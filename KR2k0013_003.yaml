body:
  text: 吳郡志卷三宋范成大撰城郭太伯城周三里二百步外郭三百餘里在西北隅名曰故吳又曰吳城在今梅里平墟人民皆田其中闔閭城吳王闔閭自梅里徙都即今郡城始闔閭舉伍子胥於耕野以為行人以客禮事之與謀國政問子胥曰寡人欲強國霸王何由而事濟子胥對曰臣聞治國之道安君理民為上闔閭曰其術奈何子胥曰凡欲安君治民興霸成王從近制逺必先立城郭設守備實倉廩治兵庫斯則其術也闔閭曰善夫築城郭立倉庫因地制宜豈有天氣之數以威鄰國者乎子胥曰有闔閭曰寡人委計於子乃使相土嘗水象天法地築大城周回四十七里陸門八以象天之八風水門八以法地之八卦築小城周十里門之名皆伍子胥所制東面婁匠二門西面閶胥二門南面盤蛇二門北面齊平二門唐時八門悉啓劉夢得詩云二八城門開道路許渾詩云共醉八門回畫舸今惟啓五門八門吳地記所紀而不載葑門續經載葑門而謂平門一名巫門與赤門二門皆不在八門之數蓋考之於今者如此方故吳時東門不開欲以絶越也梁吳均吳城賦曰古樹荒煙幾百千年云是吳王所遷東有鑄劒殘水西有舞鶴故廛縈具區之廣澤宕姑蘇之逺山僕本蓄怒千悲億恨況復荆棘蕭森叢羅網蔓亭梧百尺皆厯地而生枝階筠萬丈或至杪而無葉不見春花夏薰惟聞秋蟬冬蝶水魅晨定山鬼夜驚不知四海九州乃復有此吳城杜牧吳城詩二月春風江上來水晶波動碎樓臺吳王宫殿栁含翠蘇小宅房花正開解舞細腰何處往能歌姹女逐誰回千秋萬古無消息國作荒原人作灰閶門文選注吳王闔閭立閶門象天閶闔門吳越春秋曰城立昌門者象天通閶闔風也南史及傳記中或書作昌門蓋字之訛吳越春秋又曰昌門亦名破楚門吳伐楚自此門出也孫堅母夢腸繞昌門俗傳昌門魯班所造又傳楚封春申君於吳號云破楚改曰昌門亦非是小説或謂名望齊門乃與齊門相犯非是陸機吳趨行云吳趨自有始請從閶門起文選注引吳地記昌門者闔閭所作名曰閶闔門高樓閣道按陸機所賦此門在晉時樓閣之盛如此本朝承平時門上亦有樓三間甚宏敞蘇舜欽嘗題詩於上今廢張繼詩耕夫占募逐樓船春草青青萬頃田試上吳門看郡郭清眀幾處有新煙韋應物獨鳥下高樹遙知吳苑園淒涼千古事日暮倚閶門白居易閶門四壁鬱蒼蒼始覺州雄土俗強十萬人家供課稅五千子弟守封疆闔閭城碧鋪秋草烏鵲橋紅帶夕陽處處樓前飄管吹家家門外泊舟舫雲埋虎寺山藏色月耀娃宫水放光曽賞錢塘嫌茂苑今來未敢苦誇張蘇舜欽年華苒苒催人去雲物蕭蕭又變秋家在鳳皇山下住江山何事苦相留婁門秦婁縣所直又謂之疁今謂之崑山崑山縣東北三里許有村落名婁縣蓋古縣治所寓也齊門齊景公與吳戰不勝以少女嫁吳太子終纍所謂涕泣而女於吳者終纍闔閭長子夫差兄也早亡齊女思家吳王於此作九層飛閣令女登以望齊故名陸廣微吳地記胥門伍子胥宅在其傍吳地記云石碑見在今亡此門出太湖道也今水陸二門皆塞而新姑蘇臺館乃據其上皮日休詩青翰虛徐夏思清愁煙漠漠荇花平醉來欲把田田葉盡裹當時醒酒鯖陸龜蒙細槳輕撶下白蘋故城花榭緑隂新豈無今日逃名士試問南塘著履人盤門吳地記云吳嘗名蟠門刻木作蟠龍以鎮此又云水陸縈回徘徊屈曲故謂之盤補注門有樓寶慶三年秋大風雨樓門俱壞紹定二年冬郡守李夀朋新作之規制視舊有加蛇門在巳方故云又云越在巳地吳作木蛇北向示越屬吳也吳地記謂有陸無水即與陸門八之説相忤然今巳位正是漕河通過安得無水但門已廢不可考爾匠門又曰干將門續經止曰將門吳王使干將鑄劒於此故曰將門今謂之匠音之訛此門本出海道通大海沿松江下滬瀆今廢葑門續經曰當作封門取封禺之山以為名故屬吳郡後屬吳興今但曰葑門葑門陸路嘗塞范文正公開之今俗或訛呼富門赤門平門續經謂不在八門之數平門一名巫門巫咸所葬巫平字畫相近今猶有赤門灣近葑門吳地記又云又有葑門赤門栗門魴䱐門葑赤已見上魴䱐之類皆無所據開胥蛇門議胡舜申所作其説甚詳今具載之舜申乃舜陟之弟也通風土隂陽之術世所傳江西地理新法出於舜申紹興間自績溪徙居吳暇日以其術行四郭而相之以為蛇門不當塞作吳門忠告一篇曰吳城以乾亥山為主陽山是也山在城西北屹然獨高為衆山祖傑立三十里之外其餘岡阜纍纍如羣馬南馳皆其支隴城居隴前平夷如掌所謂勢來形止全氣之地也如秪自城中觀之則城中之地亦惟西北最高是乾亥無疑乾為天亥則紫微帝座所次是謂貴龍此城既主是山法當用金局乾亥於大五行屬金故也山如此水則當與山相應此邦水勢自東南貪狼西南及正西武曲以至西北巨門等位來其來皆聚於太湖由正北廉貞及正東東北祿存而去以入于江而歸之海其來去無一不合金局之法故自古常為大郡國今為行都藩輔而吳中人物繁夥冠蓋崢嶸所以常甲於東南今觀水之流派常自閶盤二門入即西南西北水也由葑婁齊三門出即正東正北東北水也其於來去之法固合然所以導迎善祥氣者尚有缺然蓋胥塘自正西帝旺來是謂武曲之水本由胥門入運河自吳江東南長生來是謂貪狼之水本由蛇門入頃嵗乃塞胥蛇二門而生旺之水遂不得朝鄉城中此其為害眀隂陽風水者常嘆息於斯胥塘之水尚由閶盤二門委曲而入城東南長生之水乃環城而東徑由葑門之外以出於城中了不相關此尤可歎惜故自頃以來城市蕭條人物衰歇富室無幾且無三世能保其居安土宦達者比承平時寖少至建炎之禍一切掃地至舉城無區宅能存數百千年未之有也按地理法生旺二水利害最切猶人身氣血榮衛今塞絶之能安強乎眀知者願圖回其事復開二門導水入城以幸此邦可也胥門適當姑蘇新館勢不可動又武曲但主財富而已蛇門之水為貪狼主文筆官職之事於理為重復開之便政和修城於諸故門雖已塞然皆刻石於右以識今石刻具存但襲府圖之誤以蛇門為赤門爾蛇門在城之巳方故以蛇名赤門以在城正南至陽之地其義可考況蛇門直南正對吳江運河今舟船自南來非東入葑門即西入盤門皆迂逺十數里於水行非便昔吳王闔廬始作城伍子胥實規畫之立陸門八以象八風水門八以象八卦其後諸門開閉不常吳時欲以絶越遂不開東南門即蛇門也不知塞絶生氣故終為越所滅兹亦眀效大驗至吳晉李唐時諸門未嘗不開故左太沖賦吳都有通門二八水道陸衢之語劉夢得詩亦曰二八城門開道路故晉唐時吳下最為雄盛今所啓門者五餘皆閉塞而甚不可塞者惟蛇門究所以閉塞圖經之説為其多途艱於守衛幾禁噫抑末矣今清蹕暫駐錢塘吳尤當開東南之門以申朝拱之義焉吳城門不常啓閉舊矣昔年蓋嘗於八門之外又開赤平二門而葑門陸衢蓋嘗塞矣范文正公守郡始命闢之往來至今為便誠能逺迹晉唐近效文正復闢蛇門東南虛秀之氣疏導迅發儒道利亨文物之盛非復今日吳下矣乾道甲申冬直祕閣沈度守郡與舜申舊同寮知其説心善之眀年春邦人以為請度即命官吏行視其處將以十二月乙丑啓蛇門部置巳定會屬邑輒呼帶郭民戶悉具畚鍤剋期赴役號召隱然有異意者以為擾民度避謗乃止淳熙乙未春祕閣修撰韓彥古起復為守其秋邦人申前請彥古欣然從之卜以九月十二日庚寅差役八月彥古罷是時舜申年八十五矣慨然惋惜謂天時人事難合如此復為後序告來者詞贅不録吳郡志卷三
