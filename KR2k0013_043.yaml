body:
  text: 吳郡志巻四十三宋范成大撰方技吳公子光欲謀殺王僚未有可與議者乃命善相者為吳市吏伍子胥至吴被髮佯狂跣足塗面行乞於市市人㒺有識者市吏見之曰吾相人多矣未甞見斯人也非異國之亡臣乎遂與俱見王僚吴越春秋吳王夫差興九郡之兵将與齊戰道出胥門假寐於姑胥之臺夢入章眀宫見兩䥶蒸而不炊兩黑犬嘷以南嘷以北兩鋘殖宫牆流水湯湯越其宫堂後房鼓震箧箧有鍜工前園横生梧桐謂太宰嚭曰子為寡人占之嚭曰美哉王之伐齊也章者徳鏘鏘也眀者破敵聲聞昭眀也兩䥶蒸而不炊者大王聖徳氣有餘也兩黑犬嘷以南嘷以北者四夷朝服諸侯也兩鋘殖宫牆者農夫就成田夫耕也流水湯湯越宫堂者鄰國貢獻財有餘也後房箧箧鼓震有鍜工者宫女悦樂琴瑟和也前園横生梧桐者樂府鼓聲也吳王大悦而其心不已復召王孫駱問之駱曰臣鄙淺不能占王夢東掖門亭長長城公弟公孫聖多見博觀知鬼神之情状碩王問之王乃遣駱往請公孫聖急詣姑胥之臺聖伏地而泣其妻謂聖子何性鄙人主急召乃涕泣如雨乎聖曰悲哉非子所知今日壬午時加南方命屬上天不得逃亡非但自哀誠傷吴王吾受道十年隠身辟害欲紹夀命不意率約急召中世自棄故悲與子相離耳遂詣姑胥臺吴王曰寡人将北伐齊魯道出胥門過姑胥之臺忽然晝夢子為占之聖曰臣不言身名全言之必死百段於王前臣聞章者戰不勝敗走傽偟也眀者去昭就㝠㝠也入門見䥶蒸而不炊者不得火食也兩黑犬嘷以南嘷以北者黑者隂也北者匿也兩鋘殖宫牆者越軍入吳國伐宗廟掘社稷也流水湯湯越宫堂者宫室墟也後房鼓震箧箧者坐太息也前園横生梧桐者梧桐心空不為用器但為盲僮與死人俱葬也碩大王按兵修徳遣下吏太宰嚭王孫駱解冠肉袒徒跣稽首謝勾踐國可安存身可不死吳王怒曰吾天之所生神之所使顧力士石番以鐡鎚擊殺之吴越春秋吴人殺魯班父班作木僊指吳吳大旱吳人以貨謝班班斷其手其月吴中大雨酉陽雜爼魏末有吳士目盲而妙察聲丞相嗣渤海王髙澄召試之聞劉桃枝聲曰當大貴王侯将相死於其手然譬如鷹犬為人所使耳聞趙徳聲曰亦貴人聞太原公洋聲曰當為人主聞澄聲無語王曰我家羣奴猶當極貴況吾身乎其後諸王大臣賜死者多桃枝所拉殺而澄竟有蘭京之禍洋實受禪三國典略梁張僧繇吳人丹青絶代甞畫江陵天皇寺柏堂作盧舍那像及仲尼十哲眀帝怪問釋寺如何畫孔聖僧繇曰後當賴此及廢浮圖法獨此殿有宣尼像得不毁又金陵安樂寺畫四龍不㸃睛云㸃之即飛去人以為誕固請㸃之須臾雷電破壁二龍乗雲騰上天未㸃睛者見存又畫天竺二胡僧侯景亂後拆為二一僧為唐右常侍陸堅所寳堅疾篤夢胡僧云我有同侣離拆多年今在洛陽李氏若求合之當以法力助君陸以錢帛求於其處果得之劉長卿為之記甚詳潤州興國寺苦鳩鴿栖梁上穢汚尊像僧繇於東壁畫一鷹西壁畫一鷂皆側首向簷外鳩鴿不復敢入畫筆通神如此者不可具載朝野僉載又南史夷貊𫝊張繇吴人丹青之工一時冠絶大同中瓦官寺造諸堂殿窮於輪奐其圖諸經變並張繇運手案此人即僧繇也梁顔協吳人學書於范懐約蓺過其師荆楚碑碣皆協所書大歴中有吳士顧生者以畫山水歴扺諸侯之門毎畫先幀絹數十幅於地多研墨汁及諸綵色各貯一器使人吹角擊鼓數十人齊聲大噪顧生著錦襖飲酒半酣遶絹幀十餘匝取墨汁瀉絹上次傾諸色乃以長巾一頭覆於所瀉之處使人坐壓已執巾角而曵之迴環既遍然後以墨筆随勢開決為峯巒島嶼之状妙不可言吳越時朱景環算術神妙貞眀中廣陵王元璙鎮吴景環居盤門驛上書元璙云到任當三十年安寧元璙命燭焚去謂其説尚逺未之敬也至天福庚子辛丑間忽記其事召景環問之曰算數定矣碩公計後事及期果薨顔規者本吳郡玊工廣陵王錢元璙常令於便㕔解玉王毎召術士朱景環訪問算術遁甲事規性穎悟熟聞其説盡記之一日以所記質於景環景環授以學遂精算術忠獻王甞欲享廟一日規上書言翌日利五鼓之前如用寅時則杜門在南不可出入不聽翌日寅時王車出于南門鏁以鑰壊久之不能啟遂破鑰而出由是知名王遂以為軍師齊吳郡褚思荘以善奕名世同時琅邪王抗第一品思荘與㑹稽夏赤松第二品赤松思速善於大行思荘思遲巧於鬬棊宋文帝時羊𤣥保為㑹稽帝遣思荘與𤣥保戱因製局圖還於帝前覆之齊髙帝使思荘與王抗對自食時至日暮一局未竟上倦遣還省至五更方決抗睡於局後思荘達旦不寐時云思荘所以品第致髙縁其用思深久人不能當二人竝至給事中唐開元中吳隠士周廣妙於醫受訣於同郡紀朋覩人顔色談笑即知疾深淺召至京師有宫人毎日昃則笑歌啼號若狂疾而足不能及地廣曰此必因食飽促力復仆於地而然飲以雲母湯令熟寐寐覺失所苦問之乃言太華公主載誕三日宫中大陳歌吹此宫人主謳欲其聲清長食㹠蹄美遂飽當筵歌大曲曲罷覺胸中甚憒戱於砌臺乗髙而下未及半復為後来者所激因仆地比蘇即病狂自是足不能及地又有黄門自交廣使回拜舞殿下廣曰此人腹中有蛟龍眀日當産一子即不可活矣上驚問黄門有疾否對曰臣馳馬大庾嶺大熱而渇於路傍飲野水今腹中堅痞如石周以消石雄黄煮飲之吐出物數寸其大如指鱗甲備具投之水俄頃長數尺遽以苦酒沃之復如故形上驚異禮敬之欲授以官爵固請還吳中水部貟外郎劉復為廣作𫝊敘述甚備眀皇雜録許至雍者妻亡感念不巳中秋月下簾屏間有嗟吁聲良久聞語音乃其亡妻云若欲相見遇趙十四勿惜三貫六百錢至雍驚起問之則無所見自此常志其言數年薄遊蘇州春時見少年十餘輩盛装乗畫船将謁吳太伯廟路人曰此州有男巫趙十四言事多中此皆趙生之後輩至雍曰趙生何術曰能致人魂耳至雍黙㑹妻語詣趙具陳懇切趙曰某所能致生魂耳今召死魂又令生人見之某久不為此不知果遂否君有至意又神理已先白某安得辭乃計其所費之直果為錢三貫六百擇日於堂内灑掃焚香施牀几西壁下簷外結壇場致酒脯呼笑拜舞彈胡琴令至雍處堂東隅趙生於簷外垂簾卧不語至三更庭際有人行聲趙問曰非許秀才夫人乎聞吁嗟應云是趙曰以秀才誠意懇切故敢相迎逡巡如有人掲簾見許妻淡服薄粧拜趙徐入堂内東向而坐至雍涕泗嗚咽與之語曰君行若此無枉横否妻曰命也安得枉横因問兒女家人及親舊閭里間事往復數十語至雍又問人間尚佛經謂之功徳誠有否妻曰皆然又問冥間何所貴重曰春秋奠享無不得然最重者漿水粥也趙生為致之粥至向口如食收之復如故至雍曰要功徳否妻云平生無惡豈有罪乎良久趙生曰夫人可去恐有譴謫妻乃出至雍随而泣曰碩恵一物以為記妻泣曰幽㝠唯有淚可𫝊於人代君有衣服可授一事於地至雍脱汗衫置地上妻取而審視隨以汗衫蔽面大哭良久揮手别去至雍取衫視之淚痕皆血也趙生名何蘇人皆𫝊其事靈異記吳郡志巻四十三
