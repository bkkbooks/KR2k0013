body:
  text: 吳郡志卷四十三宋范成大撰方技吳公子光欲謀殺王僚未有可與議者乃命善相者為吳市吏伍子胥至吳被髮佯狂跣足塗面行乞於市市人罔有識者市吏見之曰吾相人多矣未嘗見斯人也非異國之亡臣乎遂與俱見王僚吳越春秋吳王夫差興九郡之兵將與齊戰道出胥門假寐於姑胥之臺夢入章眀宫見兩䥶蒸而不炊兩黑犬嘷以南嘷以北兩鋘殖宫牆流水湯湯越其宫堂後房鼓震篋篋有煆工前園橫生梧桐謂太宰嚭曰子為寡人占之嚭曰美哉王之伐齊也章者德鏘鏘也眀者破敵聲聞昭眀也兩䥶蒸而不炊者大王聖德氣有餘也兩黑犬嘷以南嘷以北者四夷朝服諸侯也兩鋘殖宫牆者農夫就成田夫耕也流水湯湯越宫堂者鄰國貢獻財有餘也後房篋篋鼓震有煆工者宫女悅樂琴瑟和也前園橫生梧桐者樂府鼓聲也吳王大悅而其心不已復召王孫駱問之駱曰臣鄙淺不能占王夢東掖門亭長長城公弟公孫聖多見博觀知鬼神之情狀碩王問之王乃遣駱往請公孫聖急詣姑胥之臺聖伏地而泣其妻謂聖子何性鄙人主急召乃涕泣如雨乎聖曰悲哉非子所知今日壬午時加南方命屬上天不得逃亡非但自哀誠傷吳王吾受道十年隱身辟害欲紹夀命不意率約急召中世自棄故悲與子相離耳遂詣姑胥臺吳王曰寡人將北伐齊魯道出胥門過姑胥之臺忽然晝夢子為占之聖曰臣不言身名全言之必死百段於王前臣聞章者戰不勝敗走慞偟也眀者去昭就冥冥也入門見䥶蒸而不炊者不得火食也兩黑犬嘷以南嘷以北者黑者隂也北者匿也兩鋘殖宫牆者越軍入吳國伐宗廟掘社稷也流水湯湯越宫堂者宫室墟也後房鼓震篋篋者坐太息也前園橫生梧桐者梧桐心空不為用器但為盲僮與死人俱葬也碩大王按兵修德遣下吏太宰嚭王孫駱解冠肉袒徒跣稽首謝勾踐國可安存身可不死吳王怒曰吾天之所生神之所使顧力士石番以鐡鎚擊殺之吳越春秋吳人殺魯班父班作木仙指吳吳大旱吳人以貨謝班班斷其手其月吳中大雨酉陽雜爼魏末有吳士目盲而妙察聲丞相嗣渤海王髙澄召試之聞劉桃枝聲曰當大貴王侯將相死於其手然譬如鷹犬為人所使耳聞趙德聲曰亦貴人聞太原公洋聲曰當為人主聞澄聲無語王曰我家羣奴猶當極貴況吾身乎其後諸王大臣賜死者多桃枝所拉殺而澄竟有蘭京之禍洋實受禪三國典略梁張僧繇吳人丹青絶代嘗畫江陵天皇寺柏堂作盧舍那像及仲尼十哲眀帝怪問釋寺如何畫孔聖僧繇曰後當賴此及廢浮圖法獨此殿有宣尼像得不毁又金陵安樂寺畫四龍不點睛云點之即飛去人以為誕固請點之須臾雷電破壁二龍乘雲騰上天未點睛者見存又畫天竺二胡僧侯景亂後拆為二一僧為唐右常侍陸堅所寶堅疾篤夢胡僧云我有同侣離拆多年今在洛陽李氏若求合之當以法力助君陸以錢帛求於其處果得之劉長卿為之記甚詳潤州興國寺苦鳩鴿栖梁上穢汚尊像僧繇於東壁畫一鷹西壁畫一鷂皆側首向簷外鳩鴿不復敢入畫筆通神如此者不可具載朝野僉載又南史夷貊傳張繇吳人丹青之工一時冠絶大同中瓦官寺造諸堂殿窮於輪奐其圖諸經變並張繇運手案此人即僧繇也梁顔協吳人學書於范懷約藝過其師荆楚碑碣皆協所書大歷中有吳士顧生者以畫山水歷扺諸侯之門每畫先幀絹數十幅於地多研墨汁及諸綵色各貯一器使人吹角擊鼓數十人齊聲大噪顧生著錦襖飲酒半酣繞絹幀十餘匝取墨汁瀉絹上次傾諸色乃以長巾一頭覆於所瀉之處使人坐壓已執巾角而曵之回環既遍然後以墨筆隨勢開決為峯巒島嶼之狀妙不可言吳越時朱景環算術神妙貞眀中廣陵王元璙鎮吳景環居盤門驛上書元璙云到任當三十年安寧元璙命燭焚去謂其説尚逺未之敬也至天福庚子辛丑間忽記其事召景環問之曰算數定矣碩公計後事及期果薨顔規者本吳郡玊工廣陵王錢元璙常令於便廳解玉王每召術士朱景環訪問算術遁甲事規性穎悟熟聞其説盡記之一日以所記質於景環景環授以學遂精算術忠獻王嘗欲享廟一日規上書言翌日利五鼓之前如用寅時則杜門在南不可出入不聽翌日寅時王車出于南門鎖以鑰壞久之不能啓遂破鑰而出由是知名王遂以為軍師齊吳郡褚思莊以善奕名世同時琅邪王抗第一品思莊與會稽夏赤松第二品赤松思速善於大行思莊思遲巧於鬬棊宋文帝時羊玄保為會稽帝遣思莊與玄保戲因製局圖還於帝前覆之齊髙帝使思莊與王抗對自食時至日暮一局未竟上倦遣還省至五更方決抗睡於局後思莊達旦不寐時云思莊所以品第致髙緣其用思深久人不能當二人並至給事中唐開元中吳隱士周廣妙於醫受訣於同郡紀朋覩人顔色談笑即知疾深淺召至京師有宫人每日昃則笑歌啼號若狂疾而足不能及地廣曰此必因食飽促力復仆於地而然飲以雲母湯令熟寐寐覺失所苦問之乃言太華公主載誕三日宫中大陳歌吹此宫人主謳欲其聲清長食豚蹄美遂飽當筵歌大曲曲罷覺胸中甚憒戲於砌臺乘髙而下未及半復為後來者所激因仆地比蘇即病狂自是足不能及地又有黃門自交廣使回拜舞殿下廣曰此人腹中有蛟龍眀日當産一子即不可活矣上驚問黃門有疾否對曰臣馳馬大庾嶺大熱而渴於路傍飲野水今腹中堅痞如石周以消石雄黃煮飲之吐出物數寸其大如指鱗甲備具投之水俄頃長數尺遽以苦酒沃之復如故形上驚異禮敬之欲授以官爵固請還吳中水部貟外郎劉復為廣作傳敘述甚備眀皇雜録許至雍者妻亡感念不巳中秋月下簾屏間有嗟吁聲良久聞語音乃其亡妻云若欲相見遇趙十四勿惜三貫六百錢至雍驚起問之則無所見自此常志其言數年薄遊蘇州春時見少年十餘輩盛裝乘畫船將謁吳太伯廟路人曰此州有男巫趙十四言事多中此皆趙生之後輩至雍曰趙生何術曰能致人魂耳至雍默會妻語詣趙具陳懇切趙曰某所能致生魂耳今召死魂又令生人見之某久不為此不知果遂否君有至意又神理已先白某安得辭乃計其所費之直果為錢三貫六百擇日於堂內灑掃焚香施牀几西壁下簷外結壇場致酒脯呼笑拜舞彈胡琴令至雍處堂東隅趙生於簷外垂簾卧不語至三更庭際有人行聲趙問曰非許秀才夫人乎聞吁嗟應云是趙曰以秀才誠意懇切故敢相迎逡巡如有人揭簾見許妻淡服薄粧拜趙徐入堂內東向而坐至雍涕泗嗚咽與之語曰君行若此無枉橫否妻曰命也安得枉橫因問兒女家人及親舊閭里間事往復數十語至雍又問人間尚佛經謂之功德誠有否妻曰皆然又問冥間何所貴重曰春秋奠享無不得然最重者漿水粥也趙生為致之粥至向口如食收之復如故至雍曰要功德否妻云平生無惡豈有罪乎良久趙生曰夫人可去恐有譴謫妻乃出至雍隨而泣曰碩惠一物以為記妻泣曰幽冥唯有淚可傳於人代君有衣服可授一事於地至雍脫汗衫置地上妻取而審視隨以汗衫蔽面大哭良久揮手别去至雍取衫視之淚痕皆血也趙生名何蘇人皆傳其事靈異記吳郡志卷四十三
