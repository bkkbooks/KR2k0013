body:
  text: 吳郡志卷四十六宋范成大撰異聞崑山臨江鄉有南翔寺初掘地得石徑丈餘常有二鶴飛集其上僧有齊法師者即此地作精舍聚徒居之鶴飛來無定方隨飛來處其方必有人來施財作供無一日不驗久之鶴去不返僧為之號泣石上忽有題一詩云白鶴南翔去不歸惟留空跡在名基可憐後代空王子不絶薰修享二時因名寺曰南翔寺之西有村曰白鶴申徒有涯方外之士嘗擕一白瓷瓶自陽羡遊吳中大風雪中脫衣賃舟沽酒斗餘飲畢大吐同載者惡之榜舟者逐之有涯挈壺登岸倚樹高吟曰仲尼非不賢為世所不容嗤嗤同舟子不識人中龍溪雪戴落梅寒聲激長松狂來但清嘯一壺隱塵蹤吟訖跳身入瓶悄然無跡榜舟者大駭舉瓶碎之無見也它日同濟者見有涯擕杖於虎丘劍池側箕踞而坐知其異人不敢逼問樹萱録慶厯中李元者管城人泛舟過吳江岸傍見小朱蛇長尺餘為牧童所困元以百錢售得洗去傷血放茂草中眀年復經吳江縱步長橋有展刺來謁者稱進士朱浚少年風骨清聳趨進可觀曰大人願見君子年老久不出敢爾坐邀所居去橋數百步耳元拒不獲已乃相從過橋已有彩舫艤岸浚拉元登舟去如飛俄至一山數十吏立俟水濱乘元以肩輿欻至其處朱扉侍衛甚嚴殿閣凌空王侯之居莫及也一人髙冠道服立殿上侍立皆美人吏曰此吾王也浚引元升殿再拜王答拜曰小子閒遊江岸不幸為頑童所辱幾死其手賴君子以仁存心救此微命不然化為江濵土矣元方記救蛇事王顧浚令百拜且持元坐受其禮曰此不足報厚德乃置酒高會元從容謂王曰願聞王所以居此王曰吾南海鱗長有薄功于世上帝命為安流王且使居此江湖清深易作膏澤水甘泉潔足以養老又曰吾欲少報君有女童年未筓君若納之當得其助又以白金百斤遺元曰珠璣之類非敢吝白金易售也乃别去與女升舟諸吏送之少選至長橋别去女童自言小字雲姐年十三矣言笑惠敏元甚愛之後二年科詔下明日當試女童曰我為君入禮闈竊所試題出門不久復還探懷出題元撿閲宿備明日入試果吻合既捷薦名遂登科調丹徒簿女童之來至是六年矣忽辭去留之不可離席苒苒不復見朱蛇記皇祐中蘇州民家一夜有人以白堊書其牆壁悉似在字一夕之間數萬家無一遺者至卧內深隱之處無不到者莫知其然後亦無他熙寧六年六月龍見於郡東方黑龍二北方白龍二雲氣盛作而不雨獨承天寺前雨二寸元豐元年七月四日夜蘇州大風雨潮高二丈餘漂蕩尹山至吳江塘岸洗滌橋梁沙土皆盡惟石僅存崑山張浦沙保有六百户悉漂盡惟餘五戶空屋人亦不存元豐四年七月蘇州大水西風駕湖水浸沒民居凡邊湖者皆蕩盡或舉家不知所在松江長橋亦推去其半橋南至平望皆如掃內外死者萬餘人翌日水退村人漸獲流尸蘇匠為棺一日盡售無以繼之人云吳江以北民露地而哭平望以南刈禾而歌宣和間盛章守郡譙樓火有得一木於煨燼之餘析而為薪中有大吉字遂獻諸朝時郡學立石一株中夜有光發石上教官作瑞石放光頌亦以上聞又一日雷震大成殿柱火光滿庭東壁楣上遺一四帶青布巾大可貯五斗粟教官命以香案置庭中夜半失之宣和間楊崈字之損為吳江丞治所枕太湖雲濤汹湧震動窗戶㕔西有湖山堂堂設石棊局及石墩二一日薄暮聞下子聲小吏走觀見青巾二人對奕聞人來即起凌波而去視局上已五十許子崈案為圖以視善奕者歎其妙而莫能殫其意父老相𫝊以為竒事圖嘗板行今逸之堂亦更為㕔事矣丞郭某所記慧聚寺大殿二柱有天書如今之大篆非刋刻者一績溪火三字一蜿蜒蟠結若符篆不可曉在柱裏向人所不見字大小近二尺許好事者或模印之通鑑本末松陵陳益年少俊邁嘗冠鄉舉夜夢一人衣道服促左右於巾笥中取緑衣靴笏與益衣之益詢左右則曰楊文公也益穿袍亟覺毛骨寒凜似不能勝道服者乃歎曰惜乎有此才而無此緣即命褫去益後語其事於人不一年遂卒談選嘉祐中崑山縣海上有一船桅折風飄泊岸船中三十餘人衣冠如唐人繫紅鞓角帶短皂布衫見人皆慟哭語言不可曉試令書字亦不可讀行則相綴如雁行久之自出一書示人乃唐天祐中告授屯羅島首領陪戎副尉制又有一書乃是上高麗表亦稱屯羅島皆用漢字蓋東夷之臣屬高麗者時贊善大夫韓正彥為縣令召其人犒以酒食罷食以手捧首而𩥇意若歡感者正彥使人為其治桅桅舊植船木上不可動工人為之造轉軸教其起倒之法其人又喜而𩥇船中有諸穀惟麻子大如蓮的蘇人種之初嵗亦如蓮的次年漸小數年後只如中國麻子治平中錢忠道過吳中愛其風物留戀不能去終日諷詠遊賞遙見好女子小舟獨棹煙波間忠悅之作詩贈之有句云滿目生涯干頃浪全家衣食一輪竿女得詩擕歸呈其父蓋隱淪客也嘉忠之詩遂以女妻忠泛舟同入煙波不知所往清隱集吳郡志卷四十六
