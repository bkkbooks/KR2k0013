body:
  text: 吳郡志巻二十二宋范成大撰人物顧琛字𢎞瑋吳縣人和曽孫祖履之父倓並為司徒左曹掾琛謹確不浮華孝建初為吳郡太守以起義功封永新侯三年竟陵王誕反遣客陸延稔齎書板琛及子弟官琛執其使斬之遣二子送延稔首啓聞後復為吳郡太守琛雖貴達吳音不變顧覬之字偉仁為山隂令御繁以約晝日垂簾門階閒寂自宋世為山隂務簡而事理莫能尚也後為吳郡太守幸臣戴法興權傾人主覬之未嘗低意或嫌其風節過峻覬之曰辛毗有云孫劉不過使吾不為三公耳卒官湘州刺史諡曰簡子覬之常謂命有定分非智力所移唯應恭已守道信天任運而闇者不達妄求徼倖徒虧雅道無關得喪乃以其意命姪愿作定命論焉顧歡字景怡郡人聰敏好學母亡廬墓次遂隱遁不仕開館聚徒受業者嘗近百人太祖輔政召為揚州主簿遣中使迎歡及踐䟭乃至歡稱山谷臣顧歡上表曰湯武得勢師道則祚延秦項忽道任勢則身戮夫天門開闔自古有之四氣相新絺裘代進今火澤易位三靈改憲天樹眀徳對時育物是以窮谷愚夫敢露蠡管謹刪撰老氏獻治綱一巻伏願稽古百王不以蒭蕘棄言不以人微廢道臣自足雲霞不須祿養陛下既遠見尋求敢不盡言言既盡矣請從此退武帝永眀元年詔徴為太學博士同郡顧黯為散騎郎俱不就顧黯字長孺有隱操與顧歡俱召俱不赴顧子喬吳人梁武陵王府叅軍事以儒術知名子烜烜梁臨賀王記室亦以儒術知名子野王仕陳顧憲之字士思覬之孫性尤清直宋元徽中為建康令為政甚得人和故都下飲酒淳㫖者輒號為顧建康言其清且美焉仕齊為衡陽内史出公祿葬疫死者王夐歎曰顧衡陽之化至矣憲之雖累經宰郡資無儋石及歸環堵不免饑寒梁天監中卒遺令勿設靈筵朔望祥忌權安小牀勿用牲牢設香燈下素饌而已所著文數十萹顧協字正禮吳人晉司空和六世孫年數歳外從祖光祿大夫張永嘗攜之遊武丘山問欲何戲協曰正欲枕石漱流初舉秀才沈約覽其䇿歎曰江左以来未有斯作為湘東王記室叅軍有詔舉士湘東王表薦曰協行稱閭里學兼文義服膺墳索雅量邃逺安貧専靜奉公抗直年幾六十室無妻子臣欲言於官人申其屈滯協苦執靜退立志難奪可謂東南之遺寳昔孔愉表韓纘之子庾亮薦翟陽之徳臣雖未齒二臣協實無慙兩士見文苑英華累遷常侍卒官無衾以斂武帝為舉哀諡温子協初為廷尉正冬服單薄寺卿蔡法度欲解襦與之憚其清嚴不敢發口自丁艱憂終身布衣蔬食少時將聘舅息女未成昏而協母亡免喪後不復娶年六十餘此女猶未他適協義而迎之晚雖判合卒無嗣息博極羣書撰異姓苑五巻𤨏語十巻文集十巻並行於世顧野王字希馮烜子七歳知五經大指九歳能屬文十歳隨父之建安作建安地記長則徧觀經史精記默識天文地理蓍龜占候蟲篆字無所不通又善丹青時人稱絶侯景之亂歸本郡召募鄉黨隨義軍援都體素清羸裁長六尺又居䘮過毁殆不勝哀及伏戈被甲陳君臣之義逆順之理抗辭作色莫不壯之陳天嘉中卒官光祿卿知五禮事野王少以篤學至性知名在物無過辭失色視其容貌似不能言其厲精力行皆人所莫及撰玉篇輿地志符瑞圗顧氏譜𫝊分野樞要續洞㝠記𤣥象表又撰通史要畧國史紀𫝊未就而卒顧彪吳人以春秋左氏授朱子奢名于世顧嗣𦙍吳人父覽隋祕書學士𦙍永徽中修國史撰太宗實録又論次國史有勞封餘杭縣男終司文郎中子琛武后時拜相顧少連字夷仲吳人擢第補登封主簿邑有虎孽少連命塞陷穽移文嶽神虎不為害徳宗幸奉天徒步詣謁授翰林學士中書舍人閲十年以謹密稱裴延齡方横無敢忤者少連酒酣挺笏謂曰段秀實笏擊賊臣今吾笏將擊姦臣奮且前元友直勸解之改京兆尹東都留守表禁苑及汝閑田募耕以便民閲武力利鎧仗號良吏卒封本縣男贈右僕射諡曰敬始少連攜少子師閔奔行在有詔同止翰林院車駕還授同州叅軍韋夏卿撰少連神道碑謂顧氏復徙吳會自晉司空和洎梁給事中耀至少連十三代矣又云少連父望慕梁伯鸞於陵仲子安貧履道不辱其身該通六經髙貫百氏究天人之際盡性命之端觀夏卿所述望盖耆儒隱君子也又云子師閔以拔萃甲科次師安等三人非少子也碑見文苑英華顧禧字景繁祖沂字歸聖知龔州父彦成字子英兩浙運使皆有賢名禧雖受世賞不仕居光福山中閉户讀誦博極墳典所著書甚富注蘇文忠公詩尤詳紹興間郡以遺逸薦閑居五十年不出名重鄉里顧襄字公甫郡人太學上舍生名聲籍甚熙寧九年登第召為太學正卒歸葬虎丘戴顒字仲若父逵隱遯有髙名顒以父不仕復修其業自桐廬徙居吳吳下士人共為築室聚石引泉植林開澗少時繁密有若自然乃述莊周大㫖著逍遥論禮記中庸篇三吳守將及郡内衣冠要其同遊野澤堪行便去不為矯介宋國初建辟召並不就文帝每欲見之嘗謂黄門侍郎張敷曰吾東巡之日當宴戴公山下也陳遺郡人宋初為郡吏母好食鐺底飯遺在役常帶一囊每煮食輒剝其焦以貽母後孫恩亂聚得數斗恒帶自隨及敗逃竄多有餓死遺因此得活母晝夜泣涕目為失眀耳無所聞遺還入户再拜號咽母豁然即眀南史何求字子有其先廬江人何氏過江自司空充並葬吳西山為吳人求除中書郎不拜隱居波若寺足不踰户人莫見其面宋眀帝崩出奔國哀除永嘉太守求時寄住南澗寺不肯詣臺乞於寺拜受見許一夕忽乗小船逃歸吳隱虎丘山齊拜太中大夫又不就弟㸃仕梁杜京產郡人少恬靜閉意榮宦郡命主簿州辟從事皆稱疾去除奉朝請亦不就永眀十年孔稚珪陸澄虞悰沈約等表薦之曰竊見吳郡杜京産潔靜為心謙虚成性通和發於天挺敏達表於自然學遍𤣥儒博通史子流連文藝沈吟道奥奉初之朝掛冠辭世遁捨家業隱於太平葺宇窮巖採芝幽澗耦耕自足薪歌有餘確爾不羣淡然寡欲麻衣藿食二十餘載雖古之志士何以加之謂宜釋巾幽谷結組登朝則巖谷含歡薜蘿起抃矣不報建武初徴為員外散騎侍郎京産曰莊生持釣豈為白璧所囘辭疾不就陳景尚吳人善講誦道釋中皆不可及製靈書經大行於世梁邵陵王甚重之抱朴子何點字子晳求之弟居喪幾至滅性真素通美博通羣書善談論無所與屈世以點為孝隱士弟𦙍為小隱士士大夫多慕從之兄求卒於虎丘點菜食不飲酒三年腰帶减半宋齊之間累詔不就嘗患渴累歳不愈後在吳中石佛寺講所晝寢夢一道人形貌非常授丸一掬夢中服之自此而差時人以為淳徳所感弟𦙍何𦙍字子季仕齊為中書令領臨海巴陵王師拜表解職不待報輒去二兄求㸃並棲隱求先卒至是𦙍又隱世號㸃為大山𦙍為小山亦曰東山兄弟號何氏三髙𦙍家世少夀惟祖尚之至七十二𦙍年登祖夀以上世皆葬吳西山乃移還吳至吳居虎丘山西寺講經論學僧復隨之東境守宰經途者莫不畢至戒殺有虞人逐鹿鹿徑来趨𦙍伏而不動又有異鳥如鶴紅色集講堂馴狎如家禽年八十六孫修道吳人梁中散大夫以雅素知名子瑒仕陳皇侃郡人青州刺史皇象九世孫少好學師事賀瑒精力専門盡通其業尤眀三禮孝經論語仕梁國子助教召入夀光殿説禮記義武帝善之加員外散騎侍郎侃性至孝日誦孝經二十徧丁母憂還鄉卒所撰論語禮記義見重於世孫瑒字徳璉吳人父修道瑒倜儻好謀畧博涉經史仕梁以軍功封富陽侯陳初王琳立蕭莊於郢召瑒都督郢州刺史周將乗虚攻之瑒兵不滿千人乗城拒守遂盡有中流之地奉表歸陳封定襄侯召為領軍將軍文帝謂曰昔朱買臣願為本郡卿豈有意乎改吳郡太守給鼓吹一部改鎮公安為鄰境所憚累遷五兵尚書卒諡曰桓瑒事親以孝聞於諸弟甚篤睦性通泰有財散之親友家庭穿築極林泉之致歌鐘舞女當世罕儔嘗於山齋設講肆集𤣥儒之士冬夏資奉之處已率易不以名位驕物巧思過人為起部尚書軍國器械多所創立後主數幸其宅賦詩述勲徳及卒尚書令江總為之銘誌後主又題銘後四十字遣左户尚書蔡徴就宅宣𠡠鐫之畧曰天長路逺歳久靈多功名未勒此意如何時以為榮瑒二十子次子訓頗知名仕至髙唐太守杜之偉郡人陳武帝命以經授衡陽獻王昌孫超之全景文皆郡人微時嘗與沈攸之共乗小船出都有人止而相之曰君三人皆當至方伯不驗便是相書誤耳後超之果為廣州刺史景文字𢎞達齊永眀中卒於光祿大夫潘徽字伯彦郡人性聰敏受禮於鄭灼受毛詩於施公受書於張冲講莊老於張譏並通大義尤精三史善屬文能持論秦孝王俊令徽於馬上為賦行一驛而成復令為萬字文煬帝時為京兆郡博士褚輝字髙眀郡人以禮學稱於江南煬帝徴天下儒士集内史省講論輝博辯無能屈者擢太學博士撰禮疏百巻徐孝頴吳人祖驎梁侍中石陽侯父樞陳尚書起部郎孝頴勤學多覽善屬文性至孝丁母憂三年縗絰不離身經冬不御綿纊形體骨立杖而能起每哭臨哀聲徹於郡邑聞者亦為隕涕嘗在園中晝卧見人盜菜徐轉身向裏恐盜見之其仁行謙退皆此類也仕煬帝為學士校書郎大業雜記朱子奢吳人從鄉人顧彪授經善文辭正觀初持節使海外平髙麗百濟新羅三國之憾子奢有儀觀夷人尊畏之累遷諫議大夫唐初太廟止四室子奢始發七廟之議帝欲觀起居記録子奢曰陛下所舉無過事雖見無嫌然以此開後世史官之禍可懼也史官全身畏死則悠悠千載尚有聞乎子奢性樂易能劇談以經誼緣飾每侍宴帝令論難羣臣恩禮甚篤史徳義崑山人咸亨初隱居虎丘山以琴書自適或騎牛帶瓢出入郊郭東市號為逸人髙宗聞其名召赴洛陽尋稱疾歸公卿皆賦詩餞别徳義亦以詩留贈其文甚美天授初江南道宣勞使周興表薦則天徴赴都詔曰蘇州隱士史徳義志尚虚𤣥素履真確謙冲彰於里閈孝友表於閨庭固辭徴辟長往嚴陵之瀨多謝簪裾髙蹈愚公之谷風操可知啓沃攸佇特宜優奬委以諫曹授諫議大夫後放歸丘壑朱佐日郡人兩登制科三為御史子承慶年十六登秀才科代濟其美天后嘗吟詩曰白日依山盡黄河入海流欲窮千里目更上一層樓問是誰作李嶠對曰御史朱佐日詩也賜綵百疋轉侍御史承慶嘗為昭陵挽詞入髙等由是父子齊名翰林盛事陶峴崑山人文學自許生知八音通曉不謀宦遊富田業擇人不欺者悉付之身泛江湖遍遊煙水往往數歳不歸製三舟一自載一置賓客一貯飲饌與客孟彦深孟雲卿焦遂共載逢佳山水必窮其勝開元末名聞朝廷經過郡邑靡不招之峴不肯来自謂麋鹿野人非王公上客亦有不招而自詣者吳越之士號為水仙常慕謝康樂之為人言終當樂死山水浪迹垂三十年後遊襄陽西塞歸老於吳歸崇敬字正禮吳縣人治禮家學多識容典舉博通墳典科第一詔舉才可宰百里者復䇿髙等大厯初以倉部郎中使新羅遇風濤舟㡬壊衆謀易單舸崇敬不肯獨濟風訖息使還囊槖惟衣服東夷𫝊其清徳遷翰林學士左散騎常侍餘姚郡公表歸上冢寵賜繒帛儒生以為榮卒贈僕射諡曰宣論撰數十篇歸登字冲之崇敬子事繼母篤孝舉孝㢘髙第又䇿賢良性温恕嘗慕陸象先為人貞元初為右拾遺裴延齡得幸右補闕熊軌易疏論之以示登登動容曰願竄吾名雷霆之下君難獨處同列有所諫正輒聮名無所囘諱轉起居舍人凡十五年退然逺權勢終不以淹晚槩懐順宗為太子登父子侍讀憲宗問政所先知帝睿而果于斷勸順納諫爭内外𫝊為讜言進工部尚書封長洲縣男諡曰憲歸融字章之登之子開成初拜御史中丞湖南觀察使盧周仁取羨錢億萬進京師劾奏請還所進代貧民租入厯兵部尚書封晉陵郡公會昌後儒臣少朝廷禮典多本融議沈既濟吳人經學該眀有良史才召拜史館修撰議則天皇后進非以徳請省其紀位禮部員外郎沈𫝊師字子言既濟子材行有餘能治春秋工書有楷法舉進士禮部侍郎權徳輿於門生中推為顔子復登制科累拜尚書右丞湖南江西觀察使吏治嚴眀吏不敢罔以㢘靖聞入為吏部侍郎卒贈尚書𫝊師性夷粹無競更二鎮十年無書賄入權家初拜官宰相欲以姻私託幕府者𫝊師拒曰誠爾願罷所授故其僚佐如李景讓蕭寘杜牧極當時選治家不威嚴閨門自化兄弟子姓屬無親疏衣服飲食如一問餉姻家故人帑無儲錢鬻宅以葬沈詢字誠之𫝊師子能文辭累遷昭義節度使治尚簡易人皆便安卒贈兵部尚書左散騎常侍徐岱字處仁蘇州人本農家子於學無不通辯論眀鋭座人常屈終給事中史館修撰于公異吳人進士擢第李晟表為書記破朱泚公異為露布曰臣既肅清宫禁祗奉寢園鐘簴不移廟貌如故帝覽泣下曰誰為之辭或以公異對帝咨歎一再然仕不振而卒丁公著字平子吳人幼喪母七歳見鄰媪抱子哀感不食請於父緒願絶粒學老子道稍長父勉敕就學舉眀經授校書郎不滿秩輒去侍養父喪負土作冢貌力癯惙見者憂其死孝觀察使表上至行詔刺史存問賜束帛旌表其閭後為皇太子諸王侍讀著太子諸王訓十篇穆宗立未聽政召居禁中條詢治理且許以相公著陳遜牢切辭疾求外所至以清靜聞終太常卿公著清約守道每進一官輒憂見顔間四十喪妻終身不畜妾及卒天下惜之吳郡志巻二十二
