body:
  text: 吳郡志卷三十宋范成大撰土物下彭螖吳人呼為彭越蓋語訛也足上無毛堪食吳越間多以鹽藏貨於市嶺表録異白魚種子隋大業六年吳郡貢入洛京敕付西苑內海中以萬把别遷著水十數日即生小魚取魚子法候夏至前三五日日暮時白魚長四五尺者羣集湖畔淺水中有菰蔣處産子著菰蔣上三更産竟散去漁人刈取草之有魚子著上者曝乾為把故洛苑有白魚大業雜記鮸魚出海中鱗細紫色無細骨不腥隋大業六年吳郡獻鮸魚乾膾十四瓶浸一瓶可得徑尺盤十所又獻其作乾膾法五六月海中取此魚縷切曬乾盛以瓷瓶密封泥欲食開取以新布裹大盆盛井底浸久出布灑却水則敷然散著盤上帝以示羣臣曰昔術人介象於殿庭釣得海魚此幻化耳今日之膾乃是東海真魚亦一時竒味又獻鱸魚乾膾六瓶作膾法如鮸魚大業雜記鮸魚含肚隋大業六年亦吳郡獻之多至千頭六七月取魚長二尺珍者闕皮光徹如黃油闕醎有味賢於石首含肚時有口味使大都督會稽人杜濟者作此等食法以獻煬帝大業雜記海蝦子大業六年吳郡獻四十挺挺一尺濶二寸厚寸許先取海中白蝦子以小布袋盛末鹽封之日曬夜則平板壓乾則破袋出之包如赤琉璃美勝鰿子其説又云白蝦一石僅約五升暴殄之酷無烈於此今鰿子猶存而蝦子則人不忍作矣大業雜記鯉腴鮺出太湖隋大業十二年吳郡獻之純以鯉腴為之一瓶用魚四五百頭味過鱣鮪大業雜記蜜蟹擁劒皆大業六年吳郡所獻蜜蟹糖蟹之類擁劒即吳都賦所謂烏賊擁劒者自白魚子而下至蜜蟹等皆煬帝窮侈縱欲之時吳郡以為貢多殺物命以共口腹旋致喪亡之禍續圗經言之切矣此等物今不復製作但其事登載未詳故重録之併以為世戒紅蓮稻自古有之陸龜蒙别墅懷歸詩云遙為晚花吟白菊近炊香稻識紅蓮則唐人已貴此米中間絶不種二十年來農家始復種米粒肥而香再熟稻一歲兩熟吳都賦鄉貢再熟之稻蔣堂登吳江亭詩云嚮日草青牛引犢經秋田熟稻生孫注云是年有再熟之稻細考之當在皇祐間今田間豐歲已刈而稻根復蒸苗極易長旋復成實可掠取謂之再撩稻恐古所謂再熟者即此緑橘出洞庭東西山比常橘特大未霜深緑色臍間一點先黃味已全可噉故名緑橘又有平橘比緑橘差小純黃方可噉故品稍下而其皮正入藥今市賣橘皮多雜以柑皮及永嘉匾橘皮不可不察芝田録云韋蘇州寄橘詩云書後欲題三百顆洞庭須待滿林霜蓋南史有人題書尾曰洞庭霜橘三百顆韋正用此事余按王右軍帖亦云奉橘三百枚霜未降不可多得同出於此唐何頻瑜洞庭獻新橘賦以湖海清和遠人修貢為韻云洞庭之逺兮亘全楚而連巨吳路悠悠以窮塞波渺渺而平湖逺國出之奧壤中華之外區風土所宜兮四方各異珍果斯兮諸夏或無至於白商謝玄律改風落遙林寒生窮海枇杷落而將盡荔枝摘而不待然後浮香外散美味中成照斜暉而金色帶曉潤而霜清圓甚垂珠琪樹方而孰可味能適口玉果比而全輕在禹貢非它於周制則那充厥苞於林下發使者於江沱襄橙不得而雜楚柚不得而和所獻者皆歎其美所貴者不以其多歲崢嶸而巳晚路﨑嶇而甚逺齊方物以坌入離本枝而不返其價可重其味可珍固緑蒂而未變施素錦而猶新若夕發於南國已朝奉於北辰匪雕飾以自媚實羽翼以因人獻芹者既非其匹敵獻桃者何足以等倫豈比夫江北則枳江陵則洲隨樝梨而莫遂備職貢而無由同碩果而已矣望君門兮阻修美哉植物斯多結實者衆斯橘也栽則隔乎淮浦生則主乎雲夢獨擅美於當今及歲時而入貢仲子陵賦皇帝垂衣裳而治萬國舞干戚而來九區包之橘柚至自江湖歲以為常知方物之咸有時而後獻表庭實之何無其來則風秋洞庭霜落寰海元侯布教下吏旁採碧林冬生大小異名乍去霜蒂初辭緑莖然後盛以瀟湘之竹束以江淮之菁背楚塞以西走望秦雲而北征上方端想玄默深居穆清扇鴻鈞而不宰張大樂而無聲閲彼要荒之貢得斯華實之英乃眀四目乃序九歌朱紱方來以彰其道泰碩果可食以表其時和時和在乎務本道泰在乎柔逺一果熟知百果之不荒一方來知萬方之未晚橘之名也則珍橘之熟也惟新越彼千里獻于一人丹其實體南方之正酸其味含木德之純足以附荔枝於末葉遺檳榔於後塵然以出自荒陬升聞莫由煙波無巳歲月空流豈知夫湮沈可達職貢可修辭草澤以孤往入金門而見收物之因人也其則以衆人之象物也豈不或中儻草木之可儔希成名于入貢白居易揀貢橘書情洞庭貢橘揀宜精太守勤王請自行珠顆形容隨日長瓊漿氣味得霜成登山敢惜駑駘力望闕難伸螻蟻誠疏賤無由親跪獻願憑朱實表丹誠梅摰新橘千頭霜熟摘來新包貢虔修望紫宸它日功成許髙退社中還結素封人真柑出洞庭東西山柑雖橘類而其品特髙芳香超勝為天下第一浙東江西及蜀果州皆有柑香氣標格悉出洞庭下土人亦甚珍貴之其木畏霜雪又不宜旱故不能多植及持久方結實時一顆至直百錢猶是常品稍大者倍價併枝葉剪之飣盤時金碧璀璨已可人矣安定郡王以釀酒名洞庭春色蘇文忠公為作賦極道包山震澤土風而極於追鴟夷而酌西子其貴珍之至矣又有三日手猶香之詞則其芳烈又不待言而知蘇軾洞庭春色并引安定郡王以黃柑釀酒名之曰洞庭春色其猶子德麟得之以餉豫戲作賦曰吾聞橘中之樂不減商山豈霜餘之不食而四老人者遊戲於其間悟此世于泡幻藏千歲于一斑舉棗葉之有餘納芥子其何艱宜賢王之達觀寄逸想於人寰嫋嫋兮春風泛天宇兮清間駕洞庭之白浪漲北渚之蒼灣攜佳人而往遊勤霧鬢於風鬟命黃頭之千奴卷震澤而與俱還糅以二米之禾藉以三脊之菅忽雲蒸而霧解旋珠零而涕澘翠勺銀罌紫絡青綸隨屬車之鴟夷􅍁朱門之銅環分帝觴之餘瀝幸公子之破慳我洗盞而起嘗散腰足之痺頑盡三江於一吸吞魚龍之神姦醉夢紛紜始如髦蠻鼓包山之桂楫如林屋之瓊關卧松風之瑟縮揭春溜之淙潺追范蠡於渺茫弔夫差之惸鰥屬此觴於西子洗亡國之愁顔驚羅襪之塵飛失舞袖之弓彎覺而賦之以授公子曰嗚呼噫嘻吾言夸矣公子其為我刪之海杏大杏也范蠡宅在湖中有海杏大如拳今吳下杏猶有如小兒拳大者地理志連根柿吳令顧修期言縣西鄉有柿樹殊本合條義熙起居注方蒂柿出常熟蒂正方柿形亦方色如鞓紅味極甘鬆它紅柿無能及者近年城中園户亦接其種然味不及常熟韓梨出常熟韓丘皮褐色肉如玉每歲所生不多價極貴凡梨削皮切片不移時色必變惟韓梨雖經日不變所以獨貴頂山栗出常熟頂山比常栗甚小香味勝絶亦號麝香囊以其香而軟也微風乾之尤美所出極少土人得數十百枚則以綵囊貯之以相饋遺此栗與朔方易州栗相類但易栗殼多毛頂栗殼瑩淨耳蠟櫻桃自唐已有吳櫻桃之名今之品髙者出常熟縣色微黃名蠟櫻味尤勝朱櫻不能尚白樂天吳櫻桃含桃最説出東吳香色鮮穠氣味殊洽恰舉頭千萬顆婆娑拂面兩三株鳥偷飛處銜將火人摘爭時踏破珠可惜風吹兼雨打眀朝後日即應無梅譜并序梅天下尤物無問智愚賢不肖莫敢有議吳下所出而成大得而植於范村者十二種嘗為譜之今掇其名狀略志於此梅譜略云曰江梅遺核野生不經栽接者又名直腳梅或謂之野梅凡山間水濱荒寒清絶之趣皆此本也花稍小而疏瘦有韻香最清實小而硬曰早梅花勝直腳梅吳中春晚二月始爛熳獨此品於冬至前已開或重陽後即有花者故得早名曰官城梅吳下圃人以直腳梅擇他本花肥實大者接之花遂敷腴實亦佳可入煎造詩人所稱官梅止謂在官府園圃中非此官城梅也曰消梅花與江梅官城梅相似其實圎小鬆脆多液無滓多液則不耐日乾故不入煎造亦不宜熟唯堪青噉北梨亦有一種輕鬆者名消梨與此同意曰古梅枝樛曲萬狀蒼蘚鱗皴封滿本身又有苔鬚垂於枝間或長數寸至緑絲飄飄可玩其自湖之武康所得者則不變曰重葉梅花頭甚豐葉重數層盛開如小白蓮梅中之竒品花房獨出而結實多雙尤為瑰異極梅之變化工無餘巧矣曰緑萼梅凡梅花跗蒂皆絳紫色惟此純緑枝梗亦青特為清髙好事者比之九華仙人萼緑華京師艮嶽有萼緑華堂其下專植此本人間亦不多有為時所貴重吳下又有一種萼亦漸緑四邊猶淺絳亦自難得曰百葉緗梅亦名黃香梅亦名千葉香梅花葉至二十餘瓣心色漸黃花頭差小而繁密别有一種芳香比常梅尤穠美不結實曰紅梅粉紅色標格猶是梅而繁密則如杏香亦類杏詩人有北人全未識渾作杏花看之句與江梅同開紅白相映園林初春絶景也西清詩話云紅梅承平時獨盛于姑蘇晏元獻公始移植西岡圃中一日貴遊賂園吏得一枝分接由是都下有二本晏嘗與客飲花下賦詩曰若更遲開三二月北人應作杏花看客曰公詩固佳待北俗何淺耶晏笑曰傖父安得不然王琪君玉時守郡聞盜花種事以詩遺公曰館娃宫北舊精神粉瘦瓊寒露蘂新園吏無端偷折去鳯城從此有雙身此花當時罕得如此比來展轉移接殆不勝數吳下紅梅詩傳于世者甚多獨方惟深一篇號絶唱梅聖俞認桃無緑葉辨杏有青枝當時以為著題東坡詩老不知梅格在更看緑葉與青枝蓋誚其不韻為紅梅解嘲云曰鴛鴦梅多葉紅梅也花輕盈重葉數層凡雙果必並蒂惟此一蒂而結雙梅亦尤物曰杏梅花比紅梅色微淡結實甚匾有斕斑色全似杏味不及紅梅曰蠟梅本非梅類以其與梅同時香又相近色酷似蜜脾故名蠟梅凡三種以子種出不經接花小香淡其品最下俗謂之狗蠅梅經接花疏雖盛開花常半含名磬口梅言似僧磬之口也最先開色深黃如紫檀花香穠名檀香梅此品最佳蠟梅香極清芳殆過梅香初不以形狀貴也故難題詠山谷簡齋但作五言小詩而已此花多宿葉結實如垂鈴尖長寸餘又如大桃奴子在其中白居易郡圃新栽梅池邊新種七株梅欲到花時點檢來莫怕長洲桃李妬今年好為使君開方惟深紅梅清香皓質世稱竒添在輕紅也自宜紫府與丹來換骨春風吹酒上凝脂真教臘雪無藏處只恐朝雲有去時溪上野梅何足種秦人應獨未相知蜜林檎實味極甘如蜜雖未大熟亦無酸味本品中第一行都尤貴之他林檎雖硬大且酣紅亦有酸味鄉人謂之平林檎或曰花紅林檎皆在蜜林檎之下金林檎以花為貴此種紹興間自南京得接頭至行都禁中接成其花豐腴艷美百種皆在下風始時折賜一枝惟貴戚諸王家始得之其後流傳至吳中吳之為圃畦者自唐以來則有接花之名今所在園亭皆有此花雖已多而其貴重自若亦須至八九月始熟是時已無夏果人家亦以飣盤蓮花海棠花中之尤也凡海棠雖艷麗然皆單葉獨蜀都所産重葉豐腴如小蓮花成大自蜀東歸以瓦盆漫移數株置船尾才髙二尺許至吳乃皆活數年遂花與少城無異桂本嶺南木吳地不常有之唐時尚有植者白樂天謂蘇之東城古吳都城也今為樵牧之場有桂一株生乎城下惜其不得地因賦三絶句以唁之近世乃以木犀為巖桂詩人或指以為桂非是白居易子墮本從天竺寺根盤今在闔閭城當時應逐南風落落向人間取次生相霜雪壓多雖不死荆榛長疾欲埋長憂落在樵人手賣作蘇州一束柴遙知天上桂華孤試問姮娥有更無月宫幸有間田地何不中央種兩株栁以垂者為貴吳下士大夫家有得鳯州種者其半拂地復堆如尺石湖綺川兩旁亦有之樂天蘇州栁金谷園中黃嫋娜曲江亭畔碧婆娑老來處處遊行遍不似蘇州栁最多絮撲白頭條拂面使君無計奈春何扶芳初生纒繞它木葉圎而厚夏月取葉火炙香煮以為飲色碧緑而香隋大業五年吳郡貢二百本入洛京植之西苑時尚食直長謝諷造食經具四時飲春有扶芳飲大業雜記牡丹唐以來止有單葉者本朝洛陽始出多葉千葉遂為花中第一頃時朱勔家圃在閶門內植牡丹數千萬本以繒綵為幕彌覆其上每花身飾金為牌記其名勔敗官籍其家不數日墟其圃牡丹皆拔而為薪花名牌一枚估直三錢中興以來人家稍復接種有傳洛陽花種至吳中者肉紅則觀音崇寧夀安王希疊羅等紅淡紅則風嬌又名勝西施一捻紅深紅則朝霞紅又名富一家鞓紅雲葉及茜金毬紫中貴牛家黃等不過此十餘種姚魏蓋不傳矣王元之長洲種牡丹偶學豪家種牡丹數枝擎露出朱欄晚來低面開檀口似笑窮愁病長官吳縣廳前冬日雙開牡丹歌君不見年年三月千叢媚紫爛紅繁誇勝異尋常人戴滿頭歸醉折狂分不為貴枝間梁盡根空培人情皆待明年開化工自有呼魂術霜前喚下瓊瑶臺王母親將金粉傳麻姑齊借霞裳來主人蓋是神仙才不然此物胡為而來哉二姬勸酒誰引滿長洲懶吏先舉杯多感同年與攀折吟詩欲謝難輕發青宫校書方遁迹代我作歌如錦拆他年吾輩功業成與君共作騎鯨客菊所在固有之吳下尤盛城東西賣花者所植彌望人家亦各自種圃者伺春苗尺許時掇去其顛數日則岐出兩枝又掇之每掇益岐至秋則一幹所出數百千朵婆娑團欒如車蓋薰籠矣人力勤土又膏沃花亦為之屢變淳熙丙午歲成大植於范村者正得三十六種嘗為譜之今掇其名狀之略志於此范村菊譜略云凡黃花十七種曰勝金黃一名大金黃菊以黃為正此品最為豐縟而加輕盈花葉微尖但條梗纖弱難得團簇作大本須留意扶植乃成曰疊金黃一名明州黃又名小金黃花心極小疊葉穠密狀如笑靨花有富貴氣開早曰棣棠菊一名金䭔子花纖穠酷似棣棠色深如赤金它花色皆不及蓋竒品也窠株不甚髙金陵最多曰疊羅黃狀如小金黃花葉尖瘦如剪羅縠三兩花自作一髙枝出叢上意度瀟灑曰麝香黃花心豐腴傍短葉密承之格極髙勝亦有白者大略似白佛頂而勝之逺甚吳中比年始有曰千葉小金錢略似明州黃花葉中外疊疊整齊心甚大曰太真黃花如小金錢加鮮明曰單葉小金錢花心尤大開最早重陽前巳爛熳垂絲菊花蘂深黃莖極柔細隨風動搖如垂絲海棠曰鴛鴦菊花常相偶葉深碧曰金鈴菊一名荔枝菊舉體千葉細瓣簇成小毬如小荔枝枝條長茂可以攬結江東人喜種之有結為浮圗樓閣髙丈餘者曰毬子菊如金鈴而差小二種相去不遠其大小名字出于栽培肥瘠之外曰小金鈴菊花如金鈴而極小無大本夏中開曰藤菊花密條柔以長如藤蔓可編作屏障亦名棚菊種之坡上則垂下裊裊數尺如纓絡尤宜池潭之瀕曰十樣菊一本開花形模各異或多葉或單葉或大或小或如金鈴往往有六七色以成數色名之曰十樣錦衢嚴百花黃杭之屬邑有白者曰甘菊一名家菊人家種以供蔬茹凡菊葉皆深緑而厚味極苦或有毛惟此葉淡緑葉瑩味微甘咀嚼香味俱勝擷以作羮及泛茶極有風致天隨子所賦即此種花差勝野菊野菊旅生田野及水濱花單葉極瑣細曰五月菊花心極大每一鬚皆中空攢成一匾毬子細白單葉繞承之每枝只一花徑二寸葉似同蒿夏中開近年院體畫草蟲喜以此菊寫生曰金杯玉盤中心黃四傍淺白大葉三數層花頭徑三寸菊之大者不過此本出江東比年稍移栽吳下此與五月菊二品以其花徑寸特大故列之于前曰喜容千葉花初開微黃花心極小花中色深外微暈淡欣然丰艷有喜色甚稱其名久則變白尤耐封植可以引長七八尺至一丈亦可攬結白花中髙品也曰御衣黃千葉花初開深鵝黃大略似喜容而差疏瘦久亦變白曰萬鈴菊中心淡黃䭔子傍白花葉繞之花端極尖香尤清曰蓮花菊如小白蓮花多葉而無心花頭疏極蕭散清絶一枝只一葩葉亦緑甚曰芙蓉菊開就者如小木芙蓉尤穠盛者如樓子芍藥但難培植多不結繁曰末利菊花葉繁縟全似末利緑葉亦似之長大而圎淨曰木香菊多葉略似御衣黃初開淺鵝黃久則淡白花葉尖薄盛開則微卷芳氣最烈一名腦子菊曰酴醿菊細葉稠疊全似酴醿比末利差小而圎曰艾葉菊心小葉單緑葉尖長似蓬艾曰白麝香似麝香黃花差小亦豐腴韻勝曰白荔枝與金鈴同但花白耳曰銀杏菊淡白時有微紅花葉尖緑葉全似銀杏葉曰波斯菊花頭極大一枝只一葩喜倒垂下久則微捲如髮之鬈曰佛頂菊亦名佛頭菊中黃心極大四傍白花一層繞之初秋先開白色漸變微紅曰桃花菊多葉至四五重粉紅色濃淡在桃杏紅梅之間未霜即開最為妍麗中秋後便可賞以其質如白之受采故附白花曰燕脂菊類桃花菊深紅淺紫比燕脂色尤重比年始有之此品既出桃花菊遂無色蓋竒品也姑附白花之後曰紫菊一名孩兒菊花如紫茸叢茁細碎微有菊香或云即澤蘭也以其與菊同時又常及重九故附於菊萱草一名紫萱又名忘憂草吳中書生呼為療結花王子年拾遺記麝香萱吳中有之述異記謂香似紅藍而甚芳今吳下所植其花淡黃比常萱差瘦弱香全類末利為可貴也錦帶花又名海仙蓋王元之名也此花雖處處皆有吳中者特香略如瑞香山礬輩圃中夾路多植之梅摰海仙花泥根捧入故吳宫暖力迎隨帶漸紅風栽近木蘭殊有意留連文酒繫春石竹花草花也狀如金錢陸龜蒙石竹花詠所謂金錢買春風者陸龜蒙曽看南朝畫國娃古羅衣上碎眀霞而今莫共金錢鬬買却春風是此花鼓子花野花也皮日休虎丘詩云鼓子花明白石岸金竹不甚大色如金今多不見蔣堂嘗有詩百鎰先寒一徑深濳疑造化鑄成林貪夫或有憑欄者不見修篁但見金哺雞竹葉大多濃隂雖圍徑難得極大者而至易種其筍蔓延滿地若雞之生子衆多故名哺雞吳人謂雞鶩伏卵為哺桃枝竹皮日休虎丘泛舟云桃枝竹覆翠嵐溪白芷一名藥世傳吳白芷以吳中所出者為貴陸龜蒙採藥賦藥白芷也香草美人得以比之君子定情屬思聊為賦云日正融冷春歸飾荒覩一時之流恨撫萬古之遺香問人則不屈不宋説地則非瀟非湘搴其榮煙攜而動色擢其體雪挺而騰光諷畔牢愁子雲於焉華皓吟哀時命曼倩由是摧藏惰思矜年慵情畏晚胡繩繫晷以難駐揭車載春而不返陋君折楊栁須為送行陋君採芙蓉仍勞贈逺豈知隂晴互出雅艷相迎隈回鳯喜怨盼鴻驚侍笑者青琴作號顧謂者碧玉為名偷襞積競縈盈目斜柯而水怯鬢疊葉而雲爭蘭在口以時聞嬌如連瑣蕙牽心而不定飄若懸旌契叩難申融怡暗許石能潛遁以求偶山亦浮來而命侣誓不為巖阿竹冉冉孤生誓不為澗底松亭亭獨處於是欺皓本掩縮蕤房紅者自破蒂縹者誰披望懷沙之浦詠遺襟之詞煙分而麝墨猶溼綺斷而龍刀合知只言長信長門年年可恨未必傾城傾國箇箇生悲臨階躑躅以虛徐當户薔薇兮約弱蜂咋葉而先盡鶯踶枝而易落未若北堂公子樹芳草忘憂南國佳人佩生香辟惡露茁煙冶風條翠謔不知海傍之期逺不信人間之命薄休為上計掾空尋寶叉聊作侍中郎且乘金絡别有廬江小吏蜀郡長卿或支離而築恨或調笑以衷情不同乎稟簪裾而霧悄秉禮義以霜眀鄭交甫則江邊珮解萼緑華則席上詩成彼怡神而致問皆護節而含貞悚懼趨前雖陳辭而往訴遷延却立終抱恨而難平淚滴堪穿腸回好繫蟲織怨以成段酒蠲愁而判劑江僕射之孤燈向壁不少凄迷張記室之少婦當壚應還細麗景方駘蕩思已低摧酒疲於子建為使花困于靈均作媒何庶物之相負痛妍華而未回莫與心傷瑶圃從驚鵜鴂緬邈如防膽怯空屏宜畫魁堆歡而剩欲追尋徒嗟杯形連理而終在扇樣合可學若遇劉公伯雅夢亦沈沈如逢王母少兒書還數數栯李花小碎花也繁縟可愛陸龜蒙有栯李花賦云一枝上能萬其膚萼一萼中自參其丹白狀其實也薔薇花有紅白雜色陸龜蒙詩所謂倚墻當户一端晴綺者紅薔薇也皮日休泛舟詩所謂淺深還看白薔薇者則是野薔薇耳水邉富有之紅花又有金沙寶相刺紅紫玫瑰五色薔薇等白花又有金櫻子佛見笑等皆薔薇類也又有黃薔薇一種格韻尤髙蓴味香滑尤宜芼魚羮晉陸機入洛見王濟濟指羊酪謂機曰吳中何以敵此機云千里蓴羮未下鹽䜴時人以為名對晉書菘菜唐人有云濶葉吳菘巨根蜀蒻五色瓜吳威王時會稽生五色瓜梁時吳中亦有五色瓜歲充賦述異記藕唐蘇州進藕最上者名傷荷藕傷荷之名或云葉甘為蟲所傷傷其葉則長其根也國史補趙嘏秋日吳中觀貢藕野艇幾西東清泠映碧空褰衣來水上捧玉出泥中葉亂田田緑蓮餘片片紅激波才入選就日已生風御潔玲瓏膳人懷拔擢功梯山謾多品不與世流同芰即菱也今人但言菱諸家草木書亦不分别唯武陵記云四角三角曰芰兩角曰菱今蘇州折腰菱多兩角酉陽雜爼折腰菱唐甚貴之今名腰菱有野菱家菱二種近世復出餛飩菱最甘香腰菱廢矣吳郡志卷三十
