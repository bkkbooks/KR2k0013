body:
  text: 吳郡志巻三十三宋范成大撰郭外寺堯峯院在吳縣横山即唐免水院也院有十景謂清輝軒碧玉沼多境巖寳雲井白龍洞觀音巖偃盖松妙髙峯東齋西隱蔣堂新井歌并序云堯峯顥暹禪師有道行居常遊吳門一日且曰山中鑿石造井踰歳僅成既冽而甘大為叢林之利願得紀述以久其𫝊因作歌云白雲莽莽青山頭一穴四面飛泉流其初山間舊井涸枯腸燥吻海衆羞於時大士寳雲者頤指土脉智慮周山靈所感道心爽檀施聿来工力鳩雲鍤齊下遠雷動石火内擊飛星稠百尺虚空廓地表一泓清冽呀深幽人疑從天墮月窟或問何處移龍湫次則其徒駭殊勝競持應器嘗甘柔飢狖連臂喜跳擲渴烏引喙鳴鈎輈碧甃光中轆轤曉銀牀側畔梧桐秋寳方金地互相映谷鮒坎蛙難此留傍睨江形小衣帶下窺湖面卑浮漚何兹鑿飲有功利一掬入口醍醐優熱者濯之昏鈍決病者沃之沈痼瘳而我時邀墨客去松澗逺挈都籃游淨瓶汲引試香荈雅具羅列無腥甌比之玉乳不差别誚彼鍊丹多謬悠莬裘喜雲液鄰今兹泉眼在魯塢所苧翁既往乏鑒者水記未載予將修此山此井永不廢此歌其庶𫝊南州又題半峯亭詩云何名半峯亭堯峯路之半游客趨層崖斗上多股戰寳雲搆兹軒接引心不倦所冀冠盖来少休松石畔雄視金仙居巍乎倚銀漢自此更攀緣須臾躋彼岸李彌大雲峯何岧嶤去天餘㡬丈其下蔚華林幽禪屹相向我游先朝暾海日射巾杖飛盖不須持步步蒼松障山僧知我来羅立鳬雁行提攜兩行人為我談實相一種勿弦琴三歎無聲唱開軒面東南千里入俯仰西登妙髙臺更欲兹曠望土斷澤遶山煙濤渺雲浪恐是六鼇連蓬壺墮莽蒼又疑鯨入海偃脊起青嶂時方老火熾金石流欲煬須叟變雲雨為作雄風壯飜手囘涼秋掀舞千林響誰云免水宫自是神龍蔵三髙如可作吾欲五湖訪洗足巨浸心振衣孤峯上寄語夸奪流得飽但相忘長哦可當歌踏月下空曠僧懐深山居十詠湛湛平湖浸月明漁歌吹斷曉風清壊衣䝉頂跏趺坐不稱詩情稱道情右凊輝軒深靜含秋一鑑寛清甘聊酌齒牙寒靈巖自笑窮山骨明月泉慳只欲乾右碧玉沼聊向蒼藤掛六環滿莎嘉致伴幽閑雙眸淨洗看不厭欲結遮頭草一間右多境巖寳雲珠草廣禪林鑿石窮源意亦深長歎甘泉不當路汪汪空有濟人心右寳雲井古洞深沈莫敢窺森隂草木野雲飛白龍何處淹頭角天下蒼生待汝歸右白龍洞笑日野花青嶂下歌春幽鳥白雲間寳陀大士全身露懊惱遊人空看山右觀音巖寒松門底如張盖接引嘉賓眼倍青方丈老人迎送少未應因汝下幽庭右偃盖松下視羣山盡子孫孤髙直與月輪分善財不用别峯覓只此休時見徳雲右妙髙峯禪板蒲團消永日眀窻淨几映疎筠一爐香盡六時過轉覺山家氣味真右東齋匿影長嫌山未深閉門莫放俗塵侵如今滿眼事奔走欲向何人話此心右西隠普眀禪院即楓橋寺也在吳縣西十里舊楓橋妙利普眀塔院也孫覿記平江自唐白公為刺史時即事賦詩已有八門六十坊三百橋十萬户為東南之冠詩云茂苑太繁雄是也逮乾符光啓間大盗蠭出爭為强雄而武肅王錢鏐以破黄巢誅董昌之功盡有淛東西之地五代分裂諸藩據十數州自王獨嘗順事中國迨有宋受命盡籍土地府庫帥其屬朝京師逐去其國盖自長慶訖宣和更七代三百年吳人老死不見兵革覆露生養至四十三萬家而吳太伯廟楝猶有唐昭宗時寧海鎮東軍節度使錢鏐姓名書其上可謂盛矣建炎盗起官寺民廬一夕為煨燼而楓橋寺者距州西南六七里枕漕河俯官道南北舟車所從出而巋然獨無恙殆有數焉寺無石誌按吳郡圗經實妙利普明塔院而不著經始之歳月唐人張繼張祐嘗即其處作詩記遊吟誦至今而楓橋寺亦遂知名於天下太平興國初節度使孫承祐重建浮屠七成峻峙蟠固人天鬼神所共瞻仰至嘉祐中始改賜普明禪院而雄傑偉麗之觀滋起矣屬有天幸僅脱於兵火而官軍蹂踐寺僧逃匿頹簷委地飄瓦中人卧榻之上仰視天日四壁蕭然如逃人家紹興四年長老法遷者會其徒入居之而相其室無不修銖積寸累扶顛補敗棟宇一新可支十世寺有水陸院嚴麗靚深龍象所栖升濟幽明屢出靈響尤為殊勝而塔之役最大更三年而後就一日遷老過余言曰願有紀也余嘗怪天下多故縣官財匱力屈天子減膳羞大臣辭賜金將吏被介胄以死士大夫毁車殺牛而食而吾民則當輸家財助邊率常睊睊然舉首蹙額疾視其上無慨然樂輸之意而佛之徒無尺寸之柄無左右紹介之先瓦盂錫杖率爾至門則倒衣吐哺躧履起迎惟恐後已乃捐金幣指囷廩捨所甚愛如執左契交手相付無難色此何道也今觀遷老積精營作練學苦空弊衣糲食不以一毫私其身日以飾蠱壊起頹仆為急又飭其徒三二輩持鉢扣門或持簿乞民間日有獲焉惟資以治寺以故一方道俗皆向慕之凡所欲為無不如志故成就如此今吾鄉縣之長人者晨擁百吏坐一堂之上赫然如神明之臨又恃聲威以怛之而後吏得以投其隙吾欲以柔道理之量其力之所堪任而與之為均無急之以期無使吏廹之上下休戚共為一體人人歡然欣戴如駒犢嬰兒之慕以盡夫為民父母之道夫以子弟而事父母其於奉佛固無間然矣故著余之所欲言者為記使歸刻焉紹興十六年七月日晉陵孫覿記張祐長洲苑外草蕭蕭却憶重遊歳月遥惟有别時因不忘暮煙疎雨過楓橋張繼晚泊月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺夜半鐘聲到客船張師中吳門多精藍此寺名尤古距城七里餘冠盖日旁午斜逕通採香逺岫對棲虎巖扉横野橋塔影落前浦霜樓鳴曉鐘夕舸軋雙櫓方丈中有人學佛洞禪語跡忙心巳閑道樂行彌苦不為喧所遷意以靜為主何必深山林峯巒遶軒户程帥孟門對雲山畫不如師今一念六年居邇来寺好尤瀟灑張繼留題内翰書邊寺迎風坐一軒好山又遊楓橋偶成晩泊橋平隔岸流水漫過門朱舫朝天路青林近郭村主人頭似雪怪我到多番孫覿與温老閶闔層城外寒山古道西若人具眼隻與佛拍肩齊白浪噴鷁首黄塵送馬蹄憧憧南北路一榻有髙栖又三絶白首重来一夢中青山不改舊時容烏啼月落橋邊寺欹枕猶聞半夜鐘翠木蒼藤一兩家門依古栁抱溪斜古城流水參差是不見元都舊日花三年瘴海卧炎宵夢隔青楓一水遥萬里歸来悲故物銅駝埋没草齊腰胡珵朝辭海涌千人石暮宿楓橋半夜鐘眀日館娃宫裏去洞庭呼起一帆風張孝祥四年忽忽兩經過古岸依然窣堵波借我繩床銷午暑亂蟬鳴處竹隂多郭附師子山雲漠漠越来溪水悠悠鐘到客船未曉月和漁火俱愁咫尺横塘古塔連綿芳草長洲一老翛然自在時時来繫扁舟福臻禪院在吳縣西南四十五里穹窿山舊經云梁天監二年置今記中云唐會昌六年建寺有米芾大書詩兩壁字畫竒逸至今存焉楊宿記穹窿禪院者唐會昌六年之所建也先是蕭梁下詔取梅梁於兹地致白馬之奠感明神之徴因為白馬塢即兹院之址也至唐宣宗改元大中重興梵宇法眷承紹六世于兹事曠繕完迨今百載飛梁朽以虹㫁危簷壓而翼摧則燥濕之患是生矣大教不泯招来信人天王嗣位之八年粤有當院徒弟奉安發志必葺果得檀那繼踵而至自夏侯鍾離二氏等一百五十餘人咸蠲淨緍鼎新大壯殿堂爽塏廊廡轇轕璇題次第以輝鮮金地迴環而嚴潔於戲阿含所云若能補故寺者是謂二梵之福則安師之興葺能事有是夫諸檀信之慈悲喜捨有是夫魁兹勝事願勒貞珉聊奮直筆為紀歳時皇宋景徳四年五月九日記寳積寺在横山下亦名楞伽寺山頂有塔隋人所書塔銘碑石全好字畫秀整絶類虞褚大抵隋人書法兼𫝊晉宋間造意甚可珍今錄之吳郡横山頂舍利靈塔銘竊以至理無言非言無以寄理𤣥蹤無體非體無以眀蹤然則八十種好呈應身之妙三十二相表化質之妍至如獻土童兒聚沙稚子尚獲無窮之報猶成莫盡之因況捨身命重財崇諸聖業者矣但樹因之最無過起塔崇福之重詎甚建幢而銀青光禄大夫吳郡太守李顯者乃華陽杞梓江漢芳蘭夙布素誠少匡王國吐納風雷之際出處朱紫之庭縻爵峻於其身隆基茂於往葉温良洽于郡國孝友睦于閑門建節贊治張振化風門雖望族世載公卿安仁樂智之心無違終食謙明恵厚之徳造次必存仍共奬勸郡部宫人奉為皇帝皇后齊王六宫眷屬各捨七珍同崇八福在郡城之西山頂上營造七層之寳塔以九舍利置其中金瓶外重石槨周護留諸弗朽遇刧火而不燒守諸不移漂刧水而不易時有龍華道場比丘法首者歳居齠齓即起踰城之心年將志學仍持航海之操自離親捨俗三十許年洞識苦空明閑法要誠心内發㝠夢外酬時聞此山有古之佛殿乃共於此所成斯勝業願寳鐸常摇法輪恒轉含生迴向歸心上通有頂之天傍及無邊之地同離生死之苦俱成湼槃之樂其辭曰相焉是滅法矣非生盖纒虚萃渴愛徒盈不無不有何體何名業風既息法水便清以兹勝地令徳来持功施合矩化動成規如雲出岫狀月臨池清流不倦貽銘無疲䖍心局體同歸共慕施彼七珍崇斯六度下被羣品上資天祚萬福莊嚴千靈輔䕶少宣令問待秀苗聚輪轉三有馳流六通獨善非徳兼濟為功俱成法雨用息塵籠大隋大業四年歳次戊辰九月辛未朔八日戊寅立銘吳郡司户嚴徳盛製文司倉魏瑗書智顯禪院在吳縣西南三十里寳華山孫規新鐘記寳華山智顯禪院面震澤之洪瀾背長洲之故苑左控洞庭之峻右挹靈巖之巔刻蟠之閾相望遊麋之墟密邇真三吳之佳地一方之上游先是梁天監中有僧號憨憨者至自梵天營立香界植錫杖之故所化靈源之尚存年祀滋深締架㡬圯國朝祥符乙夘歳故府侯崇儀秦公羲當巋然之未墜思勉矣而可興其疇尸之必有能者即以今心印師居焉増卑為髙肇建宫殿之類岌起金碧垂一紀間精廬克備云云實相院在吳縣西南七十里古廢寺也梁大同十年再興皇朝大中祥符元年改今名光福寺在吳縣西南七十里舊有銅像觀音歳有水旱郡輒具禮迎奉入城祈禱必應淳熙初年為人盜去至十四年再得之元祐中建安黄公頡銅觀音像記光福寺距城六十里有銅像觀音其始作者與其歳月予不得知也康定改元六月志里張氏於廟傍之泥中覩焉時久旱弗雨相與言曰觀音示現殆有謂乎廼具梵儀禱焉即時雨降以是凡有禱而弗獲者州人必請命于刺史而致敬無不得其感報夫道之在天下其廢興有數而出處有命亦惟其時而巳盖習俗沈迷之日久矣必將有以薫沐其邪意啓廸其善心教令既不足以敺之於是時聖人出而輔世其在吳越則若四眀之奉化東陽之雙林錢塘之天竺是也或因乎俗之所趨或寓乎物之所感顯相示化變出不窮以是因縁不假言説凡見聞者隨其願求各有所得則雖頑嚚抵冒之人亦將有以善其心況根性之厚者乎則其所以輔世者豈小補哉此其佛教行乎中國人之所賴以悔罪祈福者宜乎曠世厯年而弗絶也予母葬于寺之西南常過其上僧藴恭屢求為記予不得辭也因序其事云唐顧在鎔題光福上方蒼島孤生白浪中倚天髙塔勢翻空煙凝逺岫列寒翠霜染疎林墜碎紅溪渚或棲彭澤雁樓臺深貯洞庭風六時金磬落何處偏傍葦䕺驚釣翁澄照寺在長洲縣西北陽山下天禧五年陳最記佛宇之興其来尚矣自竺乾入洛象教歸周琅函流貝葉之文寳塔閟玉毫之相莫不圗諸爽塏樹乃精藍茍非背山而面林左泉而右石則何以延大千之開士啓孤秀之名園是故鷲嶺雄標世尊因而説法雙林秀拔恵遠由是奠居盖人境之兩殊亦古今而一致蘇州郡城之西北三十五里山曰陽山山之下寺曰澄照先是唐會昌中丁某施白馬澗宅為白鶴寺後有龍興寺僧知又因遊其上縱目周覽嗟其年祀寖逺名額僅存榛莽靡除基址甚隘於是鴻臚卿左衛大將軍曹茂達六代孫𤣥祚捨祠堂基以搆寺不改舊額因而遷之始剏茒茨數十間而已觀其崗巒環合巖谷洞呀真佛者之津梁乃道林之形勝靈啓其地人興厥謀決智力而有開獲明神之来乂寺中有靈泉潛發莫窮其源決洩盖自於神功疏鑿豈因於人力引山渠者數派溉民田者百塍水旱不更其淺深逺邇必沾其潤利吴國彭城威顯公嘗而異之因改曰仙泉我宋祥符初始賜今額乾徳中乂公既没上足藴明嗣而續之香火無廢道者藴與亦乂公弟子也勇猛精進出於常倫痛先志之未終發精心而善誘由是智者獻謨壯者効用經始勿亟舉而新之敞廣殿以安睟容飾華龕而庋大蔵厨有庫香積之供成僧有堂收雲之衆集辰昏是警鼓鐘於百尺之臺水陸致䖍設位於五層之閣而又置懴院法華院亭榭髙掲房廊繚周耽然巍然不勝其壯觀矣開寳中太保韓公承徳復捨梳洗樓為塔院詳其始末敘厥廢興見徴蕪辭用紀珍琰維時天禧五年十一月二十一日記明因禪院在吳縣西南横山下即薦福山感慈禪院也凌民瞻重建方丈記世之為放曠曼衍之言者指宇宙為極矣如来眎宇宙猶一漚也嘗以大千世界為言斯多矣而未極其廣也嘗又以殑伽沙世界為言斯廣矣而未得為無量也然則無量者非世論所可計矣如来能以如是無量世界置諸虚空而不墮納諸芥子而不廹擲之方外而無動沃之巨浸而不溺神化無方理絶思議是莊嚴偈云淨土如所欲受用皆現前盖言諸佛如来遊戲三昧自在若此雖欲貿梵世於忍土遷内苑於鷲峯固為不難然且徇須達之請而經營舍衛之室忍其虚府庫殫智力而後成豈神境妙用不足尚耶嗚呼非具大悲者孰能與於此衆生差别知見㝠鈍要以檀施攝其初心由是言之祇園精舍豈一手一足為之哉兹院成於國初景祐中璿玠師頗易舊宇其間未葺者日益隳圯長老唯廣師補漏支欹迨已四稔尺椽寸甓不以强人凡興斯緣莫非樂施熙寜七年四月二十七日始工後十月而工畢坎髙増庳廣倍舊址欂櫨榱桷亦攻堅材圬墁斲削皆聚良匠美哉輪奐不日而成如天持来若地湧出物不終否在人而興僝工之初予嘗謂師曰弟子貧不能以財施弱不能以力施它日願施鄙文讃勝事明年師故遺書来岳陽從索斯記師昔住天峯盖有甚大緣事未嘗刻一言今反記此者是欲攝我以文施因得記其歳月焉湧泉院在吳縣西南横山之下舊為程師孟光禄香火院故程公賦詩甚多比年其家不振伐木毁屋以其地賣為劉孝韙侍郎之墓程師孟入湧泉道中十三詩小航時過越溪頭當日呉宫事可求西子冶容来作餌伍貟忠憤反為讎雖無别館虹蜺帶但有荒臺麋鹿遊髙望太湖千萬頃夕陽依舊水東流窮冬未見六花飄春意微微動栁梢千丈龍形蟠暮嶺一條虹影落溪橋閶門飛跨何清泚茂苑繁雄未寂寥切幸早歸頻出郭西山隠客不須招因省先塋到故都不妨閑步問耕夫水雲蒼莽遥連洞田野低窪稍近湖秋熟㡬家收橘柚日生衆口藉菰蒲今朝偶得西華稻僧飯年年出玉腴道出横塘跨石梁塘南塘北稻花香風吹舴艋輕如駛日照浮圗峻若翔逺岸漁樵三兩兩近村鵝鴨一行行囘頭却指城南路雲屋朱樓氣鬱蒼寒林已見早梅芳盡日臨流野興長門外牛羊人自得籬邊雞犬盜誰防三江夜色滄浪白千里秋香􅛉稏黄借問船中何所有橙虀鱸鱠酒先嘗舟行如葉泛長川解水吳兒力可全風急輒先千浪破岸欹能把一䉡牽湖沈日影山頭畫雲漏天光雨足懸試向中流東北望城南寳塔在門前告老清朝分自安從今榮悴不相關有愁方見田家樂無事纔知釣叟閑世故要看終始後人生未免是非間婦墳更在公塋側一舸夷猶遂往還誰何不欲蚤忘機今已髙年古亦稀翠栁隂中黄鳥過青山影裏白鷗飛新春已到無髙下故里重過有是非人意不如毛羽意聲聲猶道不如歸天宫寺在吳縣西南四十里梁武帝天監中所營唐徳宗重加興飾天聖間重新前進士張汴為之記水月禪院在洞庭山縹緲峯下梁大同四年建隋大業六年廢唐光化中僧志勤因舊址結廬天祐四年刺史曹珪以眀月名之皇朝祥符間詔易今名山有無礙泉紹興間始名贊寧寄題水月參差峯岫畫雲昏入望交蘿濁浪奔震澤湧山来北岸華陽連洞到東門日生樹掛紅霞脚風起波摇白石根聞有上方僧住處橘花林下採蘭蓀積翠湖心迤邐長洞臺蕭寺兩交光鳥行黑㸃波濤白楓葉紅連橘柚黄人我絶時隈樹石是非来處接㠶檣如何遂得追遊性擺却營營不急忙慶厯七年蘇舜欽記予乙酉歳夏四月来居呉門始維舟登靈巖之巔以望太湖俯視洞庭山歸然特起雲霞采翠浮動於滄波之中即時據欄竦首精爽下墮欲乗風跨落景以翺翔乎其間莫可得也自爾平居緬然思於一到惑于險説卒未果行則常若有物偪塞於胸中是歳十月遂招徐陳二君浮輕舟出横金口觀其洪川蕩潏萬頃一色不知天地之大所能并容水程泝洄七十里而遠初宿社下踰日乃至入林屋洞陟毛壇宿包山精舍又泛明月灣南望一山上摩蒼煙舟人指云此所謂縹緲峯下也即岸步自松間出數里至峯下有佛廟號水月者閣殿甚古像設嚴煥旁有澄泉絜清甘涼極旱不枯不類他水梁大同四年始建佛寺至隋大業六年遂廢不存唐光化中有浮屠志勤者厯遊四方至此愛而不能去復於舊址結廬誦經後因而屋之至數十百楹天祐四年刺史曹珪以眀月名其院勤老且死其徒嗣之迄今七世不絶國朝大中祥符初有詔又易今名子觀震澤受三江吞齧四郡之封其中山之名見圗誌者七十有二唯洞庭稱雄其間地占三鄉户率三千環四十里民俗真朴厯歳未嘗有訴訟至于縣吏之庭下皆樹桑梔柑柚為常産每秋髙霜餘丹苞朱實與長松茂樹參差間於巖壑間望之若圗繪金翠之可愛縹緲峯又居山之表民已少事尚有歲時織紃樹藝捕採之勞浮屠氏本以清曠逺事物巳出中國禮法之外復居深逺絶勝之地壤斷水懾人跡罕至數僧宴坐寂黙於泉石之間引而與語殊無纎芥世俗間氣韻其視舒舒其行于于豈上世之遺民者邪予生平病閟鬱塞至此嚗然破散無餘矣反復身世惘然莫知但如蜕解俗骨傅之羽翰飛出乎八荒之外吁其快哉後二年其徒心源造予乞文識其居之廢興欣其誠請攬筆直述且敘昔遊之勝焉湯思退尉吳縣時遊水月長短句畫船横絶湖波練更上雕鞍窮翠巘霜橘半垂黄征衣盡日香鐘聲雲外聽金界將松映何處是華山峯巒杳靄間李彌大無礙泉詩序水月寺東入小青塢至縹緲峯下有泉泓澄瑩澈冬夏不涸酌之甘冽異於他泉而未名紹興二年七月九日無礙居士李似矩靜養居士胡茂老飲而樂之靜養以無礙名泉主僧願平為煮泉烹水月芽為賦詩云甌研水月先春焙鼎煮雲林無礙泉將謂蘇州能太守老僧還解覓詩篇夀聖院在吳縣西南二十里晉天福五年吳越國中吳軍節度使威顯公文奉創建以奉其父廣陵王元璙墓祀初名吳山院至本朝治平中改賜今額崇寧元年威顯之孫奉儀郎賜緋魚袋錢公著立石俾承議郎行少府監丞雲騎尉强浚眀為之記元祐八年九月辛已同郡錢君慎微過余言曰昔我先王既荒吳越維子若孫分建藩屏我髙祖廣陵宣義王實鎮中吳父子再世嗣有節鉞逮我皇祖司封始至而仕于朝然自廣陵而下四世皆葬于蘇晉天福辛酉歳曽祖威顯公始建寺於吳山之麓以為薫修之所因其山名之曰吳山院本朝天聖丁夘歳主僧惟久嘗遷其寺少南既又遷瓦塢最後遷宋塢則今所建寺之地也治平中賜今名壽聖院厥初屋纔數十間僧徒甚寡歳久益壊而僧之来者日衆先將軍為出緡錢二十萬俾其徒懐政合衆財以新之然後瞻禮有殿講説有堂井廬庖湢無不完具又俾其徒懐遇即寺之側相衍沃之地闢田畝百歳更豐㓙不資檀施而寺常足食先是法堂獨庳陋不稱寺僧智来又侈大之以増其舊此寺之興踰百年更三遷歴吾家四世而後大備其成之難如此幸此寺日益新僧之来者日益衆則錢氏之興可知也恐後来者無以考也吾子試為我書之余曰唯唯詞曰武肅多子大王小侯厥初啓宇十有三州分建子弟維藩維屏維時中吳控扼外境廣陵受鉞開壤千里文穆之兄武肅之子生有其土死即葬之父子孫曽相望纍纍在晉天福當威顯公相方視址爰作佛宫桓桓將軍世濟其美百年于兹寺更三徙浮圗惟久實繁有徒修敝徙廢不忘其初太湖之濵吳山之原㫁石刻辭敢告後昆吳郡志巻三十三
