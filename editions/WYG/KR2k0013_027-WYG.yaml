body:
  text: 吳郡志巻二十七宋范成大撰人物顔孚字端中長民幼子崇寧間有聲太學士行甚美毎試必居前列時人目為顔夫子争願識其面與兄采相繼髙科孚擢第未㡬蚤卒鄭景平字希尹居帶城橋剛正不撓所涖官有㢘介稱甞為大理官毎有疑獄中夜拜禱蘄得其情請老家居朝廷以其能詔復起知饒州數月復拂衣歸或問故答曰天子命景平為郡守當以撫字為職乃不得行志今日須金若干眀日須粟若干民巳枯骨矣捶拷不出吾安得不歸時朱勔用事撓權從之者甚衆獨景平終始不見子絪字天和亦能文屢為郡徐奭字武卿建州建安人大中祥符五年進士第一釋褐為将作監丞通判蘇州又為兩浙轉運副使其在蘇水潦為沴具區東南毁隄防溺廬舍漂田疇不可勝計奭為周視盡得舊迹請于朝市涇以北赤門之南築土石隄九十里起橋梁十有八計費七十萬舟徒無墊溺之憂隄上下復良田數千頃蘇人徳之入為翰林學士權知開封府卒故其家後居于蘇子師閔年六十餘以左中散大夫普寧郡侯致仕居蘇為蒋堂蔡襄所知在官自輔臣以下薦之者㡬百人及退歸與元絳程師孟諸人以詩酒相過號十老鄉人榮之年八十乃卒葬蒸山徐師回字望聖師回甞守南康蘇文定公轍為作直節堂記黄庭堅眀月泉銘誰賞音徐望聖一時名重如此子閎中為吏有能名為吏部郎子林兢徐林字稚山宣和三年進士少有特操從母之夫王黼柄國用事獨不肯附麗寧坎壈卑官紹興初上書言事召對改官累遷太府少卿出為江西轉運副使劾秦丞相檜親黨坐是以沮經界法貶興化軍十三年更化復入為刑部户部侍郎論國用太廣宜撙節之隆興初為吏部侍郎復論符離之役為非計遂以敷文閣直學士奉祠知平江府力辭旋乞致仕再以給事中召辭疾不起遷龍圖閣學士卒年八十餘葬靈巖山之西世稱賢侍從以林為首少居吳縣硯石山下自號硯山居士弟兢字眀叔官刑部郎中善篆書次弟徳止遜官於從子而學佛徽宗賜號圎通禪師子蕆亦登科有學行甞為浙東提舉常平魏憲字令則紹興四年進士累遷國子司業親喪三年弗御酒肉廬於冢次塋域有芝草甘露之祥再為司業以學行見推徧歴中外師儒之選兼太子舍人遷中書舍人給事中吏部侍郎歸鄉名所居曰止菴優游求志十餘年終時無疾危坐禪榻取水盥手泊然而逝年七十三潘兌字說之吳人崇寧三年進士累官至中書舍人左諫議大夫刑禮吏部侍郎終徽猷閣待制路允迪為之銘略曰言語文章一本六經之醇修身則毅然有守終無玷缺云凌哲字眀甫吳人宣和六年進士自眀州通判召對髙宗擢為御史數日遷右正言又遷左司監吏部侍郎兼侍講以敷文閣待制知台州遂退歸里居澹約自守鄉里稱其徳量挂冠十餘年卒年八十六王葆字彦光崑山人逸野堂僖之姪宣和八年進士崑山自郟亶登科有孫載載後六十年葆始繼之邑人以為奇事葆學行俱髙潛心古道著春秋集𫝊十五巻春秋備論二巻誘掖後進推誠樂育如親子弟門下士多成立者號稱鄉先生初主麗水簿上疏陳十弊事皆人所難言紹興間歴司封郎官監察御史崇政殿說書終浙東提刑王公於人物鑒裁尤精樂巷李侍御史衡布衣流落一見以女弟妻之左丞相周益公必大初第以女妻之知其為國器也成大以蚤孤廢業一日呼前喻勉切至加以詰責留之席下程課甚嚴未㡬亦忝科第邊知白字公式曽祖珣自陳留官姑蘇樂其風土遂世為吳人知白宣和六年進士孝友醇誠蹈繩墨規矩清虛寡欲號為吉人而學佛尤盡誠紹興中歴户部郎官将作監户部吏部侍郎直學士院歸鄉築室郡南金獅巷為終焉計卒年六十五贈徽猷閣待制少遊廬山夢人吿曰君本江南僧終當尋盟去龔明之字希仲宗元之曽孫祖母李及笄時得寒疾夢神吿曰與汝七十七大觀中行年適滿夢數病革自意必死眀之夜禱於天􅂅減己算五年以益祖母夀炷香於頂上須臾腦中爆裂有聲不為動控懇益切翌日李病巳至八十三乃終明之蹭蹬舉場以特恩廷試年巳八十二法不應出官吳士在朝者列其行義薦之得監南嶽廟淳熙五年乞致仕鄉人又請之朝遷宣敎郎致仕賜五品服居崑山黄姑别墅作期頤堂日飲其間一日感㣲疾精神蕭爽親友問疾者歌以答之遺令毋設仙釋像於柩前供一水一花誦論語孝經足矣年九十二朱良字良伯吳郡人其先累以進士登第祖公綽光祿卿父季端為郎屢典名郡建炎中良仕秀州海鹽縣尉金人來侵車駕南幸游騎及縣境良謂僚友曰今日乃忠臣義士死國難之時也乃被甲執戈集所部百餘輩奮厲而前遇金人於境身先赴敵出入行陣手殺數人餘衆為之披靡衆寡莫當竟以死敵其子思䝉恩録用今以朝議大夫守漢陽軍胡元質字長文長洲人父珣治生大穰所親為之宰負金萬數珣焚其書待之如常元質少穎悟年未冠游太學紹興十八年進士髙第亦有隠行初旅泊行都聞鄰有貧士夜哭問之乃為人責償鬻其女相與别元質慨然垂槖予之夀皇即政以薦者入為太學正歴祕書省正字校書郎禮部兼兵部遷右司侍經帷直史筆參掌内外制給事黄門知貢舉帝眷特厚為書王褒聖主得賢臣頌及親製論以賜曰得天下之常才易得天下之大才難盖常才智力之有限而大才謀慮之無窮此大才所以為難得也今之朝士大夫當居臺諫給舍侍從之時評議朝政十中八九謀王體斷國論有優為之者及一旦遷入政府往往識慮詳明頓減於前使人得以反議其後諺有旁觀者審當局者迷此不特為奕者之論以今日之秉政何翅於當局以昔日之言事何翅於旁觀倘能易當局之迷而為旁觀之審天下之事有不足辦者雖然是豈可與牽文泥古沽名釣利號為俗儒者言之必得器識宏博奇謀逺略卓然為天下之大才者然後可與共非常之功歟出守當塗建業成都皆有政績舊得程公闢光禄南園故居之址既歸杜門郤掃園林池館日以成趣扁表其堂曰招隠優游自遂奉祠逾六七年以正奉大夫敷文閣學士吳郡侯致其事而卒年六十三贈金紫光禄大夫葬横山平居未甞疾言厲色加人或評人短長及告以人之傾已輒俛首欲寐毎自謂於人無怨惡其心休休然好善樂施家貲多推予諸弟未始較人皆義之烈女吳孫奇妻范姬年十八配奇一年而奇亡父母以姬少寡無子迎還其家姬不肯歸迎者迫之姬操刀割耳及鼻曰父母迎我者不過以我年少色美今已殘矣行将焉如於是迎者空反烈女傳張氏三女吳人皆有節行兄温為孫權所囚姉妹已嫁者皆見録奪其中妹先適同郡顧承官以改嫁丁氏成婚有日飲藥而死吳朝嘉歎鄉里圖畫為之賛頌吳文安𫝊陸鬱生績之女績守鬱林所生故以名適同郡張温弟白有志節姚信甞表稱之曰竊見故鬱林太守陸績女子鬱生少履貞特之行幼立匪石之節年始十三適同郡張白侍廟三月婦禮未卒白遭罹家禍遷死異郡鬱生抗聲昭節義形於色冠蓋交横誓而不許奉白姊妹嶮巇之中蹈履水火志懐霜雪義心固於金石體信貫於神眀送終以禮邦士慕則臣聞昭徳以行顯行以爵茍非名爵勸善不嚴乞聖朝斟酌前訓褒鬱生以義姑之號以厲兩髦之節吕榮許升妻也升遊誕博戱不治操行榮躬勤家業以養其姑勸升學問常垂淚言之榮父惡升欲改嫁之榮曰命之所遭義無離異不肯歸升後感悔尋師逺學四年乃歸遂致名譽為州所辟遇劫被害榮手刃殺升者以首祭升烈女傳一說吳郡烈女吕榮許升妻也升為賊所殺遂欲干穢榮秉節不聽遂遇害是日雷雨晦暝賊懼叩頭謝屍葬之後刺史名其里曰義婦坂文樞鏡要晉張林妻徐氏者案張林碑曰夫人姓徐吳郡人柔恵清順中和聖善婦徳既備母道亦踐志厲氷玉厥徳丕顯靡靡其操翼翼其仁眀景内映朗節外新共媺風邁淑謹其身張茂妻陸氏郡人茂為吳郡太守為沈充所害陸傾家産率義部曲討充充敗詣闕上書為茂謝不尅之責詔曰茂夫妻忠誠舉門義烈宜追贈茂太僕宋顧琛吳人母孔氏孫恩亂後東土饑荒孔氏發家糧以賑邑里得活者甚衆生子皆以孔為名張沖張敖母戴顒女也有儀範張氏内取則焉沖敖皆為名士宫人韓蘭英郡人有文辭孝武時獻中興賦被賞入宫眀帝用為宫中職僚齊武帝以為博士敎六宫書學以其年老多識呼為韓公齊武帝或云前廢帝范法珣郡人妻褚氏勤苦執婦業昇眀中孫曇瓘謀反褚謂子僧簡云孫越州先姑之姉子汝宜收之曇瓘既伏法褚令僧簡往斂葬永眀中年七十餘卒僧簡在郡未至褚將殯舉尸不起尋而僧簡至焉梁青冀二州刺史郡人張稷女楚媛適會稽孔氏無子歸宗州人徐道角作亂害稷楚媛以身蔽刃同遇禍後周宣帝四后朱氏小女滿月吳人生静帝後立為皇后班亞楊后静帝立尊為帝太后隋初為尼改名法静古今小名録長安縣君丁氏晉公之妹陳君子之奇之母也晉公欲官二甥縣君固辭俾自以學術進晉公竦然稱歎之奇兄弟繼登科鄉里𫝊縣君之賢安定胡先生著丁氏賢恵録蘇子美書之吳郡志巻二十七
