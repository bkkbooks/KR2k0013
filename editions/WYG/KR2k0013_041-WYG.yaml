body:
  text: 吳郡志巻四十一宋范成大撰仙事王可交松江南趙屯村人以釣耕自業常取大魚烹之𢷬蒜虀大嚼樂之不厭一日棹舟擊檝髙歌江行數里間歘見采舫盪漾中流中有道士七人皆年少玉冠霞帔服色各異侍者十餘人總角雲鬟又四人黄衣櫂船一人呼可交姓名不覺漁舟巳近舫側一道士令總角引可交上見七人前各有青玉盤酒果之器皆瑩徹有光不可識又有女妓十餘悉持樂器可交立筵末遍拜七人共視可交一人曰好骨相合仙已炙破矣一人曰與之酒侍者瀉酒樽中酒再三瀉之不出一人又曰與栗喫一人取二栗付侍者與可交栗色青光如棗長二寸許嚙之有皮非人間者比肉脆而甘如飴久之食方盡一人曰王可交巳見之矣可令去敕黄衣送上岸尋向所乗漁舟不復見黄衣曰不必舟但瞑目自到於是閉目聞風水林木浩浩之聲有頃呼令開眼則失黄衣所在惟見峯嶺複重松柏㕘天坐草中石上望見有大門樓乃在天台山瀑布寺前採樵者并浮屠十餘人皆来問可交所從来具以前事對又問何日離家曰今日早離家又問今日何日對以三月三日樵與僧大驚曰今九月九日矣且去君鄉水陸千餘里僧邀可交為具食可交不喜聞食氣唯飲水耳寺僧以状白唐興縣以達台州州以聞越州㢘使王渢召見之可交身長七尺餘儀貌殊異言語精爽渢歎曰此誠真人又以其同姓益敬之飾以道服而遣人之蘇州詰其家具言三月三日可交乗漁舟入江不歸家人訪得漁舟謂已水死跡其尸不可得巳招魂葬之渢具以表聞可交後歸鄉里與鄉人到江上指所逢采舫之處依然自食栗後即絶粒舉止若有神助不復耕釣挈妻子入四眀山二十餘年復出明州賣藥酤酒得錢即以施人且言藥則壺公所授酒則餘杭阿母相𫝊藥已疾有驗酒亦致佳時皆稱王仙人藥酒道俗多圖其形像後三十餘年入四眀山今人時有見之者續神仙𫝊單以清常熟縣元陽觀道士大歴中甞之嘉興入船聞異香疑有非常人遍目同載唯船頭一人儀趣頗殊單君遷坐與並席香氣彌甚因從容問之答曰吾此地人少病大風逃于深山遇一老人哀之令從行有草堂數間老人曰汝且居此堂一月後自来視汝以藥圜一裹令餌之老人遂行更入深山吾入堂餌藥不飢渇身日以輕兩月老人方来笑曰有心哉故在此疾已差矣至水濱照之鬢眉皆生顔色益少老人曰汝既服吾藥可長生人間且勤修道術以二十年為期遂導令却歸吾因拜問其姓名老人曰子聞國初衛公李靖乎我是也乃辭出山今年限将及再入山尋師耳單君因記其事為人道之原化記蒋生吳郡人好神仙弱嵗棄家遊四方學鍊丹不成後得日者章全素為𨽻見生几上瓦硯忽曰先生好烹鍊之法夫仙丹食之則骨化為金安有不長生耶今先生之丹能化石硯為金乎生心甚慚以他詞拒之曰汝傭者豈能知神仙事乎無妄言全素笑而去後月餘衣中出小瓢云是中有丹能化土為金顧此硯以刀圭傅之生以為誕妄罵之全素尋卒以簀盛尸将瘞之忽亾其尸徒有巾帶衣履存焉藥鼎下有美光粲然中探之得石硯其上寸餘化為紫金矣宣室志本朝紹聖中有潘裕者過吳江遊長橋見一翁棹小舟往来叩舷飲酒酣歌自得裕異之乃揖曰視先生氣貌固非漁釣流殆髙隠士也􅂅聞緒言其人曰君語不凡能過小舟語乎裕欣然就之謂裕曰吾遯跡於此三十年矣幼喜談經史百家及釋氏書今惟飽食嬉遊爾裕曰先生澡身浴徳今聖眀在上盍出而仕乎翁曰君子之道或出或處吾雖不能隠處巖穴追綺皓之跡竊慕老子人皆求福巳獨曲全之義與子出處異趣勉之而已裕曰幸聞先生髙義敢問舍所在翁曰吾姓且不欲人知況所居耶飲罷長揖拏舟而去此事髙勝故附之仙事遯齋閒覽隆興間常熟縣海隅山頂有僧慈悦者患水腫病醫藥弗効一日有客自云姓囘憐悦病以指爪劃其股腹水潰腫消又授以藥且云夀至八十五後兩月又有客以畫授悦曰吾所畫也須臾而去展示乃吕真人像方悟前所姓囘者即吕也趙彦清吕真人感應記昔陽大明南安名士也孝純篤出於天性親喪廬墓而上帝昭鑒遣吕真人贈詩遺藥以答其誠郡守既甞表于朝又刻石𫝊於世予竊謂神仙在渺茫荒忽之間安得與人接始疑而未之信平江之常熟海嵎山北七十里絶頂有僧慈悦結廬于白龍祠之側向得水腫疾屢投藥石勿療一日有客自云姓回忽至龍祠音容異常徐而入見慈恱甚憐其病遂以指甲劃其股腹水即潰而腫消又以藥一彈丸敎用當陸根煮湯服之且語慈悦夀至八十有五不踰兩日其疾遂痊慈悦初不悉其為何人也後兩月餘有客云来自臨安因覲補陁至此以畫一軸授慈悦曰吾所畫也須臾而去及展視之乃薜茘所覆吕真人之像方悟前日姓回者即吕也慈悦奉龍祠三十年其不懈如一日凡有禱祈随即感應里人莫不愛重之天使真人来治其病其事亦類於陽君也歟夫人患不誠不信誠可以開金石信可以及豚魚況於神仙乎余因禱龍祠慈悦以此告余既以釋吾之疑而且有感也故刻石以記之吳郡志巻四十一
