body:
  text: 吳郡志巻二十五宋范成大撰人物楊收字藏之父遺直客死姑蘇收七嵗而孤遂居吳䖏喪若成人母長孫親授經十三通大義善屬文所賦輒就吳人號神童里人多造門觀賦詩至壓敗其藩懿宗時以中書侍郎同中書門下平章事子鉅散騎常侍鏻户部尚書徐修矩吳人仕為恩王府記室參軍奕世才賢承家介潔守世書萬巻優游自適有潮田五萬歩草屋十數間不復出仕皮日休甞就借書讀之與任晦同時日休與陸龜蒙作二游詩謂修矩與任晦也任晦吳人仕為涇縣尉退居里中有深林曲沼危亭幽砌池中又為島嶼脩篁嘉木掩映限奥晦資髙放寡合好奇樂異喜文學名理之士得顧辟疆舊圃以居云松陵集孫發吳人舉百篇科皮日休贈以詩云百篇空體喧金屋一日官銜下玉除陸龜䝉亦云直應天授與詩情百詠惟消一日成其見推當時如此後未有繼之者皮光業字文通父日休為蘇州從事光業生於蘇十嵗能屬文錢武肅王鏐辟以為屬吴越國建以為相教令儀注多其所定美容儀善談論若神仙中人吴越備史殷宅字昌從少負志氣博學善屬文弱冠遊太學籍甚公卿間天寶末知天下将亂乃趣装東歸侍母居吳郡吳中士大夫得從之遊者鄉黨以為榮採訪使李希言辟為從事奏授試崑山尉不就子侑遂顯宦馮宿集吴仁璧大順中及第喜屬文精星學及黄白術初學於廬山道士數年其師曰能罷卷學仙乎仁璧固陳求名之志道士曰一第取之拾芥耳但他年從宦勿干英雄仁璧既成名錢武肅王待以客禮訪以天文固辭非所知欲辟幕職又以詩辭及秦國夫人薨武肅具禮幣請為志又不從遂為錢氏所害其女亦善星學仁璧被繋女仰瞻而泣曰文星失位大人其不免乎備史遺事温訥蘇州人吴武忠王楊行宻時為大将劉威幕客行宻卒威為帥府所忌或譛之於徐温温将害之訥說威曰公受謗雖深反本無状若輕舟入覲則嫌疑皆亡矣威從之温果待威甚恭威得逺鎮訥之力也司馬福郡人始𨽻吴越王水軍淮人圍姑蘇置柵環城内外阻絶王遣救兵至莫知城中音問福能水中行總帥因遣入城淮人設網縣銅鈴纎鱗過之必覺福以巨竹觸網淮人聞鈴聲亟舉網網舉而得度或浮水上則戴萍荇而行因得入城既而復出凡在水中三日及救兵至與城中弓矢相應淮人以為神軍中皆服福奇才進官都指揮使吳越王城吳江置軍鎮命福主之許老於職至國初不絶備史遺事丁偃蘇州進士試邇英延講藝詩云白虎前芳掩金華舊事輕天心非不寤垂意在蒼生有古詩諷諫之體偃是嵗奏名甚髙御前下第自是二十年始及第温公詩話鄭夷甫郡人少登科有美才嘉祐中監髙郵軍稅遇一術士能推人死期無不驗推夷甫命不過三十五嵗感歎不堪人有勸其讀老荘以自廣者乆之潤州金山一僧端坐與人談笑間化去夷甫聞之喟然歎息既不得夀得如此僧復何憾哉乃從佛者授楞嚴經往還吳中嵗餘忽有所見曰生死之理我知之矣遂釋然放懐無復芥蔕後調封州判官預知死日先期旬日作書與交遊親戚訣及次敘家事備盡至期沐浴更衣公舍外有小園面溪一亭夷甫至其間親督人洒掃及焚香揮手指畫之間屹然立化家人奔出呼巳僵立亭亭如植木一手猶作指畫之状郡守而下少時皆至士民觀者如堵牆明日乃斂髙郵崔伯易為墓誌略敘其事墨客揮犀筆談謝濤字濟之淳化三年進士幼奇敏講學陽山澄照寺吴令羅處約長洲令王禹偁皆與定交處約謂禹偁曰濟之楊㩁天人吾曹敵也由此聲名益顯真宗即位鋭意人物内出濤等二十四人治状會京東强寇起召知曹州歴三司判官兩浙轉運使侍御史直昭文館知越州權西京留司御史臺就拜祕書監朝廷嘉其恬退擢太子賔客其為侍御史清静端介百辟望其風采及分務悉屏去外累不復親筆硯曰佚我以老日閲舊史一巻以代賔話弟炎有文名與盧植齊名時謂之盧謝謝絳字希深濤子祥符八年進士召試館閣校勘上疏言國家當以土徳王天下又言真宗當配上帝議不合河決滑州又言災異衆多宜深自引咎損膳於朝罷不急之役省無名之斂以休息天下又請罷内降詔令皆由中書樞宻院而後施行因進聖治五箴遷知制誥出知鄧州卒子景初景溫景平景回龔識給事中慎儀之子端拱元年進士大中祥符間翰林學士李宗諤薦擢監察御史遷殿中侍御史兼左巡使本朝襲唐制御史不専言職至是始擇學術醇正操履端方可綱紀朝廷者俾入臺言事識始被選後以目疾求退除檢校司封郎中平江軍節度使本朝吴士登科者始於識今府學先達題名以識為首識之後有宗元等列於後其家至今居崑山黄姑猶藏其登第時金花榜帖乃用塗金黄紙闊三寸長四寸許大書姓名下有兩知舉花押又用白紙作大帖如藥帖状貯金花帖於中外亦書姓名二字盖以此報其人也自唐以榜帖相𫝊而世少見其制故附於此丁謂字謂之長洲人少與孫何善袖文謁王禹偁大驚重之以為自唐韓愈栁宗元後二百年始有此作世謂之孫丁淳化三年進士甲科累遷䕫州路轉運使蠻酋為寇謂諭以禍福蠻感泣作誓刻石立境上五年不得代詔舉自代者乃入為三司鹽鐵副使大中祥符五年叅知政事九年請外為平江軍節度使知昇州天禧初復叅政改樞宻使代寇準拜中書門下平章事加司空晉國公仁宗即位進司徒侍中為山陵使授太子少保分司西京又貶崖州司戸叅軍在崖五年累徙光州授祕書監致仕卒年七十二謂機敏有智謀文字累數千百言經覽輒誦善談笑為詩至圖畫博奕音律無不洞曉甞建鄉郡節鉞以至宰相國朝吴人至相位者始於謂又甞為鄉里請於朝特免丁錢鄉人至今徳之祠於萬夀寺許洞字洞天吳縣人父仲容太子洗馬洞疎雋幼習弓矢擊刺長折節勵學精左氏𫝊咸平三年第進士為雄武軍推官詣府白事有倅踞坐不起即移書責知州馬知節知節怒劾之除名歸吴所居常植一竹以表特操吴人至今詠之曰許洞門前一竿竹日以酣飲甞從民坊貰酒大有所負一日忽書壁作酒歌數百言人爭往觀其酤數倍景徳中獻所撰虎鈐經應籌䇿科報罷封太山祀汾隂獻三大禮賦卒於烏江主簿劉少逸年十一文辭精敏有老成體其師潘閬擕以見長洲令王元之吳縣令羅思純以所作贄二令二令名重當時疑所贄假手未之信因試之與之聮句略不淹思思純曰無風燈焰直少逸曰有月竹隂寒元之曰一囘酒渇思吞海少逸曰㡬度詩狂欲上天凡數十聮皆敏妙二公驚異聞于朝賜進士及第官止尚書貟外郎續歸田録祝庶㡬郡人通象緯之學累赴鄉舉不中第景徳中求試所習以為司天靈臺郎徐祐字受天擢第為吏以清白稱慶歴中屏居吴下日渉園廬以自適終左官貟外郎年七十五鄭戩字天休吴人居皋橋九嵗而孤長客京師師事楊億天聖三年進士第三累官龍圖閣學士知開封府戩强敏善聽決假貸細民繩治豪宗大姓流姦吏馮士元于海島執政盛度程琳皆坐黜朝議畏其皦核康定元年同知樞宻院出知杭州發丁數萬開闢西湖民賴之歴陜西四路都總管經略安撫招討使行邊至鎮戎軍天寒與将佐置酒會塞塵起有報西戎至戩云此必川兵按邊回耳非賊騎已而果然以資政殿大學士知并州時契丹與元昊交惡邊奏互上獨戩不以聞上問戩對戎狄相攻中國不足憂仁宗甞曰戩氣質英豪朕欲以為相故屢試於外尋為宣徽北院使檢校太保奉國軍節度使卒年六十三贈太尉諡文肅吳感字應之以文詞知名天聖二年省試第一九年中書判拔萃科仕至殿中丞子純文行亦髙鄉人目曰吳先生元絳字厚之居帶城橋天聖五年進士屢典大藩以文章政譽名一時神宗欲選翰苑之才王荆公曰有真翰林學士恐不能用耳遂自外召入翰林未㡬叅知政事事詳在國史後以太子少保致仕還吴中與程公闢諸公為九老會鄉人號其居曰衮繡坊卒年七十餘有玉堂集三十巻程師孟字公闢郡人其髙祖思為錢氏營田使遂居吴師孟居南園側號晝錦坊景祐元年舉進士累遷判三班院給事中判将作都水監歴知楚遂洪福廣越青州為政簡而嚴剸煩制劇才力有餘罪非死者不以屬有司獄毎為空寛猛得中所至人恱性樂易純質言無隠情喜為詩效白樂天而尤簡直至老不改吳語累官光禄大夫致仕年七十八樂圃朱先生伯原少許可言師孟為政則曰雖韋丹治豫章孔戣帥嶺南常衮化七閩無以加也天下以為才卿吏師米芾亦云廣平公以文學登科以政事躋顯以言語出疆以恬退告老足之所及功利蔚起云有詩集二十巻奏議十五巻盧秉父革本徳清人舉神童慶厯之後累歴監司有聲請郡自効神宗嘉其恬退未㡬告老累進太子賔客官制行累改通議大夫退居於吳年八十二今盧提刑橋因其宅以名其家遂為吳人秉皇祐元年進士元豐中為發運使父革退老於吴秉毎嵗上計必請還鄉省侍後帥涇原懇辭歸養手詔慰勉時以為榮龔宗元字會之慎儀之孫幼頴悟絶人讀書虎丘為鄉貢首選天聖五年擢第范文正公謂之曰君器業清修他日必為令器謹勿因人以進宗元後登朝未甞遊公卿門文正之教也終都官貟外郎宗元始以都官分司南京謝事取白居易詩作中隠堂語在園亭條子程孫況皆繼登科龔程字信民剛正自守不怵於禍福力學排異端家不設佛老像祭祀不焚紙錢讀書南峰攻苦食淡遂博極羣書鄉人號有脚書㕑熙寜六年第進士終桐廬令子況龔況字濬之崇寧五年進士入館以學術文章與蘇過在朝俱知名時號龔蘇用宗元中隠故事自號起隠子終祠部貟外郎有起隠集三十巻孫載字積中崑山人曽祖漢英仕錢氏為蘇州崑山鎮防遏使遂為縣人載治平二年第進士歴廣東河北淮西使者知海沂婺亳州治務大體時號循吏以甞薦元祐黨人遂丐歸一日徧謁先壠及甞與往來者呼妻子與訣問日早晏盥手焚香而逝年七十五丁騭吴人元祐中甞為正言五上章論何正臣治獄殘酷巧詆刻深甚於羅織黨錮事載國史侍其沔字國紀上世自髙密徙吴學貫穿經𫝊與人交如淡薄遇其急奮義以往不避艱險五舉禮部退為鄉先生治平三年沒門人弟子相與議其治行諡曰夷晦先生滕元發志其墓云士生斯世有進取出力得時行道功烈被於民者有行義修潔退而講學為一鄉之善士者斯二者用舎不同要皆天下之强立君子也善士盖指沔其慕尚之如此秦希甫字辨之郡人元豐二年進士元符中為陜西轉運判官奏王贍王厚取邈川青唐府庫物因此致變又言河州至湟州道路險阨往者如赴死所湟州本溫溪心故地當求溫氏之後立為屏輔皆在可棄崇寧初黨論起言者以棄地為罪降官入黨籍葉清臣字道卿長洲人父參甞守郡謝事因居天慶觀之東有賢徳名事具七檜堂條下清臣天聖二年舉進士第二簽書蘇州觀察判官累遷修起居注三班鹽鐵院上疏論地震熒惑犯南斗因訟范仲淹余靖以言事被黜天下齚舌行将二年人主當深自咎責詳延忠直敢言之士出為兩浙運使豪右田據上游水不得泄民不敢爭清臣請疏盤龍匯滬瀆港入于海民賴其利擢三司使編前後詔勑使吏不敢欺遷為翰林侍讀學士歴江寧邠澶青永興河陽諸郡清臣幼敏異好學善屬文天資爽邁遇事敢行數上書論天下事其陳九議十要五利皆當世可行者有文集一百六十巻錢象先字資元郡人中進士髙第宰相吕夷簡薦其經行為國子監直講歴大理少卿三司判官河北江東轉運使天章閣待制龍圖閣直學士官尚書刑部侍郎又歴知河中河南府許潁陳蔡亳州以吏部侍郎致仕象先長於經術仁宗留神經萟象先以古學進勉間有顧問依經以對因以諷論政事時務有啟迪獻納之益留侍經筵前後十五年又通刑名之學所尚詳平又以犯敕者重犯令者輕請移敕文入于令者甚衆又省去許捕之條百餘其持法近厚如此修敕成例賜勲爵獨賜三品服仁宗謂輔臣曰象先以孝聞有母八十嵗以此慰其母心熙寧九年卒年八十一滕甫字元發避髙魯王諱以字為名更字達道本東陽人范文正公父之甥敎以為文文正為郡安定胡先生翼之亦居郡中甫来從學廷試兩為第三孫沔一見曰後當為賢将累遷御史中丞翰林學士歴開封真定府鄆許秦定青揚鄧等州終龍圖閣學士諡章敏甫慷慨豪邁不拘小節近世名将無及者葬陽山子孫遂為吳人蒋堂字希魯本宜興人徙于蘇祥符五年進士任侍御史論禁中火宜責躬修徳不必歸咎宫人郭皇后廢極論不可出為淮南發運使薦部吏二百貟累遷樞宻直學士歴知應天河中府洪杭益蘇州後十二年再守蘇遂謝事以禮部侍郎致仕家於靈芝坊詳見園亭門堂為人修潔遇事不少屈好學工文詞延譽晚進至老不倦卒年七十五有吳門集二十巻其絶筆詩云歸来深隠太湖濵天與扶持百嵗身雖是浮雲隔雙闕丹心愛戴在君親忠厚之氣終始如此陳郢隠居里中以琴書自樂丁晉公甥也欲薦以官拒之續圖經并其弟之奇謂之兩髙士父殿中丞質亦以徳行著稱鄉里陳之奇字虞卿曽祖賛眀事錢氏為中吳軍節度推官所謂丁陳范謝四長者之奇天聖中禮部試第四御試不得第居鄉里十年無仕進意母丁晉公之妺晉公欲官之之奇兄弟毎力辭而勉使復應舉不得已復起得及第李瑋尚秦國大長公主詔舉經術仁義者為隴西郡王宅敎授數月吿歸即致仕郡留其奏不可時年未五十未㡬詔賜金錢復起之卒不起終太常博士之奇孝於親約於身信於朋友篤行好學知道心泊如不為聲利所遷其退歸與鄉人同憂樂赴人之急至於州縣無所避州縣以之奇至誠亦不為疑平居静黙與人言忠孝立身亹亹不倦人莫不以為君子毎出乗羸駒里巷小人見之必斂然曰此吾陳君子也四方賢士大夫至吴必問陳君所在爭欲一見之王岐公聞其喪曰吾甞與陳君相從於閶門之下觀其言出入仁義之際真君子哉乃為誌其墓而題曰太常博士致仕陳君子之墓云方惟深字子通其先自莆陽徙吳為吳下鄉先生文學行義與樂圃朱長文同為一世所宗事具程俱所撰墓銘其略曰子通幼有稱鄉貢為第一試禮部不第即棄去吴下有田一㕓與其弟躬出入耕穫間則讀書至於黄帝老荘之書養生為夀者之說及西方别𫝊皆得其大指平居視之猶木雞也及其論議古今道理窮覈至到確然莫能移常以雅道自娱一篇出人争傳誦王安石以為精詣警絶元白皮陸有不到處以韋布之士閉關陋巷而孝友清介之風隠然稱東南有司舉貢籍以年格應補軍州助敎者就賜敕牒袍笏於其家得興化軍助敎拜受唯謹初年四十無子其弟有子以為吾先人有後足矣即屏居於外預知死期期至不亂喪葬皆有治命云楊懿孺字彛甫其先自浦城徙長洲以行義隠處與方子通同時號吳中二老事具程俱所撰墓銘略云吳郡有二老焉或仕或不仕皆隠者也居城之東北曰方公居城之東南曰楊公即懿孺也懿孺少孤力學言行相顧朝無夕儲讀書哦詩泊如也神夷氣昌未甞有饑寒憂雖閭里不盡知其貧崇寧二年特奏名後調南昌主簿居一年忽載妻子歸吳下且吿老以承奉郎致仕平居直心自信不知世間有傾巧事自未仕及老于家不入州縣不事鄉里請謁間一過所親厚嵗不過數四雖甞出而仕人猶謂隠者吴郡志巻二十五
