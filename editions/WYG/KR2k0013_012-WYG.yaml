body:
  text: 吳郡志巻十二宋范成大撰官吏祠廟官吏後漢彭修會稽人為吳郡功曹時西部都尉宰晁行太守事以微過收吳縣獄吏將殺之主簿鍾離意爭諫甚切晁怒使收縛意修排闥直入拜於廷曰眀府發雷霆於主簿請聞其過晁曰受教三日初不奉行廢命不忠豈非過耶修因拜曰昔任痤面折文侯朱雲三攀毁欄檻自非賢君焉得忠臣遂原意貸獄吏意亦以是得名尹興為吳郡太守楚王英隂結天下名士興在録中英敗眀帝徴興及掾史五百餘人詣廷尉考治門下掾陸續主簿梁宏功曹史駟勲備受五毒終無異辭續母自吳来雒陽作食饋續續雖見考辭色未嘗變而對食悲泣不自勝治獄使者問其故續曰母来不得見故悲問何以知之續曰母截肉未嘗不方斷葱以寸為度故知之使者以狀聞上乃赦興等吳孟仁字恭武江夏人為吳令時不得將家之官每得時物必以寄母常不先食及聞母亡犯禁棄官吳志宋江徽為吳令元㓙殺徐湛以黨與併被害王逡之字宣約少學禮博聞仕為吳令齊江介謐之子建武中為吳令政深苛人門牓髑髏為謐首介棄官去齊周洽洲南人厯吳令㢘約無私卒無以殯斂齊傅翽琰子為官有能名為吳令别建康令孫㢘㢘問翽曰聞丈人發姦擿伏恵化如神何以至此答曰無他也惟勤而清清則憲綱自行勤則事無不理憲綱行則吏不能欺事理則物無凝滯翽父珪為縣並著竒績時云諸傅有理縣譜父子相𫝊靳以示人王思遠立身簡潔王子貞為吳郡除思遠吳郡丞以本官行郡事論者以為得人梁沈浚字叔源涉學有才幹仕梁為吳令有能名陸蒙事梁為吳令節操甚髙唐鄭渾之咸通末為蘇州督郵談銖為鹺院官鍾福為院巡闕時湖州牧李起及趙䝉俱狀元人語曰湖接兩頭蘇聮三尾嵐齋録唐孟庭份郊之父庭份為崑山尉生郊以詩名世或云份亦能詩武平一𤣥宗時自考功員外郎貶蘇州㕘軍雖被謫而名不衰劉綺莊為崑山尉研窮古今博考𫝊記作類書一百巻號崑山編至今𫝊於世韋至誠吳縣尉蕭存字伯誠頴士子亮直有父風能文辭浙西觀察使李栖筠表為常熟主簿皮日休字襲美咸通十年為郡從事居官纔一月著書號鹿門子丁陳范謝皆錢元璙及子文奉為中吳軍節度使時為節度推官四人俱以長者稱丁名守節晉公謂之祖陳名贊眀中允之竒之祖范名夢齡文正公仲淹之曽祖謝名崇禮太子賓客濤之父邊倣雍熙初為崑山令因舊址新作夫子廟自是縣學始興繼以王禹偁為作記記具縣學條王禹偁太平興國九年以大理評事知長洲縣雍熙四年召赴闕入朝為名臣今虎丘寺有元之祠堂刋東坡讚於其上張文定公安道景祐中為崑山令時吳越歸國未久前此豪民占田無限歳遠多訟有數十年不決者公召問所輸租税㡬何大率百纔一二乃悉收其羨田以賦貧民訟亦息時蔣希魯侍郎守郡得公所著蒭蕘論上之遂舉賢良方正科韓正彥字師徳魏公之姪嘉祐中為崑山令剏石堤疏斗門作塘七十里以達于郡得膏腴田數百萬頃又請以輸州之賦十三萬從便輸於縣鳩作塘餘材為倉廪以儲之民大悦比去遮道以留為立生祠作思韓記鑱石祠下章岷字伯鎮嘗為平江軍推官有文聲范文正公有和章從事鬭茶歌及同登承天寺竹閣詩賈公望字表之嘗為郡通判時朱勔父子鼎盛奔競者爭趨其門公望疾之有詩云倐忽向六十萍蓬無奈何丹心猶奮迅白首分蹉跎正直士流少傾邪朋類多陽光一銷鑠不復見妖魔勔之子賜金帶公望亦衣三品服偶以朝拜㑹天慶觀中朱從者見公望所佩魚睨而視之公望厲聲叱之曰此是年及得来非緣花石左右皆錯愕朱大銜之竟擠之罷去寇國寳徐州人從陳無已學嘗為吳縣主簿賦詩為左丞葉夢得所喜詳見雜志門祠廟至徳廟即泰伯廟東漢永興二年郡守麋豹建於閶門外辨疑志載吳閶門外有泰伯廟廟東又有一宅祀泰伯長子三郎吳越錢武肅王始徙之城中纂異記又云吳泰伯廟在閶門西皮日休詩云一廟爭祠兩讓君盖併祠仲雍舊矣今廟在閶門内東行半里餘門有大橋號至徳橋乾道元年郡守沈度重建修廟記云在禮祭法聖王之制祭祀其法五其人之應法者十有四皆古大聖賢有大功烈於民者非此族也不在祀典夫以大聖賢有大功烈而祀之固宜然祀有祈焉其施於民又厚厚施不報神其不吐之乎報之之道不獨牲牢酒醴而已千里之邦必有祠所社稷則有壇先哲則有廟後世於廟尤極其尊嚴崇像設儼侍衛見之者凛如也水潦必祈旱暵必祈皆長吏之常事應而有報亦事之常儻入其門陟其堂神所馮依曽不足以障風雨區區樽罍簠簋何施之厚而報之薄歟吳門巨藩神祠之載祀典者十數而泰伯廟為䧺甚東漢永興二年郡守麋豹肇建於閶門外吳越武肅王錢氏始内徙之國朝元祐間太守黄履厯考前政若梅詢若范仲淹若孫覺輩數公淫潦有祈靡不響答列其事於朝有詔號至徳廟崇寧元祀守臣吳伯舉請封王爵有詔封至徳侯建炎擾攘鞠為灰燼厥後草創殆無以揭䖍妥靈今天子拔沈公於尚書郎以直祕閣尹是府至則訪及民利病以次罷行之其為政寛嚴詳簡允蹈厥中治人事神罔不祗肅隆興二歳天作淫雨害於穡事民不奠居乾道改元春二月公飭躬齋祓走祠下而祈焉神顧饗之是歳麥以有秋府從事請具牢醴以謝公曰不敢廢也然曷足以報萬分一於是邦人合詞而進曰侯之施甚厚而廟貌不治之日久大懼神或怨恫祥慶弗下願采材而改造之公曰是吾心也涓日恊辰得夏五月庚戌吉乃致昭告乃鳩良工斥少府之餘合私橐之助瓌材堅甓櫛比墉崇宏舊基植髙棟抗修梁藩垣階戺盡革而一新之所繪之容若欣欣然有喜色民無老穉相扶擕以觀厥成皆以手加額曰美哉輪焉誠足以塞民望而報神施矣風霽雨休禾則大熟秋九月甲子落成㡬就養府下目覩祈應為不誣公屬㡬紀其實既牢辭弗獲命若虚公之辱是終無以揚休事而告後人也於是乎書左通議大夫充敷文閣待制致仕曽㡬記皮日休一廟爭祠兩讓君㡬千年後轉清芬當時盡解稱髙義誰敢教他莽草紛陸龜䝉故國城荒徳未荒年年椒奠溼中堂邇来父子争天下不信人間有讓王張詠至徳本無名宣尼以此評能將天下讓知有聖人生南國奔方遠西山道始亨英靈豈不在千古暮江横蔣堂泰伯何為者不以身為身遜避天下位奔走句吳濱隱徳照來世遺祀𫝊斯民吁此㢘讓國合生㢘讓人龔頤正作迎享送神辭三章云翼翼兮新宫蘭栭兮枅桂祥氛總總兮髙靈下隊君視八紘兮昔何殊於棄屣今復何有兮一席之壝恵我吳人兮曷日而弭于嗟君来兮我心則喜君来不来兮我忘食事登歌兮堂上屢舞兮堂下君来享兮清酤溪毛陸離兮筐筥蓴鯽芳鮮兮亦有肥羜君不来兮使我心苦車兮載旃舟兮揚颿鼓咽咽兮君當還君肯来兮尚盤桓我心㷀㷀兮其無端君不我留兮下土囂煩福我吳人兮無疾與患千秋萬歲兮歌至徳以何言吳王夫差廟今村落間有之舊廟無攷鑑誡録云世𫝊此廟拆姑蘇臺木剏成唐陳羽秀才嘗題夫差廟時人謂之題破此廟陳羽姑蘇臺畔千年木刻作夫差廟裏神幡盖寂寥塵土滿不知簫鼔樂何人張詠由來邪正是安危不信忠良任伯嚭自古家家有容冶何須亡國殢西施伍貟廟在胥口胥山之上盖自貟死後吳人即立此廟乾道間復修之規製猶陋盤門裏又有貟廟即雙廟是也梁簡文帝立國資孝本循忠全令名舟裏多竒計蘆中復吐誠偃月交吳艦魚麗入楚兵九功推妙算千載籍餘聲洪濤猶鼓怒靈廟尚凄清行潦承椒奠宫懸雜鳳笙無勞晉后璧詎用楚臣纓密樹臨寒水疎扉望遠城窻寒野霧入衣帳積苔生惟有三青鳥斂翅時逢迎張詠胥也應無憾至哉忠孝門生能酬楚怨死可報吳恩直氣海濤在片心江月存悠悠當日者千載秪慙魂楊備出境鞭屍報父讎吳兵勇鋭越兵憂忠魂怨氣江雲在日見爐香煙上浮南雙廟在盤門裏城之西隅二廟左英烈王伍貟也右福順王隋陳果仁也果仁又稱武烈帝或云五代初常潤尚屬淮南果仁廟在常潤間錢氏得常潤遂移廟于蘇按吳志孫權既稱尊號諡堅曰武烈皇帝帝號與果仁同况堅墓西地記謂在城南二里許去盤門密邇疑此廟恐是祠堅爾建中靖國中太守吳伯舉重修是時蔡京自翰長罷過吳門為作記并書題記曰今天子即位元年愛重黎庶慎簡牧守詔以左史吳公為直祕閣知蘇州公至朞歳政化大洽姦盜屏斥牒訟疎簡民用康靖公曰噫嘻先成民而後致力於神古之善經也今俗且治矣其録境内神祠廢壊者以公帑所餘畢修之使安定休止無有祟厲為吾民憂吏白城西南隅有舊廟二荒陊當完按圖經暨州縣版祝所稱一為永昌武大王一為福順賢徳王而邦人由閭閻市井及學士大夫自昔相𫝊皆以為伍子胥廟歳時祭享甚盛雜然同辭莫可奪也或言故隋將陳果仁嘗以隂兵助錢氏伐淮宼有功錢氏崇報之請於梁朝封福順王又使諸郡皆為建廟則福順之號為果仁無疑至永昌之稱杳邈不可稽考不知為何時人今邦人獨以子胥之故願衆私出力以卒營繕協謀齊慮鳩工類材填郛溢郭奔走相屬惟恐其後故月不更朔而廟已告新今或稱號仍舊殆恐無以妥子胥之靈而失邦人所以完廟本意敢以為請公曰然昔呉瀕海建國恃水作險内虞汎濫外闕守禦鼃黽之與渚而魚鼈之與居肇自子胥相土味水築置城郭實倉廩治兵庫闢門二八以象風卦始能啓塞有時疏導無壅除昏墊蕩析之虞而存抱闗擊柝之警更祀㡬百厯載踰千其城域門號至今因之而不變是子胥嘗能安吾民也不顧小義卒雪大恥勇於納諫以至圽身二者皆人之所難昔日之不死盖以為吾父今日之死盖以為吾君由前足以教人之為孝由後足以教人之為忠忠孝之跡昭著前史殊尤卓絶震暴耳目匹夫匹婦可以與知及其久也宜胥化焉故後漢太守麋豹按行屬城問風俗所尚其功曹唐景曰處家無不孝之子立朝無不忠之臣儻非漸漬餘風被服成俗疇能臻此哉是子胥嘗能教吾民也既能安之又能教之由父𫝊子由子𫝊孫綿綿聮聮以至今日厥徳茂矣宜當血食此地而廟貌不立於城閾乃至斯民憑假它祠以崇敬奉此殆疇昔守職者之闕吾敢不勉祭法曰法施於民則祀之以死勤事則祀之以勞定國則祀之非此族也不在祀典今福順雖有功異代事跡僅存民弗敬慕盖託子胥獲享不替而武氏名字功徳闕然堙滅無所考證使子胥不忘斯民實鑒臨之則武亦安敢正位而饗也禮固有以義起者吾將請於天子兾正英烈之號以嘉廟額而用丕承民志殆或可乎武林元時敏曰好惡靡常莫能自克惟民為然古之君子因民所好之善而導之反民所好之非而禁之好惡得正而其治成矣鄭人欲祀伯有子産從而封焉鄴人欲祭河伯西門豹從而禁焉二子豈異意哉顧民好惡有當否也今吾民願祀子胥甚勤是知有功之不可忘而忠孝之可勸也因而導之使成於善此所謂不嚴而治者顧豈俗吏之所能為耶今公一舉廢事而順於民安於神又足為天下之勸三善備矣不可不書也於是乎書建中靖國元年十二月二十二日記春申君廟在子城内西南隅即城隍神廟也新廟記云輶軒莅郡十有一月矣猥以薄材謬承重寄欻自淮服半刺超為江南方伯郡領二十地亘五千皇皇者華㡬慙輝道兢兢其志常誡飲氷周爰諮詢申命行事損以懲忿窒欲益以改過遷善豺狼擁路埋輪以逐之騏􅂹伏櫪攬轡以騁之宣王化而盡覺風行安甿心而不知日用寛猛相濟威恩兼洽長吏肅警疆土乂寧日月其除氷霜再履始也務不暇給今也處有餘閑别祈神仙獲歳豐稔乗公堂之宴縱靈廟之遊城不復隍樹先禁伐闉陬荒以毁梁木小而摧乃喟然歎曰神必依人人兹望福依無所據福安來哉昔越踐滅吳楚威滅越考烈王繼立春申君登相封江東之巨縣城吳墟為大都専主威權救國災患與趙魏為四公子招賓旅有三千人擠聘使之玳簪誇上客之珠履王久無嗣君方患之璅兮李園託其女弟既歆然而有姙遂祕之以獻王王乃殂落子為君主母望之人靡信母望之禍遄興舍人其亡死士常偵棘門之下蒿里相催天乎天乎胡寧忍此令尹多居郢國假君恒守吳宫鳥焚其巢何笑號之先後蛟没其舳繄父子之沉埋夷盡其家賊園之故一朝冀將滅口千古猶為痛心今邦牧所居使臣所理故宫之内故事備聞於是大葺堂庭廣修偶像春申君正陽而坐朱英配饗其側假君西廂視事上客東室齊班李園死士庚方授戮僕夫閑駿辰位呈形大雪久寃之魂更申如在之敬家屬穆穆展哀榮也儀衛肅肅振威名也巨木臃腫而皆古小栽青葱而悉新總之一門是謂神府宜正名於黄相削訛議於城隍昔韓整守吳剏吳伯之廟太史適楚壮楚相之宫余固兼之言可則也神有新宇亨之落之人有貞石追之琢之我躬披文紀之告之君宜密應祐之福之初余之拜命也表授廣陵糾曹張顒兵曹蘇相為判官安喜尉李崗為支使同郡舊知精明深識異途新合厯落􅅛材三人冀有我師四牡慎行爾職欽刷往賢之恥歎垂後昆之裕長史宋尚主臣餘慶佑嶽良能司士楊彦琮每憂司存實稱佳吏預乎作廟翼翼觀乎降神欣欣咸亦相因斯焉附出唐天寳單閼歳除日中散大夫守呉郡太守兼江南道採訪處置使柱國天水趙居貞記郁史君廟在太湖衝山中聖姑廟在洞庭晉王彪二女相繼卒民以為靈而祀之紀聞云唐人記洞庭山聖姑祠廟云吳志姑姓李氏有道術能履水行其夫殺之自死至唐中葉幾七百年顏貌如生儼然側卧遠近祈禱者心至則能到廟心若不至風廻其船無得達者今每一日沐浴為除爪甲傅粧粉形質柔弱只如熟睡盖得道者歟辨疑志云唐大厯中吳郡太湖洞庭山中有昇姑寺有昇姑廟其棺柩在廟中俗𫝊姑死已數百年其貌如生遠近求賽歳獻衣服粧粉不絶人有欲觀者其巫祕密不可云開即有風雨之變村閭敬事無敢竊窺者巫又云有見者衣裝儼然一如生人有李七郎荒狂不懼程法率奴客啓棺觀之唯朽骨髑髏而已亦無風雨之變二説今皆無考姑存舊𫝊云皮日休洛神有靈逸古廟臨空渚暴雨駮丹青荒蘿繞梁梠野風旋芝盖饑烏銜椒糈寂寂落楓花時時鬬鼯鼠常云三五夕盡㑹妍神侣月下留紫姑霜中召青女俄然響環珮倐爾鳴機杼樂至有聞時香來無定處目瞪如有待魂斷空無語雲雨竟不生留情在何處陸龜䝉渺渺洞庭水盈盈芳嶼神因知古佳麗不獨湘夫人流蘇蕩遥吹斜領生輕塵蜀䋛駮霞碎呉綃盤霧匀可憐飛燕姿合是乗鸞賓坐想烟雨夕兼之花草春空登油壁車窈窕誰相親好贈玊條脱堪擕紫綸巾殷勤撥香池重薦汀洲蘋明朝動蘭檝不翅星河津靈祐廟即慧感顯祐善利夫人廟在能仁寺内夫人陸氏梁衛尉卿僧瓚之女僧瓚捨宅為寺夫人就居之是為重𤣥寺寺祀夫人為伽藍神號聖姑元符元年郡大旱通判祝安上攝郡禱而應以其事聞錫封慧感夫人郡人奔湊致禱相與社而稷之闔境祠廟莫能尚也其節次加封及始末靈感之跡具諸記中碑隂記元符元年歳在戊寅夏呉中大旱徧禱羣祀畧無應者是歳髙田不穫人多暍死負販之民皆捨其業而以售水自資涉冬至二年春夏之交舟車益不通百貨湧貴城中溝澮堙淤發為疫氣通判軍州事朝請郎祝公適領郡事廼用故事早暮分禱於所宜祀者一日㑹承天寺客言此乃梁衛尉卿陸僧瓉捨其第為之昔號廣徳重𤣥寺陸卿有女子不嫁經營其事既死祠于寺之東廡開寳中吳越忠懿王朝京師道出呉江大風㡬覆舟見女子拯之自言重𤣥寺之神也本國加封號感應聖姑今里中事之甚敬公聞即謁且言明日致禱既歸宿齋于㕔事舉家沐浴蔬食相約得雨而後復膳黎眀躬至祠下再拜而言曰郡承連年之旱流亡疾沴相乗而作農事失時歳且大饑雖某有罪獲戾不逃然將為國家之憂神其哀之能即致雨尚可救也屏息聽命寺僧獻兆曰神告即雨衆甚不然憮然而退憩於齋堂左右告曰天油然作雲矣未及命駕澍雨應至老幼驩呼於道至有不忍以簦笠自庇者即日盈尺闔境告足自爾有請必應如取所寄邦人無復水旱之憂歳大有年乃具事白于外臺使者以聞詔書襃美特封慧感夫人秩視公侯列于典祠按陸氏得姓於齊宣王之少子至漢有字伯元者仕為吳令遷豫章都尉既卒吳人思之迎其喪葬于胥屏亭子孫遂家焉伯元生襄賁令盱眙生本州從事鴻鴻生渤海太守建建生本州從事曄曄生御史中丞京兆尹璜璜生𢎞農都尉文文生親親生潁川太守尚書令閎閎生桓桓生揚州别駕續續生襃襃生吳城門校尉紆紆生九江都尉太學博士駿駿生選選生尚書瑁瑁生頴穎生海虞令濯濯生漢公漢公生冽冽生本郡從事元之元之生髙平相員外散騎常侍英英生晉侍中太尉興平康伯玩玩生五兵尚書侍中始始生祕書監侍中萬載萬載生宋東陽太守子真子真生齊南兖州刺史恵曉恵曉生梁太常卿倕倕生衛尉君凡二十八世冠冕不絶皆有才徳名在史冊自興平康伯至祕書監父子兄弟五世内侍嘉祥積慶挺生夫人惟夫人其生也精修正潔入清淨海其殁也通于神明有感斯應故能致朝廷報稱之禮甚厚既以詔書刻于石將求老於文學之士為之記以𫝊不朽搢紳耆老且請摭其槩於碑隂乃為之叙云戊嘗聞朝請公元祐間以奉議郎知藳城暴雨滹沱河水盛漂泛林木室廬蔽川而下水及城門雉堞凛然將決老弱皇恐奔潰調急夫督水工雨且不止人無所施其力公廼朝服涉濘立于隄上鞠躬申禱水溢隄壊相去數尺吏民救止公堅立不動以笏叩頭願以身任責於是雨小止水波稍囘河流遂復其所潰陷之地明日復為平陸如故使者方欲言諸朝會公秩滿請罷遂巳北方之人至今能道其詳惟公憂國愛民所至以誠心格物如此是可書也故附于左元符三年歳次庚辰秋八月乙未朔十日甲辰布衣林戊記天王堂在子城西北隅雖一小廟盖古屋也建炎兵難盈城宫室悉為煨燼惟郡南覺報小寺以金師營幕所寓不及燬而此堂巋然獨存郡人至今敬之吳郡志巻十二
