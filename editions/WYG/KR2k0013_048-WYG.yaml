body:
  text: 吳郡志卷四十八宋范成大撰攷證勾吳太伯之奔荆蠻義而從者千餘家號曰勾吳史記注曰勾吳太吳也史記正義引宋忠世本注云勾吳太伯始所居地名也許慎注淮南子云勾吳吳人語不正言吳而加以勾顔師古曰勾夷俗之發聲也亦猶越謂之於越也史記正義又云去梅里東南六十里十九世夀夢居之始號勾吳與史記太伯時已號勾吳不同疑正義誤太伯舊城史記正義云太伯居梅里屬今常州無錫去此東南六十里十九世孫夀夢居之二十一代孫光使子齊築闔閭城都之今蘇州是也世本又云諸樊徙吳安即今蘇州二説不同大抵泰伯之後吳自梅里凡三徙而定居於今之郡城中間遷徙不出數十里之内也梅里屬吳縣史記正義唐張守節所撰是時或屬無錫爾太伯古公長子韋昭云武王革商追封為侯伯故曰太伯范甯曰太者善大之稱伯者長也案此恐只是伯之舊名韋説似迂仲雍太伯弟與其兄同奔吳世本云吳熟哉始居蕃離宋忠注云熟哉仲雍字也案雍是熟食故名仲雍字熟哉括地志云仲雍冢在常熟縣西北三里海禺山上蕃離今吳餘暨縣世本所載仲雍名字似鑿然不敢沒其説姑寓於此餘暨前漢地理志云蕭山潘水所出東入海應劭曰吳王闔廬弟夫槩之所邑師古曰暨音既泰伯三讓今吳縣有三讓鄉孔子曰泰伯其可謂至徳也巳矣三以天下譲民無得而稱焉史記正義引江熙云太伯少弟季厯生文王昌有聖徳太伯知其必有天下故欲𫝊國於季厯以太王病託採藥於吳越不反太王薨而季厯立一讓也季厯薨而文王立二讓也文王薨而武王立遂有天下三讓也又釋云太王病而託採藥生不事以禮一讓也太王薨而不反使季厯主喪不𦵏之以禮二讓也斷髪文身示不可用使厯主祭祀不祭以禮三讓也虞仲史記武王封周章弟虞仲於周之北故夏墟是為虞仲史記正義引周本紀云古公有長子曰太伯次曰虞仲左𫝊云太伯虞仲文王之昭按周章弟亦稱虞仲當是周章弟名仲初封於虞號曰虞仲然太伯弟仲雍又稱虞仲者當是周章弟封於虞仲雍是其始祖後代人以國配仲故又號始祖為虞仲吳王夀夢書𫝊名稱不同史記正義解夢莫公反當周簡王元年左𫝊云吳子乗卒杜預云夀夢也左𫝊及世本又云吳孰姑夀夢也世謂孰夢諸也春秋𫝊夀作孰音相近姑之言諸也毛詩𫝊云舊讀月諸為姑是以姑為諸則知孰姑夀夢一人耳又名乗吳王闔閭十九年伐越越王句踐迎擊之敗吴于檇李左𫝊謂闔廬傷將指卒於陘史記乃謂敗之姑蘇姑蘇自是夫差敗處史記正義謂姑蘇檇李相去二百里疑太史公誤又吳王夫差二年悉兵伐越敗之夫椒報姑蘇也此語亦誤當云報檇李耳吳王闔廬史記作此廬字它𫝊記又用此閭字不能堅知其的今據所出處兩存之三吳之説世未有定論十道四番志以吳郡及丹陽吳興為三吳又以義興吳興及吳為三吳郡國志謂呉興義興吳郡為三吳又云丹陽亦曰三吳元和郡國圖誌亦曰與吳興丹陽為三吴酈元注水經云永建中陽羡周嘉上書以縣逺赴會稽至難求得分置遂以浙口西為吳東為會稽後分為三號三吳吳興吳郡會稽其一焉按晉書成帝咸和三年蘇峻反吳興太守虞潭與庾冰王舒等起義兵於三吳時冰為吳郡太守舒為會稽太守則是吳郡吳興會稽為三吳又孫恩攻陷會稽劉牢之遣將桓寶率師救三吳并陶回為吳興太守時大饑榖貴三吳尤甚回開倉賑之不待詔及割府庫軍資以救乏絶一境獲全詔會稽吳郡依回賑恤據此則吳郡與吳興會稽三郡為三吳甚眀又虞譚𫝊蘇峻反譚為吳興太守詔加譚督三吳晉陵宣城義興五郡事又寧康二年太后詔曰三吳奥壤水旱併臻宜時拯䘏三吳義興晉陵及會稽遭水之縣全除一年租據此兩處則義興固在三吳之外而太后之詔會稽亦復在三吳之外豈一時稱謂未有一定之説抑史又自有詳簡差互耶或云虞譚所督三吳晉陵宣城義興計六郡而稱五郡譚自為吳興太守矣増督五郡盖丹陽其一也又以太后詔攷之則會稽決不在三吳之數桓寶救三吳者以孫恩既陷會稽遂逼吳中故云今當以十道四蕃志及郡國志别説為正吳會世多稱吳門為吳會意謂吳為東南一都會也自唐以來已然此殊未穩今客館有吳會亭尤誤天下都會之處多矣未有以其地名冠於會之一字而稱之者吳本秦會稽郡後漢分為吳會稽二郡後世指二淛之地通稱吳會謂吳與會稽也諸葛亮曰荆州北據漢沔西通巴蜀南連吳會謂北則漢與沔西則巴與蜀南則吳與會皆指兩地為説南連吳會通言二淛江南形勢豈謂荆州獨連吳門一郡乎莊子釋文淛江注云浙江今在餘杭郡後漢以為吳會分界今在會稽錢塘其云分界則言兩地尤眀褚伯玉吳郡錢塘人隱居剡山齊太祖即位手詔吳會二郡以禮迎遣此證尤切六朝時亦有下吳會兩郡各造船若干者如此類甚多或謂會稽二字可以單稱會乎按宋元嘉時以揚州浙西屬司隷校尉而以浙東五郡立會州以隋王誕為刺史此單稱會之證也三江按司馬相如上林賦叙上林諸水曰丹水紫淵灞滻涇渭八川分流相背而異態灝溔潢漾東注太湖八川自入大河去太湖數千里外中隔大山及淮濟大江何縁與太湖相涉郭璞江賦云注五湖以漫漭灌三江而漰沛墨子曰禹治天下南為江漢淮汝東流注之五湖孔安國曰彭蠡江分為三入于震澤後為北江而入于海此皆未嘗詳考地理江漢至五湖自隔大山其末乃遶出五湖之下流徑入于海何縁入于五湖淮汝自從徐州入海全無交涉禹貢云彭蠡既豬陽鳥攸居三江既入震澤底定以對文言之則彭蠡水之所瀦三江水之所入未必謂入于震澤也震澤之源皆山環之了無大川震澤之委乃多大川今三江故道古今變遷巳不可堅定然禹貢之説謂三江之水無所入則震澤壅而為害三江之水有所入然後震澤底定亦水之理也水經云中江在丹陽蕪湖縣南東至會稽陽羨縣入于海震澤在吳縣南五十里北江在毘陵北界東入于海據此則水經亦謂中江北江皆在震澤傍近但其跡不可攷耳與孔安國謂彭蠡江分為三入震澤為北江以入海逺近絶不同史記正義解三江既入震澤底定云三江者在蘇州東南三十里名三江口一江西南上七十里至太湖名曰松江古笠澤江一江東南上七十里白蜆湖名曰上江亦曰東江一江東北下三百餘里入海名曰下江亦曰婁江於其分處號曰三江口又引顧夷吳地記云松江東北行七十里得三江口東北入海為婁江東南入海為東江并松江為三江是也言理三江入海非入震澤也按太湖西南湖州諸溪從天目山下西北宣州諸山有溪並下太湖太湖東北流各至三江口入海其源無通彭蠡湖及太湖處並阻山陸諸儒及地志等解三江既入皆非也周禮職方氏云揚州藪曰具區川曰三江按五湖三江者韋昭注非也其源俱不通太湖引解三江既入失之逺矣郡國志引禹貢三江既入震澤底定韋昭曰三江為吳郡南松江錢塘江浦陽江水經亦載韋昭以松江浙江浦陽江為三江虞氏志林云江於彭蠡分為三又云江自太湖出于海屈曲七百里世遂以韋昭為謬謂錢塘浦陽元不與震澤相關也水經謂浦陽一名潘水在會稽界而彭蠡乃宫亭湖去震澤更逺虞氏之説尤荒唐今松江之傍有小村落名三江口酈善長云松江自湖東北逕七十里至江水分流謂之三江口吳越春秋云范蠡去越乗舟出三江之口入五湖之中皆謂此地史記春申君𫝊云還為越王禽三渚之浦正義引戰國策三江之浦即此是案三江口異名者三姑備録之五湖即太湖也風俗通云湖都也周官揚州其浸五湖張勃吳録五湖者太湖之别名以其周行五百餘里故以五湖為名虞翻又云太湖有五道口則謂之五湖史記正義越敗吳於夫椒引杜預曰太湖中山也又引賀循會稽記云句踐逆吳戰於五湖中大敗而退今夫椒山在太湖中洞庭山西北案此吳越戰於五湖直在笠澤一湖戰耳史記正義及顧夷吳地記又云五湖者菱湖游湖莫湖貢湖胥湖皆太湖東㟁五灣為五湖盖古時應别今並相連菱湖在莫里山東周迴三十餘里西口濶二里其口南則莫里山北則徐侯山西與莫湖連莫湖在莫里山西及北北與胥湖連胥湖在山西南與莫湖連各周迴五六十里西連太湖游湖在北二十里在長山東湖西口濶二里其口東南㟁樹里山西北岸長山湖周迴五六十里貢湖在長山西其口濶四五里口東南長山山南即山陽村西北連常州無錫縣老㟁湖周迴一百九十里巳上湖身向東北長七十餘里兩湖西亦連太湖又解五宗世家五湖之間云五湖謂具區洮滆彭蠡青草也又云游莫貢䔖為五湖並太湖東㟁今連太湖盖後五湖當是也今案史記正義及顧夷所記五湖今並相連五宗世家解又以後五湖之説為是則五湖為太湖一湖甚眀越絶書云太湖濶三萬六千頃則一湖所占廣矣史記正義又引吳地記云笠澤江松江之别名又云笠澤即太湖則江湖通為笠澤矣揚州記曰太湖一名震澤一名笠澤一名洞庭史記三苗國左洞庭右彭蠡裴駰注云今太湖中包山有石穴其深洞無知其極者名洞庭此洞庭非與彭蠡為對者但通呼洞庭耳彭蠡即宫亭湖爾裴説殊為不審又水經孫皓天璽元年臨平湖開又於湖邉得小石上刻皇帝字於是改天冊為天璽元年孫盛以為元皇中興之符證五湖之石瑞也以此見古人通名浙西澤藪謂之五湖又晉楊泉五湖賦止為太湖而作此一證也陸龜䝉云太湖上禀咸池五車之氣故一水五名或又以太湖射貴湖洮湖一名長塘湖在義興上湖與隔湖為五湖尤繆葑門續圖經謂作封門取封禺山以為名封禺今屬吳興亦未有據按史記正義吳世家吳東門解云闔閭城無東門引吳俗𫝊越伐吳伍子胥見夢越軍令從東南入越王乃回向三江口岸築壇祭子胥乃開渠自羅城東開門入吳至今猶名示浦門曰鱄普孚切䱐音浮又伍子胥𫝊吳東門解亦云東門鱄門謂䱐門也今名葑門越軍開示浦子胥以濤蕩羅城開此門有鱄䱐随濤入故以名門顧野王云鱄魚又名江豚欲風則湧據此葑門乃有别意葑鱄音相近云洞庭東西兩山在吳松江南太湖之中韋蘇州謂皮陸唱和之所近時蘇子美詩云笠澤魚肥人膾玉洞庭柑熟客分金即吳松江也今岳州之南所謂洞庭湖者即酈善長注水經云洞庭波乃湖水非江也盖斥此湖爾比見岳州集古今題詠刻石龕于岳陽樓上如蘇州皮陸及子美之詩皆在焉乃知地志不可不考胥山在太湖口上有伍子胥廟舟行自此入太湖故名胥口或曰吳王既殺子胥盛以鴟夷投諸江史記謂吳人為立祠於江上號曰胥山今自吳故城至胥山四十里之近殺而投之湖中容有此理後世乃以子胥為濤神謂浙江之濤子胥所作又以杭之吳山為子胥祠或亦曰胥山然吳故城去浙江乃三百八十里不應投弃如許之逺以事理論之吳之胥山為近吳録又云胥山在太湖邉去江不百里故曰江上今胥山去浙江何止百里吳録所指或指松江耶今具存其説云古今廟宇遷移固不定而張守節作史記正義解言祠江上名曰胥山謂太史公之説非是引吳地記云越軍于蘇州東南三十里三江口又向下三里臨江北岸立壇殺白馬祭子胥杯動酒盡因立廟於此江上今其側有浦名上壇浦至會稽太守麋豹移廟於吳郭東門外道南顧夷作吳地記時其廟尚在案此即始廟不在胥山太史公乃云因命曰胥山正義又引吳地記云胥山太湖遶胥湖東㟁山西臨胥湖有古子胥二王廟張守節按此廟不干子胥事太史公誤矣据此則史記所云尚可疑乾道中胥山廟久廢鄉人復修之姑據史記所説以祠子胥有周路分者善書題其廟額而盤門内亦有廟焉王充論衡亦論濤神之誣曰儒書言夫差殺子胥煮之於鑊盛以囊投之於江子胥恚恨臨水為濤溺殺人夫言吳王殺伍子胥投之於江實也言其恚恨臨水為濤者虚也衛葅子路漢烹彭越子胥勇猛不過子路彭越然二士不能發怒於鼎鑊之中子胥亦自先入鼎鑊後乃入江在鑊之時其神豈怯而勇于江水哉何其怒氣前後不相副也城隍廟其初春申君也唐碑具在按史記春申君在楚請封於江東因城吳故墟以為都邑越絶書吳伐楚封春申君於吳吳地記春申君嘗造虵門以禦越軍其説不同宜以史記為正婁縣在崑山縣東北三里一村落也盖崑山舊治或云在漢為疁縣後避錢鏐諱改崑山案吳志張昭拜輔吳將軍封婁侯則縣之為婁舊矣漢書云改於王莽時信義古縣名蕭梁時分婁縣置信義縣屬信義郡大同初廢復分信義屬崑山今縣西二十里有村曰信義疑此古縣地也土人或訛為鎮義韋蘇州唐史不為立𫝊按其行事頗逸按白樂天吳郡詩石記云貞元初韋應物為蘇州刺史後三十七年樂天亦佩蘇印實寶厯元年記中目應物為碩人則在當時已有重名應物詩清深妍麗有六朝風致其自敘乃謂少時以三衛郎事元宗豪縱不羈元宗崩始折節讀書然觀其人賦性髙潔鮮食寡欲所居掃地焚香而坐而詩格髙潔不似晚節把筆學為文者豈其自敘之過與然天寶間不聞蘇州詩則其詩晚乃工耳宋景文作唐書文藝𫝊舉唐之能文者皆在至於蘇州集中亦足攷其履厯乃以為史家軼其行事故不書惜哉劉禹錫集又有太和六年舉自代一狀然應物温泉行云北風慘慘投温泉忽憶先皇巡幸年身騎廐馬引天仗直至華清列御前又有出身天寶今幾年之語則常逮事天寶間矣又燕李録事詩云與君十五侍皇闈曉拂爐煙上玉墀以編年通載考之天寶元年至太和六年計九十一年應物於天寶間已年十五不應能至大和間也説者謂禹錫與白居易同時視應物輩行逈不同禹錫所舉或别是一人也韓駒蔡寛夫等詩話半夜鐘按唐張繼楓橋詩云姑蘇城外寒山寺夜半鐘聲到客船在閶門外七里歐陽文忠公云句雖佳其奈三更非撞鐘時歐公盖未嘗至吳中今吳中僧寺實半夜鳴鐘或謂之定夜鐘不足以病繼也南史丘仲孚吳興人好學讀書常以半夜鐘鳴為限阮景仲為吳興守詩云半夜鐘聲後白樂天亦云新秋松影下半夜聽鐘聲吳中半夜鐘其來久矣又于鵠送宫人入道詩定知别後宫中伴遥聽緱山半夜鐘温庭筠詩亦云悠然旅榜頻回首無復松窻半夜鐘何獨於繼而疑之王直方石林二詩話詩眼學林新篇響大師崑山恵聚寺石像也寺創於梁天監中開山僧乃恵響今有古石像在靈山院小洞中俗人扣之鏗然有聲遂呼響大師以為山中奇事甚可笑響後駐錫揚子江心蝦蟆山於此入滅山上僧院有碑刻載崑山創寺本末頗詳崑山古上方有孟郊張祜留題詩或云郊随父任崑山尉因有篇什按韓文公郊墓誌云父庭玢娶裴氏女而選為崑山尉生郊及二季酆郢而卒考此語是郊時方幼稚本𫝊亦不言其幼穉能詩上方留題或者疑乃其父庭玢所作不可知或又云郊後長大問其母身所生之地母云父任崑山尉時郊遂遊吳至崑山乃留題事無考證不敢信摭言載白樂天出守蘇州科塲將開方干來求解頭而張祜適至無何二人言語喧爭於席上由是二人俱不得解頭而去祜之留題必是樂天守蘇時也太和宫在盤門外續圖經云唐相畢瑊之别業按畢瑊未嘗相相者畢諴也外岡青岡五家岡蒲岡塗菘岡徘徊岡福山岡舊圖經云並在吳縣界今次第攷之上之四岡屬崑山下三岡屬常熟言其地則與吳縣大相遼絶織里橋今訛為吉利橋帶城橋今訛為戴城橋交讓巷今訛為甘漿巷吳郡志卷四十八
