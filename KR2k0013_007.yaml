body:
  text: 吳郡志卷七宋范成大撰官宇提點刑獄司在烏鵲橋西北紹興元年建廳事後曰明清堂堂後小圃種竹有亭曰留客曽逮創逮父文清公幾命名且作詩徐蕆隸額乾道九年諸路添置武提邢一員遂於舊司之東撤去幹官廨宇以其地作東廳比年省罷使者來從其便而居焉曽幾留客亭詩序吾子逮作亭於官舍明清堂之後種竹殆千竿餘名其亭以留客取老杜竹深留客處之句因題二小詩云行到竹窮處有亭佳可遊境因吾子勝客為此君留娟淨經時雨蕭梢六月秋豈無他草樹涇渭不同流種竹無他事林間與客遊自應攜手入安用閉門留靜可過僧夏清宜對奕秋衰翁九節杖來往亦風流沈度汩汩多塵事長懷鳩杖遊每因門可欵豈為醉相留靜契竹林勝幽非草樹秋公今國耆艾砥柱屹中流持節推仍世林園記昔遊深藏事幽討長轡詎淹留已見山無盜欣同嵗有秋時容一嘯詠竊比晉名流浙西提刑題名淳熙三年直龍圖閣陳公繇浙東常平使者按刑西道領刺史韓公繇浙東刑獄使者奉祠三衢同時被命以西二公前日僚舊也弭節未幾聲諧志合風績俱茂暇日因相語曰凡官寺必冇所謂壁記是司也獨缺焉其名氏官職與夫在事之嵗月久而遂泯不可復知非所以隆一臺詔後世也於是搜閲案牘自建炎迄今居是官者得四十有二人焉將鑱石龕置壁間俾賈為之記惟案刑遣使國家令典也漢暴勝之為直指使者行郡國而謹督捕唐顔真卿為監察御史使五原而決寃獄事固甚類然未有専為刑獄遣著之令甲者本朝列聖相承子視元元欽恤刑章在淳化中始遣常參官提點諸路刑獄景德以來始兼用武臣厥後沿革因時或省或置汗青所載可考而知聖上龍飛惟祖宗成憲是循用文武長材求之如不及乃乾道六年遵景德故事制詔諸路各置武提刑一員與文臣合臺共治惟時兩浙古一道也熙寧末年岐而復合建炎以後復析而東西之浙西在今實為畿甸異時遣使視他路尤切注意今陳公以名御史韓公以左右信臣為之皇華得人於斯為盛恭聞真宗皇帝嘗命資政殿大學士向敏中較諸路提刑所上課績惟兩浙有奏報雪活寃獄者遽命升其等級以示旌勸今日考核之意同符真宗則奏最九重必有非常之寵又當自二公始故賈敢忘屬吏之賤學殖之荒落而記不敢辭淳熙四年四月日奉議郎知常州武進縣主管勸農公事借緋陳賈記施坰左朝散大夫建炎四年九月十七日到任紹興二年二月改除江東提刑邵昻左朝請郎紹興二年四月十六日到任當年十一月罷向宗厚右朝奉大夫紹興二年十一月二十九日到任五年正月宫觀朱縡左朝奉大夫紹興五年正月二十三日到任當年二月二十八日改除兩浙轉運副使吳表臣右朝請郎紹興五年三月十五日到任當年十二月除祕書監朱縡左朝散大夫紹興六年五月十四日到任七年三月改差知信州陳桷左朝散大夫直龍圖閣紹興七年三月初三日到任八年七月改差知台州曽幾左朝奉大夫紹興八年十二月二十日到任九年六月宫觀向宗厚右朝散大夫紹興九年七月十四日到任十一年四月改差知婺州張叔獻右朝奉郎直祕閣紹興十一年九月二十五日到任十二年十月改除兩浙轉運副使王鈇右朝奉大夫直祕閣紹興十二年十一月初二日到任十三年八月改除兩浙轉運副使万俟止右朝散大夫紹興十三年八月二十七日到任十四年三月宫觀符行中左朝奉郎紹興十四年七月二十四日到任十五年二月罷徐琛右朝散郎直祕閣紹興十二年四月十三日到任當年十二月除軍器監高世定右朝請大夫直龍圖閣紹興十六年正月二十六日到任當年六月罷吳傳左奉議郎紹興十六年七月十三日到任十八年十二月宫觀趙令詪左朝請大夫紹興十八年十一月十七日到任十九年十一月宫觀謝邦彥左朝請大夫紹興二十五年十二月初九日到任二十六年三月罷趙渙左朝奉郎紹興二十六年五月二十八日到任二十七年二月宫觀金安節左朝散郎紹興二十七年二月十七日到任當年九月改除大理少卿陳抃右朝散大夫紹興二十七年十月初二日到任二十八年正月宫觀徐康右朝奉大夫紹興二十八年三月十八日到任當年十月罷邵大受左朝請大夫直祕閣紹興二十八年十司月初五日到任二十九年閏六月除左吕廣問左朝請郎紹興二十九年七月初七日到任三十年四月改除兩浙轉運副使黃應南左朝散郎紹興三十年七月二十五日到任三十一年六月初七日致仕王躍右朝請大夫紹興三十一年八月初五日到任三十二年八月二十一日罷王傅左朝議大夫紹興三十二年十月二十三日到任隆興二年正月初二日轉左中奉大夫當年六月十一日改知信州葉謙亨左朝奉大夫直顯謨閣隆興二年八月二十八日到任當年十一月初五日致仕曽逮右承議郎隆興二年閏十一月初六日到任乾道二年五月二十六日丁父憂王瀹左朝散郎乾道二年六月二十八日到任當年八月初七日改除吏部郎官姚憲右朝奉郎乾道二年九月初六日到任三年五月十一日除直祕閣知平江府陳良翰左朝散郎直敷文閣乾道三年六月十一日到任四年五月盜賊肅靜特轉左朝請郎當年十一月二十四日改除宗正少卿李簡能左朝奉郎乾道四年十二月二十八日到任五年二月二十一日磨勘轉左朝散郎六年六月十六日除直祕閣主管台州崇道觀任文薦左朝奉大夫直寶文閣乾道六年八月二十五日到任七年六月二十六日除祕閣修撰改差知建寧府王淮左朝散郎直敷文閣乾道七年十月十一日到任八年十一月初九日改除大常少卿梁俊彥右武大夫高州刺史乾道九年閏正月初五日到任淳熙元年三月二十七日除福建提刑續改差提舉佑神觀吕企中右朝散郎直寶文閣乾道九年六月二十六日到任當年十二月二十七日改知揚州鄭興裔武功大夫江州觀察使淳熙元年四月初九日到任當年八月二十日改除江東提刑續召赴行在徐本中朝奉大夫充集英殿修撰淳熙元年十二月十四日到任三年三月二十五日改除江東轉運副使趙師夔承議郎直龍圖閣淳熙三年五月十八日到任當年六月初八日罷陳舉善以朝奉郎直龍圖閣浙東提舉除淳熙三年八月初八日到任五年四月二十七日召除左司韓俁以武德大夫高州刺史奉祠除淳熙三年十月初六日到任五年九月初六日改差知廬州吕正已以降授朝散大夫直顯謨閣知鎮江府除淳熙五年六月初二日到任當年九月初一日罷韓元龍以朝散大夫司農卿除直龍圖閣浙西提刑淳熙五年十月初四日到任七年十月初二日主管亳州明道宮趙伯驌以武功大夫忠州團練使浙西總管除淳熙五年十月十六日到任七年八月初六日轉和州防禦使梁總以朝散大夫大理少卿除淳熙七年十月十六日到任九年七月十三日改除江東提刑續準省劄因兼知嚴州救荒有勞除直敷文閣傅淇以朝請大夫浙東提刑除淳熙九年十月十六日到任十一年六月除直龍圖閣十月十六日再任十二年三月二十六日改知寧國府劉頴以降授朝散郎浙西提舉除淳熙十二年四月初二日到任當年十月初十日罷勾昌泰以降授宣教郎浙東提舉除淳熙十二年十一月初二日到任十三年二月轉奉議郎當月敘承議郎四月磨勘轉朝奉郎當年七月初十日罷王尚之以朝奉郎大理少卿除直寶文閣浙西提刑淳熙十三年閏七月初三日到任十四年二月十四日改除司農少卿湖廣總領趙子濛以朝議大夫直龍圖閣知揚州除淳熙十四年五月十二日到任十五年四月十六日除祕閣修撰致仕潘景圭以朝議大夫知池州除淳熙十五年五月初四日到任當年十二月初五日改除大理卿王師愈以朝議大夫直祕閣福建運判除淳熙十六年正月二十八日到任七月初十日除直煥章閣宫觀袁説友以朝議大夫淅東提舉除淳熙十六年七月二十八日到任紹熙元年三月除直祕閣知平江府王正已以朝請大夫充祕閣修撰新江東提刑改除紹熙元年五月初三日到任十二月初三日準敕以陳乞宫祠差主管建寧府武夷山沖佑觀應孟眀以朝奉郎直祕閣知靜江府除紹熙元年十二月二十四日到任二年九月除尚左郎官陳公亮以朝請大夫直祕閣福建提刑除紹熙三年四月到任四年除江南西路轉運副使黃遹以朝奉大夫淅西提舉除紹熙五年正月到任當年除荆湖南路轉運判官傅伯夀以朝議大夫直煥章閣江東運副除紹熙五年某月到任慶元元年除將作監何異以朝請郎新江東提刑改除慶元元年八月到任三年除直敷文閣八月除太常少卿韓邈以朝請大夫直祕閣浙西提舉改除慶元三年八月到任當年除金部郎官虞儔以朝請大夫新除直顯謨閣江西運副權知平江府除慶元四年正月到任依舊兼知平江府六月住兼九月除直寶文閣知廬州朱致知以朝議大夫直徽猷閣奉祠除慶元五年四月到任當年除樞密院撿詳辥紹以朝散大夫提舉兩浙西路常平茶鹽公事除慶元五年六月到任當年除戶部郎官淮東總領任洙以朝散郎提舉兩浙西路常平茶鹽公事除慶元六年正月到任嘉泰元年除直祕閣宫觀陳研以朝散大夫直祕閣荆湖南路轉運副使除嘉泰元年六月到任二年除樞密院檢詳孟綸以朝請大夫尚書倉部除嘉泰二年六月到任三年五月罷曽栗以朝散大夫荆湖南路計度轉運副使除嘉泰三年八月到任十七日除直煥章閣當年除太府少卿方銓以朝散大夫尚書司封郎中除嘉泰三年十二月到任開禧元年四月改除江西運判填見闕葉簣以朝議大夫尚書戶部郎中除開禧元年五月到任二年四月召赴行在除右司胡元衡承議郎尚書右司員外郎除直寶謨閣開禧二年四月到任嘉定元年正月召赴行在除檢正汪文振朝散大夫司農少卿兼玉牒所檢討官除直寶謨閣嘉定元年正月到任八月準省劄權鎮江府并權淮東總領九月正除司農少卿淮東總領李孟傳朝請大夫除倉部郎官改除嘉定元年十月到任二年七月除直祕閣江東提刑王居安朝奉郎知太平州除直龍圖閣嘉定二年九月到任當年赴詔行在除權工部侍郎留恭朝奉大夫浙西提舉嘉定三年正月兼權提刑四月就除五月改除直寶謨閣知紹興府劉爚朝散大夫尚書吏部郎中嘉定三年五月到任四年二月除司業章棶朝奉郎浙西提舉嘉定四年正月兼權提刑閏二月正除陳芾朝散郎新除大理寺丞嘉定五年正月到任兼權平江府七月除直祕閣知平江府金嶸以朝請郎守軍器監除嘉定五年到任七年八月除大理少卿柴中行承議郎直祕閣除江東運判未赴嘉定七年八月改除十一月到任九年除尚左郎官王涔朝奉郎新福建提刑改除嘉定九年五月到任九月宫觀王棐承議郎浙西提舉兼權嘉定十年十二月正除十一年八月除金部郎官尋得旨又兼權平江府喬行簡朝散郎江淮等路都大提點坑冶除嘉定十二年正月到任閏二月節制許浦水軍三月兼權平江府十一月除直祕閣依舊浙西提刑兼知鎮江府當月除軍器監十二月除直煥章閣知鎮江府兼權提刑十四年除司業趙㦛夫朝散郎兵部郎官除嘉定十四年十一月到任十六年除直祕閣再任寶慶元年罷林介朝散大夫浙西提舉兼權寶慶元年直祕閣正除三年兼權平江府十二月除太府少卿依舊兼權平江府紹定元年十一月改除大理少卿王與權朝請郎紹定二年正月二十八日到任檢法官廳在提刑司東幹辦公事廳在東廳後提舉常平茶鹽司在子城之東廳事東有小池上有假山榜曰壺中林壑米友仁書池南北有亭南曰揚清北曰草堂廳事之西有寶翰閣亦友仁書額廳東北曰宣惠堂廳後曰皇華堂廳之東側曰頤齋齋後圃中曰望雲堂紹興三十年楊和王子倓持節時作為思親也池旁曰繡春堂淳熙十五年史彌正建徐康記官舍題名其來久矣非特紀嵗月次先後而其人之賢不肖治行之能否亦繇此可考焉自守令而下凡在官者未之或廢也初元豐崇寧之間嘗遣廷臣分行諸路號提舉措置鹽事除授繼踵而屢經併省政和之二年始罷官鬻行新鈔鹽法於是兩河二浙荆湖江淮復置提舉司以總之宣和五年又分淮浙為西路則八州軍三十八縣𨽻焉治平江府今在府治之東廳事獨無記康之承乏又當兵火後案籍殘缺欲為之而未暇會朝廷纂修先帝實録史官移文郡縣諸司取會題名於是網羅闕遺訪問故老得承議郎王晉明而下訖于朝請大夫石彥和凡二十人皆以月日為次其未分路則或治會稽非今所部書之以著其始而闕其所不可考者裒而刻諸石以備采擇焉惟政事之在天下莫如財用而山澤之利常居其半管仲治齊謹正鹽策國以富饒用能成九合之功自漢唐以來鹽鐵𣙜酒均輸之議紛紛不同而常為國家大計所以制四夷安邊足用之本善乎魏尚書邢巒之言聖人斂山澤之貨以寬田疇之賦收關市之征以助什一之儲取此與彼非為身也御史中尉甄琛請弛河東鹽池之禁以為為民父母而吝其醯醢兼有羣生而𣙜其一物是専奉口腹而不及四體也巒譏之曰坐談則理高行之則夷闕于時咸以為然世宗卒從琛議其後豪貴封護甚於官司乃復禁如初夫古今異宜治非一軌下三章之約於結繩之代猶為密網大古之無事後世非所及而欲虞衡之官捐利豫民安在其為知務也與其賦外橫斂曷若權制商賈為不失重輕之術哉為今之法者近是矣鈔有茶鹽香礬四等茶鹽之課故嵗至七百萬緡鹽利居五之四並海縣道煮水者六所額以斛計者常不下百五十萬則所以禆國計以圖恢復之功者夫豈少哉而康獨有感焉者四人之中農為最勞以其終嵗勤動寒耕而熱耘也今所謂亭戶則過於此加以負山帶海頑獷成俗急趨利而輕犯法使輸貨於官者價直以時母或高下則盜販息盜販息則抵冒少犴獄簡不但公家利其入而已故樂以告後之人厥初建官兼治香礬後不復較而以摘山煮海正其名稱謂之提舉茶鹽公事司蓋自宣和七年始也紹興十年七月十六日右奉議郎提舉兩浙西路茶鹽公事徐康記承議郎王晉眀政和二年十一月到任朝奉郎李堯俊政和四年到任宣教郎曽纁政和六年十一月二十五日到任七年罷任奉直大夫吳林闕奉議郎魏志崇闕承事郎何志修政和七年添差宣教郎曾纁宣和元年九月二十日到任朝奉郎陳隆夀宣和元年十一月十四日到任二年五月十五日改添差於越州置司三年二月就除兩浙提舉常平朝奉大夫劉敏才宣和二年到任三年五月罷通直郎王韙宣和三年五月到任六月物故奉議郎李與權宣和三年到任五年丁憂通直郎李弼孺宣和五年到任六年丁憂奉議郎王據宣和七年四月到任當年七月丁憂通直郎王暘宣和七年到任建炎二年五月任滿奉直大夫陳述建炎二年五月二十八日到任四年正月二十八日罷任承議郎直祕閣梁汝嘉建炎四年三月二十三日到任紹興二年二月十五日就除兩浙轉運判官左宣教郎夏之文紹興二年四月十九日到任三年四月十三日罷任右通直郎張願紹興三年五月二十七日到任四年正月初九日罷任右通直郎侯憲紹興四年二月初三日到任五年四月十二日罷任左宣教郎錢堪紹興五年四月二十六日到任七年四月二十六日任滿左朝請大夫石彥和紹興七年四月二十七日到任九年四月二十七日任滿右承議郎徐康紹興九年四月二十八日到任十一年五月初三日滿替除權發遣嚴州續改知常州右朝散郎米友仁紹興十一年五月初四日到任十二年四月十一日除將作少監右朝散大夫万俟止紹興十二年五月內到任紹興十三年八月內就除浙西提刑右通直郎吳坰紹興十三年九月四日到任至紹興十四年十二月三十日改除兩浙運判右朝散大夫韋夀成紹興十五年二月十三日到任當年七月二日改除倉部郎官右朝奉大夫直祕閣鄭僑年紹興十五年七月初四日到任當年八月十九日與浙東提舉高顯謨兩易右朝請大夫直顯謨閣髙世定紹興十五年八月二十六日到任十六年正月二十六日除直龍圗閣浙西提刑左朝奉郎孫汝翼紹興十六年七月初十日到任十七年正月二十七日除提點江淮等路坑冶鑄錢右朝請大夫黃仁榮紹興十七年七月十九日到任至十八年九月十一日罷任右奉直大夫王晌紹興十八年十一月十七日到任至十九年三月初三日就除知平江府右朝散大夫王珏紹興十九年十一月十五日到任紹興二十一年十二月十四日任滿右朝散大夫李琛紹興二十一年十二月十五日到任紹興二十四年五月初二日改除知婺州左朝奉大夫孟處義紹興二十四年五月初四日到任二十五年正月初七日改除淮南路轉運判官右朝請大夫李流紹興二十五年四月初三日到任六月初六日改差知明州左朝議郎杜師旦紹興二十五年七月初三日到任十月二十六日罷右通直郎司馬倬紹興二十五年十二月十五日到任二十六年四月初十日罷左朝請大夫趙子砥紹興二十六年六月初二日到任當年八月二十二日致仕右朝奉大夫陳抃紹興二十六年閏十月初二日到任二十七年九月初八日改除浙西提刑左朝請郎朱倬未到任間改除右正言左朝奉郎謝伋紹興二十七年十一月自權知處州準告授十二月二十三日到任右朝請郎吕廣問紹興二十九年四月一日到任當年閏六