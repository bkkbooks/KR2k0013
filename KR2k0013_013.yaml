body:
  text: 吳郡志卷十三宋范成大撰祠廟下包山廟在吳縣西南一百里土山卜將軍廟在崑山縣頃於山下菜圃朱四家得斷碑云唐卜府君墓府君諱真碑字雖漫漶多闕文尚可辨然無將軍之號三髙祠在吳江縣垂虹橋南即王氏臞庵之雪灘也昔堂在垂虹南圮極偏仄乾道三年縣令趙伯虛徙之雪灘三髙者范蠡張翰陸龜蒙也此祠人境俱勝名聞天下祝鎰三髙記易稱知幾其神乎君子見幾而作不俟終日須之則後矣是維成功之下不可以久居亡道之人不可與久處兵亂之世不可以茍仕知斯三者則知幾矣遲之其殆危乎昔者越相范君既苦身勠力與勾踐深謀踰二十年滅吳霸越用復會稽之恥謂大功之下難以久居暨還返國遽書謝王去之乘輕舟浮五湖莫知其所終極而大夫種沈吟不時決卒用誅死厥後七百有餘歲晉有張季鷹自吳入洛方時齊王冏専權怙已署君東曹掾君知其不終難與獨處慨千里之羈宦臨秋風而長懷託興菰鱸促駕告歸無何冏敗又後五百有餘歲唐有陸魯望當咸通乾符間寇亂方殷隱身自放扁舟蓬席翛然笠澤甫里間時號江湖散人辟署無所從徴命無所答優遊自終竟全亂世如三先生可謂知幾君子哉雖地異時殊默語不同然去而自全咸遂其髙致均也吳江邑地瀕帶具區舊有長橋橫絶江湖之間修檻浮梁植立千柱電埏濎濙蜿如長虹巨浸浮空涵泳星日包山洞庭如在天外風帆島樹滅沒煙際東西行者以為三吳遊觀之偉好事者又寫鴟夷子皮之像配以江東步兵甫里先生立祠橋梁之上榜曰三髙蓋其平生所遊居也貞風素烈尚凛然山間可想聞而概見歲庚申秋七月初吉括蒼祝鎰與大梁人趙九齡置酒橋亭悲歌望遠舉觴釃江慷慨言曰去危即安夫人而願之然皆反焉者何哉知幾者鮮也雖並世同交如大夫種功非不多也顧常侍材非不周也鹿門子學非不掞也或死憂而辱何也居成功處亡道仕亂世黽勉畏去識之卑也其視知幾者逺矣惟鴟夷子道大功宏百世師仰而張陸二子羸然山澤之臞像而配之幾不倫矣豈不曰亟隱亟去身名俱全以是為同曰三髙云者豈異稱哉後之君子茍寵祿之是耽發機之禍忽忘不戒聞三髙之風仰三髙之像庶少警乎不然涉斯流也登斯梁也其無愧乎後將有悔乎其無悔乎始橋之置於慶厯歲中建炎初載北兵南牧并及祠宇火之無餘後六年當紹興癸丑歲今吳郡楊居同與今御史單父祝君師龍為邑尉蓋因其廢址實創而新之復立祠如故云謹記范成大三髙祠記乾道三年二月吳江縣新作三髙祠成三髙者越上將軍姓范氏是為鴟夷子皮晉大司馬東曹掾姓張氏是為江東步兵唐贈右補闕姓陸氏是為甫里先生三君生不並世而鴟夷子皮又嘗一用人之國功大名顯而去之季鷹魯望蕭然臞儒使有為於當年其所成就固不可隃度要皆以得道見微脫屣天刑清風峻節相望於松江太湖之上故天下同髙之而吳江之人獨得奉蒸嘗以夸於四方若曰此吾東家丘云爾邑大夫趙伯虛以故祠逼陋將改作鄉老王份獻其地雪灘乃築堂其上告遷而奠焉且屬諸石湖范成大為之辭噫不有君子其能國乎今乃自放寂寞之濱掉頭而弗顧人又從而以為髙此豈盛際之所願哉後之人髙三君之風而迹其所以去為世道計者可以懼矣至於豪傑之士或肆志乎軒冕宴安留連卒悔於後者亦將有感於斯堂而成大何足以述之然屈平既從彭咸而桂叢之賦猶招隱士疑若隱處林薄不死而仙況如三君蟬蛻溷濁得全於天者嘗試倚楹而望水光浮天雲日下上風帆煙蓬飄忽晦明意必往來其間成大亦何足以見之姑效小山作歌三章以招焉遂從而歌之曰若有人兮扁舟撫湖海兮遠遊衆芳媚兮髙丘忽獨君兮不可留長風積兮浪波白蕩搖空明兮南北一色鏡萬里兮鞭魚龍列星剡剡兮其下孤篷眇顧懷兮斯路與涼月兮入滄浦戰爭蝸角兮昨夢一笑水雲得意兮垂虹可以檥棹仙之人兮夀無期樂哉垂虹兮去復來載歌曰若有人兮橫大江秋風起兮歸故鄉鴻冥飛兮白鷗舞吳波鱗鱗兮而在下嗟人胡為兮天地四方美無度兮吾之土膾修鱸兮雪霏登菰蓴兮芼之水仙嬪兮胥命君可望兮不可追俯倒景兮揮碧寥娭燕息兮江之臯菉蘋堂兮廡杜若一杯之酒兮我為君酌又歌曰若有人兮北江之渚披雲而晞兮頮煙雨菊莎兮杞棘歲晼晚兮何以續君食偭五鼎兮腥腐羞三泉兮終古千秋風露兮歸來故墟月明無人兮蒼石與語牛宫洳兮生蒲荷潮西東兮下田一波訪南徑兮鄰曲山川良是兮丘壠多稼九畹兮今其刈聊舂容兮兹里是歲六月既望書遺邑人使習以侑祠伯虛請遂以為記程俱三髙堂詩序蠡位越相祿萬鍾去之如涕唾則後世角毛銖之得冒坎擭而不省者可以少沮翰進退無必隨時而保身則出處之意得託菰鱸以示好又何深哉龜蒙江湖一匹夫然於其不合雖藝位無加也其交如皮日休終見殺於賊巢彼獨挺然玉峙無一釁可指擲與夫攫金挾炭之夫蓋萬萬矣夫左手據圗籍右刃掠其吭雖冥憃不為也揣是而求之輕重得矣然世固有抱利權逐勢位死不反顧為天下僇笑者幾何人哉其於輕重未思是又出冥憃者之下也然則是三子者祠而旌之實可以訓元符二年吳江縣立三子者像明年三月甲子安於祠堂令率僚佐拜而奠之某謂俗奔競久矣冀得守道自重確乎不可拔足以風百里而驅天下者將矯浮俗而歸之庶幾清節之為貴何望之而未見抑有之而未聞邪今居是邑仰三子之志意其知時而退不迷於出處之道蓋君子之所悅聞也凡我同志其系之以詩李華鴟夷子皮贊龍蟠幽谷非時則伏蟬蛻髙枝飲露而飛進如風行退若雲歸冥冥其幾赫赫其規於越霸興強吳蕩夷功成不居先生傳之蘇軾書三賢畫詩誰將射御教吳兒長笑申公為夏姬却道姑蘇有麋鹿更憐夫子得西施右范蠡浮世功名食與眠季鷹真得水中仙不須更説知幾早直為鱸魚也自賢右張翰千首文章二頃田囊中未有一錢看却因養得能言鴨驚破王孫金彈丸右陸龜蒙煥靈廟在常熟縣破山唐咸通中所建龍堂也本朝政和二年賜今額五年加賜宣惠侯龍堂記禮山林川谷丘陵能生雲為風雨見怪物皆曰神若然者龍亦能為風雨見怪物則其澤之在民厚矣神而祀之又宜矣常熟澤國也風雨怪物日作于民有在其地者苟祀之至被其利祀之不至民受其禍汝南周君為令之初年夏且旱禜其神于破山之上果應以應君曰受其賜徒禜以報不可也於是命工以土木介其象為室以蔭之著之於典用潔其祀於是風雨時怪物止水旱不為厲連歲以穰其神之澤乎君之祀乎凡雩者春秋之道皆書之勤民之祀也君為其祠已乞文其事日休嘉其為志在民故從之咸通十三年二月十九日前攝嶺南東道節度巡官試祕書省校書郎皮日休記新建煥靈宣惠侯廟記政和二年漕臺以常熟龍祠祈禱感應之實聞于朝越明年制曰可宜賜煥靈廟為額邑人以爵號未崇無以昭神貺後二年縣以狀列於府府言於部刺史遂復保奏焉制曰可特封宣惠侯於是縣大夫率佐官祗奉休命宣于祠下而邑之士女雲集將退咸告丞魯詹曰侯之廟宇君與縣大夫謀之侯之封秩君與縣大夫請之今堂宇將畢而綸誥適班盍記之以侈其事惟侯之祠舊在破山興福之澗上父老相傳其誕育之異肇自梁武之初我宋龍興妙選守令為民師帥太平興國中蔣侯文懌來宰是邑距天監幾五百歲矣時積潦泛漲躬禱於侯不移晷雲斂而霽歲則大穫乃迎侯與聖母之像歸于頂山夀聖之西偏是日白龍示見盤旋冢上彩雲之瑞焜耀山間迄今又幾一百有四十載矣邑人乃相與作廟于山腰龍池之上侯之先壟在焉經厯若是之久始克成兹豈偶然哉佳城峩峩方沼灔灔峰巒疊秀回抱如翼長江浩蕩沃野曼衍左則福嶺狼巖右則虎丘昆玉遙岑寸碧列岫橫翠雲煙之祥疑在仙島氣象之偉實冠吳中觀侯之初以神力遷葬而隂陽家流咸謂勝地今新廟奕奕實下瞰焉庸詎知其非侯之意哉政和五年十一月庚辰既望侯之告下十二月朔廟前後殿成若門墉廊廡蓋將有待於來者焉政和五年十一月日文林郎知平江府常熟縣丞魯詹撰東嶽廟在常熟縣福山鎮重修嶽廟記維我宋真宗皇帝東幸泰山告功于天大修封禪禮泰山之神顯册褒嘉位號崇隆得非衛社稷福生靈運功烈於冥冥之際宜有所報稱歟是故四方萬里不以道塗為勞往奉祀事往往規模岱嶽立為别廟多矣然未有盛於姑蘇之福山也福山廟經始於至和之中垂六十年樓殿門廊并諸從舍巍然而輪奐江淮閩粵水浮陸行者各獻其所有以效歲時來享之誠上祝天子萬夀且以祈豐年以後保其家凡有求必禱焉率以類至號曰會社簫鼓之音相屬於道不知幾千萬人不及之乎太山則之福山焉福山臨江海上巋焉蓊鬱岡巒環回殆亦勝地父老云肇祀之日有幅畫乘潮水至乃嶽神像也居民得之欽事而加信焉山初號覆釜蓋因其形似後易名福山廟據其上遂為遠邇祈福之地豈偶然哉政和七年八月乙亥鄉貢進士崑山魏邦哲記陽山靈濟廟在澄照寺傍白龍母廟也無碑碣可考有僧祖照者以父老相傳述其事於壁云東晉隆安中山下居民繆氏家有女及笄出行風雨暴至天地陡暗避於今所謂龍塘之側俄有一白衣老人語女曰氏族為誰居何所女答姓繆指山之西曰我家舍於陽山三峰之下家有父母老人曰天色如此吾無所歸欲假館待旦而前可乎女曰當告父母老人強之再三遂首肯語竟遽失老人所在女歸有妊父母惡之逐出丐食鄰里眀年三月十八日至今所謂龍冢之上産一肉塊居民怪之驚棄水中倐焉塊破化而為龍夭矯母前若有所告其母驚絶於地即有風雨雷電飛沙折木咫尺不辨人物之異既開霽但見白龍升騰而去衆乃厚葬其母自後纍降巫語始祠之於山巔而雨暘失候祈禱必應太平興國間建廟於山南曹巷熙寧九年遷于澄照寺之東隅建炎間主僧覺眀復一新之相傳龍子分職瀟湘每歲是日必歸山間風雨凄冷人以為龍子誕日云過是山中方有春意其去也或變怪之狀見於雲間紹興十九年六月某日奔雲靉靆起於是山俄頃盲風驟雨大作龍自郡城過捲去女牆數百丈居人余氏家小亭吸入雲中又有負販者被吸復墮而無傷焉又云昔有白鬚老人至鎮江江步買船自云從長沙來與船人錢十千先付五千餘錢約至蘇州陽山看親處還登舟即令篙工悉睡日暮抵許市上岸去蓋已三百六十里矣舟人至山下尋覓值風雨大作避於廟中於像前得錢五千方悟神龍之歸乃以錢設僧供辭謝而去比歲祈龍母屢應大吏以聞紹興二十九年四月詔賜靈濟廟為額乾道四年告下封顯應夫人靈濟廟在府東南舊五龍堂也淳熙十年秋大旱郡守耿秉即設廳作祈雨道場設行雨龍王位於東西序有蜥蜴見於香案果飣之上蜿蜒不去終日雲合秉以杯珓祈之若有靈異已而大雨三日具以事聞詔賜靈濟廟為額甫里廟甫里在長洲縣東南五十里鄉人祠陸龜蒙於此至今不廢黃姑廟在崑山縣東二十六里地名黃姑父老相傳嘗有牽牛織女星精降焉女以金箆劃河河水湧溢今村西有百沸河鄉人異之為立祠舊列牛女二像後人去牽牛獨祠織女禱祈有應歲七夕鄉人醵集廟下占事無毫釐差舊有廟記今亡之案荆楚歲時記牽牛謂之河鼓後人訛為黃姑然古樂府有云黃姑織女時相見李太白詩黃姑與織女相去不盈尺則指牽牛為黃姑李後主詩乃云迢迢牽牛星杳在河之陽粲粲黃姑女耿耿遙相望又以織女為黃姑事久愈訛矣吳郡志卷十三
