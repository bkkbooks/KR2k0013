body:
  text: 吳郡志巻二十三宋范成大撰人物顧雍字元歎吳人曽祖奉潁川太守蔡伯喈嘗避怨於吳雍從學琴書伯喈歎異之故與伯喈同名而字元歎從宦有治迹累遷領尚書令封侯拜侯還寺而家人不知不飲酒寡言語舉動時當為孫權所敬憚代孫邵為相選用文武各隨能所任心無適莫訪民間及政職所宜輒密以聞若見納用則歸之於上不用終不宣泄相十九年卒子裕襲侯雍弟徽雍族人悌雍子邵穆一名裕邵子譚承顧徽字子歎雍之弟以才辯為孫權腹心權欲揣曹操意遷徽輔義都尉以往操具問境内消息徽應對婉順拜巴東太守欲大用之會卒吳書顧悌字子通雍族人以孝悌㢘正聞於鄉黨孫權時為將軍言辭切直朝廷憚之悌父向歴四縣令年老致仕每得父書灑掃設几筵舒書其上拜跪讀之父終飲漿不入口五日以不見父喪常書壁作棺柩象設神座於下對之哭泣服未闋而卒顧邵字孝則博覽書傳好樂人倫風聲流聞逺近稱之與舅陸績齊名為郡守舉善以教風化盛行留心下士雖役伍微賤皆拔而友之世稱知人子譚承顧穆宜都太守子榮仕晉顧譚字子默邵之子弱冠為太子四友清識絶倫獨見推重自謝景羊徽之徒悉在譚下赤烏中為左節度每省簿書未嘗下籌徒屈指心計盡發疑謬薛綜為選曹尚書固讓譚曰譚心精體密貫道達微才照人物徳允衆望孫權待之甚隆遂平尚書事遭讒徙交州著新言二十篇顧承字子直譚之弟孫權召見之賜丞相雍書曰貴孫子直令聞休休至與相見過於所聞為君嘉之拜吳郡西部都尉出平山越入為侍中終奮威將軍顧禺字孟著雍諸孫而榮兄子也少有名望為散騎侍郎顧榮字彦先吳人為南土著姓祖雍父穆榮機神朗悟弱冠仕吳吳平與陸機兄弟同入洛時號三俊陳敏反南渡江榮起兵攻敏敏率萬餘人出榮以羽扇麾之皆潰永嘉初召拜侍中禍難方作輕舟而還元帝鎮江東以為軍司謀畫皆諮焉朝野推敬之卒官散騎常侍安東軍司嘉興伯贈侍中驃騎將軍開府儀同三司諡曰元榮經徳體道謀猷洪逺忠正之節在困彌厲族弟衆顧衆字長始父祕交州刺史衆有文武才幹為鄱陽太守王敦作逆以軍期召衆聲色甚厲衆不為動容陸玩曰所謂剛亦不吐柔亦不茹仲山甫何以加之蘇峻反衆還吳潛圖義舉吳中人士同時響應與賊戰破之以功封鄱陽縣伯遷僕射卒諡曰靖第三子會中軍諮議叅軍時稱美士族子和顧和字君孝衆族子曽祖容荆州刺史祖相臨海太守和總角便有清操族叔榮曰此吾家騏驎興吾宗者王導謂和珪璋特達機警有鋒不徒東南之美實為海内之俊累遷中丞僕射多所獻納不阿權臣卒官儀同三司諡曰穆子淳厯黄門侍郎左尉將軍曽孫琛仕宋張允吳人輕財重士名顯州郡為孫權東曹掾子温字恵恕少修節操容貌竒偉顧雍以為當今無輩孫權聞之曰如是則張允不死矣召見文辭占對觀者傾竦權改容加禮甚見信重以輔義中郎將使蜀蜀人甚貴其才權嫌其聲名太盛會暨豔譛行遂併幽之駱統表理曰温𢎞雅之素英秀之徳文章之采論議之辨卓犖冠羣煒曄曜世人未有及之者也若忍威烈宥賢才以純大業固眀朝之休光也權終不納温病卒二弟秪白亦有才名與温俱廢張儼字子節吳人弱冠知名博聞多識拜大鴻臚寳鼎初使于晉磨厲鋒鍔思不辱命既至晉賈充裴秀荀勉等欲傲以所不知皆不能屈羊祜何禎並結縞帶之好道病卒張訓字叔方徳量淵懿清虚淡泊善文辭為海昏令甚有恵化張純字元基少厲操行學博才秀拜郎中為廣徳令治有異績擢太子輔義都尉又文士𫝊曰純少有清才與同郡張儼朱異俱童少往見驃騎將軍朱據據聞三人才名欲試之曰今三賢屈顧老鄙相聞渴甚矣其為吾各賦一物然後乃坐夫騕褭以迅驟為功鷹隼以輕疾為妙何必積思皆隨目立成據大歡悦純賦席曰席以冬設簟為夏施揖遜而坐君子攸宜儼賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛異賦弩曰南岳之榦種山之銅應機命中獲隼髙墉張禕少有孝行恭帝為琅邪王以為郎中令及帝踐祚劉裕以禕帝故吏素所親信封藥酒一甖付禕使酖帝禕既受命而歎曰鴆君而求生何面目視息世間哉不如死乃自飲之卒子暢仕宋張憑字長宗郡人有志氣為鄉閭所稱舉孝㢘劉惔見之清言彌日遂言之於簡文帝召與語歎曰張憑勃窣為理窟官至御史中丞張澄吳人晉光禄大夫當葬父郭璞為占葬地曰葬某處年過百歳位至三司而子孫不蕃某處年減半位止鄉校而子孫貴顯澄乃葬其劣處位果止光禄年六十四至曽孫裕遂昌子彭祖張彭祖廣州刺史子敞侍御史度支尚書桓𤣥簒位以事忤𤣥敞表獻忠欵事𤣥為吳郡太守一云為吳國内史子裕仕宋敞子孫至宋齊之後益昌為吳大家張翰字季鷹吳人父儼吳大鴻臚翰有清才善屬文而縱任不拘時人號為江東步兵賀循赴命入洛經吳閶門於船中彈琴翰初不識便同載去齊王冏辟為大司馬東曹掾冏時執權翰謂同郡顧榮曰天下紛紛禍難未已吾本山林間人無望於時子善以眀智自防榮執其手曰吾亦與子採南山蕨飲三江水耳翰因見秋風起乃思吳中菰菜蓴羮鱸魚鱠曰人生貴得適志何能羈宦數千里以要名爵乎遂命駕歸著首丘賦俄而冏敗人皆謂之見機翰任心自適不求當世或謂曰卿縱適一時獨不為身後名耶答曰使我有身後名不如即時一杯酒人貴其曠達性至孝遭母憂哀毁過禮年五十七卒沈珩字仲山郡人少綜經藝長春秋内外𫝊有智謀能専對孫權使使魏文帝引珩談語終日隨事響應無所屈還吳封永安鄉侯官至少府弟峻呉書沈峻字敬山有名譽而性儉吝張温使蜀與峻别峻入内良久出語温曰向擇一端布欲以送卿而無麤者温嘉其無隱又常經太湖岸上使從者取鹽米已而恨多勑令還減之尋亦自愧曰此吾天性也笑林朱據字子範吳人有姿貌膂力又能論難才兼文武孫權以為可繼吕䝉張温使領兵屯尚公主拜左將軍封雲陽侯謙虚接士輕財好施祿賜雖豐常不足用遭二宫交惡據擁護太子義形於色以死守之遂左遷終於新都郡丞孫亮時二子熊損各復領兵熊子宣襲爵尚公主至驃騎將軍朱桓字休穆郡人討平山賊有功遷濡須督拒魏曹仁衆寡不敵桓謂諸將曰勝負在將不在衆寡諸君聞曹仁用兵行師孰與桓邪雖曹丕自来尚不足憂部兵進擊仁敗走拜前將軍封侯桓輕財貴義性彊識與人一面數十年不忘部曲萬口妻子盡識之愛養吏士贍䕶六親俸祿産業皆與共分其没也吏士男女無不號慕家無餘財官周其喪事子異朱異字季文以父任除郎累遷至鎮南將軍大破魏軍後假節為大都督救夀春圍不解還軍為孫琳所枉害卜靜字𤣥風與顧邵陸通張訓等齊名終剡令暨豔字子休郡人張温引為選曹尚書性狷厲好為清議是時郎曹混淆多非其人豔臧否區别賢愚異貫遂為浸潤所譖韋曜字𢎞嗣郡人少好學能屬文孫亮時為太史令孫皓時遷中書僕射皓欲為父和作紀曜執以和不登帝位宜名為𫝊由此漸怒皓酒後以嘲弄公卿為歡曜但言論經議為不承詔收曜付獄徙其家零陵徐原字徳淵慷慨有才志忠壯好直言為吕岱所薦為侍御史岱有得失原輒諫諍原死岱哭之甚哀曰徳淵岱之益友今不幸岱復於何聞過談者美之孫拯郡人為陸機司馬孟超直入機麾下奪囚拯勸機殺之不能用及機為成都王頴所害又收其弟雲龍及拯皆下獄考掠拯兩踝骨見終不變辭吏民知拯義烈謂曰二陸之枉誰不知之君可不愛身乎拯仰天歎曰陸君兄弟世之竒才吾衆知愛今既不能救其死忍復從而誣之乎遂同被害拯門人費慈宰意詣獄眀拯寃拯譬遣之曰吾義不負二陸死自吾分卿何為爾二人曰君既不負二陸僕又安可負君亦被害吾彦字士則吳人有文武才幹身長八尺手格猛獸膂力絶羣陸抗竒其勇畧用為建平太守時王濬將伐吳造船於蜀彦覺之輒為鐵鎻横斷江路晉師攻之不能剋乃退舍禮之吳亡始歸晉為交州刺史二十餘年清身率下威恩宣著南州寧靖入為大長秋蔡洪字叔開郡人有才名時王政陵遲官才失實君子多退而窮處洪作孤奮論與王沈釋時論同意讀者莫不歎息仕為松滋令朱誕郡人陳敏之亂豪傑多見維縶惟誕與顧循不預其事吳震郡人學行清修老而未調華譚薦之為著作佐郎范平郡人其先銍侯馥避王莽亂適吳因家焉平研覽墳索該通百氏詔諡文貞先生三子奭咸泉並以儒學至大官泉子蔚家世好學闗内侯蔚子文才亦知名吳郡志巻二十三
