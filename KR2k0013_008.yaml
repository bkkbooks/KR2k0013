body:
  text: 吳郡志卷八宋范成大撰古迹吳城事具城郭門石室在常熟縣海隅山石室凡十所相傳太公避紂居之孟子太公避紂居東海之濱常熟去海近或是言偃宅蘇州記云在常熟縣西史記云言偃吳人也吳地志云宅有井井邉有洗衣石周四尺皆其故物輿地志云梁蕭正德為郡太守將石去莫知所在丁令威宅在陽山文殊法海寺有煉丹井存焉號令威井射臺華池南城宫姑蘇臺鱔山鷗陂遊臺石城長洲林園石龍以上悉吳闔廬故迹吳越春秋云闔廬既立夫差為太子使將兵屯守而自治宫室立射臺於安平里華池在平昌南城宫在長樂里闔廬出入遊卧秋冬治於城中春夏治於城外姑蘇之臺旦食鱔山晝遊蘇臺射於鷗陂馳於遊臺興樂石城走犬長洲焉越絶書云石城者闔廬所置美人離城也吳地記云石城吳王離宫越王獻西施於此城又云林園在華林里石龍在闕壇里里在烏鵲橋東皆闔廬作流杯在女墳湖西百五十步闔閭三月三日泛舟遊之今基隍猶存吳地記秦餘杭山即今陽山越破吳夫差遁去晝馳夜走三日三夕達於秦餘杭山餒甚顧得生稻而食之伏地而飲水焉吳越春秋夷亭闔閭十年東夷侵逼吳境下營於此因名之吳地記酒城在壇城邊夫差祭子胥處臨祭勸酒因名焉城中有石子走狗塘吳王作干隧越王以散卒三千擒夫差於干隧在吳縣西北史記正義干隧出葉安山西南一里戰國䇿史記正義姑蘇臺在姑蘇山舊圖經云在吳縣西三十里續圖經云三十五里一名姑蘇一名姑餘史記正義云在吳縣西南三十里橫山西北麓姑蘇山上山水記云闔廬作春秋遊焉又云夫差作臺三年不成積材五年乃成造九曲路髙見三百里句踐欲伐吳於是作柵楣嬰以白璧鏤以黃金狀如龍蛇獻吳王吳王大悅受以起此臺越絶書云闔廬造九曲路以遊姑胥之臺柵楣之義未詳此楣所謂神木一雙大二十圍長五十尋者吳王將起臺子胥諫曰王既變禹之功而髙高下下以罷民於姑蘇吳民離矣弗聽洞冥記云吳王夫差築姑蘇之臺三年乃成周旋詰屈橫亘五里崇飾土木殫耗人力宫妓千人臺上别立春宵宫為長夜之飲造千石酒鍾又作天池池中造青龍舟舟中盛致妓樂日與西施為嬉又於宫中作海靈館館娃閣銅溝玉檻宫之楹榱皆珠玉飾之吳地記云闔廬十一年起臺於姑蘇山因山為名西南去國三十五里夫差復高而飾之越伐吳焚之又云闔廬十年築經五年始成高三百丈望見三百里造曲路以登臨吳王春夏遊姑蘇臺秋冬遊館娃宫興樂華池南城之宫又獵於長洲之苑太史公云余登姑蘇望五湖案五湖去此臺尚二十餘里越絶書云夫差伐齊越范蠡泄庸帥師屯海道江以絶吳路敗太子友遂入吳國燒姑胥臺徙其大舟續圖經考之傳記謂闔廬食不二味居不重席器不雕鏤宫室不觀舟車不飾而吳越春秋言闔廬晝遊蘇臺蓋此臺始基於闔廬而成於夫差庶可以合傳記之説云唐任公叔登姑蘇臺賦司馬遷世掌天官才稱良史探禹穴之遺迹紀吳國之舊軌乃憮然而嘻曰登此姑蘇之墟淹留兮躊躇感斯宇之基為沼而仲雍之祀忽諸我聞周道既衰諸侯狎主中無霸王蠻戎振旅始闔閭以信威繼夫差以極武左與徑越同壤右與強楚為鄰內有高臺之築外有逺略之勤積如莽而暴骨亦如讎而視人是以疆埸日駭版築未弭方五載而厥成造中天而特起因土纍以臺高宛嶽立而山峙或比象於巫廬之峰或倒影於滄浪之水悉人之力以為美觀厚人之澤以為侈靡斯實纍卵於九層夫何見乎三百里俚語有之曰川壅則潰月盈則匡善敗由已吉凶何常矧謀主之賜劍若涉川兮無梁以為棲越以求霸卒見豢吳而受殃客自南鄙觀於江濆徘徊舊德惆悵前聞試遊目於寥廓曾是巋然而參雲聽逆虐而翳諫竟麋鹿而為羣高天放曠平湖泱漭奕奕孤嶼茫茫極浦悲早鴈於海風嘯寒鴟於江雨況復關梁坐隔羈旅增愁山木將落汀葭亂秋思美人兮子胥何為懷直道而驟諫遭重昏之見危將漁父以抗迹且垂釣于江湄高臺既傾夕露沾衣感蒞國之不及冀來人之與歸者也崔鷃姑蘇臺賦崔子勤學少間與客遊於橫山之下有臺巋然出於羣山荒基峻級高切雲間荆棘為之蒙翳麋鹿為之回環余語諸客此何所也客曰子不聞吳都之壯麗乎造姑蘇之高臺臨四逺而特起此其遺址也余乃倚杖而立喟然而嘆曰蓋聞吳王之築斯臺也受鄰越之貢竭全吳之力千夫山吟萬人道泣三年而聚材五年而建立佩茂苑於長洲帶濬池以朝夕自以為天下之竒觀也而今安在哉神材異木飾巧窮竒黃金之楹白璧之楣龍蛇刻畫燦燦生輝而今安在哉於是與客傴僂而上抵其上之絶嶺快四面之遐睹南望洞庭夫椒之山湖水澄徹其名銷夏灣者吳王避暑之所也北望靈巖館娃之宫廊曰響屧徑曰採香者吳之别館西子之遺蹤也其東吳城射臺巍巍其西胥山九曲之逵至於興樂有城玩華有池走犬有塘鬭雞有陂猶不足以充其欲也又侈斯臺以為娛嬉嗚呼雕楹鏤檻者丘墟之幾也九層百仞者汙池之漸也瑶臺作而夏衰瓊室考而商危章華成而楚衆叛阿房出而秦人離斯喪亂之必然曷吳王之不思也哉方其酌醁醽賦珍羞置酒若淮泗積肴如山丘其宴樂固極矣而不知會稽之上飲食嘗膽方焦思而深謀旁籠西山俯視太湖憑高望遠三百餘里其登覽固廣矣而不知笠澤之畔銜枚仆鼓忽潛軍而夜濟是以橫塘之浦僅通而越來之溪已逼高下之築未乾而勾踐之城已距於咫尺矣詞未竟客悵然曰已矣乎古往今來邈矣悠哉蒼煙兮滿目舊事兮飛灰幸江山之不改兮後之人當有鑑於遺臺陳羽憶昔吳王爭霸日歌謡滿路上蘇臺三千宫女看花處人靜臺空花自開李白蘇臺覽古舊苑荒臺楊栁新菱歌高唱不勝春只今唯有西江月曽照吳王宫裏人曹鄴吳宫酒未消又宴姑蘇臺美人和淚去半夜閶門開相對正歌舞笑中聞鼓鼙星散九重門血流十二街一去成萬古臺盡人不回時聞野田中拾得黃金叉李紳雜句序臺今遺迹連接靈巖寺採香徑響屧廊皆在寺內越王獻吳王黃金鏤楣吳王所造姑蘇臺因獻楣遂以黃金盡飾以破其國詩云越王巧破夫差國來獻黃金重雕刻西施醉舞花艷傾妒月嬌娥恣妖惑姑蘇百尺曉鋪開樓楣盡化黃金臺歌清管咽歡未極越師戈甲浮江來伍胥抉目看吳滅范蠡全身霸西越寂寞千年盡古墟蕭條兩地皆眀月靈巖香徑掩禪扉秋草荒涼遍落暉江浦回看鷗鳥沒碧峰斜見鷺鷥飛如今白髮星星滿却作間官不間散野寺經過懼悔尤公程迫蹙悲秋館吳鄉越國舊淹留草樹煙霞昔遍遊雲木夢回多感歎不惟惆悵到長洲羅隱讓高太伯開基日賢見延陵復命時未會子孫因底事解崇臺榭為西施劉駕句踐飲膽日吳酒香滿杯笙歌入海雲聲自姑蘇來西施舞初罷侍兒整金叉衆女不敢妒自比泉下泥越鼓聲騰騰吳天隔塵埃難將甬東地更學會稽栖霸迹一朝盡草中棠梨開劉禹錫故國荒臺在前臨震澤波綺羅隨世盡麋鹿占時多築用金鎚力摧因石鼠窠昔年雕輦路惟有採樵歌楊備山花野草一荒丘雲裡驕奢舊迹留珠翠管絃人不見上頭麋鹿至今遊春宵宫天池海雲館館娃閣銅溝玉檻並見上館娃宫吳越春秋吳地記皆云閶闔城西有山號硯石山山在吳縣西三十里上有館娃宫又方言曰吳有館姓宫今靈巖寺即其地也山有琴臺西施洞硯池玩花池山前有採香徑皆宫之故迹唐殷堯藩吳宫詩吳王愛歌舞夜夜醉嬋娟見日吹紅燭和塵掃翠鈿徒令句踐霸不信子胥賢莫問長洲草荒涼無限年李嘉祐傷吳中館娃宫中春已歸闔閭城頭鶯巳飛復見花開人又老橫塘寂寂栁依依憶昔吳王在宫闕館娃滿眼看花發舞袖朝欺陌上春歌聲夜怨江邉月古來人事亦猶今莫猒清觴與緑琴獨向西山聊一笑白雲芳草自知心李紳江雲斷續草綿連雲隔秋波草覆煙飄雪荻花鋪漲渚變霜楓葉卷平田雀愁化水喧斜日鴻怨驚風呌暮天因問館娃何所恨破吳紅臉尚開蓮皮日休懷古艷骨巳成蘭麝土宫墻依舊壓層崖弩臺雨壞逢金鏃香徑泥銷露玉叉硯沼秖留溪鳥浴屧廊空信野花埋姑蘇麋鹿真間事須為當時一愴懷皮日休綺閣飄香下太湖亂兵侵曉上姑蘇越王大有堪羞處秖把西施賺得吳陸龜蒙三千雖衣水犀珠半夜夫差國暗屠猶有美人皆二八獨教西子占亡吳西施洞在靈巖山之腰山即館娃宫所在故西施洞在焉徐夤勾踐進西施賦兮以妖以艷當惑人之心兮惟巧惟僭破人之國句踐之密謀進西施而果驗昔者二國相吞陵卑恃尊殊不知卑則自亡而固存尊則謂眀而反昏烏喙年年誓啄夫差之肉稽山日日惟聽范蠡之言言曰伍員之賢東吳之德伯嚭之佞東吳之賊德之盛兮越可憂賊之興兮吳可殛臣以風夜而計機謀偶得欲狂敵國之君須中傾城之色待其聲色內伐君臣外惑自然紂妲己以亡宗晉驪姬而亂國今苧蘿之山越水之灣恐是神仙之化忽生桃李之顔波淺丹臉鴉深緑鬟顰翠黛兮慘難效浣輕紗兮妖且間楊栁羞弱芙蓉死殷可以變栁惠於嚴莊之際悅荆王於魂夢之間臣請進焉王今何以王乃豁若而喜矍然而起曰此蓋神假卿之碩畫天雪越之前恥乃命寶馬騰龍香車輾風迎織女於銀漢娉姮娥於月宫炫耀雲外喧闐洞中粧成而瑞玉凝彩服麗而朝霞翦紅昨日猶賤今晨不同寧期大國之君流恩下及堪恨鄰家之婦謂妾常窮曉别越溪暮歸吳苑越慮計失吳嫌進晚歌一聲兮君魄醉笑百媚兮君心蹇坐令佞口因珠翠以興言立遣謀臣并洪濤而不返勾踐乃走電驅雷星馳箭催投醪而士卒皆醉嘗膽而胸襟洞開虎噬骨碎山崩卵摧楚腰衛鬒化為鬼鳳閣龍樓燒作灰於是命屠蘇之酒上姑蘇之臺伊霸業以何在俄英風而聿來於戲殺忠賢而受佳麗欲不敗而難哉吳王郊臺在橫山東麓下臨石湖壇壝之形儼然相傳吳僭王時或曾祀帝也吳王井在靈巖山腰大石泓也相傳為吳王避暑處詳見靈巖山條楊備詩石甃遺蹤傍古臺一泓寒影鑑光開何人照面金叉落曽見越溪紅粉來響屧廊在靈巖山寺相傳吳王令西施輩步屧廊虛而響故名今寺中以圎照塔前小斜廊為之白樂天亦名鳴屧廊王禹稱廊壞空留響屧名為因西子繞廊行可憐伍相終尸諫誰記當時曳履聲楊備步步香翻羅襪塵粉紅花艷滿宫春傾城一笑無遺迹不見長廊響屧人梧桐園在吳宫本吳王夫差園也一名琴川語云梧宫秋吳王愁採香徑在香山之傍小溪也吳王種香於香山使美人泛舟於溪以採香今自靈巖山望之一水直如矢故俗又名箭涇楊備館娃南面即香山畫舸爭浮日往還翠蓋風翻紅袖影芙蓉一路照波間香水溪在吳故宫中俗云西施浴處人呼為脂粉塘吳王宫人濯粧於此溪上源至今馨香古詩云安得香水泉濯郎衣上塵長洲在姑蘇南太湖北岸闔閭所遊獵處也吳主遣徐詳至魏魏太祖謂詳曰孤比老願越橫江之津與孫將軍遊姑蘇之上獵長洲之苑吾志足矣詳對曰大王欲奉至順以合諸侯若越橫江而遊姑蘇是踵亡秦而躡夫差恐天下之事去矣太祖笑曰徐生得無逆詐耶吳地記長洲苑舊經云在縣西南七十里孟康曰以江水洲為苑韋昭云長洲在吳東枚乘説吳王濞云漢修治上林雜以離宫佳麗玩好圈守禽獸不如長洲之苑則知劉濞時嗣葺吳苑其盛尚如此孫逖長洲苑吳苑校獵吳王初鼎峙羽獵騁雄才輦道閶門出軍容茂苑來山從列陳轉江自繞村回劍騎緣汀入旌門隔嶼開合離紛若電馳逐隘成雷勝地虞人守歸舟漢女陪可憐夷漫處猶在洞庭隈山靜吟猿父城空應雉媒戎行委喬木馬迹盡黃埃攬涕問遺老繁華安在哉越城在胥門外越伐吳吳王在姑蘇越築此城以逼之城堞髣佛具在高者猶丈餘闊亦三丈而幅員不甚廣史記正義吳東門解引吳俗傳云子胥亡後越從松江北開渠至橫山東北築城伐吳據此文即今越城正是舊迹詳見石湖門越來溪在越城東南與石湖通溪流貫行春及越溪二橋以入橫塘清徹可鑒越兵自此溪來入吳故以名史記正義越自松江北開渠至橫山東北入吳即此溪來讀曰釐吳音也魚城在越來溪西吳王遊姑蘇築此城以養魚吳地記苦酒城在魚城之西南有故城長老云築以釀酒今俗人呼為苦酒城吳地記鴨城在匠門外吳王築以養鴨吳地記雞陂在婁門外吳王養雞城也又名雞陂墟南武城在海渚闔閭所築以禦見伐之師吳地記吳小城白門闔閭所作秦始皇帝時守宫吏燭燕窟失火燒宫而門樓尚存虞氏家記美女宫夫差所作土城周五百九十步句踐所進美女西施鄭旦之宫室也越絶書吳宫鄉在吳江縣甫里之地在今長洲東南五十里相傳吳王别宫然舉無舊迹矣陸龜蒙嘗作問吳宫辭蠡口在齊門之北又有蠡塘在婁門之東相傳鴟夷子乘扁舟下五湖潛過此以出招大夫種因以名之楊備霸越勳名間世才五湖煙浪一帆開猶防烏喙傷同輩此地復招文種回甪音祿頭即漢甪里在洞庭山村漢甪里先生所居史記正義太湖中洞庭山西南中號祿里村即此甪里今有巡檢司號甪頭巡檢俗或作角字史記正義黃堂事具官舍門吳郡志卷八
