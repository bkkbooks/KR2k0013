body:
  text: 吳郡志卷三十七宋范成大撰縣記吳縣在府治之西二里廨宇紹興二年知縣蔣結建縣門淳熙十二年知縣趙善宣重建并書額㕔之西有平理堂無倦堂堂之西有延射亭天聖七年知縣徐的建亭之南北各有小山山有小亭南曰松桂北曰髙䕃皆淳熙五年知縣趙不忿建吳令壁記二范成大又為續記一世代氏姓猶可考云唐大歷梁肅撰壁記在春秋時列國各有屬邑其主者魯謂之宰楚謂之尹晉謂之大夫秦時天下始置令長宅一同之內操賞罰之柄有人民焉有社稷焉風俗善敗本乎身黎元安否繫其政其體大矣自京口南被于浙間望縣十數而吳大國家當上元之際中夏多難衣冠南避寓于兹土參編戶之一由是人俗舛雜號為難治加以州將有握兵按部之重邑居當水陸交馳之㑹承上撫下之勤征賦郵𫝊之繁倍百他縣夥乎其中不可勝紀大歷十一年天官擇可以長民者於是范陽盧公繇太原府祁縣令為之外寬內明敬事而信政本於仁飾身以文下車三年闔境之人安居樂義而不知安樂之所從來蓋平以和也夫君子立身論道之通塞不論位之升降吳縣下畿服一等公俯而為之抑選部為官擇人而其履道從政所由然也豫知者敢録其實書于東序以播其令聞時十四年二月甲子翰林學士梁肅記此記得之類書中若其姓名則不復可考矣郭受記厥今天下經用之所資百貨之所植東南其外府也渡淮而南濟江以東督府且十附城且百而田疇沃衍生齒繁夥則吳實巨擘焉豫嘗登靈巖之巔俯而四望畎澮脈分原田碁布丘阜之間灌以機械沮洳之濵環以茭楗則舄鹵磽確變為膏澤之野蘋藻葭葦墾為粳稻之陸故嵗一順成則粒米狼戾四方取給充然有餘出乎胥口以臨震澤積水無涯兩山對峙桑田翳日木奴連雲織紝之功苞苴之利水浮陸轉無所不至故其民不耕耨而多富足中家壯子無不賈販以遊者繇是商賈以吳為都㑹五方畢至獄市雜擾搢紳以吳為樂土僑民閭里幾亞京雒為政者急之則怨而駭緩之則㢮而肆泛然而多容則請謁紛紜幾至於骫法毅然而多拒則謗詈叢集必困於遊談宰字之任信難矣右通直郎許君來領是邑直方不撓有骯髒之風簡易無苛得調胹之術蓋常急於豪猾緩於善柔整其大綱濶其細故為之期年而縣告治元祐六年霪雨敗稼吳民阻饑君日慰藉而拊循之賑給務均恤隱求實不事虛名而為具文也豫以是知君之篤於從政也舉兹以勉旃則其於整凋弊而應盤錯也何有焉水災之明年君且代矣乃悉求前為此縣者之名氏爵里將書而刻諸石顧其僚郭受曰吾為是俾來者有考焉爾子為我序諸辭不獲命因槩敘吳風而毛舉君政之一二許君溫陵人世為學家甚博而文異日顯用於時當不獨以循吏稱也元祐七年五月初一日縣尉兼河塘溝洫郭受撰乾道三年范成大續記吳令壁有記尚矣唐大厯已未梁肅為之詞者令盧某所立石亡而文𫝊本朝元祐壬申郭受為之詞者令許公輔所立石雖存而中更兵燼缺裂無幾後七十有六年晉陵袁君祖忠政成將歸始治二石更刻之又斷自建炎以下為之續記實乾道紀元之三祀嵗在丁亥距大歷垂四百年而題名三立相望可考吏民以為盛事然吳之為壯縣固自昔志之風俗之媺生聚之繁覽觀之勝著于二碑者自若獨官事搶攘日不暇給必出于甚難而後能善治視昔類不同者非特吳為然余行四方所過縣邑數十百見大夫皆厭苦其官齎咨太息悔嚮之來而憂後之不得脫余私怪其說甚哉何至於此及切磋究之使一言其詳則曰古吏憂民而巳今顧不然蕞爾邑負責猶數巨萬晝夜薄遽唯錢穀之知且不能報期㑹有如一日姑舍是而用力於民不崇朝百適滿矣彼齎咨太息厭苦而欲脫者真有味其言哉今夫急催科則愧政専撫字則愧考兼善之誠難若袁君蓋幾於無愧者其政先理而後情弛例而舉法故吏不能竝緣士不敢奸以私民有訟自揣不當勝望寺門心醉郤去直者家居待報曰無庸謁吏明府自辨此坐堂上再期人信之如一日至於大官之間須求於無有責課於非時則又從容辦給弗以厲民率常最於他邑鳴呼可謂難也巳旦莫去此至大官藝益易於為縣其所成就何可量按續記所登載無慮三十人而未有顯者必將自袁君始儻余言猶信來者尚勉之八月十五日左奉議郎主管台州崇道觀范成大記并書延射亭在縣治中天聖中縣令廣州觀察支使梁允成所作自監郡而下皆集而射之極一時賓友之勝觀章珉所記足以想見當時州縣仕者之寬舒云章珉記胥臺故封為一都㑹郡領五邑吳實首之百里之封五品之令曩嵗限以常調治付中銓是將赤子奉其吐齧國家精求治本重字人之寄近制銅墨之任闕即以京僚洎朝列或幕賓以補之先是縣署占勝逼于閭閻綿歷嵗祀梁木將壞乃有前宰棘寺丞徐君繕完之墟墁訖功移符罷去則今南越郡計馮君實代之也君世襲衣纓練明吏術下車未幾政用佳茂乃因聽訟之隙周睨廨舍患無清曠之所得奉宴息之娛縣之西偏舊有幽圃俯于佛舍并吞仍嵗君披圖按籍命工糞除疊繚垣以入之繇是砥平其基而巋然為亭雲集板築而岌乎為堋䕃以佳木之清畦以雜花之英穿沼以類滄溟築山以擬蓬瀛五畝之地百步之徑而嘉致足矣君衆藝畢給愛客忘疲每缿筒絶稀簿領多暇春華爛而在目暑風泠然罷扇秋英墜砌冬霰集楹君賞心樂事擊鮮為具召貴介公子同僚諸英注弦筈以引滿擫絲管以度曲賽百嬌之楛矢爭半先之奕路中厨出乎豐饌而千里之蓴下䜴雕盤薦乎佳實而庭山之橘厥苞白日已過賓醉未去燭已見跋主歌未晞雖洛中之季倫山隂之辟疆咸有名園雅好賓侣吾不知其彼為勝此為劣也亭之既成命賔以落之監郡集賢公嘉乃好事隨其景趣悉為雅名揭于華榜觀者知意此用略諸若君愷悌之政殊尤之績采風謡者入境可知固不在因亭以敷暢之也下幕不佞嘗從事於文墨請書締結之始謹用春秋之法異時宰是邑者集簮纓於斯豢犬彘於斯惟其圖之天聖七年春三月二十有六日吳郡從事試藝臺讐書郎武寧章珉字伯鎮記楊備詩髙臺蕪沒曲池平十萬人家古縣城煙水雲山屏畫裏闔閭墳域舊都名長洲縣在府治之北三里長洲縣分自吳縣自唐以來為名邑本朝王禹稱嘗為之宰哦咏最多邑望益髙縣有茂苑嵗寒二堂掬月蟠翠二亭王禹稱記天下稱宰邑之賢者率以宓不齊為稱首以彈琴化民民不忍欺謂得致理之要也殊不知行是道者不獨繫于人亦將繫于時矣當時皇室雖微皇經未絶有周禮在魯則單父豈曰亂邦有聖人為師則子賤宜乎行道居百里之位得諸侯之權社稷民人自我而巳井田車賦得均其輕重刑罰教令得濟其寬猛凶荒水旱得専其賑恤農時民力得聽其休息然則無私于心克儉于身辨田之腴瘠定賦之上下强暴者刑之以法孝悌者旌之以禮寬其教以誘人峻其令以納吏時豐則斂之嵗饑則賑之農有力而不奪役非時而不行闢之以庠序誨之以禮樂使父子親兄弟友夫婦和然後祭祀以事鬼神行賚豫以睦鄉黨自然懷土不散熙熙如春弗知其然而然也在上者不鳴琴而何俟哉洎王道云亡霸圖孔熾大小相併强弱相攻區區子男宗廟不保故𫝊曰漢南諸姬楚實盡之又曰楚縣陳蓋縣之始也秦併天下畫三十六郡則小國皆為縣而𨽻于郡矣國之于郡猶身之有臂也郡之于縣猶臂之有指也國取于郡郡取于縣縣取于民是以臂指撫民而自奉也由是田有暴賦丁有常庸春役而夏不休朝令而夕必具小則懲之以殿最大則懾之以刑法豈惟道不能行亦將身就其辱遂使宰邑者苟祿食免笞罵而巳昔人歎徒勞賦歸去者為是也向使子賤復生亦將捨琴折腰奔走不暇況行道乎雖欲不顧其時不程其力亦猶建一指而扶天柱不其難哉時使之然也長洲之名見吳都賦貞觀中分吳縣以建之垂二百年宰名氏縣志闕焉錢氏享圃幾一百稔専建屬吏莫得而知皇上嗣位之二載漢南王歸于我國家始設官以理焉袁仁鐬首之王禹稱次之其土汙瀦其俗輕浮地無柔桑野無宿麥飪魚飯稻衣葛服卉人無廉隅户無儲蓄好祀非鬼好淫內典學校之風久廢詩書之教未行兼并者僣而驕貧窶者欺而墮田賦且重民力甚虛租調失期流亡繼踵或嵗一不稔則鞭楚盈庭不能輯事矣至有市男女而塞責者甚可哀也蓋隔中夏之政浸小國之風使今聖人求理于上庶官陳力于下斯民之泰其有漸乎禹稱非循良之才涖凋瘵之邑仍以舊貫民安仰哉㑹到任之眀年大有年也先是司漕運者轉民嵗租更送他郡苦舟楫之役糜堰埭之費者久矣至是始聽民以本屬郡輸之從便宜也亦小康之有萌矣是嵗獄訟彌繁賦調中考因鳩斂民瘼平議政體總而刋之存諸㕔事待賢者以舉之所謂言而不能行者也時大宋雍熙三年正月九日守大理評事知縣事王禹稱記此記兵火不存紹興十年知縣石珵重刻石吳騏𨽻書米友仁茂苑堂記長洲令尹石珵瑩中才髙氣剛嗜古好雅下車既久政成事簡蓋牛刀割雞游刃裕如者邑廨之東有所謂茂苑堂前人取左太沖語帶朝夕之濬池佩長洲之茂苑意也考之圖經即江為池距縣南七十里多歷年所髙岸為谷無足深怪訂之於古莫可得實視棟楹之顛圯乃鳩工而亟新之堂之南榮植以嘉木修竹奇芳蕙草鬱葱吐秀而森然敷隂如在丘壑邃深處與堂相直曰百花亭即堂之西為建屋曰尊美堂其北龜首曰維摩文室北嚮聚羣石如巖谷曰緑野軒又南開竹徑曰緑筠庵皆增廣而揭以是名琴書雅玩陳列于中客至則閲古賞奇試茗烹飲必與之從容竟日怡然自適曽不少倦後之君子游息乎其上要當勿復翦伐如甘棠之愛顧不懿歟紹興已未季夏二十日襄陽米友仁元暉記方干題坐看孤峭却勞神還是微吟到日曛松鶴認名呼得下沙鷗飛處聽猶聞夜闌亦似深山月雨後唯關滿屋雲便此逍遙應不易朱衣紅斾未容君王禹稱移任長洲詩五首移任長洲縣舟中興有餘篷髙猶見月棹穩不妨書雨碧蘆枝亞霸紅蓼穗疏此行紆墨綬不是為鱸魚移任長洲縣孤帆冒雨行全家隨逆旅一夜泊江城身世漂淪極功名早晚成惟當泥尊酒得喪任浮生移任長洲縣窮秋入水鄉江涵千頃月船載一篷霜竹密藏魚市雲疏漏鴈行故園漸迢遞烟浪白茫茫移任長洲縣辭親淚落衣折腰雖未晚㮻首欲何歸曉月霜華重晴山栗葉飛江頭鷗鳥在應怪不忘機移任長洲縣沿流漸入吳見碑時下岸逢店自徵酤野廟連荒冢江禽似畫圖髙堂從别後應夢宿菰蒲春日公舍偶題薄宦苦流離壯年心力衰鶯花愁不覺風雨病先知曉月晃竹屋寒苔疊槿籬無人慰幽寂庭栁自低垂長洲遣興七十浮生巳半生徒勞何日見功名折腰米賤堪羞死負郭田荒好力耕庭鶴慣侵孤坐影鄰雞應信夜吟聲年來更待賢良詔咫尺松江未濯纓妻兒莫笑甑中塵只患功名不患貧自覺有文行古道可能無位泰生民烟村舊業勞歸夢雪屋孤燈照病身投老緑袍未休去九重天子用平人楊備太湖東面即長洲臨水孤城逺若浮雨過雲收山潑黛管弦歌動酒家樓花光帶露栁凝烟茂苑笙歌已沸天有客尋春拚一醉青樓紅粉洞中仙蟠翠亭仲并建吕存中重修龔頤正記申國吕君宰長洲之明年行受代矣一日公退吏散約客相羊縣治之圃時屬初夏紅紫事休宿雨收霽新緑鬱勃林采煥發菳葉左右屏列餘花錯落如縀珩珮有風徐至芬香襲人乃命酒坐蟠翠亭上君指柱間仲公彌性之詩有云樛枝密葉翠虬蟠者曰名以是為花故也余居此之日久矣率夜漏未盡五刻起視事漏下五六刻猶不得息壯懷倥􅘓於簿書期㑹間領略于此蓋不一二數也適少間拾餘材為支其將傾葺其甚弊朽腐則新之敗蠧則墁之示不欲以將去而怠其事焉方此佳時一杯相屬客盍盡歡於是楚人龔頤正使折花侑坐起以酒屬君曰夫草木之生其性也遂深山大壄清曠廣莫春敷秋隕付榮瘁乎自然亦復何有不幸而名人從而玩之封植矯揉揠助其長而人方以為異而喜要非其性分也士而志於用小而小大而大其得而遂耶達者視之犧象孰先於楓栁蓬艾孰後於蘭茝耶抑余聞卬蜀山林中此花如積欒城蘇公詩半垂野水弱不墮直上長松勇無敵等語槩可想見君賢者後號有家法周旋州邑老益更事且有用於時顧欲遂其私且不可得若余者其將遂余生乎異時尚記前後二公之詩見此花為一笑君引酒釂遂書以記之時淳熙戊戌四月上浣也企賢堂在縣治淳熙九年知縣曽㮚求王元之像於虎丘繪之堂上其詳見於郡人黃由之跋長洲為縣肇唐萬嵗通天中至于我朝雍熙元年翰林學士王公諱禹稱字元之濟州巨野人實來為令滿秩召為左正言直史館公自敘其時侍親而行姑蘇名邦號為繁富魚酒甚美親年方踰耳順子孫滿前多自樂者形之於詩見之家集至其論𣙜酒懼遺斯民無窮之害則憂深思逺反覆陳之為㕔壁記則欲激其風俗遲之教化抑兼并而哀流亡所謂鳩斂民瘼評議政體以待後人則其言皆廪然是知公凡所以為訓者其言皆不茍發也惟公首倡斯文濟之忠直全名大節見諸國史如廬陵歐陽公眉山蘇公豫章黃公皆嘗追述為詩贊極其推尊自是公之言誼風烈在人耳目表表愈偉後公垂二百年今令曽君德寬來亦將終更顧縣治之東堂壁間有公之子嘉言所敘題名記繼往來之詳興踵武之歎讀之慨想因求公像于虎丘寺繪之堂上而扁曰企賢併刻三公之詩贊于石髙山景行用志則深異時永陽黃岡之祠冠佩陸離以儀以瞻竝媺相望足以使有識歆聳起敬慕矣淳熙九年十月一日邑人黃由記龔頤正書吳江縣在州南四十里主簿㕔在縣之西李處全曽程堂記余同年友髙君炳儒主吳江縣簿之二年既請於府縣以新治舍又即其西作堂三楹為退食之所規制穩密不庳不隆榜之曰曽程以禮部尚書贑川曽公楙中書舍人信安程公俱嘗為此官示尊賢也且屬余記之余幼侍先君獲拜二公席益知其文章議論軒輊一時在京師巳嶄嶄有人望曽公既登華近而程公亦賜第擢館閣迄為中興第一流先後典內外制渡江文物追配中原二公有助焉其去此雖逺而流風遺迹猶或可考尚友昔人炳儒得之矣炳儒行終更去一紙書入光範門諸公當爭挽致之由西垣入北扉丹青帝謨鼓舞郡聽則於二公何羡雖然孔子之賢賢孟子之論世其尊德樂道之風可少廢邪後之君子將有取於斯文乾道三年四月朔日贊皇李處全記范成大新修主簿㕔記州縣之任古謂之宦遊豈直以斗升易農而巳哉名山大川雄尊奇秀之境從事其間足以窺覽觀而昌神明古之君子固有樂乎此矣松江太湖水國之勝當天下第一四方好事者想像其處欲至而無繇今行臨東南士大夫假道以奏名場與夫商賈百族櫂船而逐利者飈帆相摩此其人皆有所期㑹嘂呼爭先亂次以濟終夜洶洶有聲其藝豈能少留而一寓目是雖日過乎前而與未始至者奚辨余家吳門莽蒼在望又無聲利火馳之役宜能數遊而躬耕作苦正爾少暇日私念誠得築室葦間卜鄰三髙以朝夕於斯吾樂可勝計邪乾道丙戌八月既望間從容泛舟垂虹主縣簿髙君炳儒適新作治所落其成余與觀焉蓋自始役至是財七十日而閈閎髙昭牖户靚深髹繢甓墁皆中度程既聚廬之百須無一可恨而為之讀書之齊休坐之堂修竹繞圍光景瀟然所謂垂虹者乃在其旁數十百步耳夫出有江湖之趣居有清燕之適此固古之君子官遊之樂而余素碩朝夕於斯而不可得者炳儒之職㑹計當而已無催科敲撲之煩奔命將迎之勞而有可樂者如此於是求文以為識余聞漢髙士不為主簿孫子嚴徙舍而有喜色士未遭隨所遇而安其可愧者不立我也炳儒有文學行誼而不卑其官又作意而新之視祭竈請比鄰有加焉其志固未易量姑為敘其所可樂以告後之賢者使共之明年二月一日順陽范成大記并書左迪功郎平江府吳江縣主簿主管學事四明髙文虎建吳郡志卷三十七
