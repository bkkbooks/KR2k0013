body:
  text: 吳郡志卷六宋范成大撰官宇吳都佳麗自昔所聞建炎兵燼所存惟覺報小寺及子城角天王祠今州宅官廨學舍倉庾亭館之類皆中興後隨事草創不能悉如舊觀輒考故事併異時名額識之以備考古譙樓紹興二年郡守席益鳩工三年郡守李擢成之二十年郡守徐兢篆平江府額然止能立正門之樓兩傍挾樓至今未復遺基巋然戟門紹興元年郡守胡松年建榜以平江軍額徐琛書設廳皇祐中李晉卿以兵部員外郎守郡嘗修大廳蔣堂為記敘廳之所始甚詳今題名逸李姓名晉卿是其字也後嘉祐中王琪以知制誥守郡始大修設廳規模宏壯假省庫錢數千緡廳既成漕司不肯除破時方貴杜集人間苦無全書琪家藏本讎校素精即俾公使庫鏤版印萬本每部為直千錢士人爭買之富室或買十許部既償省庫羡餘以給公厨兵火之後紹興三年郡守宋伯友更建今廳高宗皇帝巡幸嘗以為正衙制度差雄蔣堂重修大廳記姑蘇受署廳新成當兵部員外郎李公晉卿守屏之眀年冬十月也政修事舉所至精眀完葺之初見梁間有題識乃有唐乾寧元年刺史成及所建乾寧距聖宋一百六十有餘年矣刺是郡者接迹不絶凡受署訖即臨便閣煩鞅沉迷其於廳事或旬日不一至以至年祀寖逺棟將橈焉豫昔兩綰蘇印班録餘間每浚池隍構臺榭以館過賔以備宴衎以追韋白二公風迹雖自以為適然於是廳繕完有所未至今觀李公之為有過人者圖新補廢俾唐末之遺構巍乎顯眀吏民瞻之靡不胥悅君子謂李公急於先務知布政之本焉豫日是事憮然自咎因書本末云時皇祐六年三月日記黃堂郡國志在雞陂之側春申君子假君之殿也後太守居之以數失火塗以雌黃遂名黃堂即今太守正廳是也今天下郡治皆名黃堂昉此郡圃在州宅正北前臨池光亭大池後抵齊雲樓城下甚廣袤案唐有西園舊木蘭堂基正在郡圃之西其前隙地今為教場俗呼後設場疑即古西園之地郡治舊有齊雲初陽及東西四樓木蘭堂東西二亭北軒東齋等處今復立者惟齊雲西樓東齋爾餘皆兵火後一時創立非復能如舊聞東樓唐有之今廢獨孤及重陽陪李蘇州東樓宴詩是菊花開日當君乘興秋風前孟嘉帽月下庾公樓酒解留征客歌能破別愁醉歸無以贈秖奉萬年酬初陽樓在郡中池上既曰初陽宜占東城今廢皮日休登初陽樓危樓新製號初陽白粉青葌射沼光避酒幾浮輕舴艦下碁曽覺睡鴛鴦投鈎列坐圍華燭格簺分眀占靚粧莫怪重登頻冇恨二年曾侍舊吳王陸龜蒙逺窗浮檻亦成年幾伴楊公白晝筵日暖煙花曾撲地氣和星象却歸天間將水石侵軍壘醉引笙歌上釣船無限恩波猶在目東風吹起細漪漣東亭唐有之今更它名白居易溫溫土爐火耿耿紗籠燭獨抱一張琴夜入東齋宿窗聲度殘漏簾影浮初旭頭癢曉梳多眼昏春睡足負暄簷宇下散步池塘曲南鴈去未回東風來何速雪依瓦溝白草繞墻根緑何言萬戶州太守常幽獨西亭唐有之今西齋是其處白居易詩常愛西亭面北林公私塵事不能侵共間作伴無如鶴與老相宜只有琴莫遣是非分作界須教吏隱合為心可憐此道人皆見但有修行功用深又題西亭朝亦視簿書暮亦視簿書簿書視未竟蟋蟀鳴座隅始覺芳嵗晚復嗟塵務拘西園景多暇可以少躊躇池鳥淡容與橋栁高扶疏煙蔓嫋青薜水花披白蕖何人造兹亭華敞綽有餘四簷軒鳥翅復屋羅蜘蛛直廊枑曲房䆗窱深且虛修竹夾左右清風來徐徐此宜宴嘉賔鼓瑟吹笙竽荒淫即不可廢曠將何如幸有酒與樂及時歡且娛忽其解郡印他人來此居西園在郡圃之西隙地直子城甚袤唐謂之西園今以作教場白居易丘園共誰卜山水共誰尋風月共誰賞詩篇共誰吟花開共誰看酒熟共誰斟惠死莊杜口鍾殁師廢琴道理使之然從古非獨今吾道自此孤我情安可任惟將病眼淚一灑秋風襟北軒在郡宅之後梅摯北軒欹枕苦無勤瘁補臺綱西院西頭冷峭房今日鈴齋一欹枕清風不敢傲羲皇北池又名後池唐在木蘭堂後韋白常有歌詠白公檜蓋在池中皮陸亦有木蘭後池白蓮重臺蓮浮萍三詠今池乃在正堂之後而木蘭堂基正在其西後無池迹豈所謂木蘭堂基者非唐舊耶或舊池更大連木蘭耶本朝皇祐間蔣堂守郡乃增葺池館賦北池宴集詩及和梅摯北池十詠後十二年復守郡遂作北池賦按堂賦詠池中有危橋虛閣今池皆不能容則知承平時池更大矣蔣堂北池賦并序姑蘇北池其來古矣昔刺史韋應物詩云海上風雨至逍遙池閣涼即其池也韋與白樂天皆有池上之作盛詫其景自韋白沒僅三百年寂無歌詠者豫景祐丁丑嵗被命守蘇池館必葺嘗賦北池宴集詩是時端眀張安道為邑崑山亦留風什傳刻于石故事在焉去此涉一紀豫復佩蘇印感舊成賦聊以寄懷云澤國秀壤句吳故城其野意之勝者有曲池之著名環碧曉漲浮光畫渟斡琅津之餘派分銀潢之一泓危橋跨波迅若走鯨虛閣延月清如構瓊乃飛蓋之所集靄芳塵之不凝主人一去鞅之日復春草羅生賦詠幾廢涓縈未平今兹稅慰臨流之情目與景會神將喜并是時霽色疏淨羣動紛盈魚在藻以性遂龜遊蓮而體輕禽巢枝而自適蟬得蔭而獨清科斗成文書之象蛙黽有鼓吹之聲以至鷗鳥羣嬉不觸不驚菡萏成列若將若迎岸産并柯之木波孕紫莖之萍灘露沙而金紫垣疊蘚以衣青新蒲鏘鏘挺水心之劍緑竹整整矗羽林之兵别有島檜高聳虬枝相撑水石結操冰霜薦英若古君子與世寡偶而特立獨行吁可異也噫境之勝者可稱物之秀者可旌故萬狀在目吾得題評者已吾方岸野幘踞風亭觴賓友奏竽笙或獨繭靜釣或扁舟醉乘惟蔗有漿用以析朝酲惟菊有華可以制頽齡而況庭無留事身若遺榮泯得喪乎意表育平粹於心靈姑徜徉於池上亦何慮乎何營皮日休木蘭後池重臺蓮花欹紅婑嫷力難任每葉頭邉半米金可得教他水妃見兩重元是一重心浮萍嫩似金脂揚似煙多情渾欲擁紅蓮眀朝擬附南風便寄與湘妃作翠鈿白蓮但恐醍醐難並潔秖應薝蔔可齊香半垂金粉知何似靜婉臨溪照額黃陸龜蒙和重臺蓮水國煙鄉足芰荷就中芳瑞此難過風情為與吳王近紅蕚常教一倍多浮萍晚來風約半池眀重疊侵沙緑罽成不用臨池重相笑最無根蒂是浮名白蓮素花多蒙别艷欺此花真合在瑶池還應有恨無人覺月曉風清欲墮時皮日休重題後池細雨闌珊眠鷺覺鈿波悠漾並鴛嬌適來會得荆王意秖為蓮莖重折腰陸龜蒙曉煙清露暗相和浴鴈浮鷗意趣多却是陳王詞賦錯枉將心事託微波蔣堂和梅摯北池十詠池上有虛閣翬簷迅若翔百壺多盛集四坐仰惟良蘚印文綦緑蓮衣桂楫香何由陪嘯詠敷衽納微涼池上有奇檜青青歲紀深舊枝憐茂殖時亦欠清吟夕月漏孤影秋霜滋徑心今方遇真賞風什播瑶音池上有孤島影搖波底天蓬壺欣髣佛仙客得留連岸草襯丹轂灘蘆隈畫船羡君休浣日寄傲一樽前池上有修竹遙聞手自栽幾因風韻響時感隼旟來粉籜經梅脫虬根遇石回嬋娟緑隂下小宴為誰開池上有垂栁煙籠濯濯枝芳根逢茂育老翠勝平時體弱因風舞詞清入笛吹金城久不到遙想歎羇離池上有叢菊繁英滿舊蹊金刀惜頻剪粉蝶得幽棲醉辨誰同插香箋手自題遙思清賞處野步岸東西池上有時釣間忘侍從身波平方浸月吏退閴無人藻映魴魚尼風搖獨繭綸一亭容膝地雅飾免荒蓁池上有時宴笙簧沸欲凝歡多漏移刻坐久月和燈席客詠持蟹女娼歌采菱醉來忘萬事風靜水波澄池上有雛鶴來從淮水壖舊巢離海樹清唳入吳天骨峭翹霜月翎疏刷野泉使君宜得伴仙格本千年池上有馴鹿亭臺深處行長隨熊軾慣且免兔置驚遙草眠多穩流泉飲亦清寸岑有靈圑可使遂微生雙蓮堂在郡治木蘭堂東舊芙蓉堂也至和初吕濟叔大卿守郡以雙蓮花開易此名楊備雙蓮仙影面波光翠蓋搖風紅粉香中有畫船鳴鼓吹瞥然驚起兩鴛鴦池光亭在郡宅後池北紹興十七年郡守鄭滋重建池傍有小山二東曰芳坻郡守蔣粲建飛白書其額西有檜郡守洪遵訪故事植焉唐有白公檜已不存淳熙六年郡守司馬伋以亭名犯曽祖及祖諱暫以木蘭堂榜之木蘭堂在郡治後嵐齋録云唐張摶自湖州刺史移蘇州於堂前大植木蘭花當盛開時燕郡中詩客即席賦之陸龜蒙後至張聫酌浮之龜蒙徑醉強執筆題兩句云洞庭波浪渺無津日日征帆送逺人頽然醉倒摶命他客續之皆莫詳其意既而龜蒙稍醒援毫卒其章曰幾度木蘭船上望不知元是此花身遂為一時絶唱按舊堂基在今觀德堂後古木猶森列郡守數有欲興廢者而卒未就承平時堂內有治平二年郡守陳經所刻御書飛白字碑揭于木蘭堂之新閣上今不復存范仲淹木蘭堂堂上列歌鐘多慙不如古却羡木蘭花曽見霓裳舞照楊備木蘭枝密樹仍高堂下花光節旄列鼎重茵歌舞地金章同色使君袍雙瑞堂舊名西齋紹興十四年郡守王㬇建前有花石小圃便坐之佳處紹熙元年長洲有瑞麥四歧及後池出雙蓮郡守袁説友葺西齋以雙瑞名堂以識嘉祥范成大雙瑞堂記紹熙初元夏四月吳郡袁使君為政之再閲月也長洲之彭華鄉以瑞麥獻又三月木蘭後池以瑞蓮獻麥兩歧巳堅栗可刈岐間復出新苗玉枝青蔥且秀且實後十日又岐於新苗之半亦秀實如前按瑞圖麥自兩岐至九岐者有矣未聞枯莖之稊一再重出青黃殊色而三穎俱茂有生生不窮之意蓋創見云蓮則共蒂異花連理並秀豐腴適相當亦奇産也吏民歡喜謂造物者效珍發祥工深巧妙非賢使君孰能致此又謂使君辱臨吾州政爾暖席而嘉瑞輒應何其速耶余聞神人精祲之交其迹固相絶逺一念感通則和同無間直瞬息頃爾固未可速計也方使君持節按刑時以柱後惠文繩郡縣弗虔官吏絫足立逐捕劇賊血其鯨鯢風采烈於秋霜朝廷第最課進直中祕書就牧此邦吳人憺其威名相與屏氣惕息使君一日過范村從容為余言嚮吾以衣繡持斧為職知飭法鋤姦而已今為郡守號稱民父母當有惻怛之愛拊摩惸鰥若乳保之於赤子使百姓知吾此心庶幾有不忍欺者雖蒲鞭且弗願用況於桁楊敲撲乎余矍然起賀曰公此心當與天通人固未能戶知神者其知之矣閲時亡幾而叶氣薰翔被于珍物豈非一念之感如鼓應桴有不疾而速不召而至歟是嵗秋大熟政成人和庭訟稀簡郡廓廊無事曩之蘄望於民者皆如本指益知祥應之不虛於是部使者暨府縣之賔佐皆畫圖以傳賦詩以相倡酬猶謂未足傳久逺且春秋有年大有年皆以喜書今兹樂嵗善收甌窶汙邪無不滿望二瑞實兆其祥尤不可以弗識乃以雙瑞名郡之東堂余又為原其所以致祥者為之記因以附見有年之喜亦春秋之遺意焉使君名説友字起巖建陽人嘉平日石湖范成大記平易堂在小廳東挾紹興間郡守蔣璨立自書扁榜淳熙五年郡守單夔易以隸書思政堂舊名東齋紹興三十年郡守朱翌建隆興間郡守沈度更名復齋紹熙三年郡守沈揆更今名自書扁榜思賢堂舊名思賢亭以祠韋應物白居易劉禹錫後改曰三賢堂紹興二十八年郡守蔣璨建三十二年郡守洪遵又益以王仲舒及范文正公二像更名思賢仲并撰三賢堂記紹興二十八年春敷文閣待制陽羡蔣公之鎮吳門也既期年矣治最上聞帝用裦寵民安初政郡以無事公惟益勤不懈事有關於風教纎悉必舉前人遺蹤勝槩以次復焉又以前政信安孟玉之意嘗捐金欲興三賢堂蓋唐左司郎中曰洛陽韋公太子少傅曰太原白公太子賔客曰中山劉公皆嘗牧此邦者邦人尊之曰三賢曩嵗為堂以祀之毁于兵火垂三十年邦人念之歎息公訪其遺基得於郡治故木蘭堂之左攘剔榛翳掄材庀工百姓不知僚屬皆樂從也三月辛酉堂成制度古雅不陋不奢稱三賢之居焉塑其像以次位置于堂南向東上并嘗一再從公過焉公曰其為我記嵗月固辭不獲并每獨怪唐史如文藝儒學循吏三傳幾二百人韋公法當處一焉乃獨不為立傳亦史册之遺恨也惜哉公貞元初由左司郎得郡于此清德臨民民樂其政暇日賔禮名流與之酬唱于時白公客遊郡下盛稱公風流雅韻播於吳中至有詩仙之目自以不得與公遊宴為不滿已而罷郡寓永定僧廬羇旅蕭然欲求田課耕而未得每端居焚香掃地而坐清風峻節可想而知其後白公自杭移蘇實寶厯初元也首以公郡宴詩鑱之石酷愛慕之每自謂不及韋公大槩可見於此史不傳不得不致詳焉若白與劉行事始終則有本傳在二公共生大厯壬子嵗真輩行也晚益相厚世謂劉白白之去郡劉以詩遺之有十萬戶嬰兒啼之句雖三代遺愛何以加焉後六七年當太和中劉亦繼來秉郡荒疫之餘撫摩安輯免民於轉徙文宗錫服以寵之白公時在河南猶以詩為劉賀三賢平時道義相先分相好誠相與也而文聲政績兼優並著且俱為有意於民者名藩巨屏得一師帥吾民幸矣乃接踵來臨嵗月未逺聲名風采炳乎其輝一時盛事他郡所未有也去之三四百嵗邦人懷慕之不衰宜哉公復振起而一新之是將傳之愈久而愈無窮也蔣氏代以儒學顯至公而守兹土者三世矣公少受知於世父樞密太師魏公翰墨篇章悉有家法晚逢眀天子擢登法從處劇以簡中扄湛然到郡今踰年矣鋤荒植廢皆如此堂未易一二書也并聞元祐中魏公帥南海郡人繪前刺史吳公隱之宋公璟而下八人築室以祠之魏公閲圖籍所載又得滕公修王公林合前八人者號十賢各為之贊敘公今新斯堂也視十賢之舉蓋不謀而契益知公之心真魏公之心哉敢併書以告來者五月庚申朔左朝奉郎前差通判信州軍州主管學事江都仲并記廣平程紹祖書范成大撰思賢堂記吳郡治故有思賢亭以祠韋白劉三太守更兵燼久之遂作新堂名曰三賢其四年當紹興辛巳鄱陽洪公始益以唐王常侍本朝范文正之像復其舊之名亭者榜焉先是公以嵗五月來臨吾州繇州南鄙望洞庭略具區觀三江五湖之吐吞濤波聒天旁無邉垠而石隄截然浮於巨浸之上若有鬼神之扶傾鯨鰲背負而涌以出也暮夜人語馬嘶胸胸不絶公固已語其人思常侍之功矣周覽原田而相其溝防東南之播於江東北之委于海者脈絡釃通堙蕪滌塗夏旱易以陂潦水時至不能齧渚涯以決汙邪荒寒化為麥禾起景祐迄兹嵗無大浸於是公又曰非文正范公之勤其民者乎退而參石記竹書之傳詳兩賢行事尚什百於此韓退之名知言碑王之墓隧謂治蘇最天下蓋遺册廑存於一隄其變滅無考者不知幾也文正自郡召還遂參永昭陵大政德業光眀為宋宗臣通國稱之曰文正公而不以姓氏行焉韋白劉之餘愛邦人既已爼豆之語在舊碑尚矣王范風烈如此且有德於吳宜俱三賢不沒以為無窮之思此堂之所為得名者嘗謂士才高必自賢位高或不屑其官世通患也洪公忠宣公之子擢博學宏詞第一名字滿四海餘二十年既入翰林為學士未幾自劾去甫及里門制書以左魚來矣邦人度公且上朝謁莫能久私公也然始至之日咨民所疾苦退然不自居其智能亟從掌故吏訪諸賢之舊圖畫髣佛想見其平生公既以道學文章命一世顧有羡於五君子者意將迹其惠術講千里之長利以膏雨此民彼憧憧往來視桑蔭趣舍人裝者慮安肯出此夫才高而不自賢位高而滋共其官盛德事也斯堂法應得書會公使來屬筆紀嵗月成大世占民數西郭樂其州多賢守令之不歉於古也文正公又吾東家丘焉竊願詫斯堂以夸鄰邦以為邑子榮乃不辭而承公命八月既望州民左從事郎范成大記并書瞻儀堂舊在廳事之東紹興三十一年郡守洪遵建吳俗貴重太守來者必繪其像春秋則陳於齊雲樓之兩挾令吏民曕禮至是洪公恐為風日所侵故作此堂藏之紹熙三年郡守沈揆始遷諸像於後圃舊凝香堂中并其名遷焉范成大瞻儀堂記吳自置守以來仍古大國世為名郡又當東南水會外暨百粵中屬之江淮四方賔客行李之往來畢上謁戲下願見東道主城門之軌深焉稻田膏沃民生其間實繁井邑如雲煙物夥事穰有司程文書應言府者以千萬計奉使命大夫行部第郡課必致詳於吳以視列城其雄劇如此夜漏未盡太守坐堂上主吏儐客旅進退語言面目不暇相孰何平眀乃得據按聽諸曹白事率常旰食有頃它客與報期會者又至如前雖精力過絶人其勢亦出甚勞而後能善治故吳郡虎符非名德士若已至大官者不以朌去之數十百年長老猶以為記至藏弆繪像畏愛之如一日番陽洪公之以內相典城也乃規東序之間屋為堂取凡公私所藏故侯之像頗補其闕遺列畫其上又采韓退之廟學碑語名之曰瞻儀而命州民范成大詞而識諸石竊嘗觀郡國方志與耆舊風土之書既備載山川土疆郭郛所在必論次前世賢守長爵里姓字之大略著于篇謂君子嘗居之其地政僻陋猶借此以為寵今吾州不獨能志其人而肖貌具在章綬相輝凜凜如對生面它郡未聞有此雖大府地重多顯者來自有以不沒抑吳人習於親上至久逺且弗弭忘氣俗之媺舊矣洪公蓋始表出之盛事固不宜無紀然公實以紹興辛巳夏五月至郡是嵗金人謀渝盟積甲並塞使行人來啓兵端又造舟東海上將數道並入天子赫怒大發步騎待邉分命樓船將督水居之士營巨浸以直敵衝吳前當出師通道後控海浦所從入𤇺堠相望羽書疾星火公聲氣弗為動舂容頤指不斂一錢不籍一夫機事立決無留行姦人幸騷搖一逞心醉叵測相率遁去里門晏閉田間無吠犬行歌刈熟不知有軍興民德公甚念無以報恩勤飲食必祝焉公於艱難時用劇郡呼吸變故曽無足以嬰道德之威齒文章之斧斤者治行冠一世而不自以為功若此足矣顧方帥其吏民以館御諸賢覽觀裴回若慕用之云者夫有餘則母我不足者多尚人君子之德心豈世俗所能測識者哉後之人厯階而登有感於作者之意疇肯以行能蓋前聞人其必葺斯堂而嗣其事壁間之圖將魚鱗雜襲至於無窮可也敢併書之以風來者十月九日左從事郎范成大記齊雲樓在郡治後子城上紹興十四年郡守王㬇重建兩挾循城為屋數間有二小樓翼之輪奐雄特不惟甲於二浙雖蜀之西樓鄂之南樓嶽陽樓庾樓皆在下風父老謂兵火之後官寺草創惟此樓勝承平時樓前同時建文武二亭淳熙十二年郡守丘崈又於文武亭前建二井亭唐白居易齊雲樓晚望偶題十韻兼呈馬侍御周殷二協律潦倒宦情盡蕭條芳嵗闌欲辭南國去重上北城看復疊江山壯平鋪井邑寬人稠過揚府坊閙半長安插霧峰頭沒穿霞日腳殘水光紅漾漾樹色緑漫漫約略留遺愛殷勤念舊歡病拋官職易老别友肋難九月全無熱西風亦未寒齊雲樓北面半日憑欄干和公權登齊雲樓樓外春晴百鳥鳴樓中春酒美人傾路傍花日添衣色雲裏天風散珮聲向此高吟誰得意偶來間客獨多情佳時莫起興亡恨遊樂今逢四海清九日宴集前年九日餘杭郡呼賓命宴虛白堂去年九日到東洛今年九日來吳鄉兩邉蓬鬢一時白三處菊花同色黃一日日知添老病一年年覺惜重陽江南九月未搖落栁青蒲緑稻穟香姑蘇臺榭倚蒼靄太湖山水含清光可憐假日好天色公門吏靜風景涼榜舟鞭馬取賓客掃樓拂席排壺觴胡琴清圓指撥刺吳娃美麗眉眼長笙歌一曲思凝絶金鈿再拜光低昂日腳欲落備燈燭風頭漸高加酒漿觥盞灔翻菡萏葉舞鬟擺落茱萸房半酣憑檻起四顧七堰八門六十坊逺近高低寺間出東西南北橋相望水道脈分棹鱗次里閭碁布城册方人煙樹色無隙罅十里一片青茫茫自問有何才與政高廳大館居中央銅魚今持澤國節刺史是占吳郡王郊無戎馬郡無事門有棨戟腰有章盛時儻來合慙愧壯嵗忽去還感傷從事醒歸應不可使君醉倒亦何妨請君停杯聽我語此語真實非虛狂五旬已過不為夭七十為期蓋是常須知菊酒登高會從此多無二十一場章憲登齊雲樓飛樓縹眇瞰吳邦表裏江湖自方曲檻高窗雲細薄落霞孤鶩水蒼茫固知興廢因時有獨覺江山共古長回首中原正愁思不堪殘日半規黃西樓在郡治子城西門之上唐舊名西樓後更為觀風樓今復舊紹興十五年郡守王㬇重建二十年郡守徐琛篆額下臨市橋曰金母橋亦取西向之義㬇初落成郡人競獻詩以進士耿元鼎所賦為最白居易西樓雪宴宿雲黃慘淡曉雪白飄颻散麵遮槐市堆花壓栁橋四郊鋪縞素萬寶甃瓊瑶銀榼攜桑落金爐上麗譙光迎舞妓動寒近醉人銷歌樂雖盈耳慙無五袴謡城上夜宴留春不住登城望惜夜相將秉燭遊風月萬家河兩岸笙歌一曲郡西樓詩聽越客吟何苦酒被吳娃勸不休從道人生都是夢夢中歡笑亦勝愁劉禹錫登西樓見樂天題詩湖上收宿雨城中無晝塵樓依新栁貴池帶亂苔春雲水正一望簿書來繞身煙波洞庭路愧彼扁舟人玩月半夜碧雲收中天素月流開城邀好客置酒賞新秋影透衣香潤光凝歌黛愁斜輝猶可玩移宴上西樓楊修觀風樓觀風危堞與雲齊樓下開門畫戟西鼓角聲沉絲管沸卷簾晴黛逺山低范仲淹觀風樓高壓郡西城觀風不浪名山川千里色語笑萬家聲碧寺煙中靜江橋栁際眀登臨豈劉白滿目見詩情章造西樓懷感高花古栁傍城闉遊目江城次第新百感中來倚惆悵滿城煙雨滿城春耿元鼎西樓一曲舊笙歌千古當樓面翠峨花發花殘香徑雨月生月落洞庭波地雄鼓角秋聲壯天逈闌干夕照多四百年來逢妙手要看風物似元和四照亭在郡圃之東北紹興十四年郡守王㬇為屋四合各植花石隨嵗時之宜春海棠夏湖石秋芙蓉冬梅凝香堂在思賢堂西面臨池紹熙三年遷太守畫像於此堂更名瞻儀逍遙閣在舊凝香堂後蓋取韋應物逍遙池閣涼之句此閣舊觀復堂也逍遙額郡守蔣璨書後守韓彥古欲更名乃除去舊額而迄不果更名雲章亭在舊凝香堂西南故有此亭紹興三十一年郡守洪遵始命名亭有仁宗皇帝賜陳經御書飛白端敏寶文閣佛字石刻及奬諭陳經敇賜丁謂詩并太上皇帝御書千字文坐嘯齋在四照亭南紹興二十七年郡守蔣璨建并書額秀野亭在坐嘯齋西紹興三十一年郡守洪遵建涼渚本流杯名舊在凝香堂後今徙於池光亭後觀德堂在教場唐西園地也紹興二十一年郡守徐琛建西又有射亭扶春池光亭後酴醿洞也紹興二年郡守沈揆名之且書其榜頒春宣詔二亭紹興十四年郡守王㬇建知信州吳説書額亭之側東西二井亭乾道四年郡守姚憲建介菴慶厯八年郡守梅摯建在木蘭堂南凌雲臺下摯作銘刻石後菴入通判東廳久亦廢而銘石尚在蓋兵火更張官廨多失其舊也介菴銘并序郡署西北有堂曰木蘭堂之南有臺曰凌雲灌木駢生其上臺下冇故園廢洞址在焉豫因訪陳迹通其塞而菴之惜乎孑立一隅中無長物入之者志意斂然思有所守宜介其名而銘之菴非廣居介不兼濟有守退公杖而獨詣心淵坐澄默與真契嗚呼公怒賊私不遷而霽私欲蠧公不萌而制世紛萬殊浩乎亡際何以靖之曰思無邪一言以蔽慶厯八年九月二十五日尚書戶部員外郎知蘇州軍州事梅摯立通判東廳在郡治之西紹興九年通判白彥惇建介菴舊在郡圃後入通判廳今菴亦廢廳西有琵琶泉小丘嵌巖曰西施洞皆傳為往迹泉清冽可釀酒淳熙十一年通判魏仲恭葺洞門作捧心亭今更名舞雪通判西廳在城隍廟後依子城東南角城上有小樓見西山名湧翠簽判廳在儀門西教授廳在府學之東節推廳在通判東廳之西察推廳在平橋南府院在譙樓東司理院在譙樓西司戶廳並府院西司法廳在平橋南路鈐衙在子城內府西樓下東偏州鈐廳在狀元坊內路分廳在路鈐衙南轉運衙舊在郡治西偏後徙餘杭初錢氏國除田重稅尚仍舊畝稅三斗太宗命王贄為轉運使來均雜稅贄悉令畝稅一斗至今便之倉庫場務市樓附府倉在飲馬橋西常平倉在府倉內戶部百萬倉在閶門裏開禧三年創以府職曹官兼嘉定二年始命官専掌以都司提領憲司措置之補注歸仁倉報功倉淳熙元年郡守韓彥古創建専儲年計並存府倉內甲仗庫在設廳西廊軍資庫在儀門東公使庫公使酒庫並在設廳東架閣庫在設廳西廊作院在教場西乾道四年郡守姚憲建監倉廳在姑蘇館前糧料廳在譙樓西四酒務在平橋南初郡有酒務四合而為一故名曰四酒務激賞西庫在景德寺東激賞南庫在盤門裏望雲館在閶門裏右三所並紹定二年郡守李夀朋創清風樓在樂橋南黃鶴樓西樓之西跨街樓西樓之西花月樓飲馬橋東北麗景樓樂橋東南花月麗景皆淳熙十二年郡守丘崈建雄盛甲於諸樓坊市按長慶集云六十坊者舊經所籍如之後頗隨事而有創有易樂橋東南孝義坊東憩橋巷通闤坊金母橋西繡錦坊大市儒教坊飲馬橋南旌義坊蔡匯頭孝友坊南園東巷玉淵坊南星橋儒學坊烏鵲橋南衮繡坊烏鵲橋北狀元坊醋庫巷黃魁所居吳會坊府治東晉寧坊濠股口和令坊楊郡王府前繡衣坊南倉橋北孔聖坊南倉橋南積善坊府治西阜通坊夏侯橋西樂橋東北干將坊東市門建善坊干將巷真慶坊天慶觀巷遷善坊草橋布德坊顧家橋豸冠坊仁王寺前富仁坊魚行橋東聞德坊周太尉橋東崇義坊禪興寺橋南乘鯉坊張馬步橋南閭丘坊張馬步橋北大雲坊天慶觀西碧鳳坊天慶觀前慶源坊大郎橋東天宫坊迎春巷迎春坊百口橋樂橋西南武狀元坊樂橋南紙廊巷林魁所居吳歈坊西憩橋巷平權坊跨街樓南館娃坊果子行和豐坊米行麗澤坊吉利橋北通波坊吉利橋南孫君坊孫老橋賓興坊貢院南好禮坊富郎中巷義和坊杉瀆橋東靈芝坊侍其巷晝錦坊南營西載耜坊開元寺東坤維坊瑞光寺東同仁坊金獅巷南宫坊南園巷樂橋西北西市坊鐵瓶巷太平坊太平橋嘉魚坊魚行橋西流化坊吳縣東武狀元坊雍熙寺東周魁所居文正范公之坊范家園盍簪坊張馬步橋北德慶坊禪興寺橋西甘節坊承天寺東樂圃坊三太尉橋北立義坊北寺西清嘉坊朱眀寺橋北仁風坊十九勝巷至德坊泰伯廟前吳趨坊臯橋西補注右六十五坊紹定二年春郡守李夀朋並新作之壯觀視昔有加儒學坊林文節公與諸弟所居希父槩先在國史儒學傳希徙居吳與弟旦嘉祐二年同第進士次舉弟邵顔文同登第吳人榮之故以名坊衮繡坊以參知政事元絳所居得名狀元坊淳熙八年黃由魁天下郡守韓彥質以表其閭十一年衛涇魁天下涇居崑山之石浦亦立狀元坊豸冠坊直龍圖閣范師道貫之所居貫之出入臺諫有聲故以名坊大雲坊林虙所居虙自號大雲翁武狀元坊二淳熙十一年林㟽為廷魁郡守謝師稷以表其閭在樂橋之南慶元二年周虎為廷魁亦以名坊在雍熙寺之東靈芝坊初名難老坊蔣堂謝事所居李之儀作范正平遺録云胡文恭公宿為諸生時嘗受學於蔣堂文恭守吳郡蔣居第表為難老坊蔣不樂曰此俚俗歆艷內不足而假之人以誇者非所望於故人願即撤去胡乃用蔣氏嘗有芝草之瑞更名靈芝按堂皇祐六年三月作平江軍新修大廳記云當兵部員外郎李公晉卿守郡之眀年十月修此廳又有因芝草生謝兵部詩據此則所謂兵部者正謂李晉卿而揭靈芝於坊表者亦李也李之儀所記乃謂揭坊名為胡宿疑有誤又按胡宿墓志自祠部員外郎判度支後知蘇州蓋未嘗為兵部其為晉卿無疑晉卿逸其名今太守題名皆不著胡李蓋闕文方芝産時堂有詩記之因芝草生謝兵部黃菌誕丘園靈堪配醴泉至和非我召美化自公宣秀色鄰三徑幽光被一㕓時髦均秉筆為我列詳編使君有意飾門閭雅為靈芝揭表初招隱溪邉往還者從兹認得野人居晝錦坊以光祿大夫程師孟所居得名德慶坊直龍圖閣盧秉奉其親年八十餘故以名坊吳郡志卷六
