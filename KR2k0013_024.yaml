body:
  text: 吳郡志卷二十四宋范成大撰人物張裕字茂度敞之子為廣州刺史綏靜百越嶺外安之解職還家徴為都官固辭以疾就加金章紫綬茂度內足於財自絶人事經始本縣之華山為居止優遊野澤如此者七年為會稽太守有吏能職事甚理卒於官守諡曰恭子子演位太子中舍人弟鏡永辨岱俱知名時謂張氏五龍張鏡裕之次子少與顔延之鄰居延之常談義飲酒喧呼鏡靜默無言聲後鏡與客談延之從籬邊聞之取胡牀坐聽辭義清深延之心服謂客曰彼有人焉由是不復酣呌仕至新安太守張永字景雲裕之第三子涉獵書史能為文章善𨽻書騎射雜藝觸類兼善又有巧思大為文帝所知紙墨皆自營造上每得永表啓輒執玩咨嗟自歎供御者不及授揚威將軍都督諸將經略河南後為青冀二州刺史統諸將討薛安都封孝昌縣侯改吳郡太守遷南兖州刺史加都督永少便驅馳志在宣力其為將帥能與士卒同甘苦年雖老志氣不衰子瓌仕齊張岱字景山裕之幼子仕為東遷令殷冲為吳興太守謂人曰張東遷棲遲下邑名器方顯終當大至歷臨海豫章晉安三王府咨議自謂一心可以事百君我為政端平待物以禮悔吝之事無由而及徙益州刺史益土安其政齊建元初為吳郡太守髙帝知岱歷任清直至郡未幾手敕曰大郡任重未欲回換但總戎務殷宜須望實今用卿為護軍加給事中岱拜竟詔以家為府武帝即位復為吳興太守更以寬恕著名遷南兖州刺史未拜卒諡貞張邵字茂宗裕之弟初為晉琅邪內史王誕龍驤府功曹桓𤣥徙誕於廣州親故咸離棄之唯邵情禮彌謹流涕追送時寇亂年饑又資饋其妻子武帝以邵勤練憂公補州主簿邵悉心政事精力絶人帝受命以佐命功封臨沮伯卒諡曰簡遺命祭以菜果葦席為轜車諸子從焉子敷張敷字景𦙍生而母亡年數嵗問之便有感慕之色求母遺物唯得一扇緘録之每感思輒開笥流涕性整肅風韻甚髙好讀𤣥書兼屬文論少有盛名帝見而愛之與髙士宗少文談繫象少文曰吾道東矣於是名價日重宋武帝召見奇之曰真千里駒也仕至黃門侍郎後軍司徒左長史父亡十餘日始進水漿葬畢不進鹽菜毁瘠成疾未朞而卒孝武旌其孝追贈待中名其所居曰孝張里張暢字少微褘之子少與從兄敷演鏡齊名為後進之秀元嘉中纍遷安北長史魏太武南侵至彭城暢於城上與魏尚書李孝伯語吐屬如流音韻詳雅風儀華潤魏人相視歎息改為南譙王義宣長史元凶弒逆義宣舉兵暢哀容俯仰䕃映當時見者皆願為盡命事平封夷道縣侯義宣有異圗暢遣門生茍僧寶下都因顔竣陳義宣釁狀義宣敗暢見原轉侍中會稽太守卒諡曰宣張緒字思曼演之子少知名清簡寡欲從伯敷及叔父鏡並貴異之鏡語人曰此兒今之樂廣也謝敷云是我輩人宋眀帝每見緒輒歎其清談袁粲謂有正始遺風出為吳郡太守齊建元初為中書令素望甚重太祖深加敬異王儉嘗云北士中覓張緒過江未有人不知陳仲弓黃叔度能過否長於易言精理奧見宗一時吐納風流聽者皆忘饑疲見者肅然如在宗廟雖終日與居莫能測焉益州獻蜀栁狀若絲縷武帝植之靈和殿前賞玩咨嗟曰此楊栁風流可愛似張緒當年時每朝見世祖目送之謂王儉曰緒以位尊我我以德貴緒其見賞如此緒口不言利有財輒散之清言端坐或竟日無食門生見緒饑為之辦飱然未嘗求也死之日無宅以殯遺命作蘆葭轜車引柩上置杯水香火不設祭焉諡簡子子充仕齊張瓌字逸祖永之子仕宋不欲前兄瑋處祿免官不拜遭永喪還吳升眀元年劉秉有異圖弟遐為吳郡潛相影響齊髙帝密令瓌取遐諸張世有豪氣瓌與叔恕領兵十八人入郡斬之郡內莫敢動者太祖告張沖曰瓌以百口一擲出手得盧矣即授吳郡守錫以嘉名封義成縣侯郡人顧皓陸間少年未知名瓌引為綱紀後並立名皆以為知人瓌以既有國秩不取郡俸髙帝敕上庫别藏其俸以表其清鬱林之廢朝臣參承眀帝瓌託腳疾不至見朝廷多難屢啓還吳梁天監中卒弟稷子率並仕梁張沖字思約敷弟柬之子母戴顒女有儀範張氏內取則焉沖少有至性仕齊為青冀二州刺史沖父初卒遺命曰祭我必以鄉土所産無用牲物沖在鎮四時還吳取果菜流涕薦焉後遷郢州封定襄侯梁武帝起兵手書喻意又遣辨士說之沖確然不回眀年梁兵圍之沖固守不出病將死屬府僚以誠節言終而卒贈散騎常侍護軍將軍張融字思光暢之子弱冠有名神眀俊出機辨如流同郡道士陸修靜以白鷺羽麈尾扇遺之曰此既異物以奉異人仕宋為封溪令路經嶂嶮獠賊執融將殺食之融神色不動方作洛生詠賊異之而不害也融風止詭越見者驚異聚觀齊髙帝素愛融常笑曰此人不可無一不可有二善草書常自美其能帝曰卿書有骨力但恨無二王法答曰非恨臣無二王法亦恨二王無臣法義宣之亂官軍欲殺融父暢張興世以袍覆暢而坐之得免興世卒融著髙履負土成墳興世子欣時坐罪當死融又啓竟陵王欲代欣時死王義之建武中病卒遺令建白旐無旒不設祭三千買棺無製新衾有玉海集行於世張氏前有敷演鏡暢後有充融卷稷弟寶積張寶積何㸃謂為保家之主永元中乘腰輿謁蕭頴胄舉動自若頴胄問何至之晚答曰自本朝危亂四海橫流既不能為比干之死實未忍為微子之去是以至晚頴胄深善之後仕御史中丞梁張稷字公喬瓌之弟幼有至性所生母喪常設神坐出告反面如事生州里謂之淳孝父母沒廬墓六年性疏率眀悟有才略仕齊衛尉卿東昏之難為梁武佐命然常愧之徐道角作亂見害俸祿皆頒親故家無餘財與族兄充融卷並知名時號四張子嵊姪率率弟盾張卷字令逺稷族兄少以和理著稱能清言仕至都官尚書張嵊字四山稷子少篤孝年三十餘猶斑衣受稷杖方雅有志操能清言感家禍終身蔬食布衣不執刀刃不聽音樂仕梁湘東王長史王為之筮得節卦謂嵊曰卿後當東入為郡恐不得終其天年嵊曰貴得其所耳為吳興太守侯景圍建鄴遣弟伊率兵赴援賊將劉神茂遣使說嵊嵊斬其使景遣侯子鑒擊嵊嵊軍敗釋戎服坐聽事賊臨以刃不屈執送景將舍之嵊曰速死為幸與子孫同遇害者十餘人景欲存其一子嵊曰吾一門巳在鬼録不就爾處求恩於是皆死元帝追贈開府儀同三司諡忠貞子弟睪亦知名張率字士簡瓌之子性寬雅十二能屬文每日限為文一篇至年十六凡作二千餘篇陸少𤣥家有書萬卷率盡讀之齊建武中舉秀才沈約目為南金梁武帝時為文德待詔帝見其文曰相如工而不敏枚臯速而不工卿可謂兼二子之全矣又謂曰卿東南物望名家奇才若復以禮律為意便是宰相才祕書丞天下清官東南望胄未有為之者今以相處為卿定名譽尋以為祕書丞出為新安太守率嗜酒於家務尤忘懷自少屬文七略及藝文志所載詩賦今亡其文者並補作之所著文衡十五卷文集四十卷行於世張盾字士宣率之弟以謹重稱為湘東王記室出監富陽令廓然獨處無所用心身死之日家無遺財唯有文集并書千餘卷酒米數甕而已張種字士苗永從孫祖辨宋大司農父略太子中庶子種少恬靜居處雅正傍無造請時人語曰宋稱敷演梁則卷充清虛學尚種有其風仕梁始豐令母卒毁瘠過甚又迫凶荒未葬服雖畢居家飲食常若在喪景平初王僧辨以聞起為中從事并為具葬禮葬訖方即吉陳武帝受禪纍遷中書令種沈深虛靜識量宏博時以為宰相之器卒贈特進諡元子種雖歷顯位家産屢空終日晏然不以為病張稜仕梁種之弟清靜有識度位司徒左長史光祿大夫張充字延符緒之子少好逸遊嘗臂鷹牽狗吳西郭中年三十便修改多所該通尤眀老易能清言與從叔稷俱有令譽仕齊歷尚書殿中郎王儉用事方聚親賔充縠巾葛帔至便求酒言論放逸一坐盡傾遷義興太守為政清淨入為侍中梁武帝兵至建鄴東昏遇禍百官集西鐘下召充充不至歷梁吏部尚書居選以平允稱遷尚書僕射頃之為吳郡太守卒諡穆子張繹字士和郡人學道講經理致深密詞端華辨當時所宗梁武帝雅相欽賞時陶隱居著法檢論眀釋老二教繹往復討論甚有條理隱居嘉焉專心道法居貧守約善八體書别製雲篆作茅山南洞碑甚工太平經張昭字德眀弟乾字元明吳人昭幼至孝父熯病消渴嗜鮮魚昭結網捕魚以供弟乾聰敏好學亦有至性父卒兄弟並不衣綿不食鹽醋日食一升麥屑粥每感慟必歐血父服未終母陸氏又卒兄弟毁瘠骨立家貧未得大葬布衣蔬食十有餘年衡陽王伯信臨郡舉乾孝亷固辭兄弟因毁成疾昭一目失眀乾亦中冷苦癖年未五十並終于家嗣息俱絶張仲字叔𤣥郡人仕陳左中郎將好覃思經典撰春秋義略喪服孝經論語義前漢音義官至漢王侍讀張後𦙍字嗣宗崑山人祖僧紹梁零陵太守父沖陳國子博士入隋為漢王諒并州博士後𦙍以學行禪其家以經授唐太宗封新野縣公終散騎常侍諡曰康張承休後嗣孫張說撰其墓志云後嗣之子小師小師生承休承休希言篤行去華崇實非法不由非禮不動精於理物敏於從政歷朝議大夫上柱國恆州刺史說之文曰昌門一分暉我諸侯蓋居昌門云張鎰字季權後嗣五世孫父齊丘朔方節度使東都留守諡貞獻鎰纍官殿中侍御史將救盧樅死白其母曰樅免而鎰貶默則負官貶則為太夫人憂母曰兒無纍於道吾所安遂執正其罪坐貶撫州司戶建中二年拜中書侍郎平章事盧杞忌鎰剛直擠之出為鳯翔隴右節度使帝幸奉天鎰罄家資將自獻行在營將李楚琳嘗事朱泚夜率其黨作亂遂遇害史臣曰鎰暴忠王室為賊姦所乘以歿其身蓋福善禍淫之訓有時而撓要躬可殞而名與岱嵩等矣張從師郡人張說撰其墓志云河南府法曹參軍有唐逸士吳郡張從師沖和純粹辨博閎達卓犖好古儻蕩逸羣秀才髙第歷官五政忘懷樂道如浮雲無心野鶴獨立上元二年終葬虎邱西原子惟儉惟靜弱嵗皆精左氏穀梁春秋弟從申時為祕書省正字從師祖損之隋侍御史水部郎損之生浤碩學麗藻名動京師從師之父也從申自有時名書法甚髙張旭吳人草書嗜酒每大醉呼叫狂走乃下筆或以頭濡墨而書既醒自視以為神不可復得也世呼張顛初仕為常熟尉有老人陳牒求判宿昔又來旭怒其煩老人曰觀公筆蹟奇妙欲以藏家爾旭因問所藏盡出其父書旭視之天下奇筆也自是盡其法後人論書歐虞褚陸皆有異論至旭無非短者𫝊其法惟崔邈顔真卿文宗時詔以李白歌詩裴旻劍舞張旭草書為三絶張僅字幾道與里人顧棠字叔思皆客於王荊公公作三經義二人與焉僅至著作佐郎卒方子通作挽詩極哀楚誦者為出涕吳人因目子通為方挽詩吳郡聲名顧與張龍門當日共升堂青衫始見登華省丹旐俄聞入故鄉含淚孤兒生面垢斷腸慈母滿頭霜可憐十載人間事不及南柯一夢長吳郡志卷二十四
