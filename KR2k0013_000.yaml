body:
  text: 吳郡志地理類三都會郡縣之屬提要臣等謹案吳郡志五十卷宋范成大撰成大字至能號石湖居士吳縣人紹興二十四年進士官至參知政事事迹具宋史本傳是書為成大末年所作郡人龔頤滕茂周南相與贊成之時有求于附籍不得者會成大沒乃騰謗謂不出成大手遂寢不行故至元嘉禾志序謂吳郡志以妄議不得刋也紹定初廣德李夀朋始為鋟板趙汝談為之序以周必大所撰成大墓志定是書實所自為併謂龔頤等三人者嘗為成大搜訪故謗有自來其論乃定夀朋又以是書止紹興三年其後諸大建置如百萬倉嘉定新邑許浦水軍顧涇移屯皆未及載復令校官汪泰亨補之自謂仿褚少孫補史記例然當時不别著為續志故與本書淆焉其書凡分三十九門徴引浩博而敘述簡核為地志中之善本刋本久佚此本猶紹定舊槧往往於夾注之中又有夾注考成大以前惟姚宏補注戰國䇿嘗有此例而不及此書之多亦可云著書之創體矣乾隆四十四年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀吳郡志原序初石湖范公為吳郡志成守具木欲刻矣時有求附某事于籍而弗得者因譁曰是書非石湖筆也守憚莫敢辨亦弗敢刻遂以書藏學宫愚按風土必志尚矣吳郡自闔廬以霸更千數百年號稱雖數易常為東南大都會當中興其地視漢扶馮人物魁倬井賦蕃溢談者至與杭等蓋益盛矣而舊圖經蕪漫失考朱公長文雖重作亦略是豈非大缺者何幸此筆屬公條章粲然成一郡巨典辭與事稱矣而流俗乃復掩厄使不得行豈不使人甚太息哉紹定初元冬廣德李侯夀朋以尚書郎出守其先度支公嘉言石湖客也是以侯習知之及謁學問故驚曰是書猶未刋耶他日拜石湖祠退從其家求遺書得數種而斯志與焉校學本無少異侯曰噫信是巳吾何敢不力而書止紹熙三年其後大建置如百萬倉嘉定新邑許浦水軍顧涇移屯等類皆未載法當補於是會校官汪泰亨與文學士雜議用褚少孫例增所缺遺訂其脫訛書用大備而不自别為續焉侯喜曰是不沒公美矣亦吾先人志也書來屬汝談序余病謝弗果侯重請曰吾以是石湖書也故敢慁子而子亦辭乎余不得巳勉諾客有問余曰或疑是書不盡出石湖筆子亦信乎余笑曰是固前譁者云也昔八公徒著道術數萬言書標淮南通典亦出衆力而特表杜佑自古如吕氏春秋大小戴禮曷嘗盡出一手哉顧提綱何人耳余聞石湖在時與郡士龔頤滕茂周南厚三人者博雅善道古皆州之雋民也故公數咨焉而龔薦所聞於公尤多異論由是作子盍亦觀益公碑公墓乎載所為書篇目可考子不信碑而信誕乎且公蚤以文名四方位二府余鄙何所繫重余特嘉夫侯之不忘其先能畢力是書以卒公志而不自表顯焉是其賢非余言莫眀也抑余所感則又有大此者焉方公書始出也疑謗橫集士至莫敢伸喙以白曽未四十年而向之風波息滅澌盡至是無一存者書乃竟賴侯以傳是不有時數哉然則世論是非曷嘗不待久而後定乎此余所以重感也余誠不足序公姑以是寄意焉其亦可乎否也疑者唯服侯父子世儒有聞其治吳未期百墜交舉既上此職方氏將復刋石湖集與白氏長慶集並行而改命漕湖北矣余故併志以申後覬焉紹定二年十一月朔汴人趙汝談序
