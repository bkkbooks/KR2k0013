body:
  text: 吳郡志巻三十八宋范成大撰縣記常熟縣在府北一百五里題名記常熟為縣其来久矣舊為毗陵郡南沙縣至梁改為常熟自梁歴唐由唐迄于偽吴㡬數百年前尹是邑者姓名莫或紀録故不得而考本朝太平興國中錢氏以圖籍歸于京師始於縣令蒋文懌至元豐初知縣宣徳郎劉拯求得其姓名凡四十有二人列之版牓置于㕔壓角自此来尹者至則書之觀其間相繼登金門上玊堂儀羽臺閣正位樞極盖翩翩焉未見其止余因承乏慮版牓不足以久𫝊於是命工鐫之于石立于㕔之左闕者補之庶為不朽之𫝊宜觀名列以勸方来俾尹斯邑者知夫儒之効愷悌及民福延百里庶㡬乎刋石而無愧也紹興二十一年九月魯國曽慎記順民倉常熟縣倉也建於治平二年記於熙寧元年所淑常熟縣新建順民倉記治平二年河内向侯作新倉成常語予其始終曰吾至之初見太守永川陳侯席未煖陳侯曰常熟大縣也考其民版之數至四萬户嵗輸之粟至八萬石有倉汙庳迫窄纔容四分之一濱江之民逺者百里水浮陸走捆載而至倉或既盈則累數夕而不得輸于州又病其逺此一不便職是嵗常散蓄于浮屠之居廊廡皆滿葢藏弗謹塗塈弗完得無有以誨盜哉此二不便葢遲君之来也久矣君亟圖之吾退而自惟倉廩盖今天下郡縣之先務京師兵儲禄廪之出入一皆仰給于東南兹又為東南之劇嵗入之粟他郡莫加厚焉吾邑雖不腆其敢後其所先務邪矧其弊又如此之甚宜陳侯有以告吾也及吾視事之日見吏民問其所疾苦尤為不便者凡㡬然而獻計者又皆不出吾陳侯之議也於是訪縣之北得隙地數十畆以營築焉始召民而諭其所以作之之意民既病此久矣莫不奔走以聽命咸碩治材于家請期日合衆材以成之既而至期倉遂以成予謂二侯皆能以材名于世所至莫不著見風迹至於興利去害便民皆其所素畜霈然而有餘夫以霈然有餘之材相與協謀治其因民所欲之役其成也宜其不勞而功多其牓曰順民盖得之矣若夫世之從政者利害較然居前畏謗忌䜛諰諰然不肯一日出其力而又諉曰愛民斯不逺哉夫愛民莫如古人古之人有為豈天作而地生斯亦出於民而巳耳姑視利害之如何豈顧可為而不為迺曰愛民哉此大不然昔者子産甞以其乗輿濟人於溱洧孟子謂之恵而不知為政凡以此也向侯亦以予言為然因刻之于石俾来者考焉時熙寧元年三月十一日将仕郎前守沂州臨沂縣縣令所淑記楊備常熟縣詩逺逼江垠傍海壖落帆多是雨来船縣廷無訟鄉閭富嵗嵗多收常熟田淳熙元年邑令陳映再為記屬龔頤正為之文上方駐蹕臨安於時吴門視周畿内漢三輔唐同華我舊京之陳鄭也衣冠之所鱗集甲兵之所雲萃一都之㑹五方之聚上腴沃壤占籍者衆雖前代與全盛時猶不可同年語府邑之事宜其倍稱況乎府庫之出内獄市之浩穰盖不待較而知者環府之邑五而常熟居其望焉時主客以户計者八千九百七十有二而今五萬一千一百卅八夏賦金錢為緡二千八百其幣帛疋合萬二千六百而奇弗詳秋租穀粟七萬六千餘斛乃今折帛為緡者十萬二千三百而斛財損其舊二千邑之事其倍稱何如哉今其邑從事於民者如是而邑復瀕海道直故疆沂密菜全齊在望刺利規恢舟師所宿則實居今日之要害風檣連林夜嚴震海資粮巨萬以日饋給營繕百須以時調度茍有不至責言繁興若民兵之事又如是重以府所倚集月四大萬版籍輸委風雨寒暑不渝比為令者材或不濟負罪投劾而去者項背相望也則壁記之不列何以自警朝夕庸少惰乎陳映不佞爰来亦既年所事定得間始閲次中興以来為令者至映人名氏授受月而日之鑱石壁端以告来者噫令秩比京寺月奉逾二萬廪逾四斛嵗入圭田真過六百石其顧一已之利害去就而不思其責之塞将不特能禍其身千室之邑亦必有受其弊者矣而某其敢堕哉今吾邑之人或知某不敢堕也率以淳厚簡孚交相為治儻如是愒日庶乎列名下方其無辱若夫邑之望則有巫咸所止之山太伯所𦵏之墟言偃所居之里龔景才所表之閭其風俗之美猶或可槩見而邑之升置凡附於府者有職方氏在故不記記其今昔之同異云崑山縣在府東北七十里補註題名記崑山秦疁邑也天下壮哉縣五季雲擾四方碁於兵吴越雖保有所履然詩書仁義之事缺焉國家文經海内始嚴令守淮海王以版圖歸時邊公倣治吴最首賜璽書褒徙以来尚旄頭紫微間能即學立夫子廟北門王公元記之故比地翕然趨於文至今好學而知禮尚孝而先信乃有昔之流風焉畺岸海江夷曠沃衍者數百里一山巍然怪石錯立井井闤闠間又有室屋林壑之勝士大夫自京都来官者樂之觀遊詠歌未覺身逺其歆豔者至合省寺賦祖帳之詩繇此以相以輔小則言語侍從之班踵相躡也而其意依然于是二百年間風流藴藉續續可紀又建炎間時和年豐薦紳北来樂其土風而居之宦遊間多勝事益號佳邑屬嵗縣計蹙束頃入者聞其名相與駭汗若蹈甚畏豈先後難易若是不同耶亦才術限量之或異耶不然則今之所謂不足非古所病耶曷其趨違異見如此漢之郎官上應列星出宰百里晉之舍人洗馬妙天下選然不更長吏不得為臺郎今天子重字民之官褒庸旌善使觀瞻者以為榮顧力所底爾因仍規畏其可哉子强至之踰年勞於耳目思慮之外迺喟然而嘆信學力之未至則諏諸前人以矩範焉然所𫝊止自崇觀間益稽史牒碣識得自雍熙以次五十有六人序而鑱之石尚俾来者知前輩優游庶㡬勉之淳熙丙申六月縉雲葉子强記并書嘉定縣在府東北一百四十里嘉定十年置補註省劄朝請大夫集英殿修撰知平江軍府事趙彦橚朝請郎提舉兩浙西路常平茶鹽公事兼權提㸃刑獄公事王棐奏照對平江府管下五縣其境土廣袤無如崑山而頑獷難治亦無如崑山詳攷其故盖崑山為邑一十四鄉五十二都東西相距㡬二百餘里縣治以遷就馬鞍山風水僻在西北故西七鄉與官司相接稍稍循理自崑山縣治東至練祁七十里自練祁至江灣又七十里通計一百四十里其間止有商量灣楊林兩寨又皆不足倚仗故東七鄉之民憑恃去縣隔絶敢與官司為敵不奉命令不受追呼毆擊承差毁棄文引甚而巡尉㑹合亦敢結集千百挾持器仗以相抗拒自此習成頑俗莫可誰何其害有三爭競鬬毆燒劫殺傷罪渉刑名事千人命合行追㑹不伏赴官至有經年而不可決者此獄訟淹延之害濱江旁海地勢僻絶無忌憚之民相率而為寇公肆剽掠退即窩藏殆成淵藪此劫盜出没之害豪民慢令役次難差間有二十餘年無保正之都兩税官物積年不納只秋苗一色言之嵗常欠四萬餘石其他類是此賦役扞格之害有此三害崑山遂為難治之邑其来非一日矣盖縣方百里而兹邑廣袤倍焉以一令臨之制馭必有所不能及養成頑惡亦地勢使然昨於嘉定七年準尚書省行下備白劄子陳乞欲於練祁市添置一縣本府已甞委長洲縣婁主簿吴縣丘縣丞兩到練祁相視利害據各官所申亦以為合置一縣但恐有起盖廨宇等費且先添置一尉然東七鄉之頑根深蔕固決非邑尉之卑所能聳動察其理勢莫若置縣之為利便今斟酌事宜欲割崑山西鄉之安亭併東鄉之春申臨江平樂醋塘凡五鄉二十八都别為一縣就練祁要㑹之地置立縣治以嘉定為名所有東鄉恵安新安湖川及西鄉朱塘積善全吴川武元水安凡九鄉二十四都仍屬之崑山縣所有其他張官置吏事件竝欲照紹興府新昌縣處州慶元縣創置一般體例㕘酌續次申請施行如䝉朝廷明照事理特從今来所乞庶使近畿之邑無不率化之民寇盜可弭賦役可均於公於私皆有利益實郡縣幸甚十二月九日奉聖㫖依仍令浙西提刑司平江府條具合施行事宜申仍公共選辟清彊有心力之人充知縣一次吳郡志巻三十八
