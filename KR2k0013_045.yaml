body:
  text: 吳郡志卷四十五宋范成大撰異聞景平中吳郡太守顧琛為朝請假還東日晚至方山于時商旅數十船悉泊岸側有一人玄衣介幘執鞭屏諸船云顧吳郡部伍尋至應泊此岸於是諸船各東西俄有泊向處人云顧吳郡早晚至船人答無顧吳郡又問何船曰顧朝請耳莫不驚怪琛意竊知為善徴因誓之曰若得郡當於此立廟至是果為吳郡乃立廟方山號白馬廟云隋大業十二年五月癸已大流星隕于吳郡為石占曰有亡國有死王有大戰破軍殺將其後大軍破劉元進于吳郡斬之又感應録載劉元進舉兵據吳郡江都郡丞王世充發兵擊之有大流星墜於江都未及地而南磨拂竹木皆有光飛至吳郡而墮地元進惡之令掘地入二丈得一石徑丈餘即此事厯代紀異感應録唐大厯初處士李籝秋夕於震澤捨艫野步望中見煙火意為漁家漸近即朱門粉雉嘉木修林畫舟倚白蓮中生異其境徘徊未敢前入俄有青衣出曰君非李處士乎願得少進籝隨步而入瑣窗洞戶中有女郎狹體瓌質衣如雲霓揖生曰延佇嘉德積有年矣今夕何夕邂逅相逢命青衣捧方丈酌酒珊瑚鍾以勸侍兒數輩執樂女郎倚曲歌玉波冷雙蓮之曲曰此傷吳宫二隊長之辭某非人也生於龍宫好楚詞君能受我一篇傳於世人乎乃以水晶簪扣盤而誦芷秀藥華之詞俄聞鐘聲隔水女郎曰此非清虛之士不得遊持素綃送生出門閉扉悄然生徐步清潯朝日已上廣陵胡人識其綃曰龍頷小髯所緝也樹萱録大厯中洛陽劉貫詞行丐於姑蘇逢秀才蔡霞者精彩俊爽便以兄呼貫詞又擕羊酒來宴曰兄浮遊江湖間行丐獲幾何而止曰十萬霞曰霞居洛中以他故避地音問久絶意有所託祈兄為達於是遺錢十萬授書一緘且曰霞家渭橋下瞑目叩橋柱當有應者當與家母相見書中亦令小妹出拜使助贈百緡貫詞遂還至渭橋叩之忽有一人應視之惟見朱門甲第貫詞稱來自吳郡郎君有書有頃引入廳中見太夫人謝曰兒子失意逺遊久絶音耗勞君數千里達書俄有青衣曰小娘子來年可十五六坐母下具饌甚精方對食母忽眼赤直視貫詞口角涎下女急掩母口曰兄慿來宜且禮待因曰兄書中處分合以百緡與貫詞因命取鎮國碗授貫詞女曰此罽賔國碗其國以鎮災癘唐人得之固無所用得錢十萬即貨之與母再拜而入貫詞持碗行出回顧碧潭危橋手中器乃一黃銅碗價直三五百耳西市店忽有胡客視之大喜以百緡易之曰此罽賓國鎮國碗也在其國大穰既失此碗國大荒兵戈大起吾聞為龍子所竊幾四年其君方以國中半年之賦召贖罽賓守龍上訐此霞所以避地隂冥吏嚴不得陳首藉君為郵送之耳殷勤見妹者非固親也慮其母老饞或相啖以其妹衛君耳續玄怪録大厯十三年虎丘寺有鬼題詩隱于石壁之上云青松多悲風蕭蕭聲且哀南山接北山幽壟空崔嵬白日空昭昭不照長夜臺雖知生者樂魂魄安能回況復念所親痛哭心肝摧慟哭復何言哀哉復哀哉又曰神仙不可學形化空遊魂白日非我朝青松為我門雖復隔幽壟猶知念子孫何以遣悲怨萬物歸其根寄言世上人莫厭臨芳樽莊生問枯骨王樂復虛言蘇州觀察使李道昌異其事遂具奏聞敕令致祭道昌祭文曰嗚呼萬古丘陵化無再出君是何人能間詩筆何代而亡誰人子姪曽作何官是誰仙室寂寞夜臺悲呼白日不向紙上石中隱出桃源三月緑草垂楊黃鶯百囀猿聲斷腸不題姓字寧辨賢良嗚呼痛哉歎惜先賢空傳經史終無再還青松嶺上嵳峩碧山大唐政集已記詩言痛復痛兮何處賔悲復悲兮萬古墳能作詩兮動天地聲哀怨兮淚沾巾感我皇兮列清酌願當生兮事明君祭後數日石上復隱出詩一絶云幽冥雖異路平昔忝攻文欲知潛寐處山北兩孤墳寺山之北有二墳甚高大荆蓁叢蔚詢諸耆艾莫知何人所葬至今猶存郡閣雅談及山中碑刻楊備幽獨君詩金見書殘石壁雲一名幽獨彼何人春深草沒松門路泉下詩猶感鬼神貞元中太湖松江之口有漁人為小網數船與其徒十餘人下網取魚無所獲惟得一鏡才七八寸漁者恚不得魚棄鏡於水移船下網又得此鏡漁者異之取鏡自照見其筋骨臟腑厯厯可怖其人悶絶而仆衆大驚共取鏡鑒形照者即仆皆嘔吐狼籍最後一人不敢照直取投之水中良久扶持仆者始醒明日復往下網所得魚多於常時數倍其人先有疾者自是皆愈詢故老云此鏡在江海數百年一出人亦常見原化記元和九年有李公佐者訪古東吳從太守元公錫於洞庭登包山宿道者周焦君廬入靈洞探仙書石穴間得古嶽瀆經第八卷文字奇古編次蠧蝕公佐與焦君共詳讀之云禹理水三至桐柏山驚風迅雷石號木鳴五伯擁川天老肅兵不能興禹怒召集百靈搜命夔龍桐柏千君長稽首請命禹囚鴻蒙氏章商氏兜闕盧氏犁婁氏乃獲淮渦水神名無支祈善應對言語辨江淮淺深源流逺近形若猿猴縮鼻高額青軀白首金目雪牙頸伸百尺力踰九象搏擊騰踔蹻疾輕利禹授之童律不能制授之烏木田不能制授之庚辰能制之木魅水靈山妖石怪奔號叢繞以千數頸鎖大索鼻穿金鈴徙淮隂之壖龜山之足俾淮水安流注海庚辰之後圖此形者免淮濤風水之難先是永泰中李湯為楚州刺史有漁人夜釣龜山下其釣為物所掣不復出漁人疾沉可五十丈見大鐵鎖盤繞山足以告于郡湯命善遊者數十人取鎖力不勝加以五十牛鎖乃振動稍稍就岸濤驚浪翻觀者大駭鎖窮見一獸如青猿白首長鬛雪牙金爪闖然上岸高五丈許蹲踞若獼猴但兩目不能開兀若昏醉目鼻水流如泉涎沫腥穢不可近久乃引頸伸頭忽開目光彩若電視人欲發狂怒衆奔走獸徐徐引鎖并牛入水時楚多知名士皆相傳驚愕莫知其何物今考李公佐得嶽瀆經於洞庭始知李湯所見與經相符戎幕間談乾符中震澤之東稻將熟羣鼠夜出齧而僵之信宿食殆盡陸龜蒙作記稻鼠一篇笠澤叢書陸龜蒙視穫于甫里夜有鳬鷖蔽天而下若風雨所當之禾竭穗而去作禽暴篇冬十月豫視穫于甫里旱苗離離年無以搘憂傷于懷夜不能寐往往聲類暴雨而疾至者一夕凡數四眀訊其氓曰鳧鷖也其曹蔽天而下蓋田所當之禾必竭穗而後去曰得無弋羅者捕而耗之耶對曰江之南不能弋羅常藥而得之􅽽􅶡塗枝叢植于陂一中千萬膠而不飛是藥也出於長沙豫章之涯行賣貨錯嵗受於射鳥兒盜興已來蒙衝塞江其誰敢商是藥既絶羣鳬恣翔幸不充乎口腹反侵人之稻糧子曰嘻失馭之民化為盜關梁急征商不得行江湖小禽亦肆其暴以害民之物乎俾生靈死乎盜死乎飢吾不知安用馭者為中和中有士人蘇昌逺居蘇州屬邑有莊去官道十里吳中水鄉多荷芰一日見一女郎素衣紅臉若神仙中人與蘇生相狎以莊為幽會之所生以玉環贈之結繫殷勤數日檻前白蓮花開敷榮殊異俯而玩之見花房中有物細視乃所贈玉環也折之遂絶出北夢瑣言文德中京官張氏子寓蘇臺時往來丈人陸評事院為一美人所悅久而心疑之又病瘠遇開元觀道士吳守元云有不祥之氣授以一符果一眀器婢子背書紅英二字在空舍柱穴中焚之乃絶出北夢瑣言吳郡志卷四十五
