body:
  text: 吳郡志卷十七宋范成大撰橋梁唐白居易詩曰紅欄三百九十橋本朝楊備詩亦云畫橋四百則吳門橋梁之盛自昔固然今圖籍所載者三百五十九橋在郡城者今以正中樂橋為凖分而為四達隨方敘之門外及外縣略附見焉樂橋之東北婁門齊門百口橋在長洲縣東東漢顧訓五世同居族聚百口衣食均等尊卑有序因其所居以名橋俗傳子孫多不能辨架上之衣歲朝會集子孫悉坐依次行酒三歲以上者並自知位次不虧其禮故俗又名試飲橋臨頓橋在長洲縣北臨頓吳時館名取之臨頓宅者是也又吳地記名吳王親征夷人頓軍憩歇宴設軍士因此置橋唐陸魯望常居其旁皮日休共老林泉忍暫分此生應不識回文幾枚竹笥送德曜一乘柴車迎少君舉案品多緣澗藥承家事少為溪雲居然自是幽人事輒莫教他孫夀聞苑橋在報恩光孝寺之西故傳闔閭有苑囿在其傍定跨橋下長洲縣前舊為闔閭故迹縣前東南故傳皆闔閭苑囿遊憩之地顧家橋顧悌仕吳為虎頭將軍父亡五日絶漿而死郡人為之造橋吳地記四通橋紹興二十六年建定跨橋吳王闔閭造吳地記開明橋醋坊橋金師堂橋馬黃橋管家橋紅爐子橋換馬橋瓶場橋永福寺橋北倉橋天心橋宫橋廣化寺橋金師子橋靈鷲寺西橋鶴舞橋又吳地記云夫差女勝玉出葬日仙鶴舞引羣鳴於市因號橋曰鶴舞或又云春申君所立也中路橋狄勝橋華家橋跨塘橋北新橋蔣家橋院子橋新街橋吳郎橋廟堂橋任蔣橋南新橋周通橋縣東橋徐思橋顧周橋雙板橋大郎橋衆喜橋雪糕橋積慶橋蘇軍橋衆安橋通利橋慶厯橋華陽橋迎春橋寺莊橋奚家橋富孫橋魏家橋唐家橋羅家橋熙寧橋廟堂橋張香橋胡家橋斜路橋程家橋棧橋花橋東石塘橋東章家橋錢都衙橋兵馬使橋胡廂使橋打急路橋北張家橋朱馬交橋南張家橋徐鯉魚橋廣化寺後橋北禪寺西橋北禪寺前橋北禪寺東橋長洲縣前橋天官寺前橋天官寺西橋萬夀寺東橋資夀寺西橋資夀寺後橋祥符寺東橋東周太保橋樂橋之西北閶門臯橋在吳縣西北閶門內漢議郎臯伯通居此橋側因名之李紳伯鸞憔悴甘飄寓非向囂塵隱姓名鴻鵠羽毛終有志素絲琴瑟自諧聲故橋秋月無家照舊井寒泉見底清猶有餘風未磨滅至今鄉里重和鳴三太尉橋都亭橋在吳縣西北故傳吳王夀夢嘗於此作都亭以招賢士至德廟橋在太伯廟前以廟故名張廣橋慈悲橋烏盆橋塢家橋榖市橋小市橋小平橋普濟橋魚行橋桞毅橋虎蹲橋梵門橋徐胡橋劉家橋夀聖橋華家橋楊家橋徐家橋仰家橋鳯凰橋髙家橋廣書橋席家橋沈家橋方廣橋德慶橋翁家橋丁家橋艇船橋安民橋崇利橋單家橋曹使橋絲行橋利市橋鵝欄橋鴨舍橋濟川橋靸鞋橋蒲老橋六通橋文家橋盧家橋使橋錢橋紅橋宫橋洞橋隆興橋隆興元年建黃牛坊橋錢駙馬橋朱明寺橋吳縣東橋吳縣西橋黃土塔橋西蔣家橋小蓮湖橋女冠子院橋陸侍郎橋南過軍橋北過軍橋盧提刑橋盧革自德清退老于吳以通議大夫致仕嘗除廣南提點刑獄後郡人以提刑名橋子秉為發運使詳見人物門西市門橋芝草營橋西石塘橋周太保橋張馬步橋祥符寺橋西章家橋雍熙寺西橋禪興寺西橋龍興寺西橋雍熙寺東橋雍熙寺後橋能仁寺東橋能仁寺後橋樂橋之東南葑門乘魚橋在子城之西北昔琴髙乘鯉升仙之地事具異聞至和元年僧達本重建橋序乘魚橋當姑蘇之要津茂苑之靈迹按吳地志云古者賢士丁法海琴髙於此地見大鯉魚長可丈餘有角有足鼓二翼而舞琴髙見其異遂乘魚騰飛宛轉駕空上升因立橋名烏鵲橋在提刑司之南舊傳古有烏鵲館橋因其館得名楊備烏鵲橋上元詩云月滿星移水照天南飛烏鵲影翩翩雖然上屬牽牛分不為秋河織女填竹隔橋飲馬橋南倉橋帶城橋馬津橋望信橋夏侯橋金母橋燕家橋淨河橋小博橋在倉司前清道橋迎葑橋船場橋望門橋雙紅橋章家橋曹家橋楊家橋董家橋朱家橋船坊橋紅鴨橋龍堂橋東長橋西長橋燒香橋唐家橋望營橋佐家橋胭脂橋驅鬼橋沙糕橋蔣家橋白蜆橋盡市橋顧亭橋遊仙橋平橋閻橋草橋甫橋洞橋祝橋星橋磚橋程橋營橋至橋尤橋篠橋胡書記橋官太尉橋吳承議橋南胡家橋採蓮涇橋覺報寺西橋覺報寺後橋楊府院子橋雙塔寺前橋東禪寺西橋折桂橋紹興二十七年內建樂橋之西南盤門孫老橋在運河上唐白頭橋也郡守白居易所建因是名之本朝天聖初郡守孫冕重修故易今名梅摰過白頭橋詩云白頭橋奈白頭何不特舊德如存故老歌輿梁起遺愛大都才美服人多西館橋太平橋薦行橋市曹橋白磰橋娥眉橋郭家橋杉瀆橋明澤橋吉利橋升平橋翦金橋銀錠橋積善橋胡家橋成家橋渡子橋趙公橋趙婆橋葛家橋張師橋蔡家橋諸家橋杉板橋木柴橋院子橋倉後橋樓西橋程基橋果子橋草鞋橋獻花橋望婆橋芮家橋彈子橋芮橋梅橋程橋新橋廟橋北張師橋南張師橋西竺寺西橋開元寺東橋開元寺後橋憩橋吳軍憩歇因名之吳地記門外外縣橋梁城門外府圗行春橋續圖經云在橫山下越來溪中湖山滿目亦為勝處橋甚長跨溪湖之口好事者或名小長橋歲久廢闕淳熙十六年縣令趙彥真始復修之勝槩為吳中第一新橋在盤門分為三橋者製度甚宏吳門橋緑雲橋並盤門外虹橋婁門虹橋齊門外虹橋渡僧橋山塘橋綵雲橋半塘寺前便山橋虎丘寺前楓橋在閶門外九里道傍自古有名南北客經由未有不憩此橋而題詠者事具楓橋普明院洞橋已上並閶門外斜橋安里橋巳上並葑門外秀峰橋顔橋張墅橋新郭橋藏圓橋楞伽寺橋橋􅳕橋短橋黃蘆橋何橋夏駕橋虎山橋靈巗寺橋胥門橋橫塘橋越來溪橋久廢淳熙中居民薛氏以奩具錢復立之越來溪水自此橋北流過橫塘也練墟新橋已上盤門外已上在吳縣長洲縣管下詳見舊經縣橋驛橋程橋看婆橋雙鳯橋馬郤橋泄水橋通泄橋富基橋徽浦橋八尺橋卓基橋盛墩橋安德橋合路橋南醋坊橋南泄水橋第一醋坊橋已上在吳江縣管下詳見舊經安民橋在新涇中利民橋在七里涇濟民橋在吳涇事具續圖經利往橋即吳江長橋也慶厯八年縣尉王廷堅所建有亭曰垂虹而世併以名橋續圖經云東西千餘尺前臨太湖洞庭三山橫跨松江為海內絶景紹興初中外戒嚴或獻計樞庭乞行下平江焚長橋時郡守洪遵持不可而縣民已有知之者相與聚哭於圯下矣橋兩圮南有匯澤亭北有底定亭餘見松江條鄭獬吳江橋詩云三百欄干鎖畫橋行人波上踏靈鰲插天螮蝀玉腰濶跨海鯨鯢金背髙路直鑿開元氣白影寒壓破大江豪此中自與銀河接不必仙槎八月潮蔣堂鴈翅橋橫五湖北翬飛亭屹大江心魚龍淵藪風月窟若比廣寒宫更深吳郡志卷十七
