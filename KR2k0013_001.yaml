  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0013_WYG_001-1a, image: WYG0485/WYG0485-0004a.png}
body:
  text: 吳郡志卷一宋范成大撰㳂革吳古揚州之域也初周大王三子大伯仲雍季厯季厯有聖子昌大王欲立季厯以及昌大伯仲雍乃奔荆蠻文身斷髪示不可用以避季厯荆蠻義之從而歸者千餘家號曰句吳立為吳大伯自大伯作吳五世而武王克商即封其後為二曰虞曰吳後十二世當周恵王二十二年晉獻公滅虞自武王元年至虞滅合四百七十八年又二世合七十一年至夀夢而吳益興始通中國夀夢卒子諸樊立譙周云又名諸樊遏伐楚為巢門人射傷卒弟餘祭側界反立餘祭卒弟餘昧莫葛反立餘昩卒子僚立諸樊之子光弑僚自立是為闔廬破楚伐越越敗吳於檇李又敗之於姑蘇闔廬傷指而卒子夫差立三年乃伐越以報怨敗之於夫椒棲句踐於會稽句踐入臣於吳羣臣祖於浙江上句踐返國厚獻夫差夫差悦之乃賜書増之以封東至句甬西至檇李南至姑末北至平原縱横八百餘里舉今四眀三衢嘉興等地悉以與越十四年越遂入吳十八年又敗吳於笠澤二十一年遂圍吳二十三年滅吳欲以夫差居甬東夫差自剄越遂并吳而有其地是時魯哀公之二十二年也句踐卒𫝊六世至王無疆凡一百四十餘年楚威王伐越殺無疆盡取吳故地威王曽孫考烈王以吳封其國相春申君黄歇使其子為假君留吳秦始皇二十五年并天下以吳越地為會稽郡治於吳漢因之領縣二十六項羽封英布為九江王漢改九江曰淮南即以封布十一年布誅立皇子長為淮南王後封兄子濞為吳王以上三國盡得揚州之地吳與會稽皆在封域中景帝四年濞誅乃復為郡治於吳元鼎五年除東越因以其地并屬於此而立東部都尉後徙章安陽朔元年徙鄞又徙句章順帝永建四年陽羨周嘉一本作周喜上書以縣逺赴會難求得分置遂以浙江西為吳郡領縣十三以東為會稽郡會稽還治山隂按會稽典録以為是年嵗在已已劉府君上書也孫皓寶鼎元年分吳郡為吳興郡晉吳郡領縣十一宋領縣十二元嘉時以揚州浙江西屬司𨽻校尉以浙江東五郡立會州及始平王子鸞初封新安王南徐州刺史又割吳郡屬之舊經所謂大眀七年廢屬南徐者是也八年屬揚州齊不改陳為吳州隋平陳改曰蘇州以姑蘇山為名大業六年復為吳州領縣五唐武徳四年復為蘇州領縣四置都督督蘇湖杭暨四州九年罷都督屬潤州貞觀元年隷江南道天寶元年改為吳郡乾元元年復為蘇州置浙江西道都團練觀察使管蘇常潤杭湖睦六州後移使額於潤州而蘇州屬焉乾寧之後屬錢氏吳越國黄巢之亂錢鏐聚兵淮南楊行密據揚州鏐奔渡江據蘇州遂定浙西數州光啓三年六合鎮將徐約攻陷蘇州龍紀元年鏐遣其弟銶討約破走之大順元年七月楊行密將李友陷蘇州九月孫儒圍蘇州十一月陷之殺李友二年鏐復平蘇州詔以鏐兼蘇杭等州觀察處置等使乾寧三年楊行密將臺濛陷蘇州五年九月鏐討平之梁開平二年楊行密復圍蘇州三年鏐復討平之唐同光二年升蘇州為中吳軍晉天福五年割嘉興縣為秀州本朝開寶八年改中吳軍為平江軍太平興國三年錢俶納土以上㳂革以吳越春秋史記漢書晉書南史會稽典録十道四蕃志九國志吳越備史及舊圖經等參修政和三年以徽廟節鎮之所陞蘇州為平江府分野黄帝分星次斗十一度至婺女七度曰須女又曰星紀於辰在丑謂之赤奮若於律為黄鍾斗建在子今吳越分野費直分星次斗十度至女五度為星紀於辰在丑吳越分野屬揚州蔡邕分星次斗六度至須女二度謂之星紀大雪冬至居之吳越之分野陳卓范蠡鬼谷張良諸葛亮譙周京房張衡分星次分壄斗牽牛須女吳越揚州九江入斗一度廬江入斗六度豫章入斗十度丹陽入斗十六度會稽入牛一度臨淮入牛四度廣陵入牛八度泗水入女一度六安入女六度唐一行所分星次分壄南斗牽牛星紀之次也丑初起斗九度餘千四十二秒十二大中斗二十四度一千七百八半終女四度其分野自廬江九江負淮水之南盡臨淮廣陵至于東海又逾南河得漢丹陽會稽豫章郡西濵彭蠡南渉越州盡蒼梧南海古吳越及東南百越之國皆星紀分也南斗在雲漢下流殷淮海之間為吳分牽牛去南河浸逺故其分野自豫章東達會稽南逾嶺徼為越分島夷蠻貊之人聲敎之所不洎皆係于狗國戸口税租舊經所記詳矣前漢領縣二十六故戸至二十二萬口至一百三萬後漢領城十三戸止十六萬自後領縣浸減又多兵亂戸口亦耗惟唐天寶元年戸止七萬口至六十三萬皆有奇然長慶集以為十萬戸此後來増衍也大唐國要圖云唐朝應管諸院每年兩浙場收錢六百六十五萬貫蘇州場一百五萬貫觀此一色足以推見唐時賦入之盛矣本朝戸主二萬七千八百八十九元豐三年戸十九萬九千口三十七萬九千皆有奇號為甚盛故其輸帛為疋者八萬苗為斛者三十四萬九千纊為兩者二萬五千免役為緡者八萬五千皆有奇今攷孫覿普眀寺記載宣和間戸至四十三萬中更兵火掃蕩流離城中幾於十室九空中興為輔郡涵養生息六十年矣淳熙十一年戸十七萬三千四十二口二十九萬八千四百有五苗三十四萬三千二百五十六石六斗九升六合四勺五杪夏税折帛錢四十三萬九千三百五十六貫四百五十八文上供諸色錢共一百二十三萬一千二百八貫九百文土貢唐之土貢攷之唐書所貢絲葛絲綿八蠶絲緋綾布白角簟草席鞵大小香秔柑橘藕鯔皮魬腊鴨胞肚魚魚子白石脂蛇粟六典又有紅偏巾蛇床子圖經及九域志圖叙唐貢絲綿絲布八蠶絲朱綾等外又有絲布菱米柑橘藕燈心席燈心草鞋子口味三十七鯔魚條魬魚條魚春子焉二魚條疑即鯔皮魬腊春子疑即魚子也大唐國要圖又載蘇州貢絲絹綾絹烏眼綾衫段羅紵布折皁布柑子橘子菱角三書所載不同如此本朝土貢攷之九域圖所貢坐倚席白墡柑橘鹹酸果子海味鮆魚肚糟薑元豐土貢録載戸部薰橘一萬五千顆治平四年罷生絲鞋皇祐勑罷花蓆二十合熙寧三年罷又云進奏院狀稱見今逐年進奉土産柑橘糟薑鹹酸果子又云今别貢葛二十疋白石脂蛇床子各十斤蓆二十領以上本朝故事今惟遇聖節貢銀五百兩絹五百疋葛布二十疋吳郡志卷一
