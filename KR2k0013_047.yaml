body:
  text: 吳郡志卷四十七宋范成大撰異聞吳王闔廬得魚腸磐郢湛盧三寶劍於越傳記紀劍事頗怪吳越春秋云闔廬失道湛盧去而水行以如楚楚昭王卧而寤得劒于牀召風湖子問焉風湖子曰此謂湛盧之劒吳王得越所獻三寶劒一曰魚腸二曰磐郢三曰湛盧魚腸已用殺吳王僚磐郢以送其死女今湛盧則入楚也昔越王元常使歐冶子造劒五枚以示薛燭燭曰魚腸劒逆理不順不可服故闔廬以殺王僚磐郢亦豪曹不法之物無益於人故以送死湛盧五金之英太陽之精寄氣託靈出之有神伏之有威可以折衝然人君有逆理之謀其劒則出故去無道以就有道也越絶書亦云越王句踐令歐冶子造劒五枚大形一曰純鉤二曰湛盧三曰鏌邪四曰魚腸五曰距闕吳王闔廬得其鏌邪魚腸湛盧闔廬無道女死殺生以送湛盧乃如楚史記正義亦引越絶所記二説劒號不同而俱記湛盧之如楚宜編之異聞吳越春秋越絶書史記正義吳王夫差時有雙鷺飛出鼓中而去古今樂録吳王夫差小女曰玉年十八嵗童子韓重年十九玉悅之私交信問許為之妻重學於齊魯屬其父母使求婚王怒不與玉結氣死葬閶門外三年重歸問其父母父母曰王怒玉結氣死已葬矣重哭泣哀慟具牲幣往弔玉於墓側形見謂重曰昔爾行之後令二親從王相求謂必從願不圖别後遭命奈何玉左顧延頸而歌曰南山有鳥北山張羅鳥既高飛羅將奈何志願從君讒言孔多悲怨生疾沒命黃壚命之不造冤如之何羽族之長名為鳳凰一日失雄三年感傷雖有衆鳥不為匹雙故見鄙姿逢君輝光身逺心近何當暫忘歌畢欷歔流涕不能自勝要重還冢重曰死生異道不敢承命玉曰死生異路吾亦知之然一别永無後期子將畏我為鬼而禍子乎款誠所奉寧不相信重感其言送之還冢留三日三夜臨出取徑寸明珠遺重曰既毁其名又絶其願復何言哉時節自愛若至吾家致敬大王重既出遂詣王自説其事王大怒曰吾女既死而重造訛言玷穢亡靈此不過發冢取物託以鬼神趨收重重脫走至玉墓所訴玉玉曰無憂今歸白王玉粧梳忽見王驚愕悲喜問曰爾緣何生玉跪而言曰韓重來求玉大王不許令名毁義絶自致身亡重從逺還聞玉已死故齎牲幣詣冢弔唁感其篤終輒與相見因以珠遺之不為發冢願勿推治夫人聞之出而抱之正如煙然録異傳又一説此女名紫圭魂出冢傍見重流涕遂邀重入冢三日三夜重請還紫圭以徑寸珠并玉壺贈之重齎二物詣夫差夫差大怒紫圭夢見於父以眀重之事夫差異之悲咽流涕因捨重以子聓之禮待之搜神記吳王夫差坐殿上獨見四人向庭相背而倚王怪問羣臣吾見四人相背而倚聞人言則四分走矣伍子胥曰如王言將失衆矣吳王怒曰言不祥子胥曰非惟不祥王亦亡矣後五日王復坐殿上望見兩人相對北向人殺南向人王問羣臣見乎曰無後見子胥曰四人走叛也北向殺南向臣殺君也王不應吳越春秋後漢時姑蘇忽有男子衣白冠神鋒瓌偉從者六七人遍擾居民家人欲掩害即有風雨郡兵亦不能擒術士趙晃聞之泛舟遽來登岸步至姑蘇臺即往謂郡守曰不欲見此妖乎乃淨水焚香長嘯一聲大風應至聞空中數十人應響晃怒擲手中符如風少頃見此妖似有人持至者晃曰何敢幻惑如此倐有旋風擁去晃謂守曰可視之使者出門人已報云去此百步有大白蛇長三丈斷首路傍其六七從者皆身首異處亦黿鼉之屬三吳記稽神異苑晉元康中吳郡婁縣懷瑶家忽聞地中有犬聲視聲所自發有小穿大如蚓穴瑶以杖刺之入數尺覺有物掘視得犬子雌雄各一目猶未開形大於常犬哺之而食長老或云此名犀犬得之者富昌當養之以目未開還置穿中覆以磨礱宿昔發視失所在矣瑶家亦無他太興中吳郡府舍中又得二枚物如初其後太守張茂為吳興兵所害尸子曰地中有犬名曰地狼夏鼎志曰掘地得狗名曰賈蓋此類也法苑珠林搜神記西晉永嘉元年吳縣萬祥婢生子鳥頭兩足馬蹄一手無毛尾黃色大如碗晉書五行志厯代神異感應録永嘉中吳郡趙文昭宅在清溪橋與吏部尚書文叔卿宅相近秋夜對月臨溪唱烏栖之詞音旨淒然忽有一女子從女婢來姿態端麗云是文尚書家人比去解金纓留贈文昭答以琉璃杯後遊清溪廟忽見琉璃杯在神女前又顧其壁畫侍女並是偕來者續博物志東晉太興中吳民華隆養一快犬號的尾常將自隨隆後至江邊伐荻為大蛇圍繞周身犬便咋蛇蛇死隆僵仆無知犬倣徨涕泣走還船復反草中徒伴怪隨往見隆悶絶將歸家犬為不食比隆復蘇始食隆愈愛惜同於親戚太興二年吳郡米廡無故自壞是嵗大飢晉書五行志成帝時三吳女子簪白花望之如素奈傳言天公織女死為之著服俄太后杜氏崩苑木録隆安初吳郡治下狗常夜吠聚高橋上人家狗有限而吠聲甚衆或有夜覘視之一狗有兩三頭皆前向亂吠無幾孫恩亂厯代神異感應録謝邈之為吳興郡帳下給使鄒覽乘樵船至平望亭夜風雨露船無所庇宿顧見塘下有燈火往投之得茅屋中有一男子年可五十方織薄别牀有小兒年十嵗許覽求寄宿欣然相許小兒啼泣歔欷此人喻止之不止啼遂至曉覽問何意曰是僕兒以其母當嫁悲戀故啼耳將曉覽去回視不見向屋惟有兩冢榛莽甚深行逢一女子乘船謂覽曰此間非人所行君何故從中出覽具以昨夜所見事告之女子曰此是我兒實欲改適故來辭墓因哽噎至冢號咷不復嫁出録異記吳人費季客遊數年時道路多寇妻常憂之季與同輩旅廬山下各相問去家幾時季曰吾去家數年臨來與妻别就求金叉以行欲觀其志當與吾否耳得叉仍以著戶楣上臨發忘道此叉故當在戶上也爾夕妻夢季曰吾行遇盜死巳二年若不信向吾取汝叉遂不以行留在戶楣上可往取之妻覺揣叉得之家遂發喪後一年餘季自來歸還搜神記王敬伯年十八仕為東宫扶侍赴假還都行至吳通波亭維舟中流月夜理琴有一美人從二小女披帷而入施錦席於東牀設銀鐺雜果命綰髮者酌酒相獻酬令小婢取箜篌作宛轉歌婢甚羞低回殊久乃解裙中出黃帶長二尺許以挂箜篌彈弦作歌女脫金叉扣琴和之歌曰月既眀西軒琴復清寸心斗酒事芳夜千秋萬嵗同一情歌宛轉妍以哀願為星與漢光景共徘徊又曰悲且傷參差淚成行低紅掩翠方無色金徽玉軫為誰鏘歌宛轉清復悲願為煙與霧氤氲共容姿天明分别女留錦四端卧具繡枕腕囊并佩各一雙贈敬伯生以牙火籠玉琴爪答之來日聞吳令劉惠時妾船中失錦及卧具等檢括諸同行至敬伯船獲之敬伯具述夜來事及與從者女儀粧并所贈答物令使檢之於帳後得牙火籠巾箱內奩中得玉琴爪令乃以壻禮敬伯厚加贈遺而别敬伯訪部伍人云女郎年十六字麗華去年遇病逝未亡之前有婢名春條年二十許一婢名桃枝年十五皆能彈箜篌又善宛轉歌相繼而死虎丘山寺立塔掘基得一舍利空中天樂衆皆聞之井吼三日法苑珠林宋劉元字幼祖少好雲水與劉裕善而輕何無忌遂不相得乃去裕遊吳郡虎丘山心欲留焉夜臨風長嘯望月鼓琴於劍池上忽聞環珮音一女子衣紫羅之衣垂鈿帶拜謂元曰吳王愛女願來相訪元曰吳王愛女豈非韓重妻紫圭耶少頃紫圭至便與元同行恍惚間及一門約去虎丘二三里雖見宫闕惟聞風聲女謂元曰聞君與劉裕相得裕是王者然與何無忌不美此人恐為君患若北還仕魏朝官亦不減牧伯曉忽不見乃在一大陵松柏下元乃北歸後仕魏纍青州刺史稽神異苑虎丘山寺有月支僧支曇籥特賦妙聲善唄弄嘗夢天神授其聲法覺因裁製新梵清響妙絶宋孝武敕請至郡從受五戒法苑珠林楞迦山有唐侍郎輝祖墓凡十七世紹興間産紫芝數本未幾侍郎之子登進士第至今衣冠不絶吳郡志卷四十七
