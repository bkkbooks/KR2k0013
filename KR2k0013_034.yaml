body:
  text: 吳郡志巻三十四宋范成大撰郭外寺孤園寺在洞庭山梁散騎常侍吳猛宅也捨而為寺皮日休艇子小且兀緣湖蕩白芷縈紆泊一碕宛到孤園寺蘿島凝清隂松門湛虚翠寒泉飛碧螭古木鬬蒼兕鍾梵在水魄樓臺入雲肆巖邊足鳴􅰏樹杪多飛鸓香莎滿院落風泛金靃靡靜鶴啄栢蠧閒猱弄榅䗁小殿薫陸香古經貝多紙老僧方瞑坐見客還强起指兹正險絶何以来到此先言洞壑數次話真如理磬韻醒閑心茶香凝皓齒巾之劫貝布饌以旃檀餌數刻得清淨終身欲依止可憐陶侍讀身列丹臺位雅號曰勝力亦聞師佛氏子陸龜䝉浮屠從西来今日到孤園何妨稱弟事者極梁武巖幽與水曲結架無遺土窮山林榦盡竭海珠璣聚況即侍從臣敢愛煙波塢幡條玉龍扣殿角金虬舞釋子厭樓臺生人露風雨今来四百載像設蔵雪浦輕鴿亂馴鷗鳴鐘和朝櫓庭蕉裂旗斾野蔓差纓組石上解空人窻前聽經虎林虚葉如織水淨沙堪數徧問得中天歸修釋迦譜包山禪院在吳縣西南一百二十里院有舊鐘云梁大同二年置為福願寺天監中再葺唐上元九年改為包山寺髙宗賜名顯慶寺本朝靖康間慈受大師懐深居之詔復賜舊名院亦復興王銍記靖康元年夏五月慈受大士普照禪師懐深住大相國寺慧林禪院之六年力祈還山優詔不許命大丞相喻㫖所以留師者靡不盡也師確不可奪拂袖出都徧走江浙所至山川城邑僧俗擁衆驩迎瞻頂焚香夹道如佛行化靈巖蔣山虚二禪席以待而兩山之人遮道不得行師姑慰其意皆少留而去最後得洞庭包山廢院欣然駐錫巻裓為終焉計兹院自六朝之初為勝地梁天監中始再崇葺唐髙宗賜名顯慶為大叢林庇千僧陸龜䝉皮日休所賦包山精舍是也政和中權豪用事撤以修其墳寺瓦木滌地俱盡淵聖皇帝詔復其名而舊寺僧法聰為師以請既至山平江府令其弟了初主院事然頽基㫁址四顧荒寒而富者獻財巧者獻技壯者獻力不數月殿堂門室鍾經與樓皆具師平日未嘗求施兵燼之後尤不煩人而施者自逺而至惟恐弗受於是禪居靚深巋然出雲煙之上矣夫洞庭别名震澤又曰松江又曰笠澤又曰具區道家謂一水五名上禀咸池五車之氣而包山即林屋洞天下有洞穴水潛行地中無往不達號為神仙天后便閤洞中産白芝紫泉廼仙饌天醴環以七十二峯而明月之灣縹緲之峯毛公之壇尤為塵外淨境𫝊稱黄帝訪道所幸而夏禹治水蔵素書於此至吳王闔閭得之以問孔子盖仙聖所宅得名數千年逺矣地分東西兩山院在西山之巔巨浸囘環四絶無地天水相際一碧萬頃風濤豪洶旁接滄溟下則魚龍之所窟宅上則虎豹之所伏蔵藤蘿膠葛橘柚蔽虧深林森木横生倒植納天風海日於窮崖絶壑之間所謂煙雲生於步武隂晴變於几席猿鳥悲嘯晝夜清寂而水作限㫁逺與世隔盖江海之外無際之山孤聳於不測之淵無逾此者東南號山之富此又東南百水所鍾之地也竊嘗論古昔學道之士必遊走四方以極天下壯觀登髙望逺廣其耳目使萬境森然納於胸中然後見聞深博道學明備釋氏之教亦然自出家祝髪則一衲一食水浮陸走匽薄風霜以求師問法務見一切世間艱難險阻情偽利害然後心境廓然知無一當留者故於道為近思斯院之成人與地稱山川改色来者瞻敬殊不知師所見豈在於此視天宫化城金色世界釋帝龍天之居與夫光眀蔵海毗盧法界皆吾一性之内非逺非近無去無来今我行住坐卧莫非西方淨土豈厭此樂彼有所分别而更他境於一念之外哉此師之達觀一視如法無彼此不眷眷於一居也然則僕今所言皆師所不取也其院之廢興歳月與師居此本心以待其徒傳永逺而無窮者亦不可以不記也於是乎書紹興二年正月戊寅翠峯禪院在吳縣西南七十里洞庭東山唐將軍席温其所捨宅也彌勒禪院在吳縣西南一百里洞庭東山乾符年間吳越王建觀音院在洞庭山宋元嘉安禪師所建華山院也隋大業間廢唐開成間再建咸通間賜今名僧懐深圓通殿記洞庭華山觀音院者本在胥湖之北宋元嘉中會稽内史張裕請於朝而立焉初裕嘗事應真謹甚感池産千葉蓮因名院曰華山隋大業間經毁廢暨唐開成四年始遷于此往時浚治得㑹昌斷石刻其畧云羅浮常安禪師卜其地即里人進士徐正甫所施也逮咸通十四年奏賜今名再廢於會昌至是復興有屋數十楹視洞庭西峯諸刹最為勝絶處主僧維照篤志學佛材器足以立事嘗語其徒曰兹院雖號觀音盖未睹其像名存而實亡矣或問觀音安在吾將何辭以對於是發廣大心欲令一切睹相聞名悉䝉解脫乃用紫旃檀八百兩造菩薩像飾以黄金丹砂珍珠琉璃端嚴瑞相工妙天下并刻諸天十有六尊莊嚴畢備為大殿以居之規模雄偉動人心目費錢凡三百萬毫累銖積閲二十年厥功乃就来者作禮歎未曽有弟子維鑒實左右之既而照公欲刻諸石自太湖汎舟登靈巖謁慈受叟懐深求紀其事懐深曰華嚴經云海上有山多聖賢衆寳所成極清淨勇猛丈夫觀自在為利衆生住此山是大寳殿跨起于曽波之中真若鬼工神運所謂補陀落迦山者豈異此耶余聞菩薩從聞思修入三摩地乃至心精遺聞圓融無礙悲愍羣品迷本循聲是故不動道埸涉入諸國廣施無畏饒益衆生請試宴坐反聽嘿觀則風濤澎湃水石相薄林木鳥獸粥魚齋鼓莫非三十二應身八萬四千手眼徧周法界又何止於一方耶雖然不假乎像無以示圎通之捷徑俾夫見聞者各隨根器普皆證入或由此也歟獨喜照公能以如幻三昧成就不思議事故樂為之書像造於崇寧五年二月工休於四月殿作於靖康二年之二月落成於建炎改元之七月作記以是年之十月初八日也孫覿題徳雲堂千丈銀山屹嵩華浪湧雲屯天一罅榜舟夜並黿鼉窟杖藜曉入雞豚社處處人家橘柚垂竹簷茅屋青黄亞牛羊出没怪石走蛟龍起伏蒼藤掛樓殿青紅隠半山兩腋清風䇿髙駕飢䑕窺燈佛帳寒華鯨吼粥僧趺下世味久諳真嚼蠟老境得閑如噉蔗山靈知我欲歸耕一夜築垣應繞舍胡松年詩序云余罷自平江謀居霅川過洞庭西山暫寓觀音院徳雲堂坐揖湖山勝槩亦足以少洗簿書役矣數年兵火之禍何所不至獨此地清涼安穩豈非林屋洞天金庭玉柱為神仙窟宅有物常䕶持耶余願掛冠終老此間也詩云小舟乗風飛鳥過萬頃雲濤縱掀簸此行要是快平生無數青山笑迎我山根隠約見人家槿籬茅屋埋煙霞宛似秦人種桃處川原逺近紛香葩杖黎徑踏華山去試問蓮開今何許路迷絶壑䕃松筠身到半山聽魚鼓道人為我開雲堂是中境界渾清涼幽磬時和野鳥語飛泉暗瀉巖花香文書照眼本吾事雁䳱著行敗人意造物似憐厭世囂挈置湖山煩一洗何人夜呼隠去来向来得喪真山崖金庭玉柱永不改人間劫火空飛灰葛勝仲弱水無風到海山慈容親禮紫旃檀亭亭寳刹凌雲近湛湛清池漱玉寒橘瘦暗飄紅萬顆竹迷曾蒔緑千竿藕花不是南朝夢真有殘香透畫欄洞庭西山小湖觀音教院在吳縣西南一百五十里即舊小湖院也相𫝊唐乾符中有沉香觀音像汎太湖而来小湖僧迎得之有草繞像足投之小湖生千葉蓮華至今有之孫覿靈泉贊良哉大士溢此靈泉世有熱惱一酌而痊方池何産三級紅蓮無實可味有根弗𫝊世紀大士浮海而来攜此二物寘之山隈青青之枝其灑此哉蹮蹮之衣其製此哉唯此小湖實補陀山我来稽首瞻仰尊顔挹水啜之清入肺肝塵垢銷落身心蕩然嗟嗟此土奉事弗篤百尺頽基數椽敗屋如泗僧伽習玩成瀆對面却迷貴耳賤目惟聖憫狂存乎克念歸斯受之匿瑕磨玷弗畀莫求弗施巳厭信受之者亦得是瞻汝心如泉泓然弗遷汝身如蓮離垢芳鮮大士可之詎曰舍旃一彈指頃超證無邊護國天王禪院在吳縣西南一百二十里洞庭西山即舊天王院也宣和間改賜今名紹興初更為十方法海寺在吳縣西七十里洞庭東山隋將軍莫釐捨宅所建寺也後梁乾化間改祇園皇朝祥符五年改今名半塘法華院在長洲縣西北七里綵雲橋西寺有雉兒塔晉道生法師有誦法華經童子死葬此義熙十一年商人謝本夜泊此岸聞誦經聲旦尋求見墳上生青蓮華郡以聞詔建是塔號法華院紹興七年重修鳩工之始夜聞塔中誦經聲數夕不絶魏憲重修塔記半塘夀聖浮屠按舊記云晉義熙十一年名法華塔詔賜國材以建繇晉厯唐距宋興凡一再改造歳久寖壊先君開府覽之慨然若契夙願實始修焉建炎庚戌之亂塔復廢憲不孝顧瞻餘燼夕陽于懐曰此吾先君所植徳者也疇敢不勉於是傾貲度財載加營繕紹興七年七月二日工告訖功初道生法師有童子能誦法華經死葬半塘其後過客夜聞誦經聲迹之莫見其人旦視童子塚有青蓮花塔之建盖權輿於此迨今㡬八百年矣而鳩工之始役夫夜方寢復聞誦經聲琅然出塔數夕不絶嗚呼異哉僧了勤以其事来告因為之書顯謨閣直學士左太中大夫提舉江州太平觀吳郡開國侯食邑一千二百户食實封一百户魏憲記大覺院在長洲縣南四十里齊昇院在盤門外髙麗亭東一里紹熙元年提舉常平張體仁創建撥没官田供院為常住貧民死而家不能津送者則與之棺後焚瘞焉吳郡志巻三十四
