顯謨閣再任張抑敷文閣學士中大夫嘉泰二年三月到當月磨勘轉太中大夫三年二月除寳文閣學士宫觀張巖資政殿學士中奉大夫嘉泰三年三月到四年正月除資政殿大學士改差知揚州李大性寳謨閣直學士太中大夫嘉泰四年七月到開禧二年四月除煥章閣直學士改知福州張澤朝請郎開禧二年五月到當年九月除龍圖閣待制十月赴召沈作賔中大夫龍圖閣待制開禧二年十一月到權節制許浦水軍十二月磨勘轉太中大夫三年二月差兼督視行府參賛軍事三月就改知鎮江府林采通議大夫充寳謨閣待制開禧三年四月到五月權節制許浦水軍十一月宫觀李大異朝奉大夫徽猷閣待制嘉定元年四月到六月磨勘轉朝散大夫八月除寳謨閣直學士依舊知平江府二年十二月磨勘轉朝請大夫三年正月知建府趙希懌朝奉郎龍圖閣待制嘉定三年四月到四年八月除煥章閣直學士依舊知平江府五年正月磨勘轉朝散郎當年正月除顯謨閣直學士差知太平府陳芾朝散郎兩浙西路提㸃刑獄公事嘉定五年二月準尚書省劄子兼權當年八月除直祕閣知平江府七年九月除度支郎官沈皥奉直大夫祕閣修撰嘉定七年九月二十七日到八年十一月磨勘轉朝議大夫十年四月十三日除浙東提刑趙彦橚朝請大夫集英殿修撰嘉定十年六月五日到十一年七月除寶謨閣待制致仕李大性端明殿學士正奉大夫嘉定十二年二月六日到當年六月一日除提舉西京嵩山崇福宫綦奎朝散郎直敷文閣嘉定十二年十二月二十九日到嘉定十四年六月准告昨任湖廣總領調遣軍馬五闗䇿應追逐敵兵委有勞績特轉朝奉大夫十五年該遇受寳轉朝散大夫過滿匄祠至當年五月除主管亳州眀道宫趙汝述華文閣直學士正議大夫嘉定十五年五月二十九日到當年十二月二十日乞守本官致仕二十五日除徽猷閣直學士特轉一官致仕沈皥太中大夫集英殿修撰嘉定十六年七月二日到十七年十一月十日準告以職事修舉除寳謨閣待制仍賜金帶寳慶元年四月該登極恩轉通議大夫屢丐祠請五月二日除煥章閣待制依所乞提舉安慶府真源萬夀宫王元春中大夫右文殿修撰寳慶元年六月十一日到三年四月八日除大理卿章良朋朝奉大夫直寳謨閣紹定元年三月十七日到七月初四日致仕林介寳慶三年四月以提刑兼權十二月除太府少卿依舊兼權紹定元年七月再兼權十一月改除大理卿李夀朋朝請大夫直寳謨閣紹定元年十二月二十八日到任二年十月二十七日除依舊直寳謨閣荆湖北路轉運判官朱在朝議大夫寳謨閣待制紹定二年十一月二十六日到任三年十一月二十一日除煥章閣待制知袁州吳淵宣教郎直煥章閣紹定三年十二月初三日到任四年四月二十一日該遇慶典轉奉議郎七月十六日改除浙西提刑鄒應博朝奉大夫新除直祕閣紹定四年九月十四日到任六年十一月召赴行在楊曄徽猷閣學士正奉大夫紹定六年十二月十二日到任端平元年三月丐祠奉聖㫖依所乞提舉隆興府玉隆萬夀宫趙立夫中大夫新除祕閣修撰浙西提刑端平三年三月兼知府事當年八月廿六日依舊祕閣修撰除樞宻副都承㫖張嗣古中大夫右文殿修撰端平元年十月二日到任三年正月令赴行在奏事當年六月宫觀王遂朝奉大夫新除煥章閣待制四川安撫制置副使兼知成都府端平三年四月十二日三省同奉聖㫖依舊煥章閣待制改差知平江軍府事節制許浦都統司水軍七月初九日到任嘉熙元年七月二十五日奉聖㫖除敷文閣待制差知慶元府㳂海制置使吳潛朝請大夫新除工部侍郎嘉熙元年八月十七日到任九月二十五日准省劄都大提舉許浦都統司水軍二年正月與宫觀史宅之朝議大夫依舊徽猷閣待制改知平江府兼浙西提舉嘉熙二年閏四月初三日陞寳文閣待制二十四日到任六月八日節制許浦都統司水軍十八日節制在府軍馬仍舊節制許浦水軍三年正月一日召赴行在趙與􅊸中奉大夫直敷文閣知平江府兼浙西兩淮發運副使嘉熙三年四月十三日到任五月初一日准樞密院劄子節制許浦水軍淳祐元年二月准省劄除中書門下省檢正諸房公事史宅之煥章閣直學士太中大夫知平江府節制許浦水軍兼浙西兩淮發運副使提領措置和糴淳祐元年三月初九日到任陳塏中大夫右文殿修撰知平江府兼兩淮浙西發運副使節制許浦水軍提領措置浙西和糴淳祐三年二月十九日到任四年四月七日除太府卿魏峻朝㪚大夫集英殿修撰知平江府兼兩淮浙西發運副使節制許浦都統司水軍淳祐四年四月二十六日到任八月以經筵徹章轉朝請大夫五年四月御筆除寳章閣待制賜帶八月招糴及數轉朝議大夫十二月磨勘轉中奉大夫六年又以招糴轉中大夫三月十三日御筆除刑部待郎徐鹿卿朝奉大夫右文殿修撰和平江府兼兩淮浙西發運副使節制許浦都統司水軍淳祐六年閏四月二十八日交發運司職事五月十一日到任交割府事七年四月二十二日御筆召赴行在五月十三日准告磨勘轉朝散大夫當月十六日御筆除權兵部侍郎吳淵龍圖閣學士太中大夫浙西兩淮發運使兼知平江軍府事兼管内勸農使節制許浦都統司水軍封金陵郡侯進爵為公吳郡志巻十一
