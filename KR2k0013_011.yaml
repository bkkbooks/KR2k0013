body:
  text: 吳郡志巻十一宋范成大撰牧守江革字休映自都官尚書監吳郡荒嵗盜掠公行郡惟有公給仗具二十人民匈懼革至郡又省游軍尉百姓愈恐革廣施恩惠盜賊靜息何敬容為呉郡太守為政勤恤民隠辨訟如神視事四年治為天下第一吏民詣闕請樹碑詔許之袁昂天監十一年以吳郡太守為兼尚書梁王僧智僧辯之弟為呉郡太守陳霸先殺僧辯僧智據城拒守霸先遣將軍裴忌攻之僧智奔吴興忌既逐王僧智陳霸先以為吴郡太守陳裴忌字無畏聰敏有識量初武帝誅王僧辯僧辯弟僧智舉兵據吴郡帝命忌勒精兵自錢唐直趨吴郡夜至城下鼓譟薄之僧智疑大軍至輕舟奔杜龕帝嘉之表授吴郡太守宗室晉安王伯恭字肅之為吳郡太守時年十餘嵗留心政事官曹緝理沈君理字仲倫為吴郡太守時兵革未寜百姓荒弊君理總集士卒修飾器械深以幹理見稱宗室永陽王伯智天嘉中為吴郡太守聞陸慶之名欲見不可往慶宗人陸榮宅穿壁觀之其好賢如此案南史儒林𫝊末附載陸慶事但稱永陽王無名檢永陽王伯智𫝊少敦厚有器局博涉經史疑即其人第𫝊不載其為吴郡盖疏畧矣宗室衡陽王伯信守吳郡舉孝㢘伯信本𫝊不著隋皇甫績字功明陳平為蘇州刺史髙智恵等作亂與績相持八旬績擊破之劉權字世畧開皇中為蘇州刺史時江南初平物情尚擾權撫以恩信甚得民和唐馮衮牧蘇州郡政優游暇日輒縱飲博因㑹賔僚擲盧馮大勝以所得均遺一座乃吟曰八尺臺盤照面新千金一擲鬬精神合是賭時須賭取不妨回首乞閑人唐郡守縱放如此出杼情詩韋應物貞元初為蘇州刺史工詩世號韋蘇州唐史不為立𫝊識者恨焉詳見辯證門并白居易吴郡詩石記論韋事為確于頔字允文徳宗時為蘇州刺史罷淫祠濬溝澮端路衢為政有績然暴横少恩嘗為觀察使所劾范𫝊正字西老為蘇州刺史有殊政進拜宣歙觀察使在劉禹鍚後張摶自湖州刺史移蘇州辟陸龜䝉以自佐種木蘭於木蘭堂下崔璞咸通中以司諌為郡有文采風流與郡中秀才相從有詩詞即命僚屬及名士賡和其去郡皮陸皆有和篇有露濃春後澤霜薄霽来威之句盖恩威兩全之政松陵集白居易字樂天穆宗時以太子左庶子分司東都拜蘇州刺史病免居易為郡時多燕遊嘗㩦蟬態容滿㸃茶十妓夜遊西虎邱山又賦紀遊詩云領郡時將久遊山數幾何一年十二度非少亦非多劉禹錫字夢得裴度薦為禮部郎中集賢直學士出為蘇州刺史王闕張有徳楊志梁知㣲隂崇劉㣲江東採訪使趙居貞比部郎中採訪使段同泰畢伉兵部員外郎江南採訪使許韶伯右皆蘇州刺史狄兼謨文宗時自鄭州刺史改蘇州以治最擢給事中盧商字為臣為蘇州刺史吏以鹽法求贏貲民愈困商令計口售無常額人便之嵗貲返增宰相上其勞進浙西觀察使陸亘歴蘇州刺史以善政稱事具人物門盧簡求景龍中為蘇州刺史事見觀音院記王仲舒字𢎞中自婺州刺史徙蘇州隄松江為路變屋瓦絶火災賦調常與民為期不擾自辦穆宗毎言仲舒之文最宜為誥有古風召為中書舍人王成自信州刺史有政績詔書襃美徙蘇州楊發為蘇州刺史治以㳟長慈幼為先以能政聞餘見雜志門崔稜字徳長為蘇州刺史性介潔矜已之清視贓負者如讐奏課第一遷湖南觀察使唐有李丹宗瓊李希言兼採訪使裴澄蕭誼職方郎中江東採訪使錢鏐字具美龍紀開平之間以兵平定蘇州景福元年以鏐為蘇杭等州觀察使奏置州縣及割嘉興縣為秀州後梁曹圭少有膽氣事錢鏐梁開平中任蘇州刺史淮人圍之急正月望夜圭張宴族人師魯宅盛陳燈火令賊俘縱觀淮人讋焉卒於官子仲達為吴越國相周顯徳三年㑹王師攻江南命圭從兄知中呉節度事文奉為水陸應援諸軍都統使于本州以備徴發唐成及字𢎞濟吴越錢氏時為蘇州刺史乾寜中楊行密攻之常熟鎮将陸郢等以城應賊及被執行密閱其府庫惟圗書藥物心敬重之與歸淮南将以為行軍司馬及辭曰及以百口託錢塘姑蘇城陷不能引決以至于此豈可以本道符節易富貴於鄰境願以此身贖百口之命引佩刀将自刺行密遽起持之厚為禮而歸之鏐迎勞郊外把袂而泣終彰義軍節度使孫承祐事錢氏本朝開寳八年改蘇州中吴軍為平江軍以承祐為節度使賞從征之勞也承祐仕錢氏時嘗應王師征李煜破毗陵太平興國三年錢氏納土徙為兖州泰寜軍節度使呉越錢元璙字徳輝鏐第四子儀状瑰傑梁淳化三年以功遷蘇州刺史累授中吴建武軍節度蘇常潤三州團練使加檢校太師守太傅同平章事侍中中書舍人彭城郡王治蘇三十年儉約鎮靖郡政循理弟元瓘襲位元璙覲之宴宫中元瓘起夀曰先王之位兄宜當之俾小子至是皆兄推戴之力元璙俯伏曰王功徳髙茂先王擇賢而立敢忘忠順因相顧感泣兄弟訖無間言晉天福七年詔封廣陵郡王九國志吴越備史錢文奉元璙之子善騎射能上馬運槊涉獵經史精音律圗緯醫藥鞠奕之藝皆冠絶一時初以父廕為蘇州都指揮使遷節度副使元璙卒代知蘇州中吴軍節度使有鑒裁禮下賢能士負才藝者多依之作南園東荘為吴中之勝東荘一名東墅多聚法書名畫寳玩雅器號稱好事又與賔僚共采史籍著資談三十巻行於世嘗問命於天台僧徳韶韶曰明公年至八十一嵗後六十一嵗以開寳二年八月十一日卒九國志吳越備史鞠真卿所至有威名知蘇州政事無它施設而人自憚之庭訟寂然每平明視事自無来者真卿即歸休客至多不及見後自兖州貶南安軍道過蘇郡人相戒不敢過其泊舟處五日左右不聞人聲其見憚如此林希逸史章岵元豐中以朝議大夫守郡剛介不可屈人目之曰章硬頸其子出入以皂絹為繖二人肩輿本朝牧守題名吳郡自古皆名人為守既畧編叙見牧守門本朝郡将則題名石具焉中更兵燼石久不存紹興十五年王㬇始追輯自至道年陳省華始而石林先生葉夢得為之記今録葉記於注下而列題名於後平江吴故都控帶楚越形勢風物自為一都㑹本朝命守多一時聞人今寳文閣直學士王公顯道由工部侍郎来鎮適當兵火擾攘之後前此臨治者類急於招集流亡撫綏彫瘵未暇盡舉其所當為至顯道曰天下今定矣化行自内始相與奉承維持輔成永世之業實在四方之政於是官隳而廢職者民姦而干令者一董振之凡閭里疾苦朝聞夕行異時調度不給或不得已取於民皆罷之未幾咸信且畏上下秩秩有序蠧弊剗革幽枉宣達府庫有餘積而斂不加廣益修城池興學校嚴舍館以待賔旅之至朞年郡以無事先是髙祖太師景徳中嘗領是邦至嘉祐中伯祖侍郎復繼之逺顯道百餘年間王氏之為平江者三皆有績在人士大夫以為美談郡舊有太守題名記先後迭代序次惟謹亡於煨燼顯道訪之久不得乃更伐石追修故事以遺来者而求文於余以識其始惟善惡之在天下固不可欺也未嘗無公論然必待久而後能定彼翕翕徇俗掠取須臾之譽與所設施或未能窺其成而妄意有不滿者徐以占於後則昭然如黒之與白其誰敢誣今郡為題名記所在而有豈徒表姓氏紀嵗月而巳哉抑善者其𫝊猶未泯吾得以考其不善者推其所以失亦足以戒各以效其材而成其志則雖遐方幽逺之邦可使如在輦轂而况其近者乎乃為之書且以塗之言得於顯道者載焉紹興十五年十月望觀文殿學士左通議大夫提舉臨安府洞霄宫葉夢得記幷書陳省華朝散大夫行在尚書吏部員外郎至道魏庠諫議大夫裴莊朝奉郎守尚書度支郎中題虎邱詩云咸平元年以留梅詢朝散大夫太常丞直集賢院景徳王贄尚書司封員外外郎景徳曾致堯尚書吏部員外郎秦羲崇儀使符大中祥黄震承奉郎守尚書屯田員外郎大中祥符五年陳靖尚書刑部郎中直史館天禧元年四月康孝基朝奉大夫行尚書都官員外郎虎邱真堂讃云天禧五年四月孫冕大中大夫尚書禮部郎中直史館天聖葉參朝散大夫尚書刑部郎中虎邱雲巖寺記云天聖二年六月范仲淹朝散大夫員外郎天章閣待制景祐蔣堂朝奉郎尚書吏部員外郎景祐四年六月張億朝散大夫尚書刑部員外郎直史館景祐富嚴左朝散大夫守尚書刑部郎中試祕書監康定邵飾尚書考功郎中慶歴梅摯尚書户部員外郎慶歴趙槩尚書刑部郎中蔣堂樞密直學士左諌議大夫皇祐王琪尚書度支員外郎龍圖閣待制皇祐二年吕居簡虎邱留題詩刻云光禄卿至和三年唐詢嘉祐王琪尚書工部郎中知制誥嘉祐蔡抗嘉祐鞠真卿嘉祐陳經朝奉郎守尚書祠部郎中治平滕甫龍圖閣學士右光祿大夫治平沈扶尚書金部員外郎治平孫覺右司諫熙寜張詵熙寜程師孟正議大夫給事中充集賢殿修撰熙寜王誨朝散大夫尚書司勲郎中熙寜唐詔熙寜韓朴尚書度支郎中熙寜九年范諤左朝奉大夫元豐韓鐸尚書度支郎中元豐楊景畧元豐晏知止朝請大夫尚書司封員外郎元豐劉淑朝請大夫元豐章岵朝議大夫元豐五年林希朝散郎充集賢殿修撰元祐劉定朝散大夫元祐王覿承議郎直龍圖閣元祐黄履左朝請郎充天章閣待制元祐吳居厚左朝奉郎紹聖蒋之翰右朝㪚大夫紹聖賈青朝散大夫紹聖王子京承議郎充祕閣校理元符陳師錫承議郎充祕閣校理元符張公庠中散大夫元符豐稷樞密直學士建中靖國元年十一月到崇寜元年二月知越州吳伯舉朝奉郎直祕閣崇寜元年六月到宇文昌齡寳文閣待制崇寧元年十月到十一月知越州林邵顯謨直學士朝議大夫崇寜邵䶵朝散大夫直龍圗閣崇寜董誥朝散大夫直祕閣崇寜張恕朝散大夫崇寜蔡渭朝散大夫崇寜郭茂恂朝請大夫直龍圖閣崇寜蹇序辰中大夫充龍圖閣待制崇寜五年正月到任十二月落職提舉杭州洞霄宫許光疑通直郎知蘄州崇寜五年十二月到孫傑朝請郎直龍圖閣大觀吳拭朝奉郎大觀二年五月到八月提舉杭州洞霄宫李孝夀朝請郎大觀三年八月到四年三月降集賢殿修撰政和元年六月除顯謨閣待制提舉醴泉觀王詔朝請大夫充集賢殿修撰政和元年馬防中大夫復集賢殿修撰政和元年盛章朝請郎充顯謨閣待制政和董正封朝散大夫充集賢殿修撰政和盛章顯謨閣直學士朝散大夫政和宋康年中奉大夫政和莊徽中大夫充徽猷閣待制政和應安道徽猷閣直學士通議大夫政和賈諲太中大夫充徽猷閣待制宣和樓异徽猷閣直學士朝請大夫宣和胡直孺中奉大夫充祕閣修撰宣和李倫顯謨閣直學士朝散大夫宣和王靚通議大夫充徽猷閣待制靖康鄭滋朝奉大夫充徽猷閣待制靖康元年十月到任建炎元年七月罷趙岍中散大夫建炎孫覿承議郎充徽猷閣待制建炎湯東野徽猷閣直學士中大夫建炎孫覿龍圖閣直學士朝奉郎建炎李邴寳政殿學士中大夫建炎湯東野徽猷閣直學士中大夫建炎胡松年起復朝請郎直龍圖閣建炎四年九月到紹興二年閏四月罷李彌大顯謨閣直學士朝散郎紹興二年閏四月到任五月提舉江州太平觀席益左朝奉郎充集英殿修撰紹興二年五月到八月赴召李擢左朝請郎充徽猷閣待制紹興二年十二月到紹興三年三月除工部侍郎宋伯友左太中大夫充徽猷閣待制紹興三年八月到十一月提舉江州太平觀孫佑右朝請郎直祕閣紹興四年正月到紹興五年二月罷趙子晝徽猷閣直學士左朝奉大夫紹興五年二月到七月赴召李光顯謨閣直學士左朝奉郎紹興五年七月到十一月赴召張守資政殿大學士左中大夫紹興五年十二月到紹興六年四月提舉臨安府洞霄宫章誼龍圖閣學士左通議大夫紹興六年八