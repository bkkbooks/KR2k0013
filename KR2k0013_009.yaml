body:
  text: 吳郡志卷九宋范成大撰古蹟死亭灣在閶門外七里漢朱買臣妻恥而自縊處也毛公壇即毛公壇福地在洞庭山中漢劉根得道處也根既仙身生緑毛人或見之故名毛公今有石壇在觀傍猶漢物也白居易詩毛公壇上片雲閒得道何年去不還千載鶴翎歸碧落五湖空鎮萬重山皮日休詩却上南山路松竹儼如廡松根礙幽逕孱顔不能斧擺屨跨亂雲側巾蹲怪樹三休且半日始到毛公塢兩水合一澗潨崕却為浦相敵百千㦸共攂十萬鼓噴散日月精射破神仙府惟愁絶地脉又恐折天柱一窺耳目眩再聽毛髪竪次到鍊丹井井幹翳宿莽下有蘂剛丹勺之百疾愈凝於白獺髄湛似挏馬乳黄露醒齒牙碧粘甘肺腑檜異松復怪枮疎互撐拄乾蛟一百丈髐然半天舞下有毛公壇壇方不盈畝當時雲龍篆一片苔蘚古元忽今時時仙禽來忽忽祥煙聚我愛周息起應眀主不復覩三諫却歸來迴頭唾珪組伊余何不幸斯人如何大開口與世爭枯腐將山待夸娥以肉投猰㺄歘坐侵桂隂不知已與午兹地足靈境他年終結宇敢道萬石君輕於一絲縷陸龜䝉詩古有韓終道授之劉先生身如碧鳳皇羽翼披輕輕先生盛驅役臣伏甲與丁勢可倒五岳不惟鞭羣靈飄颻駕翔螭白日朝太清空遺古壇在稠疊煙蘿屏逺懐步罡夕列宿森然眀四角鎮露獸三層差羽嬰迴眸眄七㤅運足馳疎星象外真既感區中道俄成爾來向千祀雲嶠空崢嶸石上橘花落石根瑶草青時時白鹿下此外無人行我訪岑寂境自言齋戒精如今君安死魂魄猶羶腥有笈皆緑字有芝皆紫莖相將望瀛島浩蕩凌滄溟石射堋在石城山有石鼓鼓鳴即有兵山有石馬望如人騎東城崑山古圖經云縣故有城在縣東三百步今縣東猶謂之東城頭近嵗耕者於東寺之後多得古城磚及銅箭鏃神運殿基即崑山慧聚寺殿事具慧聚寺門龍柱崑山慧聚寺殿柱也梁張僧繇畫龍其上其後數出在江湖中僧繇又畫鏁鏁之唐會昌中廢佛寺柱留入郡中寺復郡以柱還寺横閣於殿東間楣上余猶及見之淳熙中寺火柱亦随燼烏夜村晉穆帝后何淮女寓居縣南産后於此將産之夕有羣烏夜驚於聚落爾後烏更鳴衆共異之及眀大赦北禪院晉戴顒舊宅後為唐司勲陸郎中宅皮陸北禪聯句云歊䒱何處避來入戴顒宅龜䝉又有遊北禪詩云居士秖今開梵處先生曽是草𤣥堂支遁菴在南峰古號支硎山晉高僧支遁嘗居此剜山為龕甚寛敞相𫝊有村婦生子於中菴頂遂中裂道林又嘗放鶴於此今有亭基道林喜養駿馬今有白馬磵云飲馬處也菴傍石上有馬足四云是道林飛歩馬跡也放鶴亭見上白馬磵見上馬跡石見上般若臺在吳縣西二里晉穆侯何凖捨宅置東北角有般若橋時人呼作朱眀寺橋是也吳地記金昌亭在昌門宋少帝景平二年廢為營陽王幽于吳郡徐羨之等使邢安泰弑帝于金昌亭帝有勇力不即受制突走出昌門追以門關踣之此云走出昌門則亭尚在城中陸龜䝉又謂梁鴻墓在金昌亭下一里又似在城外恐在今城有少遷徙耳梁雙殿在虎丘寺大殿前二小殿相對最為古跡淳熙中有僧庸凡而好修造始盡毁之好事者至今以為恨錢氏廣陵王在姑蘇不喜遨遊不事園苑惟每遊虎丘山寺前路引望則喜動顔色比至山必規畫修繕今寺多其經意處也越公井今在治平寺前山岡上徑一丈八尺石欄如屏繞之上有刻字多不可辨又有唐廣明元年僧茂軋述大唐楞伽殿後重修吳朝大井記略云惟兹巨井吳誌坐當横山艮位越來溪西百步隋開皇十年越國公楊素築城創斯井焉時屯師孔多日飲萬人邇來三百餘年邑則可改其道不革按此即是楊素井盖素既平陳嘗遷吳郡於山下至今謂之新郭茂乹修井記題首乃云吳朝大井盖𫝊襲之誤僧輩不能辨也楞伽寺今名寶積寺與治平為鄰又知古只一寺井正在楞伽殿後也井記又云寺剙於乾元元年白公檜唐白樂天手植在州宅後池光亭前水中政和初巳槁瘁高不滿二丈後為朱沖取獻京師死道中乃以他檜易之禁中初不知也今池中復植一株石林避暑録虎丘寺古杉在殿前相𫝊為晉王珉所植唐末猶在形狀甚怪不可圖畫皮日休稱其死奇節不知雨露之可生即是時已枯日休詩曰種日應逢晉枯來必自隋陸龜䝉亦曰後凋依佛氏初植必僧彌寺盖王氏别墅僧彌珉小字也臨頓舊為吳中勝地陸龜䝉居之不出郛郭曠若郊墅今城東北有臨頓橋皮陸皆有詩皮日休一方蕭灑地之子獨深居遶屋親栽竹堆牀手寫書高風翔砌鳥暴雨失池魚暗識歸山計村邉買鹿車籬疎從緑槿簷亂任黄茅壓酒移溪石煎茶拾野巢靜窻懸雨笠閑壁挂煙匏支遁今無骨誰為世外交􅗀稀初上簇醅盡未乾牀盡日留蠶母移時祭麴王趁泉澆竹急候雨種蓮忙更葺園中景應為顧辟疆靜僻無人到幽深每自知鶴來添口數琴到益家資壊壍生魚沫頹簷落燕兒空將緑蕉葉來往寄閑詩夏過無擔石日高開板扉僧雖與筒簟人不興蕉衣鶴靜共眠覺鷺馴同釣歸生公石上月何夕約譚㣲經嵗㟁烏紗讀書三十車水痕侵病竹蛛網上衰花詩任𫝊漁客衣從遞酒家知君秋晚事白幘刈胡麻寂厯秋懐動蕭條夏思殘久貧空酒庫多病束漁竿𤣥想凝鶴扇清齋拂鹿冠夢魂無俗事夜夜到金壇閉門無一事安穩卧涼天砌下翹飢鶴庭隂落病蟬倚杉閑把易燒术靜論𤣥賴有包山客時時寄紫泉病起扶靈夀翛然强到門與杉除敗葉為石整危根薜蔓狂遮壁蓮莖卧枕盆明朝有忙事召客斲桐孫緩頰稱無利低眉號不能世情都太薄俗意就中憎雲態不知驟鶴情非會徴畫臣誰奉詔來此寫姜肱陸龜䝉近來惟樂靜移傍故城居閑打修琴料時封謝藥書夜停江上鳥晴曬篋中魚出亦圖何事無勞置棧車倩人翳病樹看僕補衡茅散髪還同阮無心敢慕巢簡便書露竹樽待破霜匏日好林間坐煙蘿近欲交倭僧留海紙山匠製雲牀懶外應無敵貧中直是王池平鷗思喜花盡蝶情忙欲問新秋計菱絲一畝强故山空自擲當路竟誰知秪有經時䇿全無養拙資病深憐炙客炊晚信樵兒謾欲陳風俗周官未採詩福地能容壍𤣥闗詎有扉静思瓊板字閑洗鐵笻衣鳥破涼煙下人衝暮雨歸故園秋草夢猶記緑微微水影沈魚器鄰聲動緯車燕輕梢墜葉蜂懶卧燋花説史評諸例論兵到百家眀時如不用歸去種桑麻禹穴奇編缺雷平異境殘靜吟封籙檢歸興削帆竿白石堪為飯青蘿好作冠㡬時當斗柄同上歩罡壇强起披衣坐徐行處暑天上階來鬬雀移樹去驚蟬莫問鹽車駿誰看醤瓿𤣥黄金如可化相近買雲泉野入青蕪巷陂侵白竹門風高開栗刺沙淺露芹根迸鼠緣藤桁飢烏立石盆東呉雖不改誰是武王孫疎慵真有素時勢盡無能風月雖為敵林泉幸未憎酒材經夏闕詩債待秋徴秖冇君同癖閑來對曲肱重𤣥寺藥圃唐末僧元達年逾八十好種名藥凡所植者多致自天台四明包山句曲叢萃紛糅各可指名皮日休嘗訪之而題詩皮日休雨滌煙鋤傴僂賫紺牙紅甲兩三畦藥名却笑桐君少年紀翻嫌竹祖低白石靜敲蒸火清泉閑洗種花泥怪來昨日休持鉢一尺彫胡似掌齊香蔓䝉籠覆若邪檜煙杉露濕袈裟石盆換水撈松葉竹徑遷牀避笋牙藜杖移時挑細藥銅缾盡日灌幽花支公謾道憐神駿不及今朝種一麻忠國師庵基在穹窿山絶頂疊石宛然唐顧在鎔留題在光福山寺墨跡尚存詩云蒼島孤生白浪中倚天高塔勢翻空煙凝逺岫列寒翠霜染疎林墜碎紅溪渚式棲彭澤鴈樓臺深貯洞庭風六時金磬落何處徧傍葦叢驚釣翁虞山今為海巫山山即巫咸山所出李後主題額在崑山恵聚寺大殿前二樓曰經臺鐘臺淳熙中寺焚無遺跡矣栁毅井在洞庭東山道側按小説載毅𫝊書事或以謂是岳之洞庭湖以其説有橘社故議者又以為即此洞庭山爾蔡經宅在朱眀寺西事具神仙門吳地記吳國古館三曰昇月曰烏鵲曰江風昇月在帶城橋東烏鵲在烏鵲橋今為營寨江風在渴烏巷又新館二曰通波曰全吳吳地記又續圖經載舊𫝊古館八曰全吳通波龍門臨頓烏鵲昇羽江風夷亭云昇月疑即昇羽今此亭尚存洗馬池在府學之南楊備一一牽來種是龍臨深欲下更嘶風金鞍玉勒抛何處騰踏渥洼寒影中吳郡志卷九
