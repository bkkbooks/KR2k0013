body:
  text: 吳郡志卷二宋范成大撰風俗吳之土風習俗隋志詳矣江南之俗火耕水耨食魚與稻以漁獵為業雖無蓄積之資然而亦無饑餒其俗信鬼神好淫祀父子或異居大抵然也其人並習戰號為天下精兵俗以五月五日為鬬力之戲各料彊弱相敵事類講武宣城毗陵吳郡會稽餘杭東陽其俗皆同然數郡川澤沃衍有海陸之饒珍異所聚故商賈並湊其人君子尚禮庸庶淳龎故風俗澄清而道教隆洽亦其風氣所尚也隋志華誼論云吳有發劍之節趙有挾色之客郡國志云吳俗好用劍輕死又六朝時多鬬將戰士按諸說吳俗蓋古如此本朝文教漸摩之久如五月鬬力之戲亦不復有惟所謂尚禮淳龎澄清隆洽之說則自若豈詩所謂美教化移風俗者與吳趨行樂府題解云古樂府吳趨者行經趨市也文選注云趨步也此曲吳人歌其土風也吳王闔廬起昌門象閶闔舊說吳人歌其地也晉陸機吳趨行曰楚妃且勿歎齊娥且莫謳四坐並清聽聽我歌吳趨吳趨自有始請從閶門起閶門何峩峩飛閣跨通波重欒承游極回軒啓曲阿藹藹慶雲被泠泠鮮風過山澤多藏育土風清且嘉泰伯導仁風仲雍揚其波穆穆延陵子灼灼光諸華王迹頽陽九帝功興四遐大皇自富春矯手頓世羅邦彥應興運粲若春林葩屬城咸有士吳邑最為多八族未足侈四姓實名家文德熙淳懿武功侔山河禮讓何濟濟流化自滂沱淑美難窮紀商榷為此歌樂府題解吳音清樂也乃古之遺音唐初古曲漸缺管絃之曲多訛失與吳音轉逺議者請求吳人使之𫝊習唐㑹要貞觀中有趙師者善琴獨步嘗云吳聲清婉若長江廣流綿綿徐游國士之風今樂府有吳音子世俗之樂耳白紵舞案舞辭有巾袍之言紵本吳地所出宜是吳舞也晉俳歌曰皎皎白紵節節為雙吳音呼緒為紵疑白緒即白紵也古今樂録吳歈吳人歌也拂舞白符舞白鳬鳩舞按舞志曰江左初有拂舞吳舞檢其歌非吳辭也又楊泓拂舞序曰自到江南見白符舞或言曰鳬鳩舞云有此來數十年察其辭㫖乃是吳人患孫皓虐政思屬晉也吳農器甚備以其地平夷盡為田也唐陸龜䝉有耒耜經今具載之曰農之言也民之習通謂之犁冶金而為之者曰犁鏡曰犁壁斫木而為之者曰犁底曰壓鑱曰䇿額曰犁箭曰犁轅曰犁梢曰犁評去聲曰犁建曰犁槃木與金凡十有一事耕之土曰墢墢猶塊也起其墢者鑱也覆其墢者壁也草之生必布于墢不覆之則無以絶其本根故鑱引而居下壁偃而居上鑱表上利壁形下圓負鑱者曰底底初實于鑱中工謂之鱉肉底之次曰壓鑱背有二孔係于壓鑱之兩旁鑱之次曰策額言其可以扞其壁也皆貤然相載自策額逹于犁底縱而貫之曰箭前如桯而樛者曰轅後如柄而喬者曰梢轅有越加箭可弛張焉轅之上又有如槽形亦如箭焉刻為級前高而後庳所以進退曰評進之則箭下入土也淺以其上下類激射故曰箭以其淺深類可否故曰評評之上曲而衡之者曰建建揵也所以柅其轅與評無是則二物躍而出箭不能止橫於轅之前末曰槃言可轉也左右繫以樫乎軛也轅之後末曰梢中在手所以執耕者也轅車之胸梢取舟之尾止乎此平鑱長一尺四寸廣六寸壁廣長皆尺微橢敕果切底長四尺廣四寸評底過壓鑱二尺䇿減壓鑱四寸廣狹與底同箭高三尺評尺有三寸槃增評尺七焉建雄稱絶轅修九尺梢得其半轅至梢中間掩四尺犁之終始丈有二耕而後有􅐡去聲渠疏之義也散墢去芟者焉􅐡而有礰呼格礋宅焉有碌碡焉自􅐡至礰礋皆有齒碌碡觚稜而巳咸以木為之堅而重者良江東之田器盡於是牛欄亦名牛宫吳地下溼冬寒即牛入欄唐人謂之牛宫陸龜䝉有祝牛宫詞其序曰冬十月耕牛違寒築宫納而造之建之前日老農請乞靈于土官以從鄉教豫勉之而為辭四㹀三牯中一去乳天霜降寒納此室處老農物物度地不畝東西幾何七舉其武南北幾何丈二加五偶楹當間載尺入土太嵗在亥餘不足數上締蓬茅下逺官府耕耨何時飲食得所或寢或訛免風免雨宜爾子孫實我倉庾魚具吳中水國矢魚之具尤多陸龜䝉皮日休嘗為魚具詩序其事大凡結繩持綱者總謂之網罟網罟之流曰罛曰􅊻曰罺側交反圓而縱捨曰罩挾而升降曰女減切緡而竿者總謂之筌筌之流曰筒曰車橫川曰梁承虛曰笱編而沈之曰箄音卑矛而卓之曰矠音冊矛也棘而中之曰義鏃而綸之曰射扣而駭之曰桹以薄板置瓦器上擊之以驅魚置而守之曰神鯉魚三百六十嵗蛟龍輒率而飛去年置一神守之則不能去矣神鱉也列竹於海澨曰滬吳之滬瀆是也錯薪於水中曰􅟐音糝所載之舟曰舴艋所貯之器曰笭箵其他或術以招之或藥而盡之皆出於詩書雜𫝊及今之聞見可考而驗不誣又擇其任詠者作十五題以諷其所謂十五題者曰網曰罩曰曰釣筒曰釣車曰魚梁曰叉魚曰射魚曰鳴桹曰滬曰􅟐曰種魚曰藥魚曰舴艋曰笭箵松陵集魚斗者吳俗以斗數魚今以二斤半為一斗買賣者多論斗自唐至今如此皮日休釣侣詩云趂眠無事避風濤一斗霜鱗換濁醪莫怪兒童呼不得盡行烟雨漉車螯吳中賣魚論斗吳下全盛時衣冠所聚士風篤厚尊事耆老來為守者多前輩名人亦能因其習俗以成美意舊通衢皆立表揭為坊名凡士大夫名德在人者所居往往以名坊曲元參政絳所居名衮繡坊富祕監嚴所居名德夀坊蔣密學堂家産芝草名芝草坊范侍御師道所居名豸冠坊盧龍圖秉奉其親八十餘名德慶坊朱光祿所居有園池號樂圃名樂圃坊臨水亭館以待賔客舟航者亦或因其人相近為名褒德亭以德夀富氏也旌隱亭以靈芝蔣氏也此風惟吳邦見之石林避暑録晉周玘以憂憤謂子協曰害我者諸傖子也吳人謂中州人曰傖云陸玩食酪得疾與王導箋云僕雖吳人幾作傖鬼蓋輕易之詞吳中自昔號繁盛四郊無曠土隨高下悉為田人無貴賤往往皆有常産以故俗多奢少儉競節物好遊遨嵗首即會於佛寺謂嵗懺士女闐咽殆無行路親友有經嵗不相面者多於此時相見或慶或弔紛然議姻親覘壻婦亦多決於此時上元彩燈巧麗它郡莫及有萬眼羅及琉璃毬者尤妙天下以糖圓春繭為節食爆糯穀於釜中名孛婁亦曰米花每人自爆以卜一嵗之休咎春時用六柱船紅幕青蓋載簫鼓以遊虎丘靈巖為最盛處寒食則拜掃墳墓競渡亦用清眀寒食四月八日浮屠浴佛遍走閭里重午以角黍水糰綵索艾花畫扇相餉夏至復作角黍以祭以束粽之草繫手足而祝之名健粽云令人健壯又以李核為囊帶之云療饐七夕有乞巧會令兒女輩悉預謂之小兒節重九以菊花茱萸嘗新酒食栗粽花糕十月朔再謁墓且不賀朔是日開爐不問寒燠皆熾炭俗重冬至而略嵗節臘日併力舂一嵗糧藏之土瓦龕中經嵗不蛀壞謂之冬舂米十六日婦女祭厠姑男子不得至二十四日祭竈女子不得預二十五日食赤豆粥云辟瘟舉家大小無不及下至婢僕猫犬皆有之家人有出外者亦貯其分名曰口數粥是夕爆竹及儺田間燃高炬名照田蠶嵗節祭饗用除夜祭畢則復爆竹焚蒼术及辟瘟丹家人酌酒名分嵗食物有膠牙餳守嵗盤夜分祭瘟神易門神桃符之屬夜向眀則持杖擊灰積有祝詞謂之打灰堆蓋彭蠡廟中如願故事吳中獨𫝊此一嵗風俗之大略也吳語謂來為釐本於陸德眀貽我來牟棄甲復來皆音釐德眀吳人豈遂以鄉音釋注或自古本有釐音耶吳謂罷必綴一休字曰罷休史記吳王語孫武曰將軍罷休蓋亦古有此語慶厯九老會都官員外郎徐祐與少卿葉參俱以耆德告老而歸約為九老會晏元獻公杜正獻公皆寄詩贊之晏詩首句云買得梧宫數畝秋便追黃綺作朋儔杜詩卒章云如何九老人猶少應許東歸伴醉吟時會者才五人故杜詩云爾九老會後更名耆英又名真率元豐間章岵守郡與郡之長老遊從各飲酒賦詩時米黻禮部以杭州從事罷經由為作敘敘諸老之德甚詳十老謂太中大夫致仕上護軍濮陽縣開國子盧革仲新年八十二奉議郎致仕騎都尉賜緋魚袋黃挺公操年八十二正議大夫充集賢殿修撰致仕上柱國廣平郡開國侯程師孟公闢年七十七朝散大夫致仕上輕車都尉鄭方平道卿年七十三朝議大夫致仕護軍清豐縣開國子賜紫金魚袋閭丘孝終公顯年七十三中散大夫知蘇州軍州事河間縣開國伯護軍賜紫金魚袋章岵伯望年七十三朝請大夫主管建州武夷山冲佑觀賜紫金魚袋徐九思公謹年七十三朝議大夫致仕上柱國彭城縣開國子賜紫金魚袋徐師閔聖徒年七十二承議郎致仕騎都尉賜緋魚袋崇大年靜之年七十一龍圖閣直學士正議大夫提舉杭州洞霄宫清河郡開國侯張詵樞言年七十十人合七百四十六嵗十老各有詩米芾序之中散大夫河間公清德傑氣惟時老成高誼徑節縉紳所仰靜鎮吳國四周星紀威孚惠洽訟庭晨虛乃闢郡齊會九俊老惟內閣清河公神宇軒拔德章昭融名威羌夷勳書册府正議大夫廣平公秀實孤映清標邁逺鬱建功利煥于汗青太中大夫濮陽公冲襟爽徹淑質端靖積厚施衍父子顯榮朝議大夫清豐公朝議大夫彭城公朝議大夫徐公朝散大夫鄭公並道韻虛曠內德淳耀或中臺耆彥或四方膚使出處有裕終始一德愷悌利愛布在世間承議郎崇君奉議郎黃君素行潔修里閈標凖早解簪紱仕路式瞻咸頎頎碩德天錫難老貌若遼鶴言為龜鑑於時羽觴屢酬雅章迭作敘懷感遇樂時休眀顧眄之間穆如清徵薰如太和夫學本美身仕欲行志名節既立榮利後之若諸公積儲淵深未極經緯而不茍於得進退從容千祀可垂後生仰止以襄陽米芾倦游四海多出賔僚刻繪既𫝊屬為序引嗚呼樂道人善君子有之顧黻何堪忝於承命謹序淳祐已酉月正人日郡守鄭霖會三學同舍序拜于天慶齊堂會者四十二人天台鄭霖景說參持志諭存心長服膺學諭吳門顔岩世光節性應天滕嚞景初養正天台周公眀元德養正吳門孔燁眀仲觀化學諭吳門盛文韶景聲率履吳門詹次騤平叟持志吳門滕照德明養正會稽揚珍庭玉允蹈三衢滕英傑德秀養正婺女吳邃囦仲誠意吳門張經德常節性過存心服膺習是會稽李士特奇父果行吳門錢振祖季玉篤言嘉禾趙與理子正宗學立愛過懷德三山趙綰夫景揚宗學懷德學録吳門趙震亨子東果行過時中吳門朱杲晦叔務本興化陳夀翁仁父篤信過果行學諭三山陳夢圓宗震務本嚴陵諸葛克念師聖循理三山陳桂巖肖持志三山林應炎光逺習是吳門陳伯章煥文誠意吳門吕直之道夫持志三山陳龍炎剛伯誠意毗陵李煓子眀存心吳門范爽邦景哲守約三山鄭宏洪甫率履吳門干天麟仁仲習是合陽侯爟季立持志通川高仁立仲立立禮吳門陳由之子是誠意吳門趙時㻽德玉眀賢過懷德通川高仁洽君澤立禮吳門張應高仰之貫通天台范應時和甫習是金華范士表仲端服膺南劒陳洧有之率履臨安章昌朝文叔經德三山陳鈺伯堅養正通川陸應霆伯聲服膺序曰淳祐九年嵗在己酉天基錫宴之後二日三學同舍序拜于吳門天慶觀禮成宴于郡之春雨堂有執爵而祝者三始酌曰侯自製錦而厯符節加惠此邦尚矣願守五年之信終始如一毋廢甘棠又酌曰仕而行義敬共厥職願毋愧羔羊又酌曰學優則仕時當其可願無負乎豐芑於是合席皆作而謝曰凡我同盟冇味斯言是集也序以齒交以禮會以文隱然鄉飲之遺風依然齊廬之舊習歡然相愛而又有規焉古之人飲食必祝歌詩以見志其庶幾乎又春雨堂即事詩曰十年隨牒訪三高不覺星星上鬢毛尚憶虀鹽形夜夢聊因椒柏薦春醪文明再會知何日臭味相投屬我曹總是虞庠舊培植致君當不愧夔臯吳郡志卷二
