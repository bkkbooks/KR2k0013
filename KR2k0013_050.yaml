body:
  text: 吳郡志卷五十宋范成大撰雜志吳王僚時吳邊邑處女與楚之邉邑卑梁之女蠶爭界上之桑二家相攻吳不勝更相伐滅吳之邊邑吳王僚怒使公子光伐楚取居巢鍾離公子光伏甲士於窟室中具酒請王僚僚白其母曰公子光為我具酒期無變乎母曰光心氣怏怏常有愧恨之色不可不防王僚乃被棠鐵之甲三重使兵衛陳於道自宫門至於光之門階席左右皆王僚親戚使坐立侍皆操長㦸交軹酒酣光佯為足疾入窟室使専諸置魚腸劒炙魚中進之既至王僚前専諸擘炙魚因推匕首立㦸交軹倚専諸胸斷臆開匕首如故以刺王僚貫甲達背王僚既死左右共殺専諸衆士擾動光伏甲士攻僚衆盡滅之遂自立是為吳王闔閭以位遜季札季札曰茍先君無廢祀社稷有奉乃吾君也吾誰怨乎哀死事生以俟天命非我生亂立者從之是前人之道復命哭僚墓復位而公子蓋餘燭庸二人將兵遇圍於楚者聞光殺王僚自立乃以兵降楚楚封之於舒吳越春秋越王句踐既以西施鄭旦獻夫差又飾美女八人納太宰嚭曰子茍能放越之罪又有美於此者將進之案此夫差君臣皆為美色所蠱以致破國亡身焉吳王夫差既為越王句踐所逼將死曰以三寸帛幎吾兩目使死者有知吾慙見伍子胥公孫聖越王則解綬以幎其目史記正義曰今之面衣是其遺象顧野王曰大巾覆也晉安北將軍范汪為桓溫所免朝廷憚溫不敢執談者為歎恨汪屏居吳郡從容講肄不言枉直咸安二年桓溫矯太后詔令廢帝為海西公徙居吳縣西七里勑吳國內史刁彞防衛帝深慮橫禍乃杜塞聰明終日酣暢太元十一年殂于吳與庾后合葬吳陵隆安三年孫恩作亂吳會承平日久人不習戰所在多破亡吳國內史桓謙出奔無錫內史袁山松築扈瀆壘緣海備恩眀年恩復入陜口轉寇扈瀆害山松浮海而北劉裕等并軍躡之復沿海還南裕復大破恩於扈瀆恩遂逺遁赴海自沈咸和三年蘇峻反虞潭自吳興太守加督三吳晉陵宣城義興五郡軍事遣將距管商於吳縣為商所敗峻平轉鎮軍將軍吳國內史蘇峻之亂郡人顧衆為揚威將軍義興太守還吳潜圖義舉時吳國內史庾冰奔會稽峻以蔡謨代之將軍張哲為峻收兵於吳衆遣人諭哲哲從之衆遣告謨曰衆巳潜合家兵待時而奮謨乃檄衆為本國督護衆從弟護軍參軍揚為前鋒督護吳中人士同時響應峻遣將𢎞徽鼓行而前衆與揚哲要擊戰于高莋大破之謨以庾冰還任便去郡衆遣揚率諸軍屯無錫恐賊從海虞道入衆自往備之賊帥張健馬流攻無錫揚等大敗冰亦失守健等遂據吳城衆自海虞由婁縣東倉與賊戰破之義軍又集進屯烏苞會稽內史王舒吳興內史虞潭并檄衆為五郡大督護潭前鋒戰沒衆還守紫壁賊黨方鋭義軍沮退人咸勸衆率衆過浙江衆曰不然今固守紫壁可得全錢唐以南五縣若越他境便為寓軍控引無所非長計也臨平人范眀謂衆曰此地險要可以制寇衆乃以眀為參軍合諸軍復進討健健退于曲阿留錢𢎞為吳令衆軍至路丘即斬𢎞首衆進住吳城遣督護朱祈等九軍攻賊大破之峻平論功衆以承檄奮義推功蔡謨謨以衆倡謀非己之力俱表相遜論者美之封鄱陽縣伯蘇峻之役王導潛與張闓謀密宣太后詔於三吳速起義軍闓遣吳郡度支運四部榖以給軍又與吳郡內史蔡謨等招集義兵討峻蘇峻反遣其徒管商等攻吳郡焚吳縣海鹽嘉興敗諸義軍峻敗後其將劉徴又率衆數千浮海入婁縣詔以郤鑒都督諸軍事討平之桓𤣥太元末補義興太守鬱鬱不得志嘗登高望震澤歎曰父為九州伯兒為五湖長棄官歸國王廞以母喪居吳王恭舉兵假廞建武將軍吳國內史令起軍為聲援廞即墨絰合衆誅殺異已乃遣前吳國內史虞嘯父入吳興義興聚兵衆潰奔走不知所在慕容皓僭位於燕以吳人為吳縣𨽻燕國苻堅將寇晉引羣臣會議太子左衛率石越對曰今嵗鎮星守牛斗福德在吳懸象無差未可犯也宋江夏文獻王義恭善騎馬好遊行或二三百里孝武帝聽其所之東至吳郡登虎丘山又登無錫烏山以望太湖王僧達為吳郡太守以屢遷失意吳郭西臺寺多富沙門僧達求須不滿欲遣主簿顧曠率門徒劫寺中沙門竺法瑶財數百萬又立宅於吳多役公力坐免官唐光啓初劇賊剽崑山招討使周寶遣將張郁戍海上郁叛刺史王藴調兵將還休不設備郁遂大掠藴嬰城守寶遣兵討郁郁保常熟遂走海陵楊茂實為蘇州刺史南面招討使周寶之壻也重斂人不聊生田令孜以趙載代之茂實不受命寶表留不聽乃殘郛署汙垣墉而去淮將楊行密寇姑蘇别將秦裴屯崑山吳越將顧全武擊裴圍之於崑山甚急裴援絶不降頗殺傷士卒全武為長檄諭之裴乃納款光啓中六合鎮將徐約攻陷蘇州逐刺史楊茂實擾其地劫吳越貢賦錢鏐遣其弟銶率兵破約約竄入海中劫剽中箭死鏐以海昌鎮將沈璨權知州事龍紀中錢鏐既破走徐約詔給事中杜孺休為刺史大順元年李裕陷蘇州制置指揮使沈璨害孺休及其兄延休而奔錢鏐鏐將誅之遂奔孫儒儒復以璨為蘇州制置使孺休延休異母弟同日生至是同日死人咸異之景福元年錢鏐既平孫儒命從弟銶為蘇州招緝使乾寧五年平臺濛又命曹圭為蘇州制置使皆鏐私官也後梁開平中楊行密圍姑蘇錢鏐命其弟鋸鏢帥江海遊奕都虞候何逢內外夾攻生擒淮將何朗閭丘真等三千餘人獲兵甲生口三十萬戰船二百餘艘鏐遂親巡姑蘇淮人圍姑蘇城中軍將孫琰號孫百萬専製守禦之具淮人以洞屋攻城琰設高竿竿上著大輪盤載大鐵渴烏引半繩運出城外而反其洞屋鼓譟而揭去之賊兵盡露因加矢石淮人退舍尋復縱巨石擊城聲如雷城中大懼琰乃盡取公私繩結網用巨木張之蔽于城屋石之墜者悉著網中賊計遂沮備史遺事梁侯景遣中軍侯子鑒入吳郡以廂公蘇單于為吳郡太守吳興太守張嵊舉兵討景嵊稷之子也景號令所行惟吳郡以西南陵以北而巳吳盜陸緝等起兵襲吳郡殺蘇單于推前淮南太守文成侯寧為主侯景敗至晉陵得田遷餘兵因驅掠居民東趨吳郡侯瑱追及景於松江景猶有船二百艘衆數千人瑱進擊敗之景與腹心數十人單舸走推墮二子於水遂入海陳吳州刺史蕭瓛能得物情三吳父老曰吾君之子也陳亡吳人推瓛為主與蕭巗同據東吳之地隋使宇文述討之瓛立柵於晉陵城東留兵拒述遣其將王褒守吳州自義興入太湖欲掩述後述進破其柵回兵擊瓛大破之又遣兵别道襲吳州王褒衣道士服棄城走瓛以餘衆保包山隋將燕榮擊破之瓛匿民家為人所執送長安斬之吳會悉平本傳隋大業九年劉元進舉兵應楊𤣥感將渡江而𤣥感敗吳郡朱燮晉陵管崇亦舉兵共迎元進據吳郡衆至十萬燮還俗道人長不滿七尺涉獵經史微知兵略時為崑山博士知天下將亂謀於學而起兵赴者如歸自東陽至京口千餘里並受燮節度崇隱居常熟美姿容少不籍長七尺三寸推崇為主煬帝將吐萬緒進軍逼之相持百餘日為緒所敗保於黃山緒復破之燮戰死帝令江都郡丞王世充發淮南兵擊之世充既渡江元進與崇俱為世充所殺劫魁帥先降世充於通聖寺佛像前燒香為誓誓不誅殺吳人聞世充有信誓一旬之間歸首略盡世充貪而無信利在子女資財並坑斬首八千餘人於黃山之下時以為負誓殺降不祥武德之際果遂殱夷唐武德三年李子通渡江攻沈法興法興棄毗陵奔吳杜伏威遣輔公祏攻子通子通大敗東走太湖收合亡散得二萬人襲法興於吳郡大破之法興帥左右數百人棄城走吳郡賊帥聞人遂安遣其將葉孝辨迎之法興中塗而悔欲殺孝辨更向會稽孝辨覺之法興窘迫赴江溺死子通軍勢復振帥其羣臣徙都餘杭盡收法興之地北自太湖南至嶺東包會稽西距宣城皆有之伏威將王雄誕擊子通子通降聞人遂安據崑山無所屬伏威使雄誕擊之以崑山險隘難以力勝乃單騎造其城下陳國威靈示以禍福遂安感悅帥諸將出降於是伏威盡有淮南江東之地上元元年劉展反江淮都統李峘自潤州奔宣城副使李莊用曰以數十州之兵食三江五湖之險固不發一矢而棄之非勇也收散卒得七百人東至蘇州募壯士得三千人立柵以拒展與展將張景超戰於郁墅兵敗景超遂據蘇州展以其將楊持璧為蘇州刺史明年展敗餘黨悉平展驍將王恆引兵東走至常熟而降永貞二年李錡跋扈於浙西朝廷以杜兼為蘇州刺史兼辭行上書稱錡且反必奏族臣上然之留為吏部郎中元和二年錡果反以其腹心姚志安處蘇州蘇州刺史李素為志安所虜錡敗乃免白居易自杭徙蘇首尾五年自云兩地江山遊得遍五年風月詠將殘可謂極宦遊之適矣其在蘇夜遊西武丘詩云領郡時將久遊山數幾何一年十二度非少亦非多蓋一月一遊武丘矣此詩中又識侍行容滿蟬態十妓姓名殊不以為嫌又因黃橘夜泛太湖其詩云十隻畫船何處宿洞庭山腳太湖心又自太湖寄元稹詩云報君一事君應羡五宿澄波皓月中則是連五日夜在洞庭泛舟雖白公風格髙邁好事不窘束亦當時文法網疏不以為怪古今時異事異有如此者其後劉禹錫守蘇白為河南尹又作憶舊遊詩寄禹錫又有夢蘇州寄馮侍御詩眷眷此邦甚厚則知吳在當時為名邦樂國能使賢者思之而不忘今録其詩以見一時人情物態之大略白居易憶舊遊憶舊遊舊遊安在哉舊遊之人半白首舊遊之地多蒼苔江南舊遊凡幾處就中最憶吳江隈長洲苑緑栁萬樹齊雲樓春酒一杯閶門曉嚴旗鼓出臯橋夕閙船舫回修娥慢臉燈下醉急管繁絃頭上催六七年前狂爛熳三千里外思徘徊李娟張態一春夢周五殷三歸夜臺虎丘月色為誰好娃宫花枝應夜開賴得劉郎解吟詠江山氣色合歸來夢蘇州夢到花又夢蘇州水閣寄馮侍御揚州驛裏橋水閣頭覺後不知馮侍御此中昨夜共誰遊咸通中崔璞守吳郡時皮日休為部從事與處士陸龜䝉為文會之友風雨晦冥蓬蒿翳薈未嘗不作詩璞間為詩亦令兩人屬和吳中名士亦多與焉一年間所作盈積龜䝉裒為十通日休名之曰松陵集乾德丙寅平望村王氏女病起言語倒亂多言灾異有成都卒楊恭者助之號天仙二娘子蘇帥聞之召入城居古宅中施符水旁郡人雲集其後虛妄之事發此女逃入人家踰年乃獲杖之勒令嫁人收其金帛入於道宫諺曰天上天堂地下蘇杭又曰蘇湖熟天下足湖固不逮蘇杭為會府諺猶先蘇後杭說者疑之白居易詩曰霅川殊冷僻茂苑太繁雄惟有錢塘郡閒忙正適中則在唐時蘇之繁雄固為浙右第一矣楊備郎中天聖中為長溪令忽夢作詩云月俸蚨錢數甚微不知從宦幾時歸東吳一片輕波在欲問何人買釣磯意甚異之眀道初為華亭令丁內艱遂家吳中樂其土風安之因悟夢中語嘗效白樂天作我愛姑蘇好十章又作姑蘇百題詩行於世吳郡解額自祥符間定制秋舉以四人為率慶厯中應舉者止二百人范貫之龍圖送錢正叔赴舉序已言四人之額視它藩為最寡熙豐間舉人漸多增至六人三舍法行罷科舉法嵗貢四人舍法罷合三年之數為十二人紹興丙子增流寓一名今終場之士二千猶為額窄也大觀中章莊敏公質夫之子綖為時相誣以盜鑄詔開封尹李孝夀來置獄連逮千餘人屯甲士圍其家鉦鼓聲徹晝夜郡人震駭獄不成又遣御史沈畸蕭服姚其來重鞫之甚至州人多閉戶或自門隙中窺觀不敢正視識者知其非太平氣象其後遂有建炎南渡之事方章氏事前城中小兒所在羣聚而唱云沈逍遙沈逍遙莫知其由已而三御史至丁晉公兒童時嘗從老郁先生學郁居光蕩巷淳化中公自參知政事拜平江軍節度使知升州以本鎮節旄還家首詣郁居拜之堂下郁呼曰拜殺老夫矣話舊欵密且云謂少年狹劣先生教誨痛加夏楚使得成立皆先生賜也郁沒公遣吏治後事甚嚴本朝陳文惠公堯佐能為詩世稱其吳江詩云平波渺渺煙蒼蒼菰蒲才熟楊栁黃扁舟繫岸不忍去秋風斜日鱸魚鄉今吳江口有鱸鄉亭蓋取公句江鄰幾善為詩清淡有古風蘇子美坐進奏院事謫官後死吳中江作詩云郡邸獄寃誰與辨臯橋客死世同悲用事甚精當劉貢父詩話南北章本建安人郇公得象之裔後徙居吳兩族申公子厚家州南莊敏公質夫家州北兩第屹然相望甲於郡城人號為南北章今其兩族子孫仕者不絶賀鑄字方回本越人後徙居吳之醋坊橋作吳趨曲甚能道吳中古今景物方回有小築在盤門外十里橫塘嘗扁舟往來作青玉案詞黃太史所謂解道江南斷腸句如今只有賀方回即此詞也王眀之岐公之子在姑蘇有所愛比至京師為公强留之逾時作詩云黃金零落大刀頭玉筯歸期畫到秋紅錦寄魚風逆浪碧簫吹鳳月當樓伯勞知我經春别香蠟窺人一夜愁好去渡江千里夢滿天梅雨是蘇州句甚工石林詩話葉左丞夢得居吳下一日出閶門至小寺中壁間有題詩一絶云黃葉西陂水漫流籧篨風急送扁舟夕陽暝色來千里人語雞聲共一丘意極嘉之而不書名氏寺僧云吳縣主簿寇國寶所作也國寶徐州人從陳無已學云石林詩話朱沖本以常賣為業常賣者收拾毁棄及破缺畸殘器物沿門販鬻者以過犯再杖脊而徒後乃變業賣藥家寖溫能以錢米及藥賙給飢寒老病者宣政間其子勔因中貴人遂以花石得幸人家園館及墳墓有一花一木之佳者悉用黃封徑取之开鑿太湖石同載以進奉京師謂之花石綱所過橋梁礙綱者毁折以過發運司綱舟悉撥充花石綱父子俱建節鉞即其家作雙節堂又畫徽廟御容立御容殿於家監司郡守就朝朔望日勔嘗預曲宴上親握其臂遂以黃帛纒之與人揖不舉此臂弟姪聮姻帝族園丁悉賜金紫靖康初元勔伏誅竄其家海上其門下人得告身者盡褫之今其地為張循王宅闔閭十年國東有夷人侵逼吳境吳王大驚令所司㸃軍王乃宴會親行平眀出城十里頓軍憩歇今憩橋是也王曰進軍所司又奏食時已至令臨頓吳軍宴設之處今臨頓是也夷人聞王親征不敢敵收軍入海據東洲沙上吳亦入海逐之據沙洲上相守一月屬時風濤糧不得度王焚香禱天言訖東風大震水上見金色逼海而來繞吳王沙洲百匝所司撈漉得魚食之美三軍踴躍夷人一魚不獲遂獻寶物送降欵吳王亦以禮報之仍將魚腹腸肚以鹹水淹之送與夷人因號逐夷夷亭之名昉此吳王回軍會羣臣思海中所食魚問所餘何在所司奏云並曝乾吳王索之其味美因書美下著魚是為鯗字今從失非也魚出海中作金色不知其名吳王見腦中有骨如白石號為石首魚吳地記吳郡志卷五十
