body:
  text: 吳郡志卷十九宋范成大撰水利上吳中治水之説多矣丘與權單子發於至和塘及松江百瀆皆有記可考而近世郟亶暨其子僑及趙開論議措畫之説最詳雖罷行當否自有一時去取然亶僑考訂地理塘浦所在至為纖悉開之所治至今或有利者其經之營之亦甚詳備凡古今興廢之迹江海源委之道皆如指掌恐歲久無所考今得其説取其要者著于後至和塘舊名崑山塘從古為湖瀼多風濤本朝至道皇祐中嘗議興修不果至和二年始修治成塘遂以年號名塘有崑山主簿丘與權之記甚備今採載之丘與權記吳城東闉距崑山縣七十里俗謂之崑山塘北納陽城湖南吐松江由隄防之不立故風波相憑以馳突廢民田以瀦魚鱉其民病賦入之侵蟊相從以逋徙姦人緣之以邀劫行旅通鹽檟以自利吏莫能禁父老相傳自唐至今三百餘年欲有營作而弗克也有宋至道二年陳令公之守蘇嘗與中貴人按行之邑人朱珏父子相繼論其事為州縣者亦繼經度之皆以橫絶巨浸費用十數萬緡中議而沮皇祐中發運使許公建言蘇之田膏腴而地下嘗苦水患乞置官司以畎泄之請今舒州通判殿中丞王安石先相視焉朝廷從之王君既至從縣吏拏荒梗浮傾沮訊其鄉人盡得其利害度長繩短順其故道施之圗繪疏曰請議如許公朝廷未之行也至和初今太守吕公既下車問民所疾苦蓋有意於疏導矣眀年與權為崑山主簿始陳五利一曰便舟楫二曰闢田疇三曰復租賦四曰止盜賊五曰禁姦商其餘所濟非可以勝擬願約古制役民以興作經費寡而售效速若其不成請以身塞責既而令錢君復言之太守嘗念所以興利之計喜其謀之協從於是列而上聞其副以決於監司乃誡庸力經遠邇興屯舍宿餱薪既成以授有司郡相元君實總之粵十月甲午治後先設外防以遏其上流立橫埭以限之乃自下流浚而決焉畚鍤所至皆於平陸其始戒也猖風號霾迅雷以雨乃用牲于神至癸己夜半雨息逮明休霽以卒其役人皆以為有相之者始計月餘蓋旬有九日而成深五尺廣六十尺用民力才一十五萬六千工費民財三千二百貫米才四千六百八十石為橋梁五十二蒔榆桞五萬七千八百其二河植茭蒲芙蕖稱是計其入以為修完料民之餘治小虞自嚴村至于鰻瀼治新洋江自朱厯至于清港治山塘自山南至于東浚渚涇六十四浦四十四塘六於是陽城諸湖若瀼皆道而及江田無汙瀦民不病涉矣初治河至唯亭得古閘用柏合抱以為楹蓋古渠况今深數尺設閘者以限松江之潮勢耳耆舊莫能詳之乃知昔無水患由隄防之廢則有之嗚呼為民者因循而至此乎是役也自城東走二十里曰任浦崑山治其東長洲治其西以俗名非便於是論請更之曰至和識年號也建亭曰乙未紀歲功也太守嘉其有成謂與權實區區於其間其言必詳命之為記嘉祐六年十二月立于乙未亭沈氏筆談云至和塘自崑山縣達于婁門凡七十里自古皆積水無陸途民頗病涉久欲為長隄抵郡城澤國無處求土嘉祐中人有獻計􅈬水中以籧篨為牆栽兩行相去三尺去牆六丈又為一牆亦如此漉水中淤泥實籧篨中候乾則以水車畎去兩牆間舊水牆間六丈皆留半以為隄腳掘其半為渠取土以為隄每三四里則為一橋以通南北之水不日隄成至今為利詳沈氏所記蓋至和塘既成於至和二年立石其間濬水道巳成塘陸塗尚未備至是始備而未堅固後郟亶謂至和塘所以不踰一二年而壞也蓋丘與權塘記雖作於至和二年立石乃嘉祐六年或是新塘成之時也熙寧三年崑山人郟亶自廣東機宜上奏以謂天下之利莫大於水田水田之美無過於蘇州然自唐末以來經營至今而終未見其利者其失有六今當去六失行六得所謂六失者一曰水性就下蘇東枕海北接江但東開崑山之張浦茜涇七丫三塘而導諸海北開常熟之許浦白茒二浦而導諸江殊不知此五處者去水皆逺百餘里近亦三四十里地形頗髙髙者七八尺方其水盛時決之則或入江海水稍退則向之欲東導於海者反西流欲北導於江者反南下故自景祐以來屢開之而卒無效也二曰蘇之厭水以其無隄防也故崑山常熟吳江皆浚其隄岸設官置兵以巡治之是不知塘雖設而水行於隄之兩旁何益乎治田故徒有通往來禦風濤之小功而無衛民田去水害之大效三曰書云三江既入震澤底定今松江在其南可決水而同歸於海崑山之下駕新洋小虞大虞朱塘新瀆平樂戴墟等十餘浦是也殊不知諸浦雖有決水之道未能使水之必泄於江也何則水方汗漫與江俱平雖大決之而隄防不立適足以通潮勢之衝急增風波之洶怒耳四曰蘇州之水自常州來古者設望亭堰所以禦常之水使入太湖不為蘇害謂望亭之堰不當廢也殊不知蘇聚數郡之水而常居其一常之水數路望亭居其一豈一望亭之水而能為蘇之患耶故望亭堰廢則常被其利而蘇未必有害存之則蘇未必利而常先被害矣故治蘇州之水不在乎望亭堰之廢否也五曰蘇水所以不泄者以松江盤曲而決水遲也古之曲其江者所以激之而使深也激之既久其曲愈甚故漕使葉內翰開盤龍匯沈諫議開顧浦謂松江之曲若今槎浦及金竈子等浦皆可決也是説僅為得之但未知蘇之水與江齊平決江之曲者足以使江之水疾趨於海而未能使田之水必趨於江也六曰蘇本是江海陂湖之地謂之澤國自當漫然容納數州之水不當盡為田也故國初之稅才十七八萬石今乃至於三十四五萬石是障陂湖而為田之過也是説最為疏闊殊不知國初之逃民未復今乃盡為編户稅所以昔少而今多也借使變湖為田增十七八萬為三十四五萬乃國之利何過之有且今蘇州除太湖外止有四湖常熟有昆承二湖崑山有陽城湖長洲有沙湖是四湖者自有定名而其闊各不過十餘里其餘若崑山之所謂邪塘大泗黃瀆夷亭髙墟巴城雉城武城夔家江家柏家鰻等瀼及常熟之市宅碧宅五衢練塘等村長洲之長蕩黃天蕩之類皆積水而不耕之田也其水之深不過五尺淺者可二三尺其間尚有古岸隱見水中俗謂之老岸或有古之民家階甃之遺址在焉故其地或以城或以家或以宅為名嘗求其契劵以驗云皆全稅之田也是皆古之良田而今廢之耳己上六説者皆執一偏之論而未能通其理也必欲治之固當去其六失行其六得曰辨地形髙下之殊求古人蓄泄之迹治田有先後之宜興役順貧富之便取浩博之大利舍姑息之小恩也一何謂地形髙下之殊曰蘇州五縣號為水田其實崑山之東接于海之岡隴東西僅百里南北僅二百里其地東髙而西下向所謂東導於海而水反西流者是也常熟之北接于北江之漲沙南北七八十里東西僅二百里其地皆北髙而南下向所謂欲北導於江而水反南下者是也是二處皆謂之髙田而其崑山堽身之西抵于常州之境僅一百五十里常熟之南抵于湖秀之境僅二百里其地低下皆謂之水田髙田者常欲水今水乃流而不蓄故常患旱也唯若景祐皇祐嘉祐中則一大熟爾水田者常患水今西南既有太湖數州之水而東北又有崑山常熟二縣堽身之流故常患水也唯若康定至和中則一大熟爾但水田多而髙田少水田近於城郭為人所見而稅復重髙田逺於城郭人所不見而稅復輕故議者唯知治水而不知治旱也二何謂古人蓄泄之迹曰今崑山之東地名太倉俗號堽身堽身之東有一塘焉西徹松江北過常熟謂之橫瀝又有小塘或二里或三里貫橫瀝而東西流者多謂之門若所謂錢門張堽門沙堰門吳堽顧廟堽丁堽李堽門及斗門之類是也夫南北其塘則謂之橫瀝東西其塘則謂之堽門堽門斗門者是古者堰水於堽身之東灌溉髙田而又為堽門者恐水之或壅則決之而橫瀝所以分其流也故堽身之東其田尚有丘畝經界溝洫之迹在焉是皆古之良田因堽門壞不能蓄水而為旱田耳堽門之壞豈非五代之季民各從其行舟之便而廢之耶此治髙田之遺迹也若夫水田之遺迹即今崑山之南向所謂下駕小虞等浦者皆決水於松江之道也其浦之舊迹闊者二十餘丈狹者十餘丈又有橫塘以貫其中而碁布之是古者既為縱浦以通於江又為橫塘以分其勢使水行於外田成於內有墟田之象焉故水雖大而不能為田之害必歸於江海而後已以是推之則一州之田可知矣故蘇州五門舊皆有堰今俗呼城下為堰下而齊門猶有舊堰之稱是以隄防既完則水無所瀦容設堰者恐其暴而流入於城也至和二年前知蘇州吕侍郎開崑山塘而得古閘於夷亭之側是古者水不亂行之眀驗也及夫隄防既壞水亂行於田間而有所瀦容故蘇州得以廢其堰而夷亭亦無所用其閘也為民者因利其浦之闊攘其旁以為田又利其行舟安舟之便決其堤以為涇今崑山諸浦之間有半里或一里二里而為小涇命之為某家涇某家濱者皆破古隄而為之也浦日以攘故水道堙而流遲涇日以多故田隄壞而不固日隳月壞遂蕩然而為陂湖矣此古人之迹也今秀州濵海之地皆有堰以蓄水而海鹽一縣有堰近百餘所湖州皆築隄於水中以固田而西塘之岸至有高一丈有餘者此其遺法也獨蘇州壞之耳三何謂治田有先後之宜曰地勢之髙下既如彼古人之遺迹又如此今欲先取崑山之東常熟之北凡所謂髙田者一切設堰瀦水以灌溉之又浚其所謂經界溝洫使水周流於其間以浸潤之立堽門以防其壅則髙田常無枯旱之患而水田亦減數百里流注之勢然後取今之凡謂水田者除四湖外一切罷去其某家涇某家濱之類循古今遺迹或五里七里而為一縱浦又七里或十里而為一橫塘因塘浦之土以為隄岸使塘浦闊深而隄岸髙厚塘浦闊深則水通流而不能為田之害也隄岸髙厚則田自固而水可擁而必趨於江也然後擇江之曲者若所謂槎浦金竈子浦而決之使水必趨於海又究五堰之遺址而復之使水不入於城是雖有大水不能為蘇州之患也如此則髙低皆利而無水旱之憂然後倣錢氏遺法收圗回之利養撩清之卒更休迭役以浚其髙田之溝洫與水田之塘浦則百世之利也四何謂興役順貧富之便曰蘇州五縣之民自五等已上至一等不下十五萬户可約古制而户借七日則歲約百萬夫矣又自三等以上至一等不下五千户可量其財而取之則足以供萬夫之食與其費矣夫借七日之力故不勞量取財於富者故不虐以不勞不虐之役五年而治之何田之不可興也五何謂取浩博之大利蘇州之地四至餘三百里若以開方之法而約之尚可方二百餘里為田六同有畸三分去一以為溝池城郭陂湖山林其餘不下四同之地為三十六萬夫之田又以上中下不易再易而去其半當有十八萬夫之田常出租稅也國朝之法一夫之田為四十畝出米四石則十八萬夫之田可出米七十二萬石矣今蘇州止有三十四五萬石借使全熟則常失三四十萬石之租又况因水旱而蠲除者歲常不下十餘萬石而甚者或蠲除三十餘萬石是則遺利不少矣今或得髙低皆利而水旱無憂則三四十萬之稅必可增也公家之利如此則民間從可知也六何謂舍姑息之小惠曰是議之興或者必曰向者蘇州或治一圃或調一縣而役一月則民勞且怨矣今欲盡一州之境役五縣之民五年而治之其工力蓋百倍於向時是役未興而數千百萬之民已呶呶矣非養民之道也曰向者之興役也多興於大水方盛之際是時公私匱乏疾癘間作故民勞且怨也今或於平歲無事之時借力以成利何勞怨之有傳曰使民以時又曰以佚道使民雖勞無怨又曰悅以使民民忘其勞是雖至治之世未嘗不役民以使之也唯近世不求所以養之之道使躋於富庶但務其姑息之末使至於飢餓而不能相生然後又從而賙之故上乏而下益困有可以除數百年未去之患興數百里無窮之利使公私皆獲其利豈可區區計國家五歲之勞惜百姓七日之力耶亶又上治田利害大槩有七一論古人治低田髙田之法二論後世廢低田髙田之法三論自來議者只知決水不知治田四論今來以治田為先決水為後五論乞循古人遺迹治田六論若先往兩浙相度則議論難合七論先詣司農寺陳白則利害易眀一論古人治低田髙田之法者昔禹之時震澤為患東有堽阜以隔截其流禹乃鑿斷堽阜流為三江東入于海而震澤始定震澤雖定而環湖之地尚有二百餘里可以為田而地皆卑下猶在江水之下與江湖相連民既不能耕植而水面又復平闊足以容受震澤下流使水勢散漫而三江不能疾趨於海其沿海之地亦有數百里可以為田而地皆髙仰反在江水之上與江湖相逺民既不能取水以灌溉而地勢又多西流不得蓄聚春夏之雨澤以浸潤其地是環湖之地常有水患而沿海之地常有旱災如之何而可以種藝耶古人遂因其地勢之髙下井之而為田其環湖卑下之地則於江之南北為縱浦以通于江又於浦之東西為橫塘以分其勢而碁布之有墟田之象焉其塘浦闊者三十餘丈狹者不下二十餘丈深者二三丈淺者不下一丈且蘇州除太湖之外江之南北别無水源而古人使塘深闊若此者蓋欲取土以為隄岸髙厚足以禦其湍泳永旱之流故塘浦因而闊深水亦因之而流耳非専為闊其塘浦以決積水也故古者隄岸髙者須及二丈低者亦不下一丈借令大水之年江湖之水髙於民田五七尺而隄岸尚出於塘浦之外三五尺至一丈故雖大水不能入於民田也民田既不容水則塘浦之水自髙於江而江之水亦髙於海不須決泄而水自湍流矣故三江常浚而水田常熟其堽阜之地亦因江水稍髙得以畎引以灌溉此古人浚三江治低田之法也所有沿海髙仰之地近於江者既因江流稍髙可以畎引近於海者又有早晚兩潮可以灌溉故亦於沿海之地及江之南北或五里七里而為一縱浦又五里七里而為一橫塘港之闊狹與低田同而其深往往過之且堽阜之地髙於積水之處四五尺至七八尺逺於積水之處四五十里至百餘里固非決水之道也然古人為塘浦闊深若此者蓋欲畎引江海之水周流於堽阜之地雖大旱之歲亦可車畎以溉田而大水之歲積水或從此而流泄耳非専為闊深其塘浦以決低田之積水也至於地勢西流之處又設堽門斗門以瀦蓄之是雖大旱之歲堽阜之地皆可耕以為田此古人治髙田蓄雨澤之法也故低田常無水患髙田常無旱災而數百里之地常獲豐熟此古人治低田旱田之法也二論後世廢低田髙田之法者古人治田髙下既皆有法方是時也田各成墟墟必有長每一年或二年率逐墟之人修築隄防浚治浦港故低田之隄防常固旱田之浦港常通也國而尚有撩清指揮之名者此其遺法也至錢氏有洎乎年祀綿逺古法隳壞其水田之隄防或因田户行舟及安舟之便而破其墟或因人户請射下腳而廢其堤或因官中開淘而減少丈尺或因田主只收租課而不修隄岸或因租户利於易田而故要淹沒或因決破古隄張捕魚蝦而漸致破捐或因邊墟之人不肯出田與衆做岸或因一墟雖完傍墟無力而連延隳壞或因貧富同墟而出力不齊或因公私相吝而因循不治故隄防盡壞而低田漫然復在江水之下也每春夏之交天雨未盈尺湖水未漲二三尺而蘇州低田一抹盡為白水其間雖有隄岸亦皆狹小沈在水底不能固田唯大旱之歲常潤杭秀之田及蘇州堽阜之地並皆枯旱其隄岸方始露見而蘇州水田幸得一熟耳蓋由無隄防為禦水之先具也民田既容水故水與江平江與海平而海潮直至蘇州之東一二十里之地反與江湖民田之水相接故水不能湍流而三江不浚今二江已塞而一江又淺儻不完復隄岸驅低田之水盡入於松江而使江流湍急但恐數十年之後松江愈塞震澤之患不止於蘇州而已矣此低田不治之由也其髙田之廢始由田法隳壞民不相率以治港浦其港浦既淺地勢既髙沿於海者則海潮不應沿於江者又因水田隄防隳壞水得瀦聚於民田之間而江水漸低故髙田復在江水之上至於西流之處又因人户利於行舟之便壞其堽門而不能蓄水故髙田一望盡為旱地每至四五月間春水未退低田尚未能施工而堽阜之田己乾坼矣唯大水之歲湖秀二州與蘇州之低田淹沒淨盡則堽阜之田幸得一大熟耳此蓋不浚浦港以畎引江海之水不復堽門以蓄聚春夏之雨澤也此髙田廢之之由也故蘇州不有旱災即有水患但水田多而旱田少水田近於城郭為人之所見而稅復重旱田遠於城郭人所不見而稅復輕故議者只論治水而不論治旱也三論自來議者只知決水不知治田蓋治田者本也本當在先決水者末也末當在後今乃不治其本而但決其末故自景祐以來上至朝廷之搢紳下至農田之匹夫謀議擘畫三四十年而蘇州之田百未治一二此治水之失也惟嘉祐中兩浙轉運使王建議謂蘇州民間一槩白水至深處不過三尺以上當復修作田位使位位相接以禦風濤則自無水患若不修作塍岸縱使決盡河水亦無所濟此説最為切當又緣當時建議之時正值兩浙連年治水無效不知大段擘畫令官中逐年調發夫力更互修治及不曽立定逐縣治田年額以辦不辦為賞罰之格而止令逐縣令佐槩例勸導逐位植利人户一二十家自作塍岸各髙五尺緣民間所鳩工力不多蓋不能齊整借令多出工力則各家所收之利不償其所費之本兼當時都水監立下官貟賞典不重故上下因循未曽併聚公私之力大段修治臣今欲乞檢會王安石所陳利害却將臣所議擘畫修築隄岸以固民田則蘇州水災可計日而取效也議者或謂曩年吳及知華亭縣常率逐段人户各自治田亦不曽煩費官司而人獲其利今可舉用其法以治蘇州水田不須重煩官司也曰蘇州水田與華亭不同華亭之田地連堽阜無暴怒之流浚河不過一二尺修岸不過三五尺而田已大稔矣然不踰三五年間尚又堙塞今蘇州逺接江湖水常暴怒故崑山常熟吳江三縣隄岸髙者七八尺低者不下五六尺或用石甃或用樁篠或二年一治或年年修葺而風濤洗蕩動有隳壞今若以華亭之法而治之或水退之後一二年間暫獲豐稔蓋不可知求其久逺之效則不可得也夫以華亭之法而治蘇州之髙田則可矣若治蘇州水田譬之以一家之法而治一國也其規模法度則近之至於措置施設之方則小大不可同也貼黃自來人所議欲開通諸天浦盧瀝浦松江諸匯并決水入江隂軍等亦皆治水之一説但隄防未立行之無功候隄防既成之後前項諸説又不可不行蓋水勢湍急却要諸處分減水勢故也故曰治田者先也決水者後也臣今窮究得古人治田之本委可施行若令臣先往兩浙相度不過訂之於諸縣官吏考之於諸鄉父老而已況諸縣官吏乍來倏去固不若臣之生長鄉里世為農人而備知利害也父老之智未必過於范仲淹葉清臣況范仲淹葉清臣尚不能窺見古人治田之迹父老安得而知伏望令臣略到司農寺陳白委不至有誤朝廷候敕旨四論今來乞以治田為先決水為後田既先成水亦從而可決不過五年而蘇州之水患息矣然治田之法若總而論之則瀚漫而難行析而論之則簡約而易治何也今蘇州水田之最合行修治處如前項所陳南北不過一百二十餘里東西不過一百里今若於上項水田之內循古人之迹五里而為一縱浦七里為一橫塘不過為縱浦二十餘條每條長一百二十餘里橫塘十七條每條長一百餘里共計四千餘里每里用夫五千人約用二千餘萬夫故曰總而言之則瀚漫而難行也今且以二千萬夫開河四千里而言之分為五年每年用夫四百萬開河八百里蘇秀常湖四州之民不下四十萬三分去一以為髙田之民自治髙田外尚有二十七萬夫每夫一年借顧半月計得四百餘萬夫可開河八百里却以上項四百餘萬夫分為十縣逐縣每年當夫四十萬開河八十里以四十萬夫分為六箇月逐縣每月計役六萬六千餘夫開河十三里有零以六萬六千夫分為三十日則逐縣每日只役夫二千二百人開河一百三十二步將二千二百人又為兩頭項只役一千一百人開河六十六步雖縣有大小田有廣狹民有衆寡及逐日所開河溝所役夫數多少不同大率治田多者頭項多治田少者頭項少雖千百項可以一頭項盡也臣故曰析而論之則簡約而易治也如是而治之五年之內蘇州與鄰州之水田殆亦盡矣塘浦既浚矣隄防既成矣則田之水必髙於江江之水亦髙於海然後擇江之曲者而決之及或開盧瀝浦皆有功也何則江水湍流故也故曰治田者先也決水者後也江流既髙矣然後又究五堰之遺址而復之使水不入於城是雖有大水不能為蘇州之患也此治水田之大略也港浦以畎引江其旱田則乞用上項一分之夫浚治海之水及設􅓾門以瀦春夏之雨澤則髙低皆治而水旱無虞矣五論乞循古人之遺迹治田者臣昨來所乞蘇州水田一節罷去其某家涇某家濱之類五里七里而為一縱浦七里十里而為一橫塘因塘浦之土以為隄岸使塘浦闊深而隄岸髙厚塘浦闊深則水流通而不能為田之害隄岸髙厚則田自固而水可必趨於江今具蘇州秀州及沿江沿海水田旱田見存塘浦港瀝堽門之數凡臣所能記者總七項共二百六十五條并臣擘畫將來治田大約各附逐項之下謹具下項一具水田塘浦之迹凡四項共一百三十二條一吳松江南岸自北平浦北岸自徐公浦西至吳江口皆是水田約一百二十餘里南岸有大浦二十七條北岸有大浦二十八條是古者五里而為一縱浦之迹也其橫浦在松江之南者臣不能記其名在松江之北六七里間曰浪市橫塘又下北六七里而為至和塘是七里而為一橫塘之迹也松江南大浦二十七條北平浦破江浦艾祈浦愧浦顧匯浦養蠶浦大盈浦南解浦梁乾浦石臼浦直浦分桑浦內薰浦趙屯浦石浦道褐浦千墩浦錐浦張潭浦陸直浦甫里浦浮髙浦塗頭浦順德浦大姚浦破墩浦盞頭浦松江北大浦二十八條徐公浦北解浦瓦浦沈浦蔣浦三林浦周浦顧墓浦金城浦木瓜浦蔡浦下駕浦濱浦洛舍浦楊梨浦新洋浦淘仁浦小虞浦大虞浦馬仁浦浪市浦尤涇浦下里浦戴墟浦上顧浦青丘浦奉里浦任浦松江北橫塘二條浪市橫塘至和塘已上松江塘浦五十七條並當松江之上流皆是闊其塘浦髙其隄岸以固田也只因久不修治遂至隳壞每遇大水上項塘浦之岸並沈在水底不能固田議者不知此塘浦元有大岸以固田乃謂古人浚此大浦只欲泄水此不知治田之本也臣今擘畫並當浚治其浦修成隄岸以禦水災不須逺治他處塘浦求決積水而田自成矣一至和塘自崑山西至蘇州計六十餘里今其南北兩岸各有大浦十二條是五里而為一縱浦之迹也其橫浦南六七里而有浪市塘是也其北皆為風濤洗刷不見其迹臣前所謂至和塘徒有通往來禦風濤之小功而無衛民田去水患之大利者謂至和塘南北縱浦橫塘皆廢故也謹具下項至和塘南大浦十二條小虞浦大虞浦尤涇浦新瀆浦平樂浦戴墟浦真義浦朱塘浦界浦鳯凰涇任浦蠡塘至和塘北大浦十二條小虞浦大虞浦尤涇浦髙墟浦雍里浦諸昌涇界浦任浦上雉瀆下雉瀆蠡塘官瀆橫塘在南者曰浪市塘已具松江項內更不再出在北者皆廢已上至和塘兩岸塘浦二十四條在塘北者今猶有其名而或無其迹在塘南者雖存其迹而並皆狹小斷