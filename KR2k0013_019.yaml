而治田之法也其低田則闊其塘浦髙其隄岸以固田其髙田則深浚港浦畎引江海以灌田後之人不知古人固田灌田之意乃謂低田髙田之所以闊深其塘浦者皆欲決泄積水也更不計量其逺近相視其髙下一例擇其塘浦之尤大者十數條以決水其餘差小者更不浚治及興工役動費國家三五十萬貫石而大塘大浦終不能泄水其塘浦之差小者更不曽開浚也而議者猶謂此小塘小浦亦可泄水以致朝廷愈不見信而大小塘浦一例更不浚治積歲纍年而水田之隄防盡壞使二三百里肥腴之地槩為白水髙田之港浦皆塞而使數百里沃衍潮田盡為荒蕪不毛之地深可痛惜臣竊思之上項塘浦既非天生亦非地出又非神化是皆人力所為也然自國朝統御已來百餘年間除十數條大者間或浚治外其餘塘浦官中則不曾浚治今當不問髙低不拘大小亦不問可以決水與不可以決水但係古人遺迹而非私濱者一切併合公私之力更休迭役旋決修治係低田則髙作隄岸以防水係髙田則深浚港浦以灌田其􅓾身西流之處又設斗門或􅓾門或堰閘以瀦水如此則髙低皆治而水旱無憂矣後二項非要切不録亶之書甚多今獨摘其要者録于此亶既纍上其説五年九月許詣司農寺陳白寺以其説上聞詔以亶為司農寺丞提領兩浙路興修水利六年亶以其説鏤板遍下州縣許諸色人者詳合議焉初亶言蘇州水利其書與圖大抵以為環湖之地稍低常多水沿海之地稍髙常多旱故古人治水之迹縱則有浦橫則有塘又有門堰涇瀝而碁布之亶所能記者總二百六十餘所今欲略循古人之法七里為一縱浦十里為一橫塘又因出土以為隄岸度用十萬夫水治髙田旱治下澤要以三年而蘇之田治矣朝廷始得亶書以為可行遂真除司農寺丞令提舉興修亶至蘇興役凡六郡三十四縣比户調夫同日舉役轉運提刑皆受約束民以為擾多逃移會吕惠卿被召言其措置乖方熙寧元年正月一日有旨郟亶修墟未得興工官吏所見不同各具利害奏聞人皆歡然十三日庭下方張燈吏民二百餘人交入驛庭喧閧斥罵燈悉蹂踐驛門亦破亶幞頭墮地一小兒在旁亦為人所擊前此方盡遣諸縣令出郊標遷墟地至是諸令鳴鐃散衆遂罷役亶追司農寺丞送吏部流內銓水利下亶既沒其子將仕郎僑又嗣緝其説因歲事亦有所建眀今亦録其大略僑書大略云浙西昔有營田司自唐至錢氏時其來源去委悉有隄防堰閘之制旁分其支脈之流不使溢聚以為腹內畎畝之患是以錢氏百年間歲多豐稔唯長興中一遭水耳暨納土之後至于今日其患方劇蓋由端拱中轉運使喬維嶽不究隄岸堰閘之制與夫溝洫畎澮之利姑務便於轉漕舟楫一切毁之初則故道猶存尚可尋繹今則去古既久莫知其利營田之局又謂間司冗職既已罷廢則隄防之法疏決之理無以考據水害無已至乾興天禧之間朝廷専遣使者興修水利逺來之人不識三吳地勢高下與夫水原來厯及前人營田之利皆失舊聞受命而來恥於空還不過遽採愚農道路之言以為得計但以目前之見為長久之策指常熟崑山枕江之地為可導諸港而決之江開福山茜涇等十餘浦殊不知古人建立隄堰所以防太湖泛溢淹沒腹內良田今若就東北諸渚決水入江是導湖水經由腹內之田瀰漫盈溢然後入海所以浩渺之勢常逆行而瀦於蘇之長洲常熟崑山常之宜興武進湖之烏程歸安秀之華亭嘉興民田悉已被害然後方及北江東海之港浦又以水勢之方出於港浦復為潮勢抑回所以皆聚於太湖四郡之境當潦歲積水而上源不絶瀰漫不可治也此足以驗開東北諸渚為謬論矣又況太湖蓋積十縣之水一水自江南諸郡而下出嶺阪重復間當其霖潦積貯溪澗奔湍迤邐而至長塘湖又潤州之金壇延陵丹陽丹徒諸邑皆有山源併會於宜興以入太湖一水自杭睦宣歙山源與天目等山衆流而下杭之臨安餘杭及湖之安吉武康長興以入太湖即古所謂震澤也昔禹治水凡以三江決此一湖之水今則二江已絶唯吳松一江存焉疏泄之道既隘於昔又為權豪請占植以菰蒲蘆葦又於吳江之南築為石塘以障太湖東流之勢又於江之中流多置罾斷以遏水勢是致吳江不能吞來源之瀚漫日淤月澱下流淺狹逮元符初遽漲潮沙半為平地積雨滋久十縣山源併溢太湖當蘇湖常秀之間陂淹浦港悉皆瀰漫四郡之民惴惴然有為魚之患凝望廣野千里一白少有風勢駕浪動輒數尺雖有中髙不易之地種巳成實頃刻蕩盡此吳民畏風甚於畏雨也吳松古江故道深廣可敵千浦向之積潦尚或壅滯議者但以開數十浦為䇿而不知臨江濵海地勢髙仰徒勞無益愚今者所究治水之利必先於江寧治水陽江與銀林江等五堰體勢故迹決於西江潤州治丹陽練湖相視大岡尋究函管水道決於北海常州治宜興隔湖沙子淹及江隂港浦入北海以望亭堰分屬蘇州以絶常州輕廢之患如此則西北之水不入太湖為害矣又於蘇州治諸邑限水之制闢吳江之南石塘多置橋梁以決太湖會于青龍華亭而入海仍開浚吳松江官司以鄰郡上户熟田例敷錢糧於農事之隙和雇工役以漸闢之其諸江湖風濤為害之處並築為石塘及於彭匯與諸湖瀼等處尋究昔有江港自南涇北以漸築為隄岸所在陂淹築為水堰秀州治華亭海鹽港浦仍體究枯湖澱山湖等處向因民户有田髙壤障遏水勢而疏決不行者並與開通達諸港浦杭州遷長河堰以宣歙杭睦等山源決于浙江如此則東南之水不入太湖為害矣此前所謂旁分其支脈之流不為腹內畎畝之患者此也水為東南患其來久矣獻其端者大抵二説一則以導青龍江開三十浦為説一則以使植利户浚涇濱作墟垾為説是二者各得其一偏未容俱是何以言之若止於導江開浦則必無近效若止於浚涇作垾則難以禦暴流要當合二者之説相為首尾乃盡其善但施行先後自有次第耳必不得已欲兩者兼行以規近效亦有其説若欲決蘇州湖州之水莫若先開崑山縣之茜涇浦使水東入於大海開崑山之新安浦顧浦使水南入於松江開常熟縣之許浦梅里浦使水北入於揚子江復浚常州無錫縣界之望亭堰俾蘇州管轄謹其開閉以遏常潤之水則蘇州等水患可漸息而民田可治矣若欲決常州潤州之水則莫若決無錫縣之五卸堰使水趨於楊子江則常州等水患可漸息而民田可治矣世之言水利者非不知此然開浦未久而汙泥尋塞決堰未多而良田被患何也蓋雖知置堰閘以防江潮而不知浚流以泄沙漲故有堙塞之患雖知決五卸堰水而不知築隄以障民田故有飄溺之虞且復一於開浦決堰而不知勸民作墟垾浚涇濱以治田是以不問有水無水之年蘇湖常秀之田不治十常五六愚故曰要當合二者之説相為首尾則可盡其善某所乞開崑山常熟縣之茜涇等浦必置堰閘者且以茜涇浦在蘇州之東南去海止二十里泄水甚徑然其地浸髙比之蘇州及崑山縣地形不啻丈餘而往年開此浦者但為文具所開不過三四尺一二尺而已又止於以地面為丈尺而不知以水面為丈尺不問髙下而勻其淺深欲水之東注不可得也水既不東注兼又浦口不置堰閘賺入潮沙無上流水勢可衝遂致浦塞愚故乞開茜涇等浦須置堰閘所以外防潮之漲沙也或聞范參政仲淹葉內翰清臣昔年開茜涇等浦亦皆有閘但無官司管轄而豪強耆保利於所得不時啓閉遂致廢壞鄉人往往能道其事若推究而行之則所開之浦可久而無弊某所乞復常州無錫縣界望亭堰閘俾蘇州管轄者蓋以常潤之地比蘇州為差髙而蘇州之東勢接海岸其地亦髙蘇州介於兩髙之間故每遇大水西則為常潤之水所注東則為大海岸道所障其水瀦蓄無緣通泄若不令蘇州管轄望亭堰閘則無復有防遏之理故愚先乞開茜涇等浦以決水有東流之便次乞謹守望亭閘俾水無西衝之憂至望亭之西自有五卸堰可以決水徑入於北江若使常潤之水決下此堰則不唯少舒蘇州之水勢而常潤之水亦自可以就近順流而入於江矣某所乞決常州無錫縣界之五缷堰使水北入於楊子江者此堰決水其勢甚徑往者官吏非不施行然決堰未多而民田已沒何也蓋止知決堰而不知預築堰下民田之隄岸以防水勢故也五卸地形與民田相去幾及丈餘平居微雨水即溢堰而過已有浸溺之憂今直欲決去其堰使諸路之水舉自此而出又不曽髙其民田墟岸以為隄防則決堰未多而民田已沒某嘗論天下之水以十分率之自淮水而北五分由九河入海書所謂同為逆河入于海是也自淮而南五分由三江入海書所謂三江既入震澤底定是也而三江所決之水其源甚大由宣歙而來至于浙界合常潤諸州之水鍾於震澤震澤之大幾四萬頃導其水而入海止三江爾二江巳不得見今止松江又復淺淤不能通泄且復百姓便於已私於松江古河之旁多開溝港故上流漫出之水不能徑入于海支分派别自三十餘浦北入吳郡界內即先父比部水利奏中所謂向欲導諸江者復南而北矣雖於崑山常熟兩縣開導河浦修築墟垾然上流不息諸水輻湊或風濤間作或洪雨繼至所開浦河必皆壅滯所築墟垾必有衝蕩蓋沿江北岸三十餘浦唯鹽鐵一塘可直瀉水北入揚子江外其餘皆接連于江湖瀼合而為一非徒無益為害大矣今乞措置一面開導河浦即便相度松江諸浦除鹽鐵塘及大浦開導置閘外其餘小河一切並為大堰或説水竇以防江水即吳松江水徑入東海而吳之河浦不為賊水所壅諸縣墟垾亦免風波所破某聞錢氏循漢唐法自吳江縣松江而東至于海又沿海而北至于揚子江又沿江而西至于常州江隂界一河一浦皆有堰閘所以賊水不壅久無患害嘗考漢晉隋唐以來地里志今之平江乃古吳郡至隋平陳始置蘇州漢時封境甚濶隋開皇中始移於橫山下唐正觀中復徙於闔閭舊城而今湖州乃隋時仁夀中於蘇之烏程縣分置秀州乃五代晉時吳越王以蘇之嘉興縣分置所謂錢塘毗陵在古皆吳之屬縣以地勢卑下沿江邊海有為隄岸以防遏水勢如唐志所載秀州之海鹽令李諤開古涇三百有一而又稱去縣西北六十里有漢塘太和中再開疑即僑今所謂開鹽鐵塘以泄吳松江水者也又載杭州之餘杭今歸某築甬道髙廣徑直百餘里以禦水患又載杭州鹽官縣亦有捍海塘隄二百十四里即知古人治平江之水不専於河而築隄以遏水亦兼行之矣故為今之䇿莫若先究上源水勢而築吳松兩岸塘隄不唯水不北入於蘇而南亦不入於秀兩州之田乃可墾治今之言治水者不知根源始謂欲去水患須開吳松江殊不知開吳松江而不築兩岸隄塘則所導上源之水輻湊而來適為兩州之患蓋江水溢入南北溝浦而不能徑趨於海故也儻效漢唐以來隄塘之法修築吳松江岸則去水之患已十九矣震澤之大才三萬六千餘頃而平江五縣積水幾四萬頃然非若太湖之深廣瀰漫一區也分在五縣逺接民田亦有髙下之異淺深之殊非皆積水不可治也但與田相通極目無際所以風濤一作回環四合無非水者既非全積之水亦有可治之田瀦瀉之餘其淺淤者皆可修治永為良田況五縣積水中所謂湖瀼陂淹若湖則有澱山湖練湖陽城湖巴湖昆湖承湖尚湖石湖沙湖瀼則有大泗瀼斜塘瀼江家瀼百家瀼鰻瀼蕩則有龍墩蕩任周蕩傀儡蕩白坊蕩黃天蕩鴈長蕩淹則有光福淹尹山淹施墟淹赭墩淹金涇淹眀社淹僅三十餘所雖水勢相接略無限隔然其間深者不過三四尺淺者一二尺而巳今乞措置深者如練湖大作隄防以匱其水復於隄防四傍設為斗門水瀨即大水之年足以瀦蓄湖瀼之水使不與外水相通而水田之墟垾無衝激之患大旱之年可以決斗門水瀨以浸灌民田而旱田之溝洫有車畎之利其餘若斜塘瀼大泗瀼百家瀼之類深不過三四尺淺止一二尺而已本是民田皆可相視分勒人户借貨錢糧修築墟垾開導涇濱即前所謂湖瀼三十餘處者往往可治者過半矣某聞江南有萬春墟吳有陳滿塘皆積水之地今悉治為良田坐收苗賦以助國用郟氏再世有水利之學雖不能為必可行然用心甚専為説甚詳故録之以備論議者之參稽焉元祐中宜興人單諤作陽羡風土記専論單子發荆溪吳中水利其説本専為荆溪橫塘百瀆之塞以及於松江震澤之水勢其略謂荆溪受宣歙蕪湖江東數郡之水行四十五里至震澤古人以溪流不足以勝數郡奔注之勢復於震澤之口開瀆百條各有地分之名而總謂之百瀆又開橫塘瀆一條綿亘四十里以貫百瀆而通瀕湖諸鄉阡陌之水蓋橫塘直南北以經之百瀆直東西以緯之既分荆溪之流下震澤由震澤入太湖抵松江由江入海是以昔年未嘗有水患而震澤亦不為吳中害今荆溪受數郡之水不少減而百瀆橫塘大半堙塞又蘇湖常三州之水瀦為太湖由松江以入海慶厯二年以松江風濤漕運多敗官舟遂接續築松江長隄界於江湖之間隄東則江隄西則湖江之東即大海隄橫截江流五六十里震澤受吳中數郡之水乃遏以長隄雖時有橋梁而流勢不快又自松江至海浦諸港復多沙泥漲塞茭蘆叢生隄傍亦沙漲為田是以三春霖雨則蘇湖常秀皆憂瀰漫雖增吳江一邑之賦顧三州逋失者不資今欲泄太湖之水莫若先開江尾茭蘆之地遷沙村之民運其漲泥鑿吳江隄為木橋千所以通陸行隨橋硔開茭蘆為港走水仍於下流開白蜆安亭二江使太湖水由華亭青龍以入海則三州無水患又以陽羡言之臨江數里皆民廬墓今皆在風波浩渺中矣風靜水澄樹根磚石畢見官能於農隙率清泉祠山君山三鄉瀕湖植利人户尋百瀆與橫塘舊界牌分力開通遇歲大水則可疏荆溪交合之流順注震澤若歲大旱則可引百瀆及橫塘之水灌溉民田雖有水旱豈能侵歲哉諤又有書名荆溪集亦載此説時蘇文忠公在翰苑奏其書請行之弗果政和六年四月御筆訪聞平江府三十六浦自古置閘隨潮啓閉歲久堙塞遂致積年為患仰莊徽差户曹趙霖具逐浦經久利害破驛劵遞馬赴尚書省指説徽郡守也霖相度之説曰平江逐縣地形水勢利害各不相侔蓋浙西六州之地平江最為低下六州之水注入太湖太湖之水流入松江接青龍江東入于海而平江地勢自南自北至常熟縣之半自東止崑山縣地西南之半水與太湖松江水面相平皆是諸州所聚之水泛濫其中平江之地雖下於諸州而瀕海之地特髙於他處謂之堽身堽身之西又與常州地形相等東西與北三面勢若盤盂積水南入注乎其中所以自古沿海環江開鑿港浦者藉此疏導積中之水由是以觀則開治港浦不可不先也港浦既巳浚則必講經久不堙塞之法今瀕海之田懼鹹潮之害皆作堰壩以隔海潮裏水不得流外沙日以積此崑山諸浦堙塞之由也堽身之民每闕雨則恐裏水之減不給灌溉悉為堰壩以止流水臨江之民每遇潮至則於浦身開鑿小溝以供巳用亦為堰斷以留餘潮此常熟諸浦堙塞之由也法當置閘然後可以限水之內外可以隨潮而啓閉浦既已開閘既已置而太湖松江之水與積水為一派沈沒民田者一遇風作則髙浪萬頃愈泄愈來縱使諸浦瀉之泄之涓涓來之浩浩當斯之時障之不可疏之不可為之計者莫若順其性而狹其流乃為上䇿所謂上䇿者大築墟岸髙圍民田而已如此則積水日削衆浦日耗矣大抵三説一曰開治港浦二曰置閘啓閉三曰築墟裹田三者闕一不可又各有先後緩急之序其開浦篇曰髙田引以灌溉低田導以決泄者浦也古人大小縱橫設為港浦若經緯然按圗於舊得九十處或名港浦或名涇濱或謂之塘或謂之漕以詢究古迹得其為利之大者三十六浦區為三等上等工大而利博在前所先也中等工費可減上等三之二下等間於上中之間或自大浦而分枝别派工料之數又少損焉其置閘篇曰瀕海臨江之地形勢髙仰古來港浦盡於地勢髙處淤澱若一旦頓議開通地理遙逺未易施力以拒鹹潮今於三十六浦中尋究得古曽置閘者才四浦惟慶安福山兩閘尚存餘皆廢棄故基尚存古人置閘本圗經久但以失之近裏未免易堙治水莫急於開浦開浦莫急於置閘置閘莫利於近外若置閘而又近外則有五利焉江海之潮日兩漲落潮上灌浦則浦水倒流潮落浦深則浦水湍瀉逺地積水早潮退定方得徐流幾至浦口則晚潮復上元未流入江海又與潮俱還積水與潮相為往來何緣減退今開浦置閘潮上則閉潮退即啓外水無自以入裏水日得以出一利也外水不入則泥沙不淤於閘內使港浦常得通利免於堙塞二利也瀕海之地仰浦水以溉髙田每苦鹹潮多作堰斷若決之使通則害苗稼若築之使塞則障積水今置閘啓閉水有泄而無入閘內之地盡獲稼穡之利三利也置閘必近外去江海止可三五里使閘外之浦日有澄沙淤積假令歲事浚治地里不遠易為工力四利也港浦既巳深闊積水既巳通流則泛海浮江貨船木筏或遇風作得以入口住泊或欲住賣得以歸市出卸官司遂可以閘為限拘收稅課以助歲計五利也復有二説崑山諸浦通徹東海沙濃而潮鹹當先置閘而後開浦一也閘之側各開月河以堰為限遇閘閉小舟不阻往來二也築墟篇曰天下之地膏腴莫美於水田水田利倍莫盛於平江緣平江水田以低為勝昔之賦入多出於低鄉今低鄉之田為積水漫沒十巳八九當時田墟未壞水有限隔風不成浪今田墟殆盡水通為一遇東南風則太湖松江與崑山積水盡奔常熟遇西北風則常熟之水東赴者亦然正如盛盂中水隨風往來未嘗停息嘗陟崑山與常熟山之巔四顧水與天接父老皆曰水底十五年前皆良田也今若不築墟岸圍裹民田車畎以取水底之地是棄良田以與水也況平江之地低於諸州唯高大墟岸方能與諸州地形相應昔人築墟裹田非謂得以播殖也將恃此以狹水之所居耳崑山去城七十里通往來者至和塘也常熟去城一百五里通往來者常熟塘也二塘為風浪衝擊塘岸漫滅往來者動輒守風往往有覆舟之虞是皆積水之害今若開浦置閘之後先自南鄉大築墟岸圍裹低田使位位相接以禦風濤以狹水源治之上也修作至和常熟二塘之岸以限絶東西往來之水治之次也凡積水之田盡令修築墟岸使水無所容治之終也昨聞熙寧四年大水衆田皆沒獨長洲尤甚崑山陳新顧晏陶湛數家之墟髙大了無水患稻麥兩熟此亦築岸之驗目今積水之中有力人户間能作小塍岸圍裹已田禾稼無虞蓋積水本不深而墟岸皆可築但民頻年重困無力為之必官司借貨錢榖集植利之衆併工戮力督以必成或十畝或二十畝地之中棄一畝取土為岸所取之田令衆户均價償之其貨借錢榖官為置籍責以三年六限隨稅輸還此治積水成始成終之䇿若其當開之浦則崑山常熟共三十六浦除常熟之許浦及白苑福山二浦見今深闊水勢通快不須開治餘三十三浦崑山十有一謂掘浦下張浦七丫浦茜涇浦楊林浦六鶴浦顧涇浦川沙浦五嶽浦蔡浦琅港浦常熟二十有二謂黃泗浦奚浦西陳浦東陳浦水門塘崔浦耿涇浦魚磹浦塢溝浦瓦浦塘浦髙浦金涇浦石撞浦陸河浦北浦甘草浦千步涇司馬涇金涇錢涇黃鶯漕皆積久不浚當分為三等開修霖既上其説是歲九月奉御筆差趙霖充兩浙提舉常平前去本路措置興修積水其開浦置閘工料依元相度檢計逐旋開治更不候保眀先次施行去農隙月分不遠趙霖更不引見上殿疾速發赴新任水患日久占壓良田甚多一方受弊應有前後違礙並依今來指揮合用錢米并辟官置司等令趙霖速具畫一聞奏奏報並入急遞於入內內侍省投進仍差童師敏充承受奏報文字霖既受任復條具事目以聞悉依御筆違者以違御筆論諸路監司州縣如有稽慢闕誤以違制論其合用錢米越州鑑湖封椿米支撥十萬石借支本路諸州常平本錢十萬貫如闕則以常平米及常平封椿錢貼支并降空名度牒二千道出賣承信承節將仕郎官告各五十道其命詞並以興修水利為名别立價直將合用工料召有力户備錢米官為募夫監部開修候畢工計實用錢米紐直給告或給空名許令變賣並與免勘會有無違礙書填仍不作進納出身就平江置局所奏辟官不拘常制直牒指差理為在任月日不許辭免內選人考第舉官合格水利職事未畢未得赴部磨勘依方田官法就任改官幹當公事文武官各四員準備差遣檢踏官共四員所用材料木植専辟使臣三員分往淮南江南路及溫處等州收買并辟置監轄造堰閘官俵散錢糧巡視催促檢覆工料官點檢醫藥飲食官等貟其差辟官屬其間有才吏理須旌别以示勸奬特於提舉常平司歲舉官數外改官從事郎一員縣令二員武臣升陟二員積水之地正在崑山常熟兩縣各權暫添差縣丞一員今來開修平江諸浦緣常湖秀等州水勢會聚以成積水據所役人夫先於平江府諸縣雇募如闕即分那下常湖秀州雇募霖以宣和元年正月二十一日役夫興工前後修過一江一港四浦五十八瀆修築常熟塘岸一條隨岸開塘至宣和二年八月初十日罷華亭縣青龍江自白鶴匯開修至艾祁塘口長十三里面闊十五丈底闊九丈深一丈二尺通役六十一萬二千八百餘工江隂縣黃田港自摖拄橋開修至港口閘長二十里有畸面闊六丈五尺底闊三丈深七尺通役六萬四千八百工崑山縣茜涇浦自太倉塘斂口開修至青堽坊北長三十四里有畸面闊八丈底闊四丈八尺深七尺通役三十一萬工堀浦自上源開修接至練祈塘長十二里有畸面闊三丈底闊二丈四尺深三尺五寸通役二萬三千五百餘工常熟縣崔浦自陳家莊開修至雉浦塘口出梅里塘長二十三里有畸面闊八丈底闊四丈八尺深七尺通役二十一萬四千七百餘工黃泗浦連小山浦開修至湖口長七十里有畸面闊八丈底闊四丈八尺深七尺通役十二萬六千九百餘工宜興縣開修百瀆五十八條長六十二里十七丈面闊二丈五尺止一丈底闊一丈七尺止九尺各深五尺通役十萬一千一百餘工築常熟塘岸一條長六十二里有畸其已築岸一萬三百七十五丈通役三十二萬九千八百餘工未了一千一百五十九丈常熟縣界岸長四千七百三十一丈已築三千五百七十二丈通役三萬二百餘工未了一千一百五十九丈長洲縣界岸長六千八百三丈並已築了通役十九萬九千六百餘工隨岸開淘府塘一條長九千一百五十丈紐五十里有畸面闊八丈底闊五丈深八尺通役六十四萬一千二百餘工宣和元年十月四日御筆訪聞平江府常熟縣常湖秀州華亭泖並可為田仰趙霖相度措置召租限一季了當具便民利害圗籍歲入以聞霖又應詔為之修圍常湖通役二十四萬七千九百餘工修築錢涇口止藕蕩村大岸長五百八十二丈腳闊一丈五尺面闊一丈二尺髙六尺開修張墓塘北徹小山浦長五百四十二丈面闊六丈底闊四丈深六尺開修山塘涇自小山浦口止本縣市河長二千八十一丈面闊六丈底闊四丈深六尺開修顔家涇徹入小山浦長一千二百七丈面闊三丈底闊一丈五尺深七尺創造小山浦口啓閉泄放水勢斗門二所又圍裹華亭泖通役八萬三千七百六十五工楊泖中心開河三條共長九百四十八丈各闊十丈水深三尺隨河兩畔築岸髙闊六尺顧亭泖心開十字河共長一千五百二十九丈五尺闊七丈水深四尺隨河兩畔築岸髙闊各六尺止七尺及開陸家港小河長二百丈闊四丈水深三尺築岸髙闊六尺宣和二年八月十一日詔旨罷役勾收人吏送平江府右獄根磨錢物通支錢四十一萬五千八百五十三貫九百二十一文係度牒官誥坊場市易抵當等名色十九種焉吳郡志卷十九
