body:
  text: 吳郡志巻四十宋范成大撰仙事後漢中散大夫王逺字方平既得道東欲入括蒼山過吴住胥門蔡經家經小民也逺以其骨相當仙語經曰汝應得度世然汝少不知道氣少肉多當為尸解如從狗竇中過耳告經以要言而去經後忽身發熱如火汲水灌之如沃焦石如此三日銷耗骨立乃入室以被自覆忽然失之視其被内唯有皮頭足具如蟬蛻也去十餘年忽還家容色少壯語家人曰七月七日王君當来可多作飲食以供從官至日經家乃借瓮器作飲食百餘斛羅列庭中是日王君果来未至先聞金鼔簫管人馬之聲及逺至舉舍皆見逺冠逺遊冠朱衣虎頭鞶囊五色綬帶劍黄色少髭長短中形人也乗羽車駕五龍各異色前後麾節幡旗導從威儀奕奕如大将軍從官皆隠不知所在唯獨見逺坐爾引見經父母兄弟因遣人召麻姑亦莫知麻姑是何神也言曰王方平敬報久不到民間今来在此想姑能暫来語否須臾信還不見其使但聞其語曰麻姑再拜比不相見忽巳五百餘年尊卑有序拜敬無階煩信承来在彼食頃即到先受命當按行蓬莱今便暫往如是當還還便親覲碩未即去如此兩時間麻姑来亦先聞人馬聲既至從官半於逺蔡經亦舉家見之是好女子年可十八九許於頂上作髻餘髮散垂至腰衣有文綵又非錦綺光彩曜日不可名狀入拜逺逺為之起立坐定各進行厨皆金盤玊杯餚膳多是諸花香氣達於内外擘脯行之云麟脯也麻姑自説云接侍巳来巳見東海三為桑田向到蓬莱水又淺於往日㑹時略半豈将復為陵陸乎逺笑曰聖人皆言海中行復揚塵也麻姑引見蔡經母及婦等時經弟婦新産數十日姑見知之曰噫且止勿前即以少許米擲之以祛其穢視其米皆成丹砂逺笑曰姑故年少吾老矣不喜復作如此狡獪變化也逺語經家人曰吾欲賜汝輩美酒此酒乃出天厨其味醇醲非俗人所宜飲飲之或能爛腸今當以水和之勿怪也乃以斗水合升酒攪之以賜經家人人飲一升許皆醉良久酒盡逺遣左右曰不足復還取也以千錢與餘杭姥相聞求其酤酒須臾信還得一油囊酒五斗許信𫝊餘杭姥答言恐地上酒不中尊飲耳麻姑手爪似鳥經心中念曰背大癢時得此爪以爬背當佳也逺巳知經心中所言即使人牽經鞭之謂曰麻姑神人也汝何忽謂其爪可爬背耶但見鞭着經背亦莫見有人持鞭者逺告經曰吾鞭不可妄得也經比舍有姓陳者失其名甞罷縣尉聞經家有神人乃詣門求見逺使引前與語陳便欲随從驅使比於蔡經逺令向日而立從後觀之曰噫君心邪不正未可敎以仙道當授君地上主者之職司以一符并一𫝊着小箱中與陳曰此不能令君度世止能存君本夀自出百嵗可以禳灾治病病者命未終及無罪者君以符到其家便愈矣若邪鬼求食作祟禍者便以𫝊勅吏遣其鬼君心中亦當知其輕重臨時以意治之陳以此符治病有効夀一百一十嵗而死死後子弟行其符不復驗矣逺去後經家所作飲食數百斛皆盡亦不見有人飲食也經父母私問經曰王君是何神人居何處經曰常在崑崙山往来羅浮括蒼等山山上皆有宫室主天曺事一日之中與天上相反覆者十數過地上五岳生死之事皆先来告王君王君出或不盡将百官從行唯乗一黄麟将十數侍人毎行常見山林在下去地數百丈所到則山海之神皆来迎謁其後十數年經復暫歸家逺有書與陳尉真書廓落大而不工先是人無知方平名逺者因此乃知之陳尉家于今世世存録王君手書并符𫝊於小箱中神仙𫝊乂吳地記云經幼學𤣥老工方術變水成玉變石成金服水玉得真仙今吴縣有蔡仙鄉郎宗字仲綏少仕為吴縣令學精道術占候風氣後一旦有暴風經窗間占知京師大火燒大夏門遣人往㕘果爾諸公聞之以博士召宗宗恥以占卜進夜解印綬負笈遯去居華山下服胡麻後得道今在鹿跡山洞真誥李崇吴郡人少好道林屋仙人王瑋𤣥授之以流珠丹之法曰子行此道亦可以出身仕宦無妨仙舉崇遂仕稍至宛陵令虎狼避去蝗不入境累遷汝南太守拔書佐袁安安後位至司徒時人服其識鑒身享重官妻自紡績明帝奇之加秩中二千石在郡十四年政化為天下最年七十四瑋𤣥授以隠解法去入大霍山又受瑋𤣥遁化泥丸紫户術以度世今在華陽洞中為左理中監准太府長史云瑋𤣥楚荘王時人也真誥晉楊羲者吳人好學沈厚與許先生遁許長史謐結神明之交甞為公府舍人興寧三年羲年三十六衆真降焉自東嶽上真司命君等二十三人又自太和靈嬪上真左夫人等女真十五人毎旬輙數人同降髙談道㣲幽指藥妙楊及二許更受其詞捉筆為書是嵗六月十五日夜紫㣲王夫人與一神女俱来紫㣲謂羲曰此太虛上真元君金臺李夫人之少女紫清上宫九華真妃者也賜姓安成名鬱嬪字虛簫真妃又謂羲曰我昔學真於龜臺受玉章虎録為上真妃遊行玉清非不能訪搜紫童友于帝郎也直推㡬任㑹應度歴數欲求氏族於眀君非有邪也君夷質虛閑幽真内煥必翊贊帝躬髙佐四輔理生斷死互察隂陽妾當助君綜御萬神尊制東蕃君将乗龍駕雲白日昇天此自元徳上挺太極所旌不復用懃學劬勞也今人居風塵間乃多罪之下鬼趣死之朽質君奚必汲汲於人間之貴賤投身榮辱之肆哉且方交兵日㑹三灾向臻褰衣逺逸是其時也自後數日即衆真一降所授詩章道要羲及二許所筆授者甚多華陽陶洪景論次為書號曰真誥真誥沈羲吴郡人學道能消灾治病未甞餌藥物也羲與妻賈共載路逢白鹿青龍白虎車各一乗從騎滿道問羲曰君是沈羲否羲愕曰是矣騎人曰羲有功於民心不忘道少小以来履行無過今年夀将盡黄老遣仙官下迎侍郎薄延垂乗鹿車者是度世君司馬生乗青龍車者是迎使者徐福乗白虎車者是即有三仙人羽衣持節以白玊簡青玉冊丹玉字授羲羲不能識遂載羲羲昇天時道間鉏田者皆共見之忽大霧不解失所在惟見羲所乗車牛入田食苗或以告羲家子弟恐羲為邪鬼所魅布人於百里之内徧索不得後四百餘年忽還鄉里惟求得數世孫懐喜懐喜曰聞先人説家有仙人今其歸邪留數十日具言初昇天時不得見帝但見老君東向坐宫殿鬱鬱如雲氣侍者數百人多女子庭中有珠玉樹衆芝叢生龍虎成羣遊戱其間聞琅琅如銅鐡聲不知何等四壁熠熠有符書著之老君身形略一丈被髮文衣體有光耀須臾數玉女持金盤玉杯来賜羲曰此是神丹飲者不死夫婦各一杯夀萬嵗又賜棗二枚大如雞子脯五寸遺羲曰暫還人間治民疾苦欲上来書此符著竿杪吾當迎汝乃以一符及仙方一首賜羲羲奄忽如寐巳在地上世多得其符驗云出神仙𫝊魏伯陽吳人本髙門之子好道術與弟子三人入山作神丹既成謂其弟子曰丹雖成宜以犬甞試之犬飛則可服乃與白犬犬斃伯陽曰作丹唯恐不成今既成而殺犬恐未當神明之意餌之将復如犬奈何弟子曰先生當餌之否伯陽曰吾背違世路棄家而来今不得仙亦恥復返死生皆當餌之乃服丹入口即死弟子有姓虞者曰吾師非常人服此而死得無意乎復取丹餌之亦死餘二人相謂曰所以為丹者欲長生耳今乃趣死将焉用之不服此藥自可更得數十嵗遂相與出山方為伯陽及死弟子求木以斂二子去後伯陽即起以所服丹内死弟子及白犬口中須臾皆起仙去道逢伐木者乃作手書寄謝鄉里人及二弟子伯陽作㕘同契五行相類凡三巻其說似周易其實假借爻象以論作丹之意而世之儒者不知神丹之事多作隂陽注之殊失其㫖矣負局先生者負磨鏡局循吳市中得一錢便輒問主人得無有疾苦否若有輒出紫丸藥以與之服者皆愈列仙𫝊隋周隠遥洞庭山道士自云甪里先生之孫山上有其祖甪里廟甪里村言其數世得道隐遥學太隂鍊形死於崖窟中囑弟子曰檢視我尸勿令他物相干六年後更生當以衣裳迎我弟子守視初甚臭穢蟲壊唯五藏不變如言閉䕶之至期往視身巳全起坐弟子備湯沐以新衣迎歸髮鬒而黑髭麤而直若獸鬛焉十六年又死如前更七年復生如是三度已四十餘年且八十嵗狀貌如三十許人隋煬帝召至東都尋懇還本郡唐貞觀中召至長安館於内殿問修習之道對曰臣所修者匹夫之事功不及物帝王一言之利萬國䝉福得道之効速於臣人區區所學非萬乗所宜問也復求歸山詔遂其所適出仙𫝊拾遺唐令狐楚周先生住山記云先生姓周氏名隠遥字息元宗其道者相號為太𤣥先生汝南人也抱天和沖澹之氣含至精潔朗之質玉泠泉潤松髙鶴閑韜精守道冥得真契谷神既存而長守𤣥關無鍵而不開貞元初游蘇州吴縣之包山林屋洞秋八月始於洞西得神景觀訊其居者曰距此數里世𫝊毛公塢毛公道成羅浮居山三百餘嵗有弟子七十二人聚石為壇遺址猶存爾能勤求吾請以導既行而蘿篠迷密不知所往先生冥目久之逢一物焉雙眸盡碧毛色紫而本白髙數尺餘随而行之視乃鹿也須臾乃跪止若有所告先生黙記之而還至十九年冬刜木鬋茅奠厥攸居得異石一方上有蟲篆驗之即毛公鎮地符也既而鑿户牖以為竇有鶴銜㺯冠裳戯舞于庭砌後得一井香白滑甘溢為白泉其傍得古池焉深廣袤丈陽驗隂伏湛如也初先生甞息于洞之南門中神化慌惚往往失其所在遇好風日亦来人間将至必先之以雲鶴其弟子洒掃香室俄而至矣嗟乎先生之體同乎無體矣不以晝夜更動息不以寒暑易纎厚不食而甚力走及奔馬全乎氣者也雖飲而無漏止如靈龜外乎形者也鹿以導步神柔異物也符以存視道契先躅也井泉去癘昭乎仁也池水不枯齊其慮也仙雲靈鶴之驗去来髣髴之状其必神行而智知乎予叔服膺先生之門二紀于兹録先生本起見命為記凝神遐想直而不遺元和十三年八月華州刺史兼御史中丞令狐楚記周生太和中廬于洞庭山以道術濟人吴楚敬之後出遊廣陵佛寺有三四客偕来時八月望霽月澄瑩生自言曰某學於師能挈月致之懐袂或疑其誕或喜其奇生命虛一室翳四垣使無纎隙取筯數百呼僮以繩聨續架之曰我将此梯取月去乃閉户久之數客步庭中伺焉忽覺天地曛晦聞生呼曰某至開室視之生曰月在某衣中諸君試觀舉其袖出月寸許一室通眀寒入肌骨客再拜謝之却閉户其外尚晦食頃如初范村山者乾符中吳人胡六子聚徒海中一旦暴風矴纜斷諸舟散失獨所乗舟泊一山島下登岸尋食漸見村落遂戒約徒伴曰風波如此幸不傾没雖數日絶食若見居人只可博糴糧食輒不得擾人言訖縦步見居人乃問其地其人曰范村也皆禮貌相接人物情義與中國同引上髙山十餘里花木夾路風景清虚宫室華麗謁見一人侍衛甚衆年可八十餘號為山長升階延坐曰余越相范蠡也居此年深子孫相承巳數十世山下皆吾子孫子孫生死與世人同獨余得道長生以子逺来不相驚擾即以迴風相送却歸中國乃告别下山衆人各助以糧食既及船中便風俄起頃刻歸達西岸六子自歎幸獨不知范蠡為何人話于有識者方知其仙六子後為髙駢六合鎮将神仙感遇𫝊于濤宰相琮之姪随琮南遷途經平望驛維舟方食有叟自門直扺濤所問叟何人對曰曹老耳問其所以来對曰郎君極有好官職此行不用憂問其所能云老無解但見郎君此後官職髙顯亦敘琮牽復之事濤又問京中家内事可知否叟俛首久曰京宅甚安今日堂前有某夫人尼賓客名字一一詳識又云某廊下有小童某牽一銅龜子馳戱濤因指薛芸香姬者謂叟曰此人如何對曰極好三千里外亦得好官濤謂婦人安得官訝其疎脱意怠不復領略之既去訪之莫知所止人或云此即曹的休博士也的休魏之宗室仕晉為史官齊梁之間或處或顯於朝列得神仙之道多遊江湖間往往賈販拯救人以隂功及物多有見之者濤後自泗州防禦使歙州刺史佐淮南吳王楊行宻為副車琮尋亦北歸姬俄以疾終山中無求祕器之所輟一夀棺瘞之装漆金彩頗甚鮮華方驗得好棺之說訪問京宅是日賓客小童遊戱之事一一皆驗神仙感遇𫝊吳郡志巻四十
