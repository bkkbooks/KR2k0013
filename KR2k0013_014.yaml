body:
  text: 吳郡志巻十四宋范成大撰園亭晉辟疆園自西晉以來𫝊之池館林泉之勝號吳中第一辟疆姓顧氏晉唐人題詠甚多陸羽詩云辟疆舊林園怪石紛相向陸龜䝉云吳之辟疆園在昔勝槩敵皮日休云更葺園中景應為顧辟疆本朝張伯玉云于公門館辟疆園放蕩襟懐水石間今莫知遺跡所在考龜䝉之詩則在唐為任晦園亭今任園亦不可攷矣唐褚家林亭松陵集倡和云在震澤之西皮日休詩云茂苑樓臺低檻外太湖魚鳥徹池中當在松江之傍也今吳中褚姓尚多亦有登進士科者任晦園池晦嘗為涇縣尉歸吳作圃為時所稱皮日休云有深林曲沼危亭幽物陸龜䝉詩云吳之辟疆園在昔勝槩敵不知佳景在盡付任君宅盖任晦得顧辟彊舊園以為宅也皮日休任晦園亭任君恣髙放斯道能寡合一宅閑林泉終身逺囂雜嘗聞佐浩穰散性多儑内却與親朋洽欻爾解其綬遺之如棄靸歸来鄉黨開溪未讓丁列第方稱甲入門約百步古木聲霎霎廣檻小山欹斜廊怪石夾白蓮倚欄楯翠鳥緣簾押地勢似五瀉巖形若三峡猿眠但腽肭鳬食時啑唼撥荇下文竿結藤縈桂檝門留醫樹客壁倚栽花鍤度歳止褐衣經旬唯白帢多君方閉户顧我能倒屧請題在茅棟留坐於石榻魂從清景遛衣任煙霞裛階墀龜任上枕席鷗方狎沼似頗黎鏡當中見魚眨杯杓悉杉瘤盤筵盡荷葉閒斟不置罰閒奕無争劫閒日不整冠閒風無用箑以斯為思慮吾道寜疲苶衮衣競璀璨鼓吹争鞺鞈欲者解擠排詬者能詀讘權豪暫翻覆刑禍相填壓此時一圭竇不肯饒閭闔有第可棲息有書可漁獵吾欲與任君終身以斯惬陸龜䝉吳之辟疆園在昔勝槩敵前聞富脩竹後說紛怪石風煙慘無主載祀將六百草色與行人誰能問遺跡不知清景在盡付任君宅却是五湖光偷来傍簷隟出門向城路車馬聲轥轢入門望亭隈水木氣岑寂犨牆繞曲㟁勢似行無極十歩一危梁乍疑當絶壁池容澹而古樹意蒼然僻魚驚尾半紅鳥下衣全碧斜来島嶼隱怳若瀟湘隔雨靜挂殘絲煙消有餘脉朅来任公子擺落名利役雖将祿代耕頗愛巾隨䇿秋籠支遁鶴夜榻戴顒客説史足為師譚禪差作伯君多鹿門思到此情便適偶䕃桂堪帷縱吟苔可席顧余真任誕雅遂中心獲但喜醉還醒豈知𤣥尚白甘閑在雞口不責封龍額即此自怡神何勞謝公屐滄浪亭在郡學之南積水彌數十畆傍有小山髙下曲折與水相縈帶石林詩話以為錢氏時廣陵王元璙池館或云其近戚中吳軍節度使孫承佑所作既積土為山因以瀦水慶厯間蘇舜欽子美得之傍水作亭曰滄浪歐陽文忠公詩云清風眀月本無價可惜只賣四萬錢滄浪之名始著子美死屢易主後為章申公家所有廣其故地為大閣又為堂山上亭北跨水有名洞山者章氏併得之既除地發其下皆嵌空大石人以為廣陵王時所蔵益以増累其隙兩山相對遂為一時雄觀建炎之後歸韓蘄王家蘇舜欽滄浪亭記予以罪廢無所歸扁舟南遊旅於吳中始僦舍以處時盛夏蒸燠土居皆褊狭不能出氣思得髙爽虚闢之地以舒所懐不可得也一日過郡學東顧草樹鬱然崇阜廣水不類乎城中並水得微徑於雜花脩竹之間東趨數百步有棄地縱廣函五六十尋三向皆水也杠之南其地益闊旁無民居左右皆林木相虧蔽訪諸舊老云錢氏有國近戚孫承佑之池館也㘭隆勝勢遺意尚存予愛而徘徊遂以錢四萬得之搆亭北碕號滄浪焉前竹後水水之陽又竹無窮極澄川翠榦光影㑹合於戸軒之間尤與風月為相宜予時榜小舟幅巾以往至則洒然忘歸觴而浩歌踞而仰笑野老不至魚鳥共樂形骸既適則神不煩觀聽無邪則道以眀返思向之汩汩榮辱之場日與錙銖利害相磨戞隔此真趣不亦鄙哉噫人固動物情横于内而性伏必外寓於物而後遣寓久則溺以為當然非勝是而易之則悲而不開唯仕宦溺人為至深古之才哲君子有一失而至於死者多矣是未知所以自勝之道予既廢而獲斯境安於冲曠不與衆驅因之復能見乎内外失得之源沃然有得笑閔萬古尚未能忘其所寓自用是以為勝焉舜欽滄浪詩一逕抱幽山居然城市間髙軒面曲水脩竹慰愁顔迹與豺狼逺心隨魚鳥閑吾甘老此境無暇事機闗滄浪觀魚瑟瑟清波見戲鱗浮沈追逐巧相親我嗟不及羣魚樂虚作人間半世人滄浪靜吟獨遠虚亭步石矼静中情味世無雙山蟬帶響穿疎户野蔓盤青入破窻二子逢時猶死餓三閭遭逐便沈江我今飽食髙眠外惟恨澄醪不滿缸滄浪懐友滄浪獨步亦無悰聊上危臺四望中秋色入林紅黯淡日光穿竹翠玲瓏酒徒漂落風前燕詩社凋零霜後桐君又蹔来還徑往醉吟誰復伴衰翁獨步花枝低欹草色齊不可騎入步是宜時時攜酒只獨往醉倒唯有春風知又初晴遊夜雨連明春水生嬌雲濃澹弄微晴簾虚日薄花竹静時有乳鳩相對鳴歐陽修子美寄我滄浪吟邀我共賦滄浪篇滄浪有景不可到使我東望心悠然荒灣野水氣象古髙林翠阜相囘環新篁抽笋添夏景老枿亂發争春妍水禽閑暇事髙格山鳥日夕相啾喧不知此地㡬興廢仰視喬木皆蒼煙堪嗟人迹到不逺雖有来路曽無緣窮奇極怪誰似子搜索幽隱探神仙初尋一逕入䝉密豁見異境無窮邊風髙月白最宜夜一片瑩淨鋪瓊田清光不辨水與月但見空碧涵漪漣清風明月本無價可惜祇賣四萬錢乂疑此境天乞與壯士憔悴天應憐䲭夷古亦有獨往江湖波濤渺翻天﨑嶇世路欲脱去反以身試蛟龍淵豈如扁舟任飄兀紅蕖綠浪摇醉眠丈夫身在豈長棄新詩美酒聊窮年雖然不許俗客到莫惜佳句人間𫝊胡宿竄逐本無罪羈窮向此忘野煙含悵望落日滿滄浪亂草荒來綠幽蘭死亦香楚魂招不得秋色似瀟湘胡珵昔聞滄浪亭未濯滄浪水先賢眇遺跡壮觀一何侈飛橋跨木末巨浸折胡壘糟牀行萬罋繚牆周數里廢興固在天庶用觀物理緬懐嘉祐世周道平如砥相君賢相君子美東南美如何一網盡禍豈在故紙青蠅變白黑作俑兹焉始所存醉翁文垂耀信百世無忘角弓詠嘉樹猶仰止同来二三子感歎咸坐起縹瓷釂新汲毁譽均一洗忽逢醒狂翁一别垂二紀雋哉老益壯論事方切齒我欲裂絳幔推着眀光裏安得上天風吹落君王耳梅堯臣寄題滄浪亭聞買滄浪水遂作滄浪人置亭滄浪上日與滄浪親宜曰滄浪叟老向滄浪濱滄浪何處是洞庭相與鄰竹樹種已合魚蠏時可緡春羮芼白菘夏鼎烹紫蓴黄柑摘霜晚香稻炊玉新行吟招隠詩懶戴醉中巾憂患兩都忘還往誰與頻昨得滁陽書語彼事頗真曩子初去國我勉勿迷津四方不可之中土百物淳今子居所樂豈不遠埃塵被髪異太伯結客非春申莫與吳俗尚吳俗多文身蛟龍刺兩股未變此遺民讀書本為道不計賤與貧當湏化閭里庶使禮義臻劉敬觀滄浪亭石感而有作蘇君在朝人不知蘇君既没人悲之流風遺書見稱道髙文大句爭提撕壁間草隸亦不置剝苔堆立無棄遺乃知死不與人共利害而後不為時所疑滄浪亭空卉木老古石蒼蒼顔色好無脛猶能千里来致身忽在都門道帝都王侯好事多相看自悔取不早君不見呉興長史春襴衫閉門抱恨長枯槁南園吳越廣陵王元璙之舊圃也老木皆合抱流水竒石參錯其間王禹偁為長洲令常攜客醉飲焉有詩曰天子優賢是有唐鏡湖恩賜賀知章他年我若功成後乞與南園作醉鄉大觀末蔡京罷相欲東還詔以園賜之京有詩云八年帷幄竟何為更賜南園寵退歸堪笑當時王學士功名未有便吟詩禹偁詩石尚存續經云舊有三閣八亭二臺龜首旋螺之類歳久摧圯者多相傳猶有流杯四照百花樂堂惹雲風月等處每春縱士女游觀兵火之後皆不復有今園屬張循王家羅隱南園摶擊路終迷南山且灌畦敢言逃俗態自是托幽棲葉長春菘闊科圎早薤齊雨沾虚檻冷雲壓遠山低竹好還成徑桃夭亦有蹊小窻飛野馬閑甕養醯雞水石心逾遠雲霄分已睽病憐王猛畚愚笑隗囂泥澤國潮平㟁江村桞覆堤到頭乗興是誰手好持攜蘇舜欽西施臺下見名園百草千花特地繁欲問吳王當日事後来桃李若為言梅摰長洲茂苑足珍材剰買前山活翠栽客土不疎承帝力㡬多臣節共安来又長洲茂苑占幽竒巖榭珍臺入翠微園李露濃三色秀徑桃烟暖一香飛月臨夕樹烏頻遶風掲珠簾燕未歸弭盖暫歡成結戀斜陽憑檻獨依依胡宿宋周元明遊南園一遍芳菲欲滿林囘塘過雨曉来深紅粧珠珮交花影白馬春衫度桞隂向老追攀多强意隨時風物但驚心眼前百事輸年少猶解因君放浪吟周元明爛熳花時錦繡張無端下馬繫垂楊山亭水閣笙歌地合與行人作醉鄉程俱王子池臺迹已荒年来華構壓髙岡長林不礙千山月老榦猶含九夏霜便覺平泉冠東洛還依綠水記南塘蝸廬却喜通幽徑㟁幘時来一嘯長東莊九國志謂之東墅與南園皆廣陵王元璙帥吳時其子文奉為衙内指揮使時所創營之三十年間極園池之賞竒卉異木及其身見皆成合抱又累土為山亦成巖谷晚年經度不巳每燕集其間任客所適文奉跨白騾披鶴氅緩步花逕或汎舟池中容與往來聞客笑語就之而飲盖好事如此九國志吳越備史鱸鄉亭在吳江始陳文恵公堯佐題松陵詩有秋風斜日鱸魚鄉之句屯田郎中林肇為令乃作亭江上以鱸鄉名之陳瓘瑩中主縣簿嘗賦詩陳瓘鱸鄉亭中郎臺榭據江鄉雅稱詩翁賦卒章蓴菜鱸魚好時節秋風斜日舊煙光一杯有味功名小萬事無心歳月長安得便抛塵網去釣舟閑倚畫欄傍如歸亭在吳江張先子野撤而新之蔡襄君謨題壁云蘇州吳江之瀕有亭曰如歸者隘壊不可居康定元年知縣事祕書丞張先始為大之云七檜堂在天慶觀之東葉參少卿嘗守吳既謝事因居焉作此堂以佚老見其子清臣至大官餘見人物條范仲淹詩退也天之道東南事了人風波抛舊路花月伴閑身湖外扁舟遠門中駟馬新心從今日泰家似昔時貧見子登西掖攜孫過北鄰白雲髙閣曙緑水後池春樽酒呼前輩爐香叩上真只應隂徳在八十富精神小隱堂秀野亭在城北蔣堂嘗有過葉道卿侍讀小園詩云秀野亭連小隱堂紅蕖綠篠媚滄浪卞山居士道卿自號也無歸意却借吳儂作醉鄉蘇人多游飲於此園隱圃在靈芝坊樞密直學士蔣堂之居堂兩守吳謝事因家焉自號遂翁圃中有巖扃水月菴煙蘿亭風篁亭香嚴峰古井貪山等堂嘗自賦隱圃十二詠結菴池上名水月宅南小溪上結宇十餘柱名溪館又築南湖臺於水中皆有詩隱圃雅得莬裘地清宜隱者心綠葵才有甲青桂漸成隂獨曳山屐往無勞俗駕尋湛然常寂處水月一菴深溪館年来納組去林下得身還泚泚清流處童童碧樹間淵魚樂且静庭鶴夀而閑粗有淮安趣誰同賦小山野意本自遂兹溪稱獨醒雲蘿環靜室水石照疎櫺殺竹編書古紉蘭作佩馨王通昔不偶時亦坐汾亭南湖臺危臺竹樹間湖水伴深閑清淺採香徑方圓眀月灣放魚隨物性載石作家山自喜歸休早全勝賀老還嶢樹水中央兹為隱遯鄉小園香寂寂一派曉泱泱煙草碧彌㟁霜桃紅壓牆鴟夷儻居此未必入滄浪水次揭危亭煙隄四面平栽蘆延宿鷺種桞待啼鸎雪霽清流漲風来夜艇横輕肥莫臨暨吾老懶逢迎中隱堂在大酒巷都官貟外郎分司南京龔宗元所居取樂天詩大隱住朝市小隱入丘樊不如作中隱隱在留司間乃作中隱堂與屯田貟外郎程適太子中允陳之竒遊從極文酒之樂皆耆徳碩儒掛冠而歸者吳人謂之三老樂圃朱長文伯原所居在雍熙寺之西號樂圃坊圃中有髙岡清池喬松夀檜此地錢氏時號金谷朱父光祿始得之伯原營以為圃名徳所寓邦人珍之因號其巷曰樂圃坊朱自有記樂圃記大丈夫用於世則堯吾君虞吾民其膏澤流乎天下及乎後裔與夔契並其名與周召偶其功茍不用於世則或漁或築或農或圃勞乃形逸乃心友沮溺肩綺季追嚴鄭躡陶白窮通雖殊其樂一也故不以軒冕肆其欲不以山林䘮其節孔子曰樂天知命故不憂又稱顔子在陋巷不改其樂可謂至徳也巳余嘗以樂名圃其謂是乎始錢氏時廣陵王元璙者實守姑蘇好治林圃其屬徇其所好各因隙地而營之為臺為沼今城中遺址頗有存者吾圃亦其一也錢氏去國圃為民居更數姓矣慶厯中余家祖母吳夫人始搆得之先大父與叔父或游焉或學焉每良辰美景則奉板輿以觀于此厥後稍廣西壖以益其地凡廣輪逾三十畝予嘗請營之以為先大父歸老之地熙寧之末新築外垣盡覆之瓦方將結宇而親年不待既孤而歸於是遂卜居焉月葺歳増今更數載雖敝屋無華荒庭不甃而景趣質野若在巖谷此可尚也圃中有堂三楹堂側有廡所以宅親黨也堂之南又為堂三楹命之曰邃經所以講論六藝也邃經之東又有米廩所以容歳儲也有鶴室所以畜鶴也有䝉齋所以敎童䝉也篴經之西北隅有髙岡命之曰見山岡上有琴臺琴臺之西隅有詠齋此予嘗拊琴賦詩於此所以名云見山岡下有池水入于坤跨流為門水由門縈紆曲引至于岡側東為谿薄于巽隅池中有亭曰墨池余嘗集百氏妙迹於此而展玩也池㟁有亭曰筆谿其清可以濯筆谿傍有釣渚其静可以垂綸也釣渚與邃經堂相直焉有三橋度谿而南出者謂之招隠絶池至于墨池亭者謂之幽興循岡北走度水至于西圃者謂之西磵西圃有草堂草堂之後有華嚴庵草堂西南有土而髙者謂之西丘其木則松檜梧栢黄楊冬青椅桐檉桞之類柯葉相蟠與風飃颺髙或參雲大或合抱或直如繩或曲如接或蔓如附或偃如傲或參如鼎足或並如釵股或圎如盖或深如幄或如蛻虬卧或如驚蛇走名不可以盡記狀不可以殫書也雖雪霜之所摧壓飈霆之所擊撼槎牙摧折而氣象未衰其花卉則春繁秋孤冬曄夏倩珍藤幽蘤髙下相映蘭菊猗猗蒹葭蒼蒼碧蘚覆㟁慈筠列砌藥錄所收雅記所名得之不為不多桑柘可蠶麻紵可緝時果分蹊嘉蔬滿畦摽梅沈李剝瓜斷壺以娛賔友以約親屬此其所有也予於此圃朝則誦羲文之易孔氏之春秋索詩書之精微眀禮樂之度數夕則泛覽羣史厯觀百氏考古人是非正前史得失當其暇也曳杖逍遥陟髙臨深飛翰不驚皓鶴前引揭厲于淺流躊躇于平臯種木灌園寒耕暑耘雖三事之位萬鍾之禄不足以易吾樂也然余觀羣動無一物非空者安用拘於此以自贅耶異日子春之疾瘳尚平之累遣將扁舟桴海浮游山岳莫知其所終極雖然此圃者吾先光祿之所遺吾致力於此者久矣豈能忘情哉凡吾衆弟若子若孫尚克守之母頽爾居母伐爾林學於斯食於斯是亦足以為樂矣予豈能獨樂哉昔戴顒寓居魯望歸隠遺迹迄今猶存千載之後吳人猶當指此相告曰此朱氏之故園也元豐三年十二月朔吳郡朱伯原記紅梅閣在小市橋天聖中殿中丞吳感所居吳有姬曰紅梅因以名閣又作折紅梅詞𫝊於一時蔣堂亦有吳殿丞新葺兩圃詩有深鏁煙光在樓閣旋移春色入門牆之句吳死閣為林少卿家所得三瑞堂在閶門之西楓橋孝子姚淳所居家世業儒以孝稱蘇文忠公往來必訪之嘗為賦三瑞堂詩姚氏致香為獻公不受以書抵虎丘通長老云姚君篤善好事其意極可嘉然不湏以物見遺恵香八十罐却託還之已領其厚意實為他相識所恵皆不留故也蘇軾詩君不見董召南隠居行義孝且慈天公亦恐無人知故令雞狗相哺兒又令韓老為作詩爾来三百年名與淮水東南馳此人世不乏此事亦時有楓橋三瑞皆目見天意宛在虞鰥後惟有此詩非昔人君更往求無價手五桞堂胡稷言所居在臨頓里陸龜䝉之舊址也如村胡嶧所居嶧父稷言作五桞堂至嶧又取老杜宅舍如荒村之句名其居曰如村范家園在雍熙寺後范周無外所居逸野堂在崑山老儒王僖所居僖累試不利以讀書自娛教其姪孫葆為名儒至今此堂為邑人所稱醉眠亭在松江李無晦所居李本湖人徙居松江髙尚不仕以詩酒自娛治園亭號醉眼漫莊在毗村處士顧禧所居禧棄官髙隠讀書以老鄉人貴重之後其居有名章憲何許明人眼松間見古堂泉聲到棐几山影覆繩牀愛酒陶元亮聽蛙孔徳璋紛紛戰蠻觸丘壑信難忘蝸廬在城北中書舍人程俱致道所居俱政和間自監舒州茶場上書論時政不合来家於吳葺小屋號蝸廬中有常寂光室勝義齋嘗賦遷居蝸廬詩及蝸廬後隙地種植竹菊鳯仙雞冠紅莧芭蕉水青等七詠遷居蝸廬有舍僅容膝有門不容車寰中孰非寄是豈真吾廬不作大耳兒閉闗種園蔬茅簷接環堵無地可灌鋤不作下榻翁一室謝掃除平生四海志投老河魚枯願從素心人不減南村居蕭然冰炭外傲睨萬物初坐視蠻觸戰兼忘糟粕書聊呼赤松子伴我龜腸虚又葺蝸廬呉下四海無廬着此翁故營松竹儘囊空明知計出柏馬下正擬身全木鴈中東郭易成生草舍南村先怯巻茅風向来豪氣今如此敢與元龍較長雄復軒在吳縣之黄村處士章憲自作記謂葺先人之廬治東廡之軒以貯經史百氏之書名之曰復以警其學其後圃又有清曠堂詠歸清閟遐觀三亭以慕古尚賢各有詩復軒記其歌云洞視兮八荒了無物兮往無旁往古来今兮無際起復代謝兮不失吾常復乎復乎吾所寓兮廣莫之野而無何有之鄉清曠堂吾慕仲公理卜居樂清曠兹焉惬吾願名堂以自況我無適俗韻且乏食肉相何許寄吾生棲遲翳窮巷境幽有經行心逺無得䘮從容大化中信是羲皇上詠歸亭吾慕曽夫子舍瑟言所志所志則非邦獨契聖者意暮春春服成從我才一二風乎林岫間所樂有餘味邈矣千載上神交得冥契當知結駟非不易窮閻是清閟吾慕韓昌黎文章妙百世體物語尤工賦竹誇清閟唯我獨好之則亦有深意虚中可受道貫時無險易復若魏文貞直節而嫵媚伊余清閟中賞玩有遺味遐觀亭吾慕陶靖節處約而平寛涉園自成趣矯首復遐觀我亦散遊目俛仰天地間雲煙自舒巻湖嶺相囘環永與形役謝豈有俗慮干想像斜川遊千載乃相闗臞菴在松江之濱邑人王份有超俗趣營此以居圍江湖以入圃故多桞塘花嶼景物秀野名聞四方一時名勝喜遊之皆為題詩圃中有與閑平遠種徳及山堂四堂煙雨觀横秋閣凌風臺鬱峩城釣雪灘琉璃沼臞翁澗竹㕔龜巢雲闗纈林楓林等處而浮天閣為第一總謂之臞菴份字文孺以特恩補官嘗為大治令歸休老焉題詩甚多不可悉錄録其尤著於此俾其家世保焉徐作開菴藜莧幽人室丘園隠者居一原青障合萬木緑隂疎手把歸田賦腰懸種樹書桑麻連畛秀網罟入溪漁蒙與義一島風煙水四圍軒亭窈窕更幽竒眼中泉石論溪買行處壺觴逐境移勌馬虺隤前日路寒松偃蹇舊年枝自嗟老去殊癡絶一月春愁廢作詩吕本中伊洛富山水家有五畝園花竹遶瀍澗不讓桃花源清時足真賞户門開層軒一朝烽烟起故家希復存莽蒼走萬里始及吳市門庵廬據形勝冰壺貯乾坤亭榭着仍穩不見斧鑿痕主人更超邁雲夢八九吞植杖邀我坐笑語清而温坐令車馬客稍識山林尊十年老朝市漸見兩目昏求田與問舍姑置不復論但願從我公不使世諦渾蘇庠王郎臞菴摩詰詩煙花繞舍江繞籬石渠東觀了無夢筆牀茶竈行相期古人已往不可作甫里顧有今天隨東鄰蟹舍肯着我請辦簑笠懸牛衣浮天閣臞菴主人天與閑囘欄飛閣臨滄灣晴波渺渺鴈行落坐見萬頃穿雲還百年有底付鳥翼未暇著脚鴛鸞間徑湏呼酒澆磈磊莫遣暝色霾煙鬟玉蟾飛入水晶宫萬頃琉璃碎晚風詩就雲歸不知處斷山零落有無中秋落空江動碧虚黄蘆洲渚鴈飛初我来欲訪䲭夷子為掛西風十幅蒲平遠堂桞外西風六幅蒲野塘睡鴨對春鉏如何喚得王摩詰畫作江南煙雨圖寒蘆淅淅催秋晚浦雨溟溟憶去年它日未埋黄土陌為君重賦補亡萹草堂笛卧松江明月蓑披笠澤歸雲若道青霄快活王侯何事如君王銍全家髙隠白雲闗事不縈懐夢亦閑欸乃交撐漁市散隔江城郭是人間向子諲仙翁五十鬢猶青髙卧柴門晝亦扃茅舍已忘鍾鼎夢蒲輪休過薜蘿亭隂森門巷先生桞寂寞江天處士星晚歳田家農事了閑抄寗戚相牛經沈與求地控三州界池開十丈蓮桑麻無杜曲松菊有斜川别浦歸㠶逺他山晚照妍江湖春水闊幽興白鷗前程子山待月凝雲闗垂竿釣雪灘虚窻摇冷翠傑閣聳髙寒籠養千齡鶴爐燒九轉丹不湏論許事心目自清安壁上煙蘿子窻前鴻素書短籬開窈窕嫩竹轉扶疎世事霜前葉聲名澗底樗柴桑陶靖節日暮荷歸鋤何偁多羨王居士心閑事事幽山從天末見江近枕邊流春圃千葩秀霜林百果收更能窮物理濠上看魚游地占松江勝為園不種爪幽深清磬響髙下石欄斜花密蜂隨蝶林深雀啅蛇勝如摩詰畫不是季鷹家桞外長虹卧江邊小市圎水摇千嶂影窻納五湖天隔㟁誰家圃開㠶何處船非闗臺榭好此地最堪憐霜落川原淡風髙木葉丹雲垂千頃白月墮一江寒禮佛因成塔焚香旋築壇竹聲過小院雜珮響珊珊沙暖鴛鴦困江寒翡翠愁紅蓮秋的厯短櫂晚夷猶處世長無累端居百不憂時時明月下横笛倒騎牛僧道舉竹裏蓬茅掩棘扉主人詩瘦帶寛圍種成苜蓿先生飯製就芙蓉隠者衣栁絮春江魚婢至荻花秋渚鴈奴歸小溪短艇能容我先向溪隈築釣磯谿南谿北繞清漪舍後舍前圍短籬九九筭来成底夢休休歸去復何疑添丁見客走賖酒阿買能書供賦詩丘壑政非公子事綺紈當預少年知李彌正和祝鎰韻勞車發危坂勌艘失飛湍滔滔褦襶子疾走殊未闌鶴仙擺名宦結廬松江干笑拍萍風浮瞬視草露濤圖川不愧輞序谷寧先盤門豈俗駕拒室無哀筝彈按行松菊間澹然有餘歡蓮巢衆香聚浮天百憂寛秋光斂洲渚暮翠籠峰巒我来挟良朋道故盟未寒練顔仰孤標耐久同蒼官終當役薪水刀圭却衰殘陳棪季鷹雅志本江湖胡為入洛誠計疎一杯蓴羮入歸夢歳晚僅飽松江鱸何如王郎十畝宅一生江頭枕江碧西風落日弄煙波却笑陶朱計然䇿我来訪君春已深江花江桞翻緑隂相攜三徑拾瑶草為問客来何苦心固知此事君計得我被㣲官苦相逼勸君謹勿語彈冠便恐紛紛北山檄沈括清江繞檻白鷗飛坐看潮痕上釣磯松菊未荒元亮徑芰荷先製屈平衣窻前楓葉曉初落亭下鱸魚秋正肥安得從君理蓑笠櫂歌相趂入煙霏樂菴在崑山縣東六里圎眀村侍御史李衡彦平歸老所居衡本江都人避地居崑山志氣卓犖不羣學問通性理登第後治縣有聲召對累遷樞密院檢詳諸房文字出典大藩俄引年而歸作此菴以經史圖畫自娛歳餘落致仕以侍御史同知貢舉復告老年幾八十起居不衰時過諸子於邑中已復還菴清脩絶俗給事惟一蒼頭俄旬餘不食謝去醫藥手書數十紙徧别親舊勑其子不得隨俗作佛事書訖掩户蕭然而化其家刻其遺書總一大軸士大夫宗敬之范文正公義宅在雍熙寺後錢公輔譔范文正公義田記范文正公蘇人也平生好施與擇其親而貧疎而賢者咸施之方貴顯時於其里中買負郭常稔之田千畝號曰義田以養濟羣族族之人日有食歳有衣嫁娶㓙葬皆有贍擇族之長而賢者一人主其計而時其出納焉日食人米一升歳衣人一縑嫁女者錢五十千娶婦者二十千再嫁者三十千再娶者十五千葬者以再嫁之數葬㓜者十千族之聚者九十口歳入粳稻八百斛以其所入給其所聚沛然有餘而無窮仕而家居俟代者預焉仕而之官者罷其給此其大較也初公之未貴顯也嘗有志於是矣而力未之逮者二十年既而為西帥以至於參大政於是始有祿賜之入而終其志公既殁後世子孫至今修其業承其志如公存也公雖位髙祿重而貧終其身殁之日身無以為斂子無以為䘮唯以施貧活族之仁遺其子而巳昔晏平仲弊車羸馬以朝陳桓子觴之曰君位之上卿祿之百萬而弊車羸馬是隠君之賜也晏子曰自臣之貴父之族無不乗車者母之族無不足於衣食者妻之族無凍餒者齊國之士待臣而舉火者三百餘家如此為隠君之賜乎彰君之賜乎於是齊侯以晏子之觴而觴桓子予嘗愛晏子好仁齊侯知賢而桓子服義也又愛晏子之仁有等級而言有次序也先父族次母族次妻族而後及其疎遠之賢孟子曰親親而仁民仁民而愛物晏子為近之今觀文正公之義其與晏子比肩矣然晏子之仁止於生前而公之義垂於身後其規模遠舉又疑其過之嗟乎世之人都三公位享萬鍾禄其邸第之䧺輿馬之盛聲色之侈妻孥之富止乎一已而族之人不得其門而入者豈少哉況於施賢乎其下為卿為大夫為士而廩稍之充奉養之厚足乎一已而族之人操瓢為溝中瘠者又豈少哉况於賙人乎是皆文正公之罪人也公之忠義滿朝廷事業滿邊陲功名滿天下後必有良史書之者予可無書也獨書其義田以警於世云義宅記吳門范氏自唐柱國麗水府君居於靈芝坊今在雍熙佛寺之後五世孫文正公少長北地皇祐中守杭始至故鄉訪求宗族買田千畝作義莊以贍之宅有二松名堂以歳寒閣曰松風因廣其居以為義宅聚族其中義莊之收亦在焉中更兵燬族黨星散故基榛蕪編民豪據為居宇為場圃僦直無㡬甚失初意粟無所儲寓於天平山墳寺倍有往来給散之勞尋復圮廢改寘城中及寄他舍病此久矣自公長子監簿而下又五世而至良器一日謂二弟曰先君奉議念此有年齎志而殁吾儕當有以振起之慨然自任思圖其新於是厯告居民盡除僦直約期而遣之不服者訴于郡于監司以至上達臺省提刑臨川何公異太守四明鄭公若容咸義此舉力為主張由是悉得故地周一千四百八十丈首捐私帑繚以垣牆創建一堂仍扁歳寒以祠文正結屋十楹以處貧族就立新倉寖復舊觀庀役於慶元二年之季夏中秋告成不愆于素觀者無不歎息親掌出納一年以為後式選族子之㢘謹者二人繼之詳具要束以補舊規揭于堂上田籍之𫝊遠者俱刻之石以為永久之計介弟之柔續世科於百二十有四載之後尤勇於義既力贊其兄謀之屬鑰為記始末鑰不佞先祖少師收䘏宗族有意於此而歳不與伯父揚州始為之雖不及文正公之盛而寒宗之貧者賴以自給亦四十餘年于兹先工部欲附益之清貧終身猶米果也見范氏家法為之媿歎是舉也衍文正公累世之遺澤伸先奉議九原之餘恨又以綿范氏無窮之休豈不偉哉嗚呼文正公奮身孤藐未嘗賴宗人毫髪之力既達則闔族受解衣推食之恩天佑范氏三子鼎貴皆以宏才髙誼上繼父風後人得維持憑藉以保其家良器一布衣而決意興起不惟義宅載新義莊亦復整飭剔蠧省費又為數世之利用心如此後其興乎嗚呼文正初立規矩止具給予之目僅設預先支請之禁不數年忠宣公已慮其廢壊故治平奏請聖㫖違犯義莊規矩之人許令官司受理又與右丞侍郎自熙寧以至政和隨事立規闗防益密今之規約又加密矣一門同姓為此義事其難如此況天下之大思所以為億萬世之計者又可忽乎嗚呼衣冠之族不免饑寒者甚衆願如范氏之宗派而不可得今坐享飽暖者㡬人若人人如良器用心更相扶持以永其𫝊則善矣若曰是我所當得者而不思所自來甚者反為蠧於其間則文正諸公實臨之其聞於有司曰公元者盖今之族長云三年立秋顯謨閣直學士太中大夫提舉江州太平興國宫奉化縣開國男食邑三百户樓鑰記并書吳郡志巻十四
