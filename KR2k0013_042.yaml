body:
  text: 吳郡志巻四十二宋范成大撰浮屠唐僧印宗郡人姓印氏精涅槃經咸亨中至京師詔居大敬愛寺辭往蘄春謁忍師遂至廣州遇六祖能大師盡悟方外之㫖著心要集行于世道欽崑山人姓朱氏初業儒有元素禪師者為落髮授學既别戒之曰汝乗流而行逢徑即止欽至臨安見東北一山秀出樵子曰此徑山也欽遂居之為開山第一代禪宗召至内庭賜號國一禪師辭歸山𫝊燈録義師者蘇州人状如風狂貞元中民起僦屋十餘間義師忽運斤壊其簷禁之不可主人素知其神拜曰弟子生活賴此師曰爾惜之耶擲斤於地而去其夜市中火惟所壊簷屋數間獨存常止於廢寺殿中冬夏常積火壊幡木像悉燔之好燒鯉魚不具渫而食垢面不頮頮輒雨吴中以為雨候将死飲灰汁數斛念佛坐不飲食郡人日往觀之七日而逝盛暑色不變支不摧酉陽雜俎續空者吳人本齊君房也苦貧勤學為凍餒所驅元和初游錢塘至孤山寺西飢甚不能前俄有胡僧顧君房笑曰法師諳旅況否君房曰何哉僧曰子不憶講法華經於洛中同徳寺乎應為飢火所惱不暇憶前事探鉢囊出一棗大如拳曰此吾國所産食之者知過去未来事君房食訖甚渇掬泉水飲之急欠伸枕石而寝有頃乃寤思講經於同徳寺如昨日焉乃落髮纂異記僧晝字皎然吴僧也工律詩甞謁韋蘇州恐文體不合乃苦思作古體十篇為䞇韋殊不稱賞晝失望眀日寫其舊製以獻韋吟諷歎味不釋手因語晝云師㡬失聲名不以所工見投而猥希老夫之意人各有所得非卒能致晝大服其精鑒鑒師者元和初郡人馮生調選長安有老僧自稱鑒師詣生曰汝吾甥也相與往來嵗餘馮得東越尉鑒師負笈吿去曰吾廬於靈巖寺之西廡久矣遊長安忽十年幸與君相遇今将歸舊居故来吿别然君尉越道出靈巖寺下當一訪我後數月馮生道經靈巖即入詣焉詢寺僧鑒師廬安在僧曰吾曹無名鑒者生始疑異黙計鑒信士豈欺我獨遊寺庭行至西廡下乃有羣僧畫像其一状類鑒師生大驚視其題云馮氏子吳郡人年十嵗學浮屠氏法以道行聞出宣室志後唐廬山僧紹宗姑蘇人性朴野不羣流俗江南李國生造寺居之又躬入山請謁甚加禮重𫝊燈録漢清化師全付崑山人随父賈販至豫章聞禪㑹之盛求出家學成自仰山還故國錢忠獻王賜以紫方袍不受改賜衲衣號純一禪師師曰吾非飾辭恐後人倣吾而逞欲耳開運中坐亡有大風震林木焉𫝊燈録希辯常熟人聽律於楞伽受心印於天台乾徳初吳越忠懿王以清泰院居之號慧智禪師太平興國中随王入覲見於滋福殿賜號慧眀端拱中乞還故里賜御書急就章逍遥詠祕藏詮及太平聖恵方凡一百三十巻以寵之本朝毛僧日遊聚落飲啖無所擇輕薄子多狎玩之貴勢要之不詣忽謂人曰吾死矣乃危坐誦偈曰毛僧毛僧事事不能死了燒却恰似不曽言卒而化墨客揮犀遇賢姓林氏東禪院僧飲酒無算鄉人目曰林酒仙口中可容雙拳間有異事毎出人羣聚觀之能自圖其形無毫釐不肖好吟詩語雖俗而有理致有云揚子江頭浪㝡深行人到此盡沈吟他時若遇無波處還似有波時用心門前緑樹無啼鳥庭下蒼苔有落花聊與東風論箇事十分春色屬誰家心閑増道氣忍事敵灾屯謹言終少禍節儉勝求人如此類甚多不具録今其真身塑於院中恵詮吳僧佯垢汙而詩絶清婉甞書西湖一山寺壁曰落日寒蟬鳴獨歸林下寺柴扉應未掩片月随行屨唯聞犬吠聲又入青蘿去蘇文忠公和於後曰唯聞煙外鐘不見煙中寺幽人夜未寝草露濕芒屨唯應山頭月夜夜照来去詮遂以詩知名冷齋夜話道潛吴僧有標致效陶靖莭為詩甞自姑蘇歸西湖經臨平作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲蘇文忠公赴官錢塘得詩大稱賞一見如舊識甞有詩曰隔林髣髴聞機杼知有人家住翠㣲蘇公曰此吾師十四字師號也蘇公移守東徐潛訪之館逍遥堂士大夫爭欲識面饌客罷俱来紅粧擁随之遣一妓前乞詩援筆立成曰寄語巫山窈窕娘好将魂夢惱襄王禪心已作沾泥絮不逐春風上下狂一坐大驚自是聞名冷齋夜話宗本圜照禪師穹窿山僧元豐六年相國寺新創慧林智海二寺召本及常總二僧居之本既至宣見于延和殿賜茶帛賜坐殿上賜茶而退常例當席殿下盖異禮也先是中丞舒亶坐贓勒停税導洛司舟及江淮小航東歸太子少保元厚之正議大夫程公闢皆吳人善謔元聞亶事笑曰舒中丞賃客船歸鄉恨未有對及本被召津發給餐錢許馳驛其徒諠譁矜夸公闢笑謂元公曰本長老乗遞馬赴闕為公得對矣聞者絶倒林希逸史仲殊字師利承天寺僧也初為士人甞預鄉薦其妻以藥毒之遂棄家削髮時食蜜以解藥毒蘇文忠公與之還往甚厚號之曰蜜殊殊工於詩詞有寳月集行於世其長短句間有奇作非世俗詩僧比也後自經於枇杷木下道川本崑山縣弓手翟超以勇力名方被差捕賊宿廟中忽有所得徑投山西東齋出家徧遊江湖間道遇虎不為動虎亦馴伏其旁一日大書四句云我有一條鐡楖標縦横妙用無人識臨行撥轉上頭關轟起一聲春霹靂危坐脱去有注金剛經其徒𫝊誦之法全崑山陳氏子従道川為僧一日行恵應廟前偶首觸柱忽自云有所得旁觀其精采曄然全不自覺也後為名僧號無庵文暢吳人韓文公有送北遊詩昔在四門館晨有僧来謁自言本吴人少小學城闕已窮佛根源粗識事輗輒攣拘屈吾真戒轄思逺發薦紳秉筆徒聲譽耀前閥従求送行詩屢造忍顛蹶今成十餘巻浩汗羅斧鉞先生閟窮巷未得窺剞劂又聞識大道何路補剠刖出其囊中文滿聽實清越謂僧當少安草序頗排訐上論古之初所以施賞罰下開迷惑胸窙豁斸株橜僧時不聽瑩若飲水救暍風塵一出門時日多如髮三年竄荒嶺守縣坐深樾徴租聚異物詭製怛巾韈幽窮共誰語思想甚含噦昨来得京官照壁喜見蝎況逢舊親識無不比鶼蟨長安多門户弔慶少休歇而能勤来過重恵安可掲當今聖政初恩澤完䎀狘胡為不自暇飄戾逐鸇鷢僕射領北門威徳壓胡羯相公鎮幽都竹帛爛勲伐酒場舞閨姝獵騎圍邊月開張箧中寳自可得津筏從兹富裘馬寧復茹藜蕨余期報恩後謝病老耕垡庇身指蓬茅逞志縦獫猲僧還相訪来山藥煑可掘吳郡志巻四十二
