body:
  text: 吳郡志卷十宋范成大撰封爵吳孫䇿漢建安二年自騎都尉襲爵烏程侯既破陳瑀曹操表策為討逆將軍改封吳侯吳書晉吳敬王晏太康十年受封食丹陽吳興并吳三郡成帝咸和元年十月封皇弟嶽為吳王慕容垂皓第五子雋僣位封垂吳王後周尉遲綱武成元年進封吳國公厯位少傅大司空陳後主第十子藩封吳郡王唐武德三年以和州總管東南道行臺尚書令楚王杜伏威為使持節江淮以南諸軍事揚州刺史東南道行臺尚書令淮南安撫使封吳王賜姓李氏唐太宗貞觀十年子恪封吳王唐天祐元年詔錢鏐落起復進封吳王吳越備史本朝大中祥符九年拜參知政事丁謂平江軍節度使知升州謂郡人建節本鎮一時為榮真宗皇帝賜以御製詩尤為盛事詳具謂跋中御製賜平江軍節度使丁謂詩序曰卿黃閣同夤實彰於盡瘁碧幢臨鎮方屬於報功言當入謝之辰特賜褒賢之作今成七言四韻詩一首賜新授蘇州節度使丁謂依韻和進詩云懿辭碩畫播朝中造膝詢謀禮遇豐文石延登彰順美高牙前導表疇庸書生仗鉞今尤貴舊里分符古罕逢晝錦買臣安敢比黃樞早日接從容謂次韻和進云白麻初降紫宸中簮組相驚帝澤豐驟陟將壇知運偶久塵台席愧材庸桑榆便覺人間别旌戟猶疑夢裹逢巳是都城聳榮觀更頒天唱耀戎容又賜御詩序卿名藩出蒞雖極於倚毗文陛言辭良多於眷注特示寵行之什用增方面之榮今成五言十韻詩一首賜蘇州節度使丁謂依韻和進詩云踐厯功皆著咨詢務必成懿才符曩彥佳器貫時英俾展經綸業旋升輔弼榮嘉亨欣盛遇盡瘁罄純誠均逸眀恩洽疇勞茂典行白麻三殿曉紅斾九衢平雖輟凝嚴任尤增倚注情擁旄辭帝闕頓轡望都城風景高秋月煙波幾舍程想卿懷感意常是夢神京謂次韻和進云叨竊逢嘉會孤單荷曲成高車陪上宰密座厠羣英步武清華地優遊侍從榮勤劬期薄效忠謹誓眀誠方畏官針失俄驚寵命行冒恩心易感戀聖意難平未副宵衣念寧安晝錦情搖搖千里棹眷眷九重城茜斾輝登路瓊章耀去程子年牽望處金闕玉為京謂跋云臣謂材用無取聲猷不楊徒以遭遇盛眀忝冒榮寵掌邦計參國政一紀于兹贊皇儀相盛則百禮斯舉位重逾量恩深積憂蓋早負官針久妨賢路或驟掇物論則大辜聖知優退是希陳露未暇去年秋九月甲辰忽奉制命遙登將壇進崇秩於上公建高牙於故里君親奇遇臣子殊榮授命之初便殿賜對天語撫勞睿旨溫密至感至戀且拜且泣十一日復對於宣和門賜御製入謝日七言四韻詩一首十九日朝辭於長春殿賜御製寵行五言十韻詩一首皆俾和進丹文緑字親奉於紫清雲笈芝函頒流於衡泌簮纓聳觀油素騰芳璧日九華萃圎首以拭目薰絃六變罄方輿而悅心期大播於玉音敢盡刋於金字蘇臺奧壤鍾阜名區並謹嵗時永昭盛美大宋天禧元年嵗次丁巳正月二十六日推誠保德翊戴功臣金紫光祿大夫檢校太尉使持節蘇州諸軍事蘇州刺史充平江軍節度蘇州管內觀察處置隄堰橋道等使知升州軍州事兼御史大夫上柱國濟陽郡開國公食邑三千五百户食實封一千二百戶臣丁謂牧守吳郡地重舊矣守郡者非名人不敢當晉吳郡太守與會稽吳興三郡為真二千石嘗欲以黃門侍郎郤愔為吳郡守愔自以資望少不宜超蒞大都乃改臨海蘇峻平將以孔坦為吳郡自陳吳多賢豪而坦年少未宜領之亦改吳興蕭子範為蔡令撰辭吳郡表略云全吳奧區地迫都輦譬彼西京則扶風馮翊方之洛下則潁川河內自非時雨之政解繩之才寧可奉共理之言承河潤之旨白樂天少時嘗言異日首獲蘇杭一郡足矣後三十七年始佩蘇印又謂豈始望及此吳郡太守為古今貴重於此可以槩見漢未分吳會時但稱會稽太守後漢始有吳郡太守晉時有吳國則曰吳國內史或曰郡守唐號蘇州刺史或稱吳郡太守或兼江東採訪使或稱吳郡採訪使今採托諸史及他記載中顯有名稱者立牧守條本朝稱知蘇州今稱知平江府事具題名記前漢朱買臣吳郡人武帝時為會稽太守治吳先是東越數反覆買臣因言故東越王居泉山一人守險千人不得上今聞南徙五百里大澤中今發兵浮海直指泉山列兵席卷可破滅也乃拜買臣會稽太守帝謂買臣曰富貴不歸故鄉如衣繡夜行今子如何詔買臣到郡治樓船備糧食水戰具須詔書軍到與俱進初買臣昔嘗從會稽守邸者寄居飯食及為太守衣故衣懷其印綬步歸郡邸直會稽上計吏等羣飲買臣入室中守邸與共食少見其綬守邸怪之前引其綬視其印會稽太守章也驚出語上計掾吏皆醉大呼曰妄誕耳其故人素輕買臣者入視之還走疾呼曰實然坐中驚駭白守丞推排陳列中庭拜謁買臣徐出戶有頃長安廄吏乘駟馬車來迎買臣遂乘傳去居嵗餘受詔將兵與橫海將軍韓説等俱擊破東越有功徴入為主爵都尉列於九卿焉後漢尹興為吳郡太守楚王英隂疏天下名士有興名陳瑀以安東將軍行吳郡太守受詔與孫策同討袁術將併圖策屯於海西為策所破江表傳許貢為吳郡太守時孫策方起貢上表漢帝謂策驍雄類項籍宜以貴寵召還若置於外必為世患策候吏得表以示策策遂殺貢貢小子與客亡匿江邊策單騎出貢客擊傷策䇿病創死盛憲器量雄偉遷吳郡太守以病去官孫策闕憂憲不免與曹公書徴為騎都尉制命未至為權所害會稽典録僮和後漢為吳郡太守吳太史亨慈之子厯尚書吳郡太守吳書一名高謝朂吳郡太守與兄承並知名滕胤有節操自丹陽徙吳郡太守每聽訟察言觀色務盡情理人有窮寃對之流涕晉譙敬王恬忠正有幹局在朝憚之補吳國內史司馬允之恬之子為吳國內史拒庾楷斬其將段方為桓玄所害沈充車騎將軍吳國內史見沈演之傳傅咸為吳郡內史吳郡顧榮與親故書曰傅長虞徑直忠果雖非周才亦足貴也王恬導之子少好武晚節更好士起為後將軍轉吳國內史王洽導諸子中最知名為吳國內史召拜領軍尋加中書令固辭不受有清裁之稱王珣洽之子為吳國內史在郡為士庶所恱王劭導之子有風操為吳國內史子默亦繼父官王薈導之子為吳國內史年飢人多餓死薈以倉米作饘粥以啖餓者所濟活甚衆召為中領軍復為吳國內史王謐劭之子少有美譽自侍中拜吳國內史未至郡留為中書令袁山松博學有文章為吳郡太守時孫恩作亂山松守滬瀆城城陷被害魏詠之好學不倦桓玄篡位協贊義謀義熙初進征虜將軍為吳國內史顔含有操行以孝聞除吳郡太守王導問含曰卿今蒞名郡政將何先答曰王師嵗動編戶虛耗南北權豪競招遊食國弊家豐執事之憂且當悉化勢門使反田桑數年之間欲令戶給人足如其禮樂俟之眀宰含所厯簡而有恩眀而能斷然以威御下導歎曰顔公在事吳人斂手矣鄧攸清和平簡方正寡欲為吳郡太守載米之郡俸祿無所受惟飲吳水而已時郡中大飢攸奏賑貸未報乃輒開倉救之郡政清眀百姓歡悅為中興良守後稱疾去職郡常有送迎錢數百萬不受一錢百姓數千人牽攸船不得進攸乃小停夜中發去吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯挽不留謝令推不去百姓詣臺乞留一嵗不聽郤鑒討賊帥劉徴加都督吳郡諸軍事刁彞協之子斬讎人黨以祭父墓由是知名厯吳國內史殷祐為吳郡內史上箋論顧榮功髙贈典不稱榮由是贈侍中驃騎將軍開府儀同三司江灌少知名才識亞於逌自尚書中護軍為吳郡太守加秩中二千石未拜卒劉牢之當孫恩之亂吳郡內史桓謙棄郡走牢之都督吳郡諸軍事恩破吳國殺內史袁山松牢之使參軍劉裕討平之張茂有志行為鄉里所敬信補吳國內史沈充之亂遇害少嘗夢得大象以問占夢曰君當得大郡而不善也象大獸獸守也故知當得大郡然象以齒焚果如其言賀循字彥先操尚髙厲童齓不羣言行進止必以禮讓不汙陳敏之亂敏破除吳國內史不就元帝為安東將軍復上循為吳國內史循作吳郡初不出門吳中強宗輕之乃題府門會稽雞不能啼賀聞故出行至門反顧索筆答之云不可啼殺吳兒於是至諸屯及邸閣檢校諸顧陸使官兵及藏逋亡悉以事言上罹罪者衆陸抗時為江陵郡都督故下自請孫皓然後得釋出世説顧祕吳國內史唱義傳檄以討李辰石冰之亂應詹性質素𢎞雅以學藝文章稱由後軍將軍出補吳國內史庾冰亮之弟以雅素垂風自司徒右長史出補吳國內史蘇峻反遣兵攻冰冰不能禦奔會稽率衆進擊峻兵乘勝赴京都封新吳縣侯固辭不受庾羲亮之子少有時譽初為吳國內史時穆帝頗愛文義羲至郡獻詩頗存諷諫庾希冰之子自侍中出為輔國將軍吳國內史後死於桓溫之刑蔡謨當蘇峻反時吳國內史庾冰出奔會稽乃以謨為吳國內史謨既至與張闓顧衆顧揚等共起義兵迎冰還郡峻平復為侍中桓檀詳正有望補吳國內史王愷為侍中多所獻替出為吳國內史荀㽔山松之子有儀操風望除建威將軍吳國內史荀羡㽔之弟資稟逸羣清和有準遷吳國內史王允之舒之子蘇峻之亂督護吳郡義興晉陵三郡征討軍事破賊韓晃於長塘賊平以功封彭澤縣侯王侃少歷顯職位至吳國內史虞談清正有檢操始為吳興太守蘇峻反加談督三吳晉陵宣城義興五郡軍事峻平轉鎮軍將軍吳國內史徙會稽未發還復吳郡時軍荒之後百姓飢饉死亡塗地談乃出倉米賑救又修滬瀆壘以防海抄百姓賴之子嘯父隆安初為吳國內史兄􅔎之子谷亦位至吳國內史樂謨廣之子南渡江為征虜將軍吳國內史張敞郡人桓玄篡位敞為尚書以答事忤玄敞表獻忠欵事平為吳郡太守事見南史敞子邵傳而子裕傳乃云為吳國內史敞子孫至宋齊之後益昌為吳大家云宋劉損字子騫元嘉中為吳郡太守至閶門便入太伯廟室宇頽毁垣墻不修損愴然曰清塵尚可髣佛衡宇一何摧頽即令修葺王琨亷約忠實立朝強正為吳郡太守遷中領軍坐在郡用朝舍錢餉二宫諸王及作絳襖奉獻軍用左遷光祿大夫袁珣為吳郡太守諡曰貞珣弟子粲舊名愍孫幼孤好學有清才隨珣在郡擁弊裘讀書足不踰戶有欲與珣子顗婚珣曰顗不堪政可與愍孫婚耳張永廢帝時自侍中領安成王師出為吳郡太守事具人物門張岱永弟齊建元初為吳郡太守高帝手敇加護軍以家為府事具人物門張緒元徽中自侍中為吳郡太守事具人物門張瓌宋升眀中以誅劉遐授吳郡太守封義成侯齊眀帝時復為太守以拒王敬則瓌事具人物門顧琛吳人孝建初為吳郡太守以起義功封永新縣五等侯廢帝即位為吳郡太守王曇生大眀中為吳郡太守又見顧琛傳顧覬之吳人為吳郡太守不低意於幸臣蔡興宗嫌其風節過峻事見人物門羊玄保厯吳郡太守文帝以玄保廉素寡欲故頻授名郡為政雖無殊績而去後常必見思栁世隆字彥緒為吳郡太守居母憂寒不衣絮王僧達為吳郡太守王慈字伯寶少有內潤之稱厯吳郡太守王誕字茂世為宋武帝太尉長史帝甚仗之復為吳國內史母憂去職江夷字茂逺宋初厯吳郡太守營陽王於吳縣見害夷臨哭盡禮以兄疾去官厯任以和簡稱王思逺為吳郡丞行郡事時稱得人詳見官吏門褚淵字彥回宋眀帝時厯侍中為吳郡太守帝寢疾亟馳使召之託以後事受顧命輔幼主褚澄字彥道彥回弟尚宋廬江公主厯官清顯尤善醫術建元中為吳郡太守百姓李道念以公事到郡澄謂曰汝有重疾答曰病冷五年澄為診脈曰汝病非冷非熱當是食白瀹雞子過多所致令取蘇一升煮服之始一服乃吐出一物如升涎裹之動開看是雞雛羽翅爪距具足能行走澄曰此未盡更服所餘藥又吐得如向者雞十三頭而病都差當時稱妙張充自尚書僕射出為吳郡太守下車恤貧老故舊莫不欣恱事具人物門宗室安陸昭王緬字景業仕宋為吳郡太守政有能名竟陵王子良與之書曰竊承下風數十年來姑蘇未有此政武帝嘉其能纍遷官宗室南康縣侯子恪字景沖有文學建武中為吳郡太守大司馬王敬則反於會稽以奉子恪為名子恪逃之梁大通二年復為吳郡太守卒江斆字叔文有風格不降意權幸厯吳郡太守何叔度尚之之父義熙中為吳郡太守太保王𢎞每稱其清身潔已謝舉字言揚與兄覽齊名江淹目為二龍大同三年為吳郡太守先是何敬容居郡有美績世稱何吳郡及舉為政聲迹略相比嘗要何徴君講中論何難以巾褐入南門乃從東門進致詩往復為武丘山賦題于寺王規字威眀神峰標映時稱俊人為吳郡太守簡文帝為作謝章曰駕吉祥之車入句吳之地驅緹扇之馬撫奉德之鄉製錦何階棼絲方始主書芮珍宗家在吳前守宰皆傾意附之珍宗假還規遇之甚薄俄召為左戶尚書郡境千餘人詣闕請留表三奏不許求於郡立碑許之袁君正字世忠美風儀早得時譽為吳郡太守侯景亂率所領赴援君正當官有名稱君正子憲字德章朝野嚴憚詳練朝章遷吳郡太守以父任固辭改授南康內史李元履幼有操業甚間政體仕梁為吳郡太守宗室南浦侯推字智進清敏好屬文厯吳郡太守所臨必旱吳人號旱母然侯景之亂握節死之宗室南海王大臨大寶元年除吳郡太守時張彪起義會稽或勸大臨投之大臨曰彪若成功不藉我力如其撓敗以我説焉不往二年遇害吳郡志卷十
