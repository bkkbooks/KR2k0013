body:
  text: 吳郡志卷二十六宋范成大撰人物范仲淹字希文事具歐陽文忠公所撰神道碑及國史傳其略云皇祐四年五月甲子資政殿學士尚書戶部侍郎汝南文正公薨於徐州五代之際世家蘇州生二嵗而孤母再適長山朱氏仍其姓始名説既長知其家世感泣去之南都入學五年大通六經為文章論説必本仁義舉進士禮部選第一中乙科始歸迎其母以養少有大節其於富貴貧賤毁譽歡戚不一動其心而慨然有志於天下常自誦曰士當先天下之憂而憂後天下之樂而樂也其事上遇人一以自信不擇利害為趨捨天聖中為袐閣校理以言事忤章獻太后旨通判河中府召拜右司諫上疏請還政天子及郭皇后廢率諫官御史伏閣諫又揖宰相留百官廷爭不能得貶知睦州徙蘇州州地瀕震澤田多水募遊手疏五河導積水入海興作未就徙眀州轉運使言仲淹治水有緒願留以畢其役詔復知蘇州召還拜天章閣待制益論時政闕失知開封府治有聲取古今治亂安危為上開説又為百官圖以獻宰相吕夷簡怒交論上前落職知饒州徙潤越州趙元昊反河西為陜西經略安撫副使又為環慶路經略安撫招討使兵馬都部署為將務持重不急近功小利待將吏必使畏法而愛已所得賜賚皆以上意分賜諸將諸番質子縱其出入無一人逝者番酋來見召之卧內屏人徹衛與語不疑居二嵗士勇邊實恩信大洽乃決䇿謀取橫山復靈武而元昊數遣使稱臣請和上亦召之歸慶歷三年為樞密副使數月為參知政事每進見必以太平責之再賜手詔趣使條天下事又開天章閣召見賜坐授以紙筆使疏於前退而條列時所宜先者十數事上之僥幸之人皆不便因相與騰口而嫉之者亦幸外有言喜為之佐佑會邊奏有警即請行乃以為河東陜西宣撫使即拜資政殿學士知邠州兼陜西四路安撫使其知政事才一嵗而罷有司悉奏罷前所施行而復其故言者遂以危事中之賴上察其忠不聽是時夏人已稱臣因以疾請鄧州守鄧三嵗求知杭州又徙青州公益病又求知潁州肩輿至徐遂不起年六十有四贈兵部尚書諡文正御篆其碑曰裦賢之碑為人外和內剛樂善泛愛喪其母時尚貧終身非賔客食不重肉臨財好施意豁如也及退而視其私妻子僅給衣食其為政所至民多立祠畫像其行已臨事自山林處士里閭田里之人外至夷狄莫不知其名字而樂道其事焉長子純佑少有大志蚤卒純仁純禮純粹皆名世閻灝撰文正公真贊云英英如神屹屹如山仁義道德溢於顔間大忠臯夔元功方召以贊中樞以尊清廟佑我仁祖格于皇天是肅是虔不傾不騫維慶有祠邦民瞻思慶山可夷兹堂巍巍范純仁字堯夫仲淹子第皇祐元年進士父薨始出仕治平中為侍御史議濮王典禮不當命出房闥通判安州由是名震天下後知諫院言王安石驟更法度恐失人心作尚書解以進前後上言以休兵省事節用富民進君子退小人愛人材伸公論為急崇聚斂事苛刻親讒佞任偏聽為戒大則廷論小則疏述反復激切無所諱避復出補外元豐八年召為給事中明年同知樞密院事陳禦備西戎之䇿事俱施行元祐三年拜尚書右僕射自為執政務以博大開上意忠篤革士風救蘇軾韓維王覿等極言前世朋黨之禍吳處厚箋蔡確詩以聞朝廷欲貶之死地純仁獨曰此路自丁晉公後荊棘已七八十年不可自吾輩開之奏乞薄確罪亦出知潁昌府踰年復相於事無所回隱同列病之哲宗於大臣中獨注意純仁問人材法度悉以實對章子厚用事復出知潁昌纍貶永州徽宗即政即日走中貴人湖南致上及皇太后命勞賜甚寵所啓皆國家大體蓋將屬以重任以中太乙宫使召以目疾辭上每對輔臣以不見純仁為恨年七十五薨賜世濟忠直四字為墓隧碑首諡曰忠宣純仁性夷易寬簡嘗曰吾平生好學得之忠恕二字厯事四朝無間言自為布衣至宰相廉儉如一范純禮字彞叟仲淹子元祐中為給事中凡所封駮正名分立紀綱皆國體之大者論張耒不當不候參召令供職一時聳動知開封府一切以寬革前政刻深之弊中丞蘇轍攻右丞王存去將用轍代存純禮曰蘇章不避嫌此必不放過數日徙純禮刑部侍郎轍方拜元符三年拜右丞以年老力辭上謂安燾曰范純禮作執政不應引年況精力康強卿等以國家圖任老成之意勉之救陳次升以言得罪乞以嘉言用江公望留王覿解上官均鄒浩之言為理當從之乞罷京城豬羊圈解山陵明器之煩費曽布榻前云人皆言財用不足天下何憂無錢純禮進曰天下告窘戶部無料錢支藏庫空竭無如今日布誑陛下建中靖國元年知潁昌府尋除端眀殿學士崇寧初纍責單州年七十六純禮居二府布衾絁袍不為表襮沽名譽食飲不擇其鮮不役婢妾中年即清居端坐全真容物不爭而立朝端方乃不可犯人以劉寬卓茂方之范純粹字德孺文正公第五子元豐中歷鄜延陜西轉運判官鄜延都總管環慶經略安撫使改鄜延又改熙河蘭岷路元符中改河東復移鄜延兼知慶州延安太原府戶部侍郎知河南府神宗謂純粹遇事不茍存心公家旁無顧慮任陜西轉運時當五路大舉財用匱乏吳居厚為京都轉運使上羡餘三百萬緡上遂以賜純粹純粹愀然曰吾部雖窘豈忍取此膏血力辭弗納紹聖元年言者論棄四寨之地實啓戎心司馬光文彥博等主之於內純粹等行之於外後遂入黨籍最後貶鄂州久之敘官復徽猷閣待制政和七年卒年七十二范正平字子夷忠宣公次子紹聖初為開封尉戶部尚書蔡京結后戚向氏欲展向氏墳正平爭以為民田不可奪京坐贖銅由此恨之忠宣薨小人附會言正平兄弟撰造永州傳宣聖語及行狀非忠宣意行狀實李之儀受忠宣之意次第之正平遂與之儀俱下御史獄事解猶謫龔州歸終身不仕初忠宣薨特添恩澤分官中外諸孫久之追奪例外官正平遽納其子官全其姪與甥焉方遺表獄作弟正思曰兄是時方當窀穸某實預議正平獨身當之其後徐丞相處仁問正平之為人於王實仲弓仲弓作卓行對一篇大略謂正平力學為文通古今論議出人意表為宰相子有聲譽不朋比為進取資不可以勢屈不可以利回質之神眀而不疑行之屋漏而無愧云范琪字希世文正公之從兄天聖五年進士歷開封府法曹知鄞縣葺堰埭百餘決導瀦積徙常熟濬金涇鶴瀆二浦溉田千頃為公家利其在天府議法必精握節不撓府尹胥安道給事中孫夢得交薦之子師道有賢名蔣堂敘范氏上世謂琪之髙祖隋自唐末作麗水丞屬亂離遂家於蘇曽祖鈞祖從誼並在錢忠懿王幕下父昌言歸本朝贈國子博士皆葬吳縣三讓鄉之天平山云范師道字貫之天聖九年進士纍知廣德縣縣淫祀嵗殺牛以祀神一切禁絶之擢侍御史數以論事忤宰相劉沆出知常州復召為起居舍人同知諫院會百官上尊號乃言災異數出而崇尚虛文非所以答天戒又言宫人多遷除恐女寵因緣以害政事上皆嘉納之又言陳升之不當進用出知福州復入為三司鹽鐡副使終直龍圖閣知眀州有奏議二十卷文集五十卷子世京世亮皆登科范世京字延祖皇祐五年進士歷和州歷陽令適師道守眀州世京棄官侍養曰人子事親之日少事君之日多寧可曠時失定省父喪扶護歸鄉垢面跣足晝夜哀號行路為隕涕服除熙寧初官湖北廣南召至京師與時論不合辭歸終祕書丞范唐末吳處士有子七嵗能吟詩贈隱者云掃葉隨風便澆花趁日隂處士方干聞之曰此兒他日必垂名又吟夏日詩云間雲生不雨病葉落非秋干曰惜哉必不享夀果十嵗而卒延賔佳話唐宋遺史范周字無外文正公姪孫贊善純古之子負才不羈工詩詞無意榮達安貧自樂未嘗屈折於人所居號范家園所賦詩甚多時出傑句如詠懷云一瓢有道泰山重五鼎不義鴻毛輕其氣槩肆兀類如此林虙字德祖旦之子好古嗜學擢第纍遷朝奉郎太學録開封府司録以府尹不之禮移疾告歸不復出仕所居在大雲坊因自號大雲翁屏置朝章不入州縣先達稱其髙有大雲集百卷神宗聖訓十卷朱長文字伯原光祿卿公綽之子公綽居鳯凰鄉集祥里園亭甚古長文擢第號其居曰樂圃時俊咸師仰之號樂圃先生米芾撰墓表略云十九嵗登乙科病足不肯從吏築室樂圃有山林趣著書閲古樂堯舜道郡守監司莫不造請謀政所急士大夫過者必奔走樂圃以不見為恥公卿薦以自代者甚衆天子賢之起為本郡教授又召為太學博士祕書省正字元符元年卒鄉人立祠於郡庠家徒藏書萬卷天子知其清特賜其家絹百匹崇大年字靜之慶歷中擢進士第歷知青田縣民貧無以納和買大年悉令候冬熟州符督責追杖縣吏大年曰年凶民飢若催督必破産雖杖胥吏三五輩尚可寬一邑之民至冬民無不納足者徙知浦城縣舊設兩棧民以事追去無輕重悉置棧中大年曰此以牛馬役吾民悉命撒去有疾丐分司歸吳日與程光祿諸公觴詠燕遊號吳門十老大年德守淳固志尚夷曠恬於執利不求聞達辭郤薦辟浩然易退吳士自陳君子之奇之後大年繼有賢稱分司後十三年致仕又十四年卒年八十二樂圃先生朱長文與鄉人議諡謂黔婁辭國有餘貴辭粟有餘富其諡曰康陶淵明隱約就間其諡曰靖節大年當有道之世秉難進之節韜章藴能不自表襮仕而知止貧而忘憂凜然有古髙士之風乃共諡曰康靖先生林希逸史朱長文行狀富嚴大中祥符四年進士以刑部郎中守鄉郡嘉祐中守祕書監致仕未嘗一造官府以耆德稱所居坊人以德夀目之富氏本出處之青田文忠公弼於嚴為叔父嚴之祖始居吳葬焉遂為吳人子臨亦有文名曽孫鈞洵元衡皆登科郭附字眀仲嘉祐八年進士知洪州新建縣俗健訟好持吏短長附至問民疾苦皆以鷙獸暴橫為言乃檄旁縣尉併力仍以厚賞啖壯士不閲月得鷙獸數十尸諸庭乃號於衆曰有悍不率教如此獸者皆殺之無一人敢犯令以朝奉大夫致仕幅巾䇿杖窮山林詩酒之適十八年東南髙士皆碩從遊卒年八十四胡稷言字正思則之姪學古文宋景文公以特奏補官為山隂丞致仕築圃鑿池追陶靖節之風種五栁以名堂清修寡欲延納後進日晡後不飲食客坐蕭然具湯一杯而巳年八十餘子嶧胡嶧字仲連居五栁松窗蓬戶人以為隱君子步趨言動皆有尺度賔嘉喪祭率遵古法用杜甫詩名所居曰如村自號如村老人纍舉命官終不仕卒年七十九詩文簡古如其為人子百能胡百能字少明紹興十八年進士知江山縣有惠愛乾道初選教諸王宫嚮進用矣以年至力請老朝廷嘉之乃以左奉議郎賜緋衣銀魚致其事歸築堂曰宜休相羊里巷錙銖軒冕殆其天性久之乃卒年七十四子耕郭元邁字英逺附之孫博通經史入太學魁上舍靖康之難募使北朝通問徽欽二聖元邁上表請行詔以為副使行次河朔以尺紙付家云出疆當艱棘時難保全生此身已許國矣至北廷上書金帥粘罕乞歸二聖為金所留尚書洪皓得自北歸首言王倫及元邁以身徇國棄之不取緩急何以使人章甫字端叔自建徙居於吳其八世祖本浦城人有西村珠林二族西村之裔多顯仕珠林至甫曽祖可法始登科甫熙寧三年進士知夀春縣大臣以孟子解義進詔付袐書省除太府寺丞召對稱旨除府界提舉常平事崇寧初除都官郎中陛對抗言元祐臣僚削秩投荒皆緣國事非為身謀稍稍內徙道路交慶今復刻名黨籍禁錮子孫恐非陛下本意上優容之尋挂冠歸吳藏書萬卷讐校精密卒年六十二八子憲其一也章憲字叔度居黃村樂道好德操履髙潔行有餘力而以學文鄉里謂之隱君子其學師事王信伯而與朱子發吕居仁等遊尤邃於春秋有復軒集十卷曽文清公幾為之序郟亶字正夫崑山太倉農家子自幼知讀書識度不碌碌嘉祐二年進士崑山自國朝來登科者自亶始嘗條吳中水利為書上之熙寧間以亶為司農寺丞奉使浙西措置水利民不以為便遂罷詳見水利門終比部郎中子僑子髙亦有才鄉里推重謂之郟長官有幼成警悟集行于世李璋居盤門有不羈之才王荆公甚愛之嘗有詩送璋應舉云湖海青衣二十年尚從鄉試已華顛又送其下第云學如吾子何憂失命屬天公不可猜璋後改名玖以纍舉補官孫益亦登科紹興間任監察御史馬友直字伯忠其先本姓司馬氏有名球者仕吳越以御史中丞為崑山鎮遏使因家焉子孫樂道不仕隨乎流俗故止稱馬氏聚族居於邑之全吳鄉六直里以孝義著兄弟六人皆力穡獨友直以儒業自奮入京師太學元符二年薦春官與李豸方叔遊知友直賢以其兄之子妻之逮宣和水災全吳之田悉與江通兄弟皆狼狽營妻子友直獨迎其親徙於邑之進賢里僦屋以居躬養菽水母子晏如也建炎二年以纍舉得官初主湖之武康簿次監潭州南嶽廟尚強健即挂冠以宣教郎卒年七十六侍郎唐公輝御史王公葆及我先君少師皆敬愛之孫先覺登紹興庚辰進士科閭丘孝終字公顯郡人嘗守黃州蘇文忠公在東坡時與交從甚密公後經從必訪孝終賦詩為樂孝終既挂冠與諸名人耆艾為九老會王蘋字信伯事伊川先生視河南髙第楊時猶為後進時亦以為後來師門成就者惟蘋髙宗駐蹕平江郡守孫佑薦其學行召見上以為通儒賜進士出身除祕書省正字受詔條具敵退利害蘋奏治本三説一曰正心誠意二曰辨君子小人三曰消朋黨遷著作佐郎通判常州蘋識慮精微議論平易頽然若與世忘不著書既老乃集古今語説為一書未成而卒黃䇿字子虛彥之子登科為雍丘主簿元符末詔許中外言事時昭慈聖獻皇后既復位號典册有未盡正者䇿引古義上書言甚切後以此入黨籍羈管登州會赦還鄉後除直祕閣自號隨緣居士吳郡志卷二十六
