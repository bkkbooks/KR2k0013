body:
  text: 吳郡志卷四十九宋范成大撰雜詠吳中風物之美騷人墨客凡所賦詠皆以類見無所附麗者則萃于此其目有八一曰紀詠白居易吳中好風景詩二首吳中好風景八月如三月水荇葉仍香木蓮花未歇海天微雨散江郭纎塵滅暑退衣服乾潮生船舫活雨衙漸多暇亭午初無熱騎吏語使君正是遊時節吳中好風景風景無朝暮晚色萬家烟秋聲八月樹舟移絃管動橋擁旌旗駐改號齊雲樓重開武丘路況當豐熟嵗好是歡遊處州民勸使君且莫拋官去崔融次韻洛渚問吳潮吳門想洛橋夕煙楊栁岸春水木蘭橈城邑南樓近星辰北斗遙無因生羽翼輕舉託還飇蘇子美過蘇州東出盤門刮眼眀蕭蕭疏雨更隂晴緑楊白鷺俱自得近水逺山皆有情萬物盛衰天意在一身羈苦俗人輕無窮好景無緣住旅棹區區暮亦行杜牧經闔閭城遺蹤委衰草行客思悠悠昔日何人處終年水自流孤煙村戍逺亂雨海門秋吟罷獨歸去煙雲盡慘愁劉禹錫憶春草館娃宫外姑蘇臺鬱鬱芊芊撥不開無風自偃若知否西子裙裾曾拂來二曰遊覽蘇子美遊山上春遊南峰出自閶扉西崎嶇緣田塍時又涉狹磎午初至峰下先讀爛石碑僧廬頗新鮮丹青晃朝曦云昔支公居石迹有馬蹄踰嶺到天平上觀石屋危蒼壁瀉白泉對之已忘疲西巖列窗戶玲瓏透斜暉嶔然似飣餖人力安可施朝餐下木瀆市物俗所宜琴臺昔嘗遊回首憶舊題南向又度嶺盤屈麋鹿蹊摺身趨寶華未到聞法鼙松澗見廣路平如隱金鎚寺壓兩山腳三面張屏幃夜闌宿虛堂清甚無夢思西南登堯峰俗云堯所基洪川不能沒上有萬衆棲中道舍籃輿從者亦汗衣關陸巧步趨健馬莫可追自傷幹軀大兩股酸不隨巖雨灑磴滑惟賴枯笻枝四顧物象殊雖困强自持竹木互支撐小閣架險梯凌晨過橫山蹴踏雲霞低身如插翅翼下見鴻鵠卑却視衆壑林密若薺麥齊是皆樗櫪材春登緑翠􅐾一方紺碧瓦樓殿貼地飛右顧萬頃湖東與天相迷日炙白煙開風驅銀山移旁過折腰塔鐵輪盡顛隳近為震霆拔火烈瓦甓糜未知天之意摧此將何為迤邐瞰薦福愛此路側池清無一㸃塵蝦魚潜琉璃寶積仰修竹整如翠羽旗楞伽屋老朽是亦傳者非北渡千丈橋柱裊欄傾欹攬衣俯而趨愁為溪風吹遇勝輒自留仰嘯巾屢遺永言嘉謔浪把酒先嘻嘻豫履閲奇怪瞪睨惟嗟咨及還城中居城人殊未知自疑身彼留暫此夢寐歸紛然著鄙事奔走爭自私向者却是夢反復又自疑神眀日夜往內顧行者尸何由擺塵坌榮辱兩莫期清泉與白雲終老得自怡蘇軾和太守王規父侍太夫人觀燈二首不覺朱輪輾後塵爭看繡幰錦纒輪洛濱侍從三人貴京兆平反一笑春但逐東山擕妓女那知後閣走窮賓滯留不見榮華事空作賡詩第七人翻翻緹騎走香塵激激飛濤射火輪美酒留連三夜月豐年傾倒五湖春安排詩律追强對蹭蹬歸期為惡賔墮珥遺簮想無限華胥猶見夢回人胡宿彭山贈貫之彭山隔重湖落日見孤塔揚舲入空曠煙樹散鵝鴨山中老癯仙萬頃纎芥納乘風落珠唾暝色逺相答平生爾汝分磁鐵契已狎萬緣一笑空箇處無剩法方舟過谷隱風雨寒霎霎黎明帶星歸尚及齊鼓踏臨岐戒後㑹梅熟新秧插期我散縑楮莫忘鷗盟歃三曰書事李紳過吳門煙水吳都郭閶門架碧流緑楊淺深巷青翰往來舟朱戶千家室丹楹百處樓水光搖極浦草色辨長洲憶作麻衣客曽為旅棹遊放歌隨楚老清宴奉諸侯花寺聽鶯入春湖看鴈留里吟𫝊綺唱鄉語認歈謳橋轉攢虹飲波通鬬鷁浮竹扉梅圃靜水檻橘園幽絶堵荒麋苑穿巖破虎丘舊風猶越鼓餘俗尚吳鈎故館曾間訪遺基亦遍搜吹臺山木盡香徑佛宫秋帳殿菰蒲掩雲房霧露收苧羅妖廢滅荆棘鬼包羞風月俄黃綬經過半白頭重來冠蓋客非復别離愁候火分通陌前旌駐外郵水風搖綵斾隄栁引鳴騶問吏兒孫隔呼名禮敬修顧瞻殊宿昔語默過悲憂義感心空在容衰日易偷還持滄海詔從此布皇猷韋應物軍中冬燕滄海已云晏皇恩猶念勤式燕遍恆秩柔逺及斯人兹邦實大藩伐鼓軍樂陳是時冬服成戎士氣益振虎竹謬朝寄英賢降上賓旋罄周旋禮愧無海陸珍庭中丸劒闌堂上歌吹新光景不知晚觥酌豈言頻單醪昔所感大醵況同欣顧謂軍中士報答何由申曹松春日自吳門之陽羡道中書事勝異恣遊應未遍路岐猶去幾時還浪花湖濶虹霓斷栁線村深鳥雀間千室綺羅浮畫楫兩州絲竹會茶山眼前便是神仙事何必須言洞府間王元之盡怪吳蘇地瓊花冷不銷時賢臨水國天氣似中朝密逐江雲墮輕隨海吹飄影沈松塢亂片響葦篷焦粉拂龍頭舫繒鋪鴈齒橋煮茶收嵗計宜稻採民謡拔笋芽先出欺梅蘂自凋誰言未盈尺猶稱不封條郡守齊黃霸眀君邁帝堯縣官惜歌詠翻恐笑漁樵李嘉祐自蘇臺至望亭驛人家盡空春物增思悵然有作因寄從弟紓南浦菰蔣覆白蘋東吳黎庶逐黃巾野棠自發空流水江燕初歸不見人逺樹烽火依依如送客平田渺渺獨傷春那堪回首長洲苑年年報虜塵梅摯五日公宴虎符新合晚芳天良會難并樂與賢心愧白公求治切下車三月始開筵蘇軾閭丘汪君二家雨中飲酒二首小圃隂隂遍灑塵方塘灔灔欲生紋已煩仙袂來行雨莫遣歌聲便駐雲肯對綺羅辭白酒試將文字惱紅裙今宵記取醒時節㸃滴空階獨自聞五紀歸來鬢未霜十眉環列坐生光喚船渡口迎秋女駐馬橋邉問泰娘曽把四絃娛白傅敢將百草鬬吳王從今却笑風流守畫㦸空凝燕寢香皮日休吳中言情寄魯望古來傖父愛吳鄉一上胥臺不可忘愛酒有情如手足除詩無計作膏肓宴時不輟琅書味齊日難判玉鱠香為說松江堪老處滿船煙月濕莎裳陸龜䝉菰煙蘆雪是儂鄉釣線隨身好坐忘徒愛右軍為㸃畫間披左氏得膏肓無因月殿聞移屧秪有風汀去採香莫問江邉魚艇子玉皇看賜羽衣裳蘇子美九月五日夜出盤門書呈黃尉紺紬幕見黃金鉤珠璣磊落澄不流紛紛媚景動波上的的逺勢生沙頭前山漸昏漁唱息惟有疏葦吟窮秋豫方弭楫對此景時欲乘興長城遊青娥蕩槳忽逺至雖有雅約猶嚬羞綵舟鮮眀四窗闢蘭酎辛滑佳賔留歌餘清冽貫衆耳笑動姿采生香㡚玉盤鱠鱸光一色餖簇肴核隨所搜河斜參倒氣愈浩我起飲子子必酬共知此會不易得邂逅得此難再求區區才知自勞役擾擾塵俗多悲憂已醉更歌更起舞眀日分散空離愁蘇子美邂逅劉公尤於平望之西聨舟夜語走筆敘意昔别蘋初生離謳發清商契闊幾何時遺囀猶在梁我亦遊宦者吳會非我鄉三考一瞬息扁舟此徜徉邂逅通夕語弭棹水中央淡影月照戶遙音鴈南翔攄意良未盡詎及羅酒漿子去尚千里道路阻且長嶔﨑慎所厯無令馬𤣥黃林歆寒食家家踏曉晴好風吹我出重城幾灣野水迎人白數㸃家山刮眼眀已有鴒原聯乘樂何須鷁尾並橈行山前父老應相笑為我頻來學送迎林希初至吳門示諸弟兼呈伯原教授夢寐家山忽五春君恩乞與守符新便推白𫝊為前政更得梁鴻作部民入境喜逢餘秉穗舉杯無復歎鱸蓴左司西掖誠非據尤是詩情愧昔人四曰懷古許渾宫館餘基輟棹過黍苗無限獨悲歌荒臺麋鹿爭新草空苑鳬鷖占淺莎江上雨來虛檻冷海邊風起逺帆多可憐國破忠臣死日月東流生白波陸龜䝉疊韻吳宫詞二首膚愈吳都姝眷戀便殿宴逡巡新春人轉面見戰箭紅櫳通東風翠珥醉易墜平明兵盈城棄置遂至地皮日休浸深尋嶔岑勢厲衛睥睨荒王將鄉亡細麗蔽袂逝枍指替製曳康莊傷荒涼主虜部伍苦嬙亡房廊香杜牧越兵驅綺羅越女唱吳歌宫盡花聲少臺荒麋跡多茱萸垂曉露菡萏落秋波無遣君王醉滿城嚬翠娥香徑繞吳宫千帆落照中鸛鳴山苦雨魚躍水多風城帶晚莎緑池連秋蓼紅當年國門外誰信伍員忠劉商懷古送李秀才下第歸江南姑蘇臺枕吳江水層級鱗差向天倚秋眀雲白萬林空低望吳田三百里當時雄盛何如此千仞無根立平地臺前夾月吹玉鸞臺上迎涼撼金翠銀河倒瀉君王醉灔酒峩冠眄西子宫娃酣態舞娉婷香飇四颯真珠墜伍員結舌長歔欷忠諫無因能到耳城烏啼晝海霞銷深掩金屏日髙睡王道潜隨伍貟死河斗中間曕王氣會稽勾踐擁長矛萬里馬蹄掃空壘瓦解冰消真可恥凝艷妖芳安足恃可憐荒苑雨冥濛麋鹿呦呦繞遺趾君懷逸氣還東吳狂吟日日遊姑蘇興來下筆倒奇景瑶盤迸灑鮫人珠大鵬矯翼翻雲徑危峰霽後凌天孤海潮秋打羅剎石月魄夜當彭蠡湖有時凝思萬慮無霓幢髣佛遊仙都琳琅暗戛玉華殿天香靜裊金芙蕖君聲日下聞來久清贍何人堪敵手我逃名迹遁西林不得灞陵傾别酒莫便五湖為隱淪年年三十升仙人五曰題贈蘇舜欽答章𫝊廢官旅吳門迹與世俗掃搆亭滄波間築室喬樹杪窮經交聖賢放意狎魚鳥志氣內自充藜藿日亦飽不圖名利場有士同所好南閩章其氏𫝊名字𫝊道清晨闖豫門疏爽見姿表大篇隨自出爛漫風力老安敢當所褒讀之欲驚倒開軒延與語指亦有深到平生踏京塵識子恨不早扶疏珊瑚枝本不自雕巧當珍玉府中何故委衰草秋風還故鄉無或歎枯槁貴富烏足論令名當自保王元之贈草庵禪師陽山山下草庵深一般心寂寂香燈對逺岑莫怪相看總無語坐禪為政梅摯酬張無夢一夢浮生無夢身先生真是古之真人蘂函裁得瑶章祕還寄吳門吏隱六曰寄贈樂天重答劉和州分無佳麗敵西施敢有文章替左司隨分笙歌聊自樂等間篇詠被人知花邊妓引尋香徑月下僧留宿劒池可惜當時好風景吳王應不解吟詩白金章張籍寄白二十二使君詩三朝出入紫微臣頭未老身登第早年同座主題書今日是州人閶門栁色煙中逺茂苑鶑聲雨後新此處吟詩向山寺知君忘却曲江春皮日休吳中書事寄漢南裴尚書萬家無事錬蘭橈鄉味腥多厭紫囂蒂重初迎水似碁文交度郭栁如行障儼遮橋青梅雨白鳥羣髙欲避潮惟望舊知憐此意得為傖鬼也逍遙陸龜䝉風清地古帶前朝遺事紛紛老寂寥三泖涼波漁蕝動藏野寺分金剎月在五茸春草雉媒驕懷歸雲江樓倚玉簫不用忘此景吳王看即奉弓招王禹稱隱舊遊寄致仕了倩寺丞橋映家家栁涇通處處蓮海山微出地湖水逺同天草沒潮泥上沙眀蟹火然應隨白太守十隻洞庭船蘇子美贈荆暉求詩全吳氣象豪詩思合翹翹風雅久零落江山應寂寥㑹將趨古淡先可鎮浮囂好是長吟處霜天看怒潮王禹稱除夜寄羅評事同年嵗暮洞庭山知君思浩然年侵曉色盡人枕夜濤眠移棹燈搖浪開窗雪滿天無因一乘興同醉太湖船胡宿寄蘇州知府蔣密學清德臨藩第二回東南時望滯鹽梅武林間嵗移星座溫樹多年直斗魁楚客江山供逸思吳王風月屬髙才空𫝊宴寢凝香句士臯橋羈旅有梁鴻洛文酒無因得仰陪又寄子美學下嚶嚶信未通金谷經為年少客滄浪翻作主人翁山川勝氣生吟次風月髙情寄飲中身外不須論得喪儻來軒冕古今同蔣之奇賀兄之翰寵換蘇印二首久次含香厭粉闈懇求茂苑得州麾却尋舊日池臺勝上冢致哀時猶憶當年几杖隨入里下車修敬日過家應憐二弟猶羈絆萬里邉沙逺帥熙自古風流詩酒早同侍宦向長洲今擁旌麾訪舊遊地韋蘇州後蔣蘇州蔣之翰恥向承平便拂衣鄉邦還得擁旌麾昔年曾預兒孫列投老猶疑筆硯隨忠義一門均許國箕裘萬石亦遭時業當看帝載熙從來疏拙朝廷虛日方圖任功懶身謀攬轡登車已倦遊幸有醉鄉為樂地何妨吟嘯老東州劉禹錫報白君報白君别來巳度江南春江南春色何處好燕子雙飛故官道春城三百七十橋夾岸朱樓隔栁條丫頭小兒蕩畫槳長袂女郎簪翠翹郡齊北軒卷羅幕碧池逶迤繞華閣池邉緑竹桃李花花下舞筵鋪彩霞吳娃足情言語黠越客有酒巾冠斜坐中皆言白太守不負風光向杯酒酒酣襞箋飛逸韻至今𫝊在人人口報白君相思空望嵩丘雲其奈錢塘蘇小小憶君淚黯石榴裙因以酬戲蘇劉禹錫白舍人曹長寄新詩有游宴之盛州刺史例能詩西掖今來替左司二八城門開道路五千兵馬引旌旗水通山寺笙歌去騎過虹橋劒㦸隨若共吳王鬬百草不知應是缺西施七曰留别白居易别蘇州浩浩姑蘇民鬱鬱長洲城來慙荷寵命去愧無能名青紫行將吏斑白列黎氓一時臨水拜十里隨舟行餞筵猶未收征棹不可停稍隔烟樹色尚聞絲竹聲悵望武丘路沈吟滸水亭還鄉信有興去郡能無情崔璞䝉恩除替兩載求人瘼三春受代歸務繁多簿籍才短乏恩威共里乖天奬分憂值嵗饑遽䝉交郡紱儻容還故里髙安敢整朝衣作牧慙為政思鄉念式微卧掩柴扉賈島赴南巴留别蘇臺知已人過梅嶺上嵗嵗北風寒落日孤舟去青山萬里看猿聲湘水靜草色洞庭寬巳料生涯事只應持釣竿賀力牧别蘇州人徘徊睇閶闔悵望極姑蘇慨矣嗟荒運悲哉惜霸圖子常終覆郢宰嚭遂亡吳宫毁無巢燕城空有樂烏兹邦號端委多士自相趨照廡同燕石光車等魏珠言離已惆悵急别更踟蹰若訪任公子求魚東海隅林希將之宣城吳門效白樂天體被詔守東吳夜渡揚子津拭目迎家山洗我京洛塵此邦多賢豪況復平生親初欲循故事公宴月三旬庶以敘契闊豈徒樂吾身臨州未閲月吏牘方紛紜避嫌俄得請主地翻為賔樽酒未重持行樂知何因物理可勝歎俯仰迹巳陳趣整震澤帆遙挹敬亭春五月而報政速哉彼齊人今我若置郵何德於吳民舉手謝吳民自笑行役頻使君不能詩煩如迎送勤來慙白太守去愧謝宣城疊嶂樓有懷吳門朱伯原虎丘換得敬亭山句水松陵數舍間天下難如兩州好君恩乞與一身閒漸無牒訴煩敲朴喜有林泉數往還猶想朋雲隱君子思歸時見鬢毛斑八曰贈别獨孤及送長洲劉少府貶南巴使牒留洪州序曩子之尉于是邦也傲其跡而峻其政能使綱不紊吏不欺夫跡傲則合不茍政峻則物忤故績未書也而謗及之臧倉之徒得騁其媒孽子於是竟謫為南巴尉而吾子直謂豫已仕愠不見色於其胸臆未嘗蒂芥會同譴有叫閽者天子命憲府雜鞫且廷辨其濫故有後命俾除館豫章俟條奏也是月也艤船吳門將泝江而西夫行止者時得喪者機飛不摶不髙矢不激不逺何知去南巴之不為大來之機括乎由圖南而致九萬吾惟子之望但春水方生孤舟鳥逝青山芳草奈逺别何同乎道者盍偕賦詩以貺吾子歐陽詹送許少府之任序始入仕一有縣尉或中或上或緊銓衡評才若地而命之至於緊無得幸而處而緊中之美者尤難其人今年孝廉郎高陽許君授常熟尉者實緊中之美君十三舉眀經十六登第後三舉進士皆屈於命去冬以前明經從常調䕃資貴中之乙判居等外之甲既才且地擢以是官夏四月隨牒之官玉貌青春芬芳有蒨望棠隂而委質鬱蘭陔以辭親征車轔轔所往在目異時九仞由兹一簣在邦由家不出於忠信許君常以為已任夫何恤哉士之生懷四方之志軫念於離别非所以為士也行乎權德輿送從兄立赴崑山主簿序士君子筮仕之門有以代德庥廕而奉清廟齊祠者及夫試吏就祿與秀才孝廉郎等蓋以舊服流慶後昆宜之其於奬人為善之義深矣從兄承舄奕簪纓之後荷葳㽔文誼之訓敏於學行而薄於宦名乃今調於天官署崑山主簿以姑胥之通邑士衡之佳句僑舊耕植多依是間上有良二千石為東諸侯表率其飭躬敬事夙夜勤敏椎輪積水或在兹乎從弟中書舍人德輿序其所由俾羣從偕賦劉禹錫三載為吳郡臨岐祖帳開雖非謝桀黠且為一徘徊流水閶門外秋風吹栁條從來送客處今日自魂銷白樂天代諸妓贈送周判官妓筵今夜别姑蘇客棹眀朝向鏡湖莫泛扁舟尋范蠡且隨五馬覓羅敷蘭亭月破能回否娃館秋涼却到無好與使君為老伴歸來休染白髭鬚皮日休和崔諫議歸以六韻賜示因佇酬獻欲下持衡詔先容解印歸露濃春後澤霜薄霽來威舊化堪治疾餘思可療飢隔花攀去棹穿栁挽行衣佐理能無取酬知力甚微空將千感淚異日拜黃扉陸龜䝉謹和諌議罷郡敘懷六韻巳報東吳政初捐左契歸天應酬苦節人不犯寒威江上思重借朝端望載飢紫泥封夜詔金殿賜春衣對酒情何逺裁詩思極微待升鎔造日江海問漁扉李白送客歸吳江村秋雨歇酒盡一帆飛路厯波濤去家惟坐卧歸島花開灼灼汀栁細依依别後無餘事還應掃釣磯張衆甫送李司直使吳使臣方擁𫝊王事逺辭家震澤逢殘雨新豐過落花水萍千葉散風栁萬條斜何處有離恨春江無限沙杜牧送沈處士赴蘇州李中丞招以詩贈行山城樹葉紅下有碧溪水溪橋向吳路酒旗誇酒美下馬此送君髙歌為君醉念君苞材能百工在城壘空山三十年鹿裘挂窗睡自言隴西公飄然我知已舉酒屬吳門今朝為君起懸弓三百斤囊書數萬紙戰賊即戰賊為吏即為吏盡我所有無惟公之指使豫曰隴西公滔滔大君子當思掄羣材一為國家治譬如匠見木礙眼皆不棄大者粗十圍小者細一指榍橛與棟梁施之皆有位忽然竪眀堂一揮立能致豫亦何為者亦受公恩紀處士常有言殘虜為大豕常恨兩手空不得一馬箠今依隴西公如虎傳兩翅公非刺史材當坐巖廊地處士魁奇姿必展平生志東吳饒風光翠巘多名寺疏煙亹亹秋獨酌平生思因書問故人能忘批紙尾公或憶姓名為說都憔悴杜牧懷吳中馮秀才長洲苑外草蕭蕭却算遊程嵗月遙惟有别時今不忘暮烟秋雨過楓橋許渾送張尊師歸洞庭能琴道士洞庭歸風滿歸帆路不迷對岸水花霜後淺傍簷山果雨來低杉松近晚移花崦巖谷初寒蓋藥畦他日相思兩行字誰人知處武陵溪又送元晝上人歸蘇州三年無事客吳鄉南宅春深碧草長共醉八門回畫舸獨還三徑掩書堂前山雨過池塘滿小院秋歸枕簟涼經嵗别離心盡苦何堪紅葉下清漳李頎送顧朝陽還吳寂寞俱不偶裹糧空入秦宦途已可識歸卧包山春舊國指飛鳥滄波愁旅人開樽洛水上怨别栁花新顧非熊送僧歸洞庭江山萬萬里歸去指何峰未入連雲寺先齊越浪鍾風香回棧橋秋色出庵松若救吳人病須降震澤龍殷堯藩送客還吳吳國水中央波濤白渺茫衣逢梅雨漬船入稻花香海底通鹽竈山村帶蜜房欲知蘇小小君始到錢塘李頻送劉山人歸洞庭去意無人命惟應道是從半湖乘早月中路入疏鍾秋盡戶蛩急夜深山雨重當時將隱者分得幾株松即席送許製之曹南省兄梅爛荷圎六月天歸帆髙背虎丘煙到時自見成行鴈别處休聽滿樹蟬賣劍為賒吳市酒攜家猶借洞庭船待看春榜來江外名占蓬萊第幾仙蘇州寒食日送人歸覲江城寒食下花木慘離魂幾宿投山寺孤帆過海門蓬聲潑火雨栁色禁煙村定看髙堂後斑衣減淚痕送羅著作兩浙按獄使印星車適舊遊陶潛今日在瀛洲科條盡曉三千罪囹圄應空十二州蒨綬有香籠驛馬皇華無暇狎沙鷗歸來重過姑蘇郡莫妄題名向虎丘蘇子美送人還吳江雲春重雨垂垂索寞情懷送客歸不慣東流促回棹羡他雙燕逆風飛胡宿送楊中允宰常熟丹舸傍江潯嘔啞逺櫓音新科持片玉能政引孤琴美進宫坊秩榮歸里閈心名參天下雋歌著邑中黔地志連香徑家園帶武林吳山幾屏秀楚水一篙深晚鼓停餘疊秋帆卧半隂平時按方驥後夜望橫參陶菊何妨醉江毫且剩吟悠悠河上别千里鬱朋簪胡宿送顯忠上人歸吳郡秋風隨處起振錫不留行却背嵩雲去迎看淮月生禪通少林默詩得苧山清幾夕巖窗下忘眠聽瀑聲梅堯臣送唐紫微知蘇臺洞庭五月水生寒盧橘楊梅巳滿盤泰伯廟前看走馬闔閭城下見驂鸞吳娃結束迎新守府吏趨蹡拜上官曾過揚州能慣否劉郎盞底勸須寬梅堯臣送裴如晦宰吳江吳江田有粳粳香舂作雪吳江下有鱸鱸肥膾堪切炊粳調橙虀飽食不為餮月從洞庭來光映寒湖凸長橋坐虹背衣濕霜未結四顧無纎雲魚躍眀鏡裂誰能與子同去若秋鷹掣黃鑑送李殿省赴任常熟方稼吳山紫翠倚晴空潘令風流向此中雨飽公田稔春生香徑雜葩紅綵艫銜尾凌波駛頳鯉駢頭薦爼豐王季情深重暌索南雲延脰極飛鴻郭祥正姑蘇行送胡唐臣入幕登姑蘇望五湖范蠡扁舟竟何在吳王宫殿惟荒墟使君誰何好平恕寬則脂韋猛則虎只今卧治聞黃公更得高才歸幕府願令里巷歌召南風化流行成樂土昔年引對大眀殿國論軒軒動人主往持使節臨朔方威霽秋霜愛春雨玉上青蠅誰强指鼻端有堊寧傷斧升沉偶爾非吾嗟不用東方且為鼠豈聞絶代無佳人何必西施妙歌舞盛傾緑酒鱠肥鱸承詔還從大梁去又送朱伯原祕校泠泠皖溪水悠悠天柱雲雲行水光動水洗雲影分幽人坐卧吟孤絶迥出羣資彼雲水香釋此塵垢紛胡為倐言别扁舟連夜發往登姑蘇臺而望太湖月却尋史遷迹但見蒼煙滅覽古竟論今治吳校工拙有才不得施著書貽後世何必腰黃金自享千載貴鱸魚秋正熟雲泉味尤美若逢吳市門更訪長生理胡宿送太守晏大夫畫角城頭向晚悲鄧侯歸斾已臨岐西郊祖帳傾簪紱南國離聲動管絲千里去思歌召父三年遺愛泣吳兒甘棠寂寞江邉路正是清隂蔽芾時程俱送葉善卷致仕歸吳衛尉新除蓋次公便拋簪紱向江東秋鱸正與尊絲美夜鶴休驚蕙帳空滿腹詩書元未試㑹心林壑與誰同自憐華髮無歸處慚愧冥冥物外鴻許渾吳門送客吳歌咽深思楚客怨歸程寺曉樓臺迥舟日湘江秋管吹清早潮低水檻殘月下山城惆悵回南春草生劉攽送裴二知蘇州著書𤣥尚白送客鬼揶揄積水望江海秋風吹軸轤貴人千騎長紫綬左魚符遺愛眀南國歡聲接舊吳曉霜繁橘柚過雨熟菰蒲安得如吾子從君飛隻鳬蔡肇送錢齊眀倅蘇州一尉東南屈指中雍容車騎舊兒童郎君扇枕家山晚侍史焚香省戶空十里浮梁晴卧蝀一江春水淨磨銅三年官滿東吳去為具扁舟破浪風洞庭飛雨打湘絃燕寢凝香思窈然四者難并知我老七言俱賦為君妍雜花繞徑迎籃輿春鳥喧洲起畫船聞道山公方啓事重看一鶚在秋天吳郡志卷四十九
