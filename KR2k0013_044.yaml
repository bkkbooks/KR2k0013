body:
  text: 吳郡志卷四十四宋范成大撰奇事吳王闔閭伐石治宫室石中得紫文金簡之書不能讀使使者詢仲尼曰吳王閒居有赤雀銜書置殿前不知其義故逺咨訪仲尼視之曰此乃靈寶長生之法禹所服之禹將仙化封之名山石函之中今赤雀銜之殆天授耶抱朴子吳孫堅世仕吳母懷妊母夢腸出繞吳閶門寤而懼以告鄰母鄰母曰安知非吉證也巳而堅生又云堅母孕時夢腸出繞腰有一童女負之繞吳閶門三匝天授以芳茅一莖童女語母曰此吉祥也必生才雄之子今賜母此茅土王於翼軫之地鼎足於天下不出二百年語畢而覺及旦筮之卜人曰童女太白之精也王子年拾遺漢興平中吳中童謡曰黃金車班蘭耳闓昌門出天子昌門吳西郭門其後孫權遂以黃龍元年建吳國吳天冊元年吳郡言掘地得銀長一尺廣三分刻上有年月字於是大赦改元宋吳子英者舒鄉人善入水捕得赤鯉魚愛其色好持歸不殺養池中飼以米穀一年長丈餘生角有翅子英怖拜謝之魚言我來迎汝上我背與汝俱升天嵗來歸見其妻子魚復迎之故吳中門户竝作神魚子英祠列仙𫝊將仕郎陳敏功妻家居吳門北鄰嘗有人夢神人被髮持刃部集數十鬼物每經民居即呼其人出各分飲一杯令啜之暨至一劉承議家則曰此家不食牛肉巳二十年當與免其後吳門大疫鄰巷病亡者比户不遺獨劉氏舉家無恙談選姑蘇四瑞謂白龜甘露合歡芍藥雙竹也吏部貟外郎陳省華守郡四瑞並出省華之子堯咨與張君房各賦詩推官崔端為詩序今見於下觀察推官承奉郎試大理評事崔端撰蘇州四瑞聨句詩序云休祥之出必俟乎時感應之證亦繫乎政政或未乂物理寧通時既㑹昌神靈斯格蘇臺四瑞其殆庶乎而況分連牛斗地控江湖壤賦繁劇里門雄盛郡守之選古難其人昔太宗有命俾我良牧吏部貟外郎陳公鎮撫之公自下車決政之壅伸民之無告挫猾吏之鋒削刑禁之濫靡勞餘刃厥功告成嘉瑞荐臻休祥雜沓花芳連萼竹聳雙莖白龜見乎崑丘甘露零乎佛廟斯乃我后重離繼照有開必先之靈感也歷觀藩邸未有若斯之昭報焉以進士陳公與南陽茂才張公席言詩敵者也丁酉孟夏之夕㑹宿于郡齊酒酣據及四瑞且曰非筆墨無以紀郡政而頌聖德繇是賡唱迭詠終宴為聨句律詩自十二韻止二十韻四章凡五百八十言云咸平元年夏四月崑山縣有漁婦李氏張罾河上得一白龜如錢大其色玉瑩朱眸電尾宫畫粲然婦愛之因授兒為戲又恐為所傷放於河頃之龜復在網如是者三婦雖怪之然復棄去中夜岸有火熒熒往觀之白龜在焉因取以歸近村王道榮留龜置神像前翌日失之道榮私念此或靈物若䖍禱當復見則必獻于官府禱之忽自鼠竇出精瑩愈於前乃具狀獻于縣令李維維上之郡時陳省華守蘇州之二嵗也異而神之曰麟鳯龜龍王者之嘉瑞今見于是豈天意俾豫尸之以告新駿命耶即具表以聞時張君房客於蘇省華以白龜事訪之君房曰按孫氏瑞應圖云龜千嵗巢蓮葉之上是龜之質固可巢於蓮葉而其出也又將以應於千嵗之運乎且其色白白西方也豈其應在西戎乎龜者歸也西方其有逆命不廷之虜畏威懷德歸我乎哉眀年朔方叛帥李繼遷貢馬請命遂有銀夏綏宥四鎮之拜君房嘗為之頌省華尋徙漳州眀年秋賦試進士崑山進白龜詩集異記崇寧間奉議郎許白治第於蘇解木中有天下太平四字筆勢邁逸許嘗以其事聞談選吳郡自隋唐設進士科以來未嘗有魁天下者比年父老相𫝊二䜟一曰穹窿石移狀元來歸一曰潮過夷亭出狀元淳熙初穹窿山中一夕聞風雨聲詰朝視山半有大石自東徙西屹立如植所過草皆偃辛丑科吳縣人黃由子由遂狀元及第夷亭在崑山縣西三十五里崑山雖近江海自古無潮汐紹興中始有潮至縣郭至是潮忽大至遂過夷亭李彥平侍御親見一道人復誦此䜟謂必有邑人應之乃以告知縣葉自强作問潮館於水濱甲辰科崑山人衛涇清叔亦為狀元黃衛相繼兩舉天下𫝊以為奇事吳郡志卷四十四
