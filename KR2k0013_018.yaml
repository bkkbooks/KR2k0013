body:
  text: 吳郡志卷十八宋范成大撰川太湖在吳縣西即古具區震澤五湖之處越絶書云太湖周回三萬六千頃禹貢之震澤爾雅云吳越之間巨區其湖周回五百里襟帶吳興毗陵諸縣界東南水都也古今𫝊記不同者並具辨證門白居易泛太湖書事寄元稹烟渚雲帆處處通飄然舟似入虛空玉杯淺酌巡初匝金管徐吹曲未終黃夾纈林寒有葉碧琉璃水淨無風避旗飛鷺翩翻白驚鼓跳魚撥刺紅澗雪壓多松偃蹇巖泉滴久石玲瓏書為故事留湖上吟作新詩寄浙東軍府威容從道盛江山氣色定知同報君一事君應羡五宿澄波皓月中皮日休聞有太湖名十年未曽識今朝得遊泛大笑稱平昔一舍行胥塘盡日到震澤三萬六千頃千頃玻瓈色連空淡無纇照野平絶隙好放青翰舟堪弄白玊笛疏岑七十二􅑨􅑨露寸㦸悠然嘯傲去天上搖畫鷁西風乍獵獵驚波罨涵碧倐忽雷陳吼須臾玉崖拆樹動為蜃尾山浮似鼇脊落照射鴻溶清輝蕩拋􅚹雲輕似可染霞爛如堪摘漸暝無處泊挽帆從所適枕下聞澎湃肌上生瘮㾊討異足邅回尋幽多阻隔願風與良便吹入神仙宅甘將一藴書永事嵩山伯陸龜䝉東南具區雄天水合為一髙帆大弓滿羿射爭箭疾時當暑雨後氣象仍鬱密乍如開雕笯鴻濛聳翅忽飛出行將十洲近坐覺八極溢耳目駭精神寒佶栗坑來斗呀豁涌處驚嵳崒嶮異拔龍湫喧如破蛟室斯須風妥帖若受命平秩微茫識端倪遠嶠疑格筆巉巉見銅闕聞咸池氣左右皆輔弼盤空儼相趍去勢猶橫逸嘗下注作清質至今涵赤霄尚且浴白日靈官家此事難致詰又云搆浮玉宛與崑閬匹肅為才迎沙嶼好指顧俄巳失山川互蔽虧魚鳥空聱方應䎲何當授真檢得召天吳術一一問朝宗可談悉楊備魚舠載酒日相隨一笛蘆花深處吹湖面風收雲影散水天交照碧琉璃蘇子美望太湖杳杳波濤閲古今四無邊際莫知深潤通曉月為清露氣入霜天作暝隂笠澤鱸肥人膾玉洞庭柑熟客分金風烟觸目相招引聊為停橈一楚吟梅堯臣東吳臨海若看月上青冥河漢微分練星辰淡布螢細烟沈遠水重露裛空庭孤坐饒清興惟將影對形明月灣在太湖洞庭山下皮日休曉景淡無際孤舟恣迥回環試問最幽處號為明月灣半岩翡翠巢望見不可攀桞弱下絲網藤深垂花鬘松癭忽似狖石文或如虥釣壇兩三處苔老腥斒斑沙雨幾處霽水禽相向間野人波濤上白屋幽深間曉培橘栽去暮作魚梁還清泉出石砌好樹臨柴關對此老且死不知憂與患好境無處住好處無境刪𧹞然不自適脉脉當湖山陸龜蒙昔聞明月觀明月秖傷荒野基今逢明月灣不值三五時擇此二洞庭看最竒連山忽中斷遠樹分毫釐周迥回二十里一片澄風漪見說秋半夜淨無雲物欺兼之星斗藏獨有神仙期初聞鏘鐐銚積漸調參差空中卓羽衛波上停龍螭縱舞玉烟節髙歌碧霜詞清光悄不動萬象寒咿咿此會非俗致無由得旁窺但當乘扁舟酒甕仍相隨或徹三弄笛或成數聮詩自然瑩心骨何用神仙為練瀆在太湖舊𫝊吳王所開以練兵皮日休吳王厭得國所玩終不足一上姑蘇臺猶自嫌局促艅艎六宫閙艨衝後軍肅一陳水麝風空中蕩平淥烏困避錦帆龍跧防鐵軸流蘇惹烟浪羽葆飄巖谷靈境太蹂踐因兹塞林屋空闊嫌太湖崎嶇開練瀆三尋齾石齒數里穿山腹底靜似金膏礫碎如丹粟波殿鄭妲醉蟾閣西施宿幾轉含烟舟一唱來雲曲不知欄楯上夜有越人鏃君王掩面死嬪御不敢哭艷魄逐波濤荒宫養麋鹿國破溝亦淺代變草空緑白鳥都不知朝眼還暮浴陸龜䝉越恃君子衆大將壓全吳支流忽然迂吳將派天澤以練舟師徒一鏡止千里蒼奩束洪波坐似馮夷軀戰艦百萬輩浮宫三十餘平川盛丁寧絶島分儲胥鳯押半鶴䣛錦杠雜肥胡香烟與殺氣浩浩隨風驅彈射盡髙鳥柸觥醉潛魚山靈恐見鞭水府愁為墟兵利德日削反為讎國屠至今鉤鏃殘尚與泥沙俱照此月倍苦來兹煙亦孤丁魂尚有淚合灑清楓枯銷夏灣在太湖洞庭西山之趾山十餘里繞之舊𫝊吳王避暑處周回湖水一灣冰色澄徹寒光逼人真可銷夏也皮日休太湖有曲處其門為兩涯當中數十頃别如一天池號為銷夏灣此名無所私赤日莫斜照清風多遙吹沙嶼掃粉墨松竹調塤箎山果紅靺鞨水苔清䯱髵木隂厚若瓦巖磴滑如飴我來此遊息夏景方赫曦一坐盤石上肅肅寒生肌小艖或可泛短䇿或可支行驚翠羽起坐見白蓮披斂袖弄輕浪解巾敵凉颸但有水雲見更餘沙禽知京洛往來客暍死緣奔馳此中便可老焉用名利為陸龜䝉霞島焰難泊雲峯竒未收蕭條千里灣獨自清如秋古岸過新雨髙蘿䕃橫流遙風吹蒹葭折處鳴颼颼昔豫守圭竇過於回祿囚日為籧筁徒分作只裯讐願狎寒水怪不封朱轂侯豈知煙浪涯坐可思重裘健若數尺鯉泛然雙白鷗不識號火井孰問名焦丘我本魚鳥家盡室營扁舟遺名復避世消夏還消憂投龍潭在龜山皮日休龜山下最深惡氣何洋溢涎水瀑龍巢腥風卷蛟室曉來林岑靜獰色如怒日氣涌撲炱煤波澄掃純漆下有水君府貝闕光比櫛左右列介臣縱橫守鱗卒月中珠母見烟際楓人出生犀不敢燒水怪恐摧捽時有慕道者作彼投龍術端嚴持碧簡齊戒揮紫筆兼以金蜿蜒投之光焌律琴髙坐赤鯉何許縱仙逸我願與之遊兹焉託靈質陸龜䝉名山潭洞中自古多祕邃君將接神物聊用申祀事鎔金象牙角尺木無不備亦既奉真官因之徇前志持來展明誥敬以投嘉瑞鱗光煥水容目色燒山翠吾皇病秦漢豈獨探怪異所貴風雨時民皆受其賜良田為巨浸汚澤成赤地掌職一不行精靈又何寄唯貪血食飽但據驪珠睡何必費黃金年年授星使胥口在木瀆西十里出太湖之口也上有胥山舟出口則水光接天洞庭東西山峙銀濤中景物勝絶皮日休波光杳杳不極霽景淡淡初斜黑蛺蝶粘蓮蘂紅蜻蜓裊菱花鴛鴦一處兩處舴艋三家五家㑹把酒船隈荻共君作箇生涯拂釣清風細麗飄蓑暑雨霏微湖雲欲散未散嶼鳥將飛不飛換酒帩頭把看載蓮艇子撐歸斯人到死還樂誰道剛須用機陸龜䝉雨後山容若動天寒樹色如消目送回汀隱隱心隨挂席搖搖白蔣知秋露裛青楓欲暮烟饒莫問吳趨行樂酒旗竿倚河橋把鈎絲隨浪逺採蓮衣染香濃緑倒紅飄欲盡風斜雨細相逢斷岸沈漁略裘重網鄰村送客􅧼􅞤即是清霜刮野乘間莫厭松江在郡南四十五里禹貢三江之一也三江自具辨證門今按松江南與太湖接吳江縣在江濆垂虹跨其上天下絶景也程俱松江賦鴟夷子皮既棄越相乘扁舟攜西子泝東流方將家五湖以長邁屣萬鍾而不留放若巨魚縱大壑脫若六驥馳坦道而挾輕輈時則八荒收雲千里一碧狂瀾不興逺岫凝色目盡意往雲天出沒引風穡以悲嘯趣烟波而不極於是遇亡是叟而問津焉曰三江之湊實為五湖地脉四達衍為松江洶洶渾渾溶溶洋洋孤岑連障七十有二眇若散螺黛於微茫五湖之中大曰包山風穴晝暝霜林夏寒暮烟屯其疊翠冬實纍其錯丹麟鶴之所憩蛟鼉之所淵山中之人忘世與年條桑縹眇之下採石明月之灣窮是則歸墟草衣木茹泊若追羲盤而與還江流之王百谷於一吸環齊州於一區大鵬奮翅於泱漭燭龍洗光于咸虞由江而下二百餘里布帆無恙尚可以朝海門而暮方壺雖然善賈者據其㑹善摶者扼其吭方趣南則遺北既畫圓而失方今子將攬衆物之會莫若遐觀乎中央惟是江湖之接二洲相望散荒墟於垤塊識斷岸於毫芒嘗試與子至中流而四顧隂霾鬱興不辨雲水天髙日出萬頃在目者五湖也岡岫相屬如走如伏溟濛突兀乍見乍失者包山也擁松江之上流窮海道于一葦時矯首而斯盡固可以訪漁樵而種魴鯉亦優游而卒歲矣吾子以為何如子皮曰然務外游者有待樂內觀者無窮吾方以日月為燭六合為宫參天地以為友從四海之諸公乘雲氣御飛龍指包山於遺礫攬五湖于一鍾松江之勝又安能芥蒂於胸中乎後松江賦程子既為松江賦假鴟夷子皮設亡是叟以為詞是夜夢有夫頎然而長黧色而修髯叩舷而稱曰松江之勝吾子之詞侈矣然子亦聞吳越之遺事乎唯而答曰長橋卧波截江之衝飛欄疊架排霧橫空萬景所會而垂虹屹立乎其中吾嘗登垂虹顧二渚尚想夫霸國之爭雄方其踐忍烏喙差耕石田禍起腋下謀誤機先見吳軍江北越軍江南殺氣朝合軍聲夜嚴銜枚北渡奮為兩翼方風馳而霧障頓雷轟而電擊吳卒麕潰江流赭赤畢夫椒之世仇償㑹稽之膽食於此蓋夫子之雄績乃自太湖過橫山亂越來之溪登姑胥之臺弔亡國於游鹿指血化於黃埃挽艅艎以凌江卷旌旗而南歸則夫子於此退身行意揖句踐而長辭蓋與夫咎犯之貪天子推之獨賢歌龍蛇而激憤塊然與喬木而偕燔者不可同日而言矣間者五季棼亂錢鏐崛興蘇據都㑹乃淮浙之必爭徐約先拔孫儒繼焚彼得之不能以歲月守我守之不能以歲月寧則江之兩涯相為二城鎮威武之右境遏淮南之寇兵實用武者之所憑版圖入朝置為縣治畫井疆設羣吏膏壤碁别居廬鱗次帶以千尺之橋捍以百里之塘舟輿所通樓觀相望曽城邑之幾時翳喬木之蒼蒼矣吾嘗歎曰一江方東雖逝不流閲世事之萬變去莫知其所遁而來莫知其所由今之松江其昔之松江耶抑夜半之藏舟失萬世於俯仰盡賢愚於一丘夫子亦嘗弔抉眼之忠魂而訪伏劒者之靈游不乎子皮不對顧謂西子援琴而歌歌曰霰雪紛兮雲霏霏帶長鋏而佩寶璐兮子安適而不歸歲婉晚而將暮兮路既壅而中迷嗟二子之不返折疏麻而搴杜若羌搖搖其遺誰餘音未息蘧然而覺掉頭載歌付千古於一笑宋之問夜渡吳松江懷古宿帆震澤口曉渡松江瀆櫂撥魚龍氣舟衝鴻鴈羣信潮頓覺滿晴浦稍將分氣赤海生日光清湖起雲水鄉盡天衛歎息為吳君謀士伏劒死至今悲所聞又渡吳江别王長史倚棹望兹川銷魂獨黯然鄉連江北樹雲斷日南天劒别龍初沒書成鴈不𫝊離舟意無限催渡復催年張懷多年襆被玉山岑鬢雪欺人忽滿簮駑馬雖然貪棧豆野麋終是憶長林鱸魚未得乘歸興鷗鳥唯應信此心見說新橋好風景會須乘月濯煩襟劉長卿洞庭初下葉南客不勝愁明月天涯夜青山江上秋一官成白首萬里寄滄洲久被浮名繫能無愧海鷗杜牧堠館人稀夜更長姑蘇城逺樹蒼蒼江湖潮落髙樓迥河漢秋歸廣殿凉月轉碧梧移鵲影露低紅草濕螢光文園詩侣應多思莫醉笙歌掩華堂泊松江清露白雲明月天與君齊棹木蘭船風波湖雨一相失夜泊橫塘心渺然白居易松江亭攜樂觀魚震澤平蕪岸松江落葉波在官常夢想為客始經過水面排罾網船頭簇綺羅朝盤鱠紅鯉夜燭舞青娥鴈斷知風急潮平見月多繁絲與促管不解和漁歌薛據泊震澤口日落草木隂舟徒泊江汜蒼茫萬象開合沓聞風水㳂泊值漁翁䆗窱逢樵子雲開天宇靜月明照萬里早鴈湖上飛晨鐘海邊起獨坐嗟逺遊登岸望長洲寥落星欲盡曈曨氣漸收行藏空自秉知識仍未周伍胥既伏劒范蠡亦乘流欲竟鼓枻去三江多客愁許渾泊松江渡漠漠故宫地月凉風露幽雞鳴荒戍曉鴈過古城秋楊栁北歸路蒹葭南渡舟去鄉今已逺更上望京樓皮日休松江早春松陵清淨雪消初見底新安恐未如穩憑船舷無一事分明數得鱠殘魚陸龜䝉栁下江餐待好風暫時還得狎漁翁一生無事烟波足唯有沙邊水勃公錢昭度憶具區平生愛具區島嶼夾陂湖竹雨籠鸂鶒花烟溼鷓鴣神仙疑有宅魚鱉自為都何事勞長想機雲本是吳梅堯臣送裴如晦宰吳江吳江田有粳粳香舂作雪吳江下有鱸鱸肥膾堪切炊粳調橙虀飽食不為餮月從洞庭來光映寒湖凸長橋坐虹背衣濕霜未結四顧無纎雲魚跳明鏡裂誰與子同遊去若秋鷹掣又憶吳松江晚泊念昔西歸時晚泊吳江口回隄遡清風淡月生古桞夕鳥獨遠來漁舟獨在後當時誰與同泣憶泉下婦蔡肇除夜宿垂虹亭東南勝處未忘情老去扁舟復此行小邑歲除無市井下田水落見農耕雪消西嶺層稜出春到重湖鱗甲生橋下霜蛟貪睡美為槌千鼓作雷聲王禹稱中郎亭榭據江鄉雅稱詩翁賦醉章􅐜菜鱸魚好時節晚風斜日舊烟光一杯有味功名小萬事無心歲月長安得便拋塵網去釣舟閒倚畫欄傍二年為吏住江濱重到江頭照病身滿眼碧波輸野鳥一蓑疏雨屬漁人隨船曉月孤輪白入座晴山數㸃春張翰精靈應笑我緑袍依舊惹埃塵又松江亭登臨陡覺挹塵埃時有清風颯滿懷螮蝀一條連古岸玻璃萬頃自天來寒光浩渺輕烟闊緑玉參差逺岫排南指閩山猶萬里逺人歸興正無涯泛吳松江帶篷疏薄漏斜陽半日孤吟未過江惟有鷺鷀知我意時時翹足對船窗陳堯佐平波渺渺烟蒼蒼菰蒲才熟楊桞黃扁舟繫岸不忍去秋風斜日鱸魚鄉蔣堂游松江江人見我謂誰何行李無羈野意多六幅青帆趂潮去一樽白酒扣舷歌沙邊厯厯辨雲樹島外濺濺弄月波興盡歸來還更喜舞鷗相送入烟蘿長橋觀魚曙光東向欲朧明漁艇縱橫映逺汀濤面白烟昏落月嶺頭殘燒混疏星鳴榔莫觸蛟龍睡舉網時聞魚鱉腥我實宦遊無况者擬來隨爾帶笭箵中秋新橋對月月晃長江上下同畫橋橫截冷光中雲頭灔灧開金餅水面沈沈卧彩虹佛氏解為銀色界仙家多住玉華宫地雄景勝言難盡但欲追隨乘曉風蘇軾吳越溪山興未窮强扶衰病過垂虹浮天自古東南水送客今朝西北風絶境自忘千里逺勝遊難復五人同舟師不會留連意擬看斜陽萬頃紅二子緣詩老更窮人間無處吐長虹平生睡足連江雨盡日舟橫擘岸風人笑年來三黜慣天教我輩一樽同知君欲寫長相憶更送銀盤尾鬛紅楊備長橋漁市花村夾酒樓山光沈碧水光浮松陵雨過船中望一道青虹兩岸頭吳江松陵水國面松江學弄漁竿對酒缸驚起鴛鴦是旗鼓背帆飛去一雙雙章憲松江謁王文孺令宰署退凉生過雨天鳬飛鷺浴暮江前秋風小浪鴨頭水斜日輕帆燕尾船青眼却欣逢地主白頭相對聳詩肩林塘勝處開樽俎只缺冰輪特地圓晚泊松江長隄牽百丈舴艋泝清漪山與殘霞暝水將秋色宜江寒征鴈度天遠暮帆遲賸欲浮家去烟波學子皮交讓瀆在羅城之東北隅楊備琴丁結友事耕耘田熟翻如虞芮君彼此持廉為棄物一名交讓兩難分女墳湖在吳縣西北昔吳王葬女處事具冢墓門皮日休萬貴千奢已寂寥可憐幽憤為誰嬌須知韓重相思骨直在芙蓉面下消陸龜䝉水平波淡繞回塘鶴殉人沈萬古傷應是離魂雙不得至今沙上少鴛鴦越來溪在橫山下與石湖連相𫝊越兵入吳時自此來故名溪上有越城雉堞宛然楊備臨流何必弔前非且說吳宫得意時夾岸桃花烟水緑畫船安隱載西施箭涇一名採香徑事具往蹟門夏駕湖在吳縣西城下吳王夀夢避暑駕遊于此故名今城下但存外濠即漕河也河西悉為民田不復有湖民猶於河之傍種菱甚美謂之夏駕湖菱云楊備湖面波光鑑影開緑荷紅芰繞樓臺可憐風物還依舊曽見吳王六馬來錦帆涇即城裏㳂城濠也相𫝊吳王錦帆以遊今濠故在亦通大舟間為民間所侵有不通處採蓮涇在城內東南隅運河之陽也今可通舟兩岸皆民居亦有空曠為蔬圃此種蓮舊蹟也上有採蓮涇橋吳郡志卷十八
