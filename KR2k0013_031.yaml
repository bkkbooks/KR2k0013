body:
  text: 吳郡志巻三十一宋范成大撰宫觀在城仙佛之宇皆中興重建或謂天慶觀門廊三清殿能仁報恩大殿比舊加壯云天慶觀在長洲縣西南即唐開元觀也兵火前棟宇最為宏麗紹興十六年郡守王㬇重作兩廊書靈寳度人經變相召畫史工山林人物樓櫓花木各專一技者分任其事極其工緻淳熙六年聖祖殿火提刑趙伯驌攝郡重建三清殿淳熙三年郡守陳峴建初道士募緣御前亦有所賜始克成就八年至尊夀皇聖帝賜御書金闕寥陽寳殿六字為殿額伯驌跋語上既詔新平江府天慶觀三清殿廼親御翰墨書金闕寥陽寳殿六大字以揭之雲藻昭囘龍鳳翔翥萬目聳瞻威顔咫尺猗歟盛哉臣觀唐文皇書畫居鍾王表凡形篇詠賜臣工載在汗簡侈為美譚然於明道闡教為生民福者未始有聞恭惟皇帝陛下天縱多能游藝八法夐出神所奚唐足云矧方玩意昭曠儲神穆清觀道妙於化原躋斯民於夀域固非下民所能測窺其萬分苐自今仰觀勾吳之墟奎壁垂光王氣所鍾奔走百神撝訶護持罔敢或後當與天無極云郡守趙伯驌恭題郡人龔頤正作上梁文以進夀皇嘉焉在昔吳都于今漢輔誕惟仙聖之宅有嚴壯麗之區與日月以蔽虧式表中天之華闕帥雲霓而来御蔚為上帝之髙居慶基岳峙以當陽琳宇星羅而拱極南端洞達正殿穹崇維時三境之常尊駢集九光之法駕螭蟠萬礎遺址故存翬飛百楹羣目未覩方重熙累洽之運正逺至邇安之時曽是殊庭莫還舊觀其何以佇飇游於肸蠁甄靈貺於幅員皇上睠言不吝有司之費夀宫申祝亶儲二聖之休守臣承睿志以致䖍上士不崇朝而樂施至人示化髙道勤心占營室於瑶光萃梓材於荆楚莫不霞舒引墨雷動揮斤是度而是宜不震而不竦瓊檐繡栱倐若化城金戺玉階殆非人境佇結綺粲朝暾之采想觚稜宿非煙之祥仰規太紫之圎方俯盡鬼神之情狀下鏘鳴之玉珥知足稱於降臨睨帖妥之瑶壇庶永蕃於祠奉考其經始曽不淹辰斯舉應龍之修梁可後巨鼇之竊抃敢伸善頌以佐歡謡抛梁東滄海微茫一望中暘谷扶桑朝玉殿郁然和氣御靈風抛梁西震澤重湖玉浪低風雨調和時節好不煩香火詠朝隮抛梁南咫尺神都漢輔三丙位有星長燦爛兩宫天壽與之參抛梁北金榜雲房新表出一念通神本聖功八荒有道開皇極抛梁上風馬雲車来有象上元八景是天宫萬歳千秋輸景貺抛梁下日夕曽壇隆報謝昭垂乾象報豐年開闡坤珍資道化伏願上梁之後慈聞康夀宸扆尊隆徳教並恢於彤管仁恩長楙於青宫國棟無撓王臣盡忠邊圉永消於兵革民編益劭於耕農千里絶札瘥之盩四民均亭毒之工協氣旁薄而扶輿下九鳯五龍於平世髙靈偃蹇而姣服肅千乗萬騎於浮空来佑太平之極治普臻希靜之真風皮日休傷開元顧道士協晨宫上啓金扉詔使先生坐蛻歸鶴有一聲應是哭丹無餘粒恐潛飛煙凄玉笥封雲篆月慘琪花葬羽衣腸斷雷平舊游處五芝無影草微微觀中有金寳牌真宗所賜永鎮於地者兵火獨全六朝舊物也殿後通神庵淳熙八年左街道籙李若濟奉命建庵額三字亦御書先是有何道人者自紹興初往来提舉司或觀前真武堂草積中披髪顛狂以蓑衣蔽形故號蓑衣道人寒暑不避不與人親或云時有一語中人災福兩朝間遣使降香問其安否然庵則未始遷也澄虚觀在永定寺西崇真宫在能仁寺西宣和中為神霄宫燬於兵門有青石橋扶欄雕刻之工細如絲髪為吳中橋欄之最修和觀在盤門外五里舊太和宫政和中改賜今名紹興間道士朱至仁復建王禹偁撰新修太和宫記夫大道無名强其名而彰用至敬無類聚其類而誘人得之者同出而異名失之者賤彼而貴我自昔皇網既紊世教多門雖分之而有三亦統之而為一盖應機以設殊塗而歸者矣矧夫伯陽之道宣父所師尚清淨以化民體希夷而應物用之理國則絶聖棄智追軒昊之淳風以之修身則抱樸含章異巢由之素隱無欲觀妙有感則通邈乎逺哉不可得而言矣蘇州太和宫者唐畢諴之别業也誠之子師顔及其子宗逸避巢寇之亂徙而家焉先是道士戴省甄者長洲人也㓜䘮其父隨母歸於畢氏宗逸無子戴實嗣焉與兄子𤣥棄俗入道淮南王之有國也五世其昌三教具舉顧毘陵之勍敵建吳門之巨屏利用禦寇匪親不居節度使錢公文奉茅土是分緇黄尤盛乃以子𤣥主開元觀省甄處洞𤣥宫尋屬兄也云亡委兹棣萼母兮不造傷彼棘心且念出破琴之家繼卧甕之後林烏返哺以無及桑蟲受食而有懐思舍田園肇興寳宇爰以已己歳申牒而請命焉則神徳啓運之九年開寳紀號之二祀也錢氏賜額曰太和乃與弟子吳𤣥芝主而建焉于是翦蓁蕪以樹垣墉浚汙潦而開池沼伐彼良木鳩于梓人繫日以僝功隨方以募衆亦既無怠斯焉告成倬彼仙鄉忽如神化則有上清之殿事天尊也北極之堂列仙官也星壇三級侈祠祀也霜鐘萬鈞警昬旭也繪事盡妙睟容有儀芝盖雲軿婉若瑶池之會氷膚雪態依然姑射之人其或民罹札瘥歳有水旱則必禱三官而禳謝修七齋之威儀霜清步虚露冷真籙章醮具矣福佑隨之實天神之攸憑生民之所怙也爾乃就水以治檻因髙而創亭竒花移茂苑之春怪石減洞庭之翠夏筍錦折秋荷盖圓纎埃不生衆卉是茂漁人誤入應謂桃源海客遐瞻更迷蓬島姑蘇勝槩此實盡之暨聖上承乾許王入覲隨圖籍而效貢已在提封攷碑篆以無文曷虞陵谷禹偁字人多暇訪道于兹爰述斯文用垂来裔振絃歌而化俗尚愧子游乗風雲而上天焉知老氏謹為銘曰蘇臺南阯震澤東涘其誰居之畢公之里其誰嗣之戴氏之子棄兹浮世依彼𤣥門乃興宫宇肇自田園厥功既輯其教彌尊它山未勒祕宇空存敢書事迹貽于後昆春晚游太和宫詩數里新萍夹岸莎春来乗興宿煙蘿隨風蝴蝶顛狂甚當路花枝採折多綘節參差抽苦笋翠鈿狼籍撒圎荷湖山滿眼不休去空羨漁翁雨一蓑靈祐觀在洞庭山林屋洞傍舊名神景宫唐乾符二年建内有林屋洞洞中景物具祥符圗經本朝天禧五年詔郡守康孝基重造皮日休曉次神景宫夜半幽夢中扁舟似鳬躍曉来到何許俄倚包山脚三百六十丈攅空利如削遐瞻但徙倚欲上先矍鑠濃露濕莎裳淺泉漸草屩行行未一里節境轉寂寞靜逕侵泬寥仙扉傍巖㟧松聲正凊絶海日方照灼歘臨幽墟天萬想皆擺落壇靈有芝菌殿聖無鳥雀瓊幃自迴旋錦旌空燦錯鼎氣為龍虎香煙混丹雘凝看出嶺雲默聼語時鶴緑書不可注雲笈應無鑰晴来鳥思佳崦裏花光弱天籟如擊琴泉聲似摐鐸清齋洞前院敢負𤣥科約空中悉羽章池上皆靈藥金醴可酣暢玉䜴堪咀嚼存心服鷰胎叩齒讀龍蹻福地七十二兹焉堪永託在獸乏虎貙於蟲不毒蠚嘗聞擇骨録仙誌非可作緑腸既朱髓青肝復紫絡伊余乏此相天與形貌惡每嗟原憲瘇常苦齊侯瘧終然合委頓剛亦慕寥廓三茅亦常往竟與珪組薄欲問包山神来賖少巖壑陸龜䝉曉帆逗碕岸髙步入神景灑灑襟袖清如臨蘂珠屏雖然羣動息此地常寂靜翠澗有寒鏘碧花無定影憑軒羽人傲夹户天獸猛稽首朝元君褰衣就虚省砑空雪牙利潄水石齒冷香母未垂嬰芝田不論頃遥通河漢口近撫松桂頂飯薦七白蔬杯釃九光杏人間附塵躅固陋真鉗頸肯信抃鼇傾猶疑夏蟲永𤣥津蕩瓊壟紫汞啼金鼎盡出冰霜書期君一披省皮日休三宿神景宫古觀岑且寂幽人情自怡一来包山下三宿湖之湄況此深夏夕不逢清月姿玉泉浣衣後金殿添香時客省髙且敞客牀蟠復竒石枕冷入腦笋席寒侵肌氣清寐不著起坐臨堦墀松隂忽微照獨見螢火芝素鶴警微露白蓮明暗池窻􅎉帶乳蘚壁縫含雲㽔聞磬走魍魎見燭奔羇雌沆瀣欲滴瀝芭蕉未離披五更山蟬響醒發如吹箎杉風忽然起飄破步虚詞道客中異様上清朝禮儀明發作此事豈復甘趨馳陸龜䝉靈蹤未徧尋不覺谿色暝迴頭問棲所稍下杉蘿逕巖居更幽絶澗户相隠映過此即神宫虚堂惬雲性四軒盡疎達一榻何清零髣髴聞玉笙敲鏗動涼磬風凝古松粒靈壓修荷柄萬籟既無聲澄明但心聽希微辨真語若授虚皇命尺宅按来平華池漱餘淨頻窺宿羽麗三吸晨霞盛豈獨冷衣襟便堪遺造請徒探物外趣未脱塵中病舉手謝靈峯徜徉事歸艇上真宫在洞庭山上舊上真觀梁大同四年置元豐中陳于撰上真宫記云蘇州之南四十里有湖曰太湖即古震澤也又西二十里有山曰洞庭即古包山也山蹲太湖心而形勢嶻嶭氣象聳秀非人世所宜奄據而傳者皆以為神明多宫乎此盖山之中有林屋幽墟之天即洞天之第九也又有毛仙公之壇即福地之四十三也又山之西縹緲峯之南北際湖之陽即梁隠士葉順昌之宅也大同四年隠士捐宅以資道而奏可其為宫即今之夀聖上真宫也山與塵土隔而宫又當山屏環合之交人亦信其為神仙之别隠也崇岡伏嶺雲煙之所封而不散䆳巖麗谷泉瀑之所漱而不枯舒焉而明莫知其為畫慘焉而晦莫辨其為夜盖山間之朝昏也芳林茂草虎狼之所留而霜雪不能凋岫花野實禽狖之所賸而人力不能攘金石之潤不以暑而燋松桂之責不以寒而改盖山間之四時也累朝昏以為月而不眩其速積四時以為歳而不見其久幽人已往而遯者誰肥荒區相仍而来者誰繼此其年厯愈滋而遺緒易替也天聖八年州愴其如此乃於天慶觀選道士葉紹先以主之山林之居其朋以木石其游以鹿豕而間焉不蹊則虆蔓荒我室荆棘蕪我路矣況緜久哉紹先至即誅穢以治廬非特肅神位而已又以晏内處也封土以崇墉非特限坌莽而已又以威外侮也宫室既閟神明既容山蔬圃茹足以食終日道術禮醮足以化衆人訖至和改元紹先亡今朱超政代之即其嗣也超政又能謹勵其守而光眀其𫝊以齋戒攝心之逸不以夷險動也以鍼藥救人之急不以貧富辭也舉包山之民無逺近無少大皆名其為先生也盖昔之所已廢至二人而興昔之所不足至二人而備使數百年之蹤粲然復在者豈非人之難能歟余因為之説曰冲虚以生白體靜以生明而杳焉其太無者道之真也以心君神以神王氣而休焉其無情者道之用也與物非搆而仁之以其不忍與我非嬰而應之以其無對由是而精之則神也由是而神之則仙也術𫝊於祕不𫝊於露用欲其晦不欲其彰全真於太陽所以不輕其昇天養形於太隂所以不疑其夜解盖徳之隂以與天地合即將以相天地而焉為天地所相行之密以與鬼神通即將以役鬼神而焉為鬼神所役出入其獨俯仰不齊此古之所謂至人而寂寥千百年間無一人也使吾道之不明于天下者為智者不知乎此而愚者不能用也使吾道之不行於天下者為信者不篤乎此而欺者好行詐也今之名山有如洞庭者固多矣其能奮振吾道以興壊濟物有如二人者亦可謂難見也余所以樂為記其大畧而又為之説如此文林郎守常熟縣尉陳于撰皮日休逕盤在山肋繚繞窮雲端擿菌杖頭紫縁崖屐齒刓半日到上真洞宫知造難雙户啓真景齋心方可觀天鈞鳴響亮天禄行蹣跚琪樹夹一逕萬條青琅玕兩松峙庭際怪狀吁可嘆大螾騰共結修蛇飛相盤皮膚坼甲胄枝節擒貙犴罅處似天裂朽中如井眢襹風聲㾌跁跒地力痑根上露鉗釱空中狂波瀾合時若蒼莽濶處如轘轅儼對無霸陣靜問嚴陵灘靈飛一以護山都焉敢干兩廊潔寂厯中殿髙巑岏靜架九色節閑懸十絶幡微風時一吹百寳清闌珊昔有葉道士位當昇靈官欲箋紫微志唯食虹景丹既逐隱龍去道風由此殘猶聞絳目草往往生空壇羽客兩三人石上譚泥丸謂我或龍冑粲然與之懽衣巾紫華冷食次白芝寒自覺有真氣恐隨風力摶明朝若更住必擬隳儒冠陸龜䝉嘗聞昇三清真有上中下官居乗佩服一一自相亞霄裾或霞粲侍女忽玉姹坐進金碧腴去馳飇歘駕今来上真觀怳若心靈訝祗恐暫神遊又疑新羽化風餘撼朱草雲破生瑶榭望極覺波平行虛信烟藉閑開飛龜帙靜倚宿鳯架俗狀既能遺塵冠聊以卸人間方大火此境無朱夏松盖䕃日車泉紳垂天罅窮幽不知倦復息芝園舍鏘佩引涼姿焚香禮遥夜無情走聲利有志依閑暇何處好迎僧希將石樓借希夷觀在靈巖山下紹興十三年四月太傅横海武寧安化軍節度使充醴泉觀使咸安郡王韓世忠用私錢於平江府靈巖山下修盖道觀計屋五十餘間乞以希夷為額詔特從之府郭寺能仁禪寺在長洲縣西北二里即梁重𤣥寺入國朝為承天寺庭列怪石俗𫝊錢王立前有二土山中有銅無量夀佛像髙丈餘宣和中禁寺觀橋梁名字以天聖皇王等為名改今額韋應物登重𤣥寺閣時暇陟雲搆晨霄澄景光始見吳都大十里鬱蒼蒼山川表明麗湖海吞大荒合沓臻水陸駢闐會四方俗繁節又喧雨順物亦康禽魚各翔泳草木遍芬芳於兹省甿俗一用勸農桑誠知虎符忝但恨歸路長孫覿能仁寺重鑄鐘銘太平興國之初平江節度使孫承祐鑄大銅鐘於能仁寺為樓三層居之後百五十年當建炎庚戌盜入平江能仁大火一夕燼又四年紹興癸丑寺僧行和者募衆力更鑄鐘成為銅萬三千斤晉陵孫覿為之銘曰法音無礙遍滿大千際天軼海無量無邊衆生執迷馳走空聚聽蟻為牛夢舂作鼓矯亂顛倒妄認前塵色聲交騖不守其真粤有大士修三摩地出大音聲而作佛事燧木革金以燔以鎔鑄此東序千石之鐘蛇以目聞豬以足聽水鳥風林更相和應除聾破瞶一擊而通八方上下地獄天宫一切滿中十類四相凡厥聲聞俱證無上永定寺在吳縣西南前梁所置韋應物遊永定寺北池僧舍密竹行巳逺子規啼更深綠池芳草氣閑齋春樹隂晴蝶飄蘭徑游蜂遶花心不遇君攜手誰復此幽尋寓居精舍政拙忻罷守閑居初理生家貧何由往夢想在京城野寺霜露月農興羇旅情聊租二頃田方課子弟耕眼暗文字廢身閑道心清即與人羣逺豈謂是非嬰永定寺喜辟疆夜至子有新歳慶獨此苦寒歸夜叩竹林寺山行雪滿衣深爐正燃火空齋共掩扉還將一樽對無言百事違朱眀尼寺在吳縣西北東晉時邑人朱眀捨宅為寺舊𫝊朱眀富而孝友其弟聽婦言壊宅欲避兄離居眀以金榖盡與弟唯留空室一夕大風雨悉飄財寳還眀宅弟與其婦愧而自縊眀乃捨宅為寺楊備朱眀寺不悌爭分不義財舊居金碧照樓臺何縁半夜狂風雨暗裏却飛錢帛来廣化寺在長洲縣西一十步梁乾元三年諸葛氏捨宅為之名崇吳禪院本朝大中祥符元年改賜今額中更兵火夷為煨燼都僧正清立以醫藥利施一方所得貲不以厚其藏而以建大殿塑三世佛大菩薩齋堂十方佛殿淳熙二年其徒復以餘橐剏經樓龔頤正為之記其略如此方子通和廣化寺午日府宴致仕諸公詩使君瀟洒上賓閑金地無塵晝敞關風靜簫聲来世外日長仙景在人間詩成郢客爭揮翰曲罷吳姬一破顔此節東南無此㑹髙名千古映湖山龍興寺在吳縣西南梁所置紹興間於官倉瓦礫中得房琯所作寺碑韋夏卿再立者唐金紫光禄大夫守吏部尚書同中書門下平章事清河公房琯寺碑序祕書省校書郎綦母潛銘厥初道在人和上皇取象以濟其畧中古淳薄人散東周出禮以順其動後代澆極人妄西方流化以復其情夫動與理違靜與道遇詩書之義尚乎聰明其終動以乖乗戒之㫖反乎視聽其終靜以適然則先王之作其未盡歟如来之道其無上歟觀其數乗方駕愚智各新其業大慈一貫胎化咸遂其情法要颺言佛性可以懸得禪宗隂契菩提可以程至通天上地下之事達前生後身之理厯劫必遇其勝因累生固成其圎果輪迴拯厄無物不盡非釋迦如来敦能至於此乎精宫為歸誠之地比丘是覺後之人非明王良臣孰能崇於此乎此宇宙我髙祖創集之我烈祖潤色之則天皇后中微之孝和皇帝再興之此龍興寺則孝和之天下諸州各建同號所以慶王業也雖棟宇已立而裝持未嚴開元十七年天火下焚僅獲半存州將皇三從叔無言聖𦙍帝緒禀受自髙發慮存誠與庶品不類於彼無度外之物在我無累巳之人廣不可尋深難以測政成化博身逸俗康位居藩牧與天子共理親則叔父與人主同家護社稷深于他臣視龍興别于餘寺興言多感舉意大成以家率先施錢數萬合境僧尼等道會一體物通十方同力来奉佛塔此州是闔閭故國太伯始封習俗尚華人云克讓聞義風偃捨財雲集上座戒嚴長江氣雄心朗才傑寺主行䖍外想遺形苦心堅行相與戮力營衛受仗州主由是發人取材輦貨購匠川流咽塞道路相望體製諮決於公輸瓌巧採竒於衆藝程式既定百工齊舉素無特起舊有増飾𦙍正殿之四霤蔓長廡之南垂廓開房室増加廏庫髙閣疊起以下覆三門並建以相挟如少華之承西嶽少室之拱維嵩彩翠虹新欒櫨雲密歘爾已就宛然化成右驛亭左城堞亘望直視一面齊啓背倚闤闠俯朝盈夕散之人前枕通莊閲朝京通越之士地富聚落之腹壯為塔廟之首標吳中之巨麗實天下之景福向若衆生無縁則佛不出世象教何由及此乎聖祀非長則帝不出震龍興何以建寺乎州無賢牧則蒸庶不化財力何以得廣乎百祥畢備成是寳功足可以光揚前烈孚佑下人也琯浮客一過捨舟投體目駭竒功心賞直節輕諸叙事不甚明暢銘而頌之實在能者詞曰在昔元命運革唐徳大象有歸神器載復天人用慶𤣥津扇福乃命率土崇之法堂錫名取類棟宇以光善本物持淨亦神護發地騰熖莫知其故疎綴煙銷迴廊燼去半落層搆斜通平地烈烈皇叔總我古城象設不覯風埃咸盈崩殘不葺忠孝何并乃廣其施誘人助成英英郡貳亦既同聲粲粲僧士誰非會情投心霧塞効信泉傾舊制俄滿新規更營龍跳透檻虎翼飛薨與國同劫配天作程假詞紹美吁其以驚貞元中造寺僧元壹神悟寺主靈俊上座靈琬都維那靈覺經營結搆心願廣成化攝有縁捨施雲㑹取材斬木驟水奔山騖途數千尅期以就戊寅歳刺史給事中京兆韋公夏卿言念棟宇修復碑紀起廢爰獲舊文重此刻立時十四年又十月十五日建東海徐知古書前守揚州髙郵縣尉沈寧篆額楊備詩髙刹長幡敞淨居方袍圓笠照通渠龍興舊額加新榜不見金輪皇帝書瑞光禪院在吳縣西南舊普濟院宣政間朱勔建浮屠十三級靖康焚毁淳熙十三年寺僧重葺稍復舊觀報恩寺在長洲縣西北即吳先主母吳夫人捨宅所建通𤣥寺基也支硎山亦有報恩寺或云錢氏建移額於此寺有小院五曰文殊曰法華曰泗州曰水陸曰普賢有塔十一級兵燼後有行者金大圎募衆復建僅能九級所費計數十萬緡寺有卧佛北人多呼為卧佛寺舊又有不染塵觀音像髙數丈今復塑者徒存其名云妙湛尼寺在提舉常平司之東寺舊有塔兵燼後王岐公之孫女慈明大師者募衆重建開元寺在吳縣西南即後唐同光錢氏所徙寺也寺有晉時浮海来二石像及佛鉢兵燼後二像猶存鉢亦為一僧蔵去得脱今寺中世寳之相𫝊漁人以貯葷茹缽遂破璺視其璺處色采絢爛非玉非石不可名狀梁簡文浮海石像銘盖聞軒后之圗載浮河洛秦王之璧更涌滄溟昭潭之洲乗清源而西泛蓬莱之岫逐安流而南徙況夫道由慈善應起靈覺是以無方之迹隨機示現無縁之力因物成感晉建興元年癸酉之歳吳郡婁縣界松江之下號曰滬瀆此處有居人以漁者為業掛此詹綸無甄小魪布斯九罭常待六鼇遥望海中若二人像朝視沈浮疑諸蜃氣夕復顯晦乍若潛火於是謂為海神即與巫祝同往祈候七盤圓鼓先奏盛唐之歌百味椒漿屢上東皇之曲遂乃風波駭吐光景晦㝠欲起渡河之悲竊有覆舟之懼相顧失色於斯而返又有受持黄老好尚神仙職在三洞身帶八景更竭丹款復共奉迎尊像沈覆没而不見經厯旬日遐邇俱聞吳縣華里朱膺清信士也獨謂大覺大慈將宏化迹乃沐浴清齋要請同志與東靈寺帛尼及胡伎數十人乗船至滬瀆口頂禮歸依歌唄贊徳于時微風送棹淑景浮波雲舒盖而未移浪開花而不噴雖舟子招招弗能逺騖而靈相峩峩漸来就浦仰覩神像嶷然雙汎非因鷁首詎假龍橋豈藉銀連寧須玉軸背各有題一名維衛一名迦葉於是時衆踊躍得未曽有復懼金僊之姿非凡所徙試就提捧豁爾勝舟指燕宫而西歸望葑門而一息道俗側塞人祇協慶膺家住近通元寺廼孫權為乳母陳氏之所立也亦一邦之勝地胥山之神塔乃遷像於此寺武夫數百咸不能勝共怪曰朱膺帛尼二人之力而能捧持不覺為異今人工甚盛確乎不移此必精誠弗能致也乃復竭心同時稽顙然後廼動至自舟中故知據井夜飛實無以異石不能重有覺憑焉後有外國沙門釋法開来稱彼國衆聖所記云東方有二石像及阿育王塔若能恭往禮覲滅無量罪免離三塗禮已而去中大通四年歳在壬子臨沙汝靈侯奉敕更造銅光二枚其一髙九尺其一髙八尺五寸銅邁丹陽恥論劉向之術區選攻金無俟嵇康之鍜既鐫既鎪是磨是銑曄如光定湛似日輪亦當逺照三千普瞻色像遥覩十方俱聞説法豈止惜命小鳥欣入影中重罪衆生還逢愛日而已哉吳郡僧正慧法師深修五定淨持七支於三寳中盡力宏䕶立摩尼之勝殿製飛行之寳塔至於莊嚴妙色實有厥勞昔魯聖云亡尚追儀於有若楚臣殞世亦託似於優旃放勲之后更圗長樂之畫文命之君不絶稽命之禩或𫝊諸往牘或布在前言或贊述盈耳或夀宫虚置況逺追應身近現靈迹不銘不勒何以稱楊乃為銘曰巍巍天像堂堂最勝慧日獨圜無生永證愍此魚鈎傷兹螺孕乍動慈舟時延寳乗留住待縁獨有𫝊應𫝊應伊何寳兹靈像履水晨游淩濤夜上七衆有憑九垓知仰照此真容開斯俗網千輪足起萬字胷書身横五分衣刻三銖嗟爾末俗心王所驅顙浮水沬命役馳駒宜宏希嚮必盡勤劬覩相塵滅聞聲惑袪湛然神跡長處全吳皮日休開元寺佛鉢詩并序按釋法顯𫝊云佛鉢本在毘舍離今在乾陀衛竟若千百年當復至西月支國若千百年至于闐國若千百年當至屈茨國若千百年當復来漢地晉建興二年二聖像浮海而至滬瀆僧尼輩取之以歸今存于開元寺後建興八年漁者於滬瀆沙汭上獲之以為臼類乃葷而用焉俄有佛像見于外漁者始以為異意滬瀆二聖之遺祥也乃以鉢供之迄今尚存余遂觀而為之詠因寄天隨于帝青石作緑氷姿散後提羅花下洗来曽得金人手自持拘律樹邊齋時乳糜味斷中天覺麥麨香消大劫知從此共君親頂戴斜風應不等閑吹陸龜䝉空王初受逞神功四鉢須臾現一重好照金毛持次想添香積飯覆時應帯步羅鐘光寒鹿響靜堪降白耳龍從此寳函香裏見不煩西去詣靈峯韋應物遊開元寺夏衣始輕體遊步愛僧居果園新雨後香臺照日初緑隂生晝靜孤花表春餘符竹方為累形跡一来疎李紳開元寺序此寺多太湖石有峯巒竒狀者頃年多遊寓於此及太和七年往来皆不復到寺中石太半亦無也詩云十層花宇真毫相數仞峯巒閟月扉攢立寳山中色界散周香海小輪圍坐隅咫尺窺巖壑窻外髙低辨翠微難保爾形終不轉莫令偷拂六銖衣皮日休早景即事客省蕭條柿葉紅樓臺如畫倚霜空銅池數滴桂上雨金鐸一聲松杪風鶴靜時來珠像側鴿馴多在寳幡中如何塵外虚為契不得支公此㑹同陸龜䝉日上罘罳疊影紅一聲清梵萬縁空䙰褷滿地貝多雪料峭入樓于闐風水榭初抽寥泬思竹窻猶掛夢魂中靈香散盡禪家接誰共殷源小品同園鑠開聲駭鹿羣滿林鮮籜水犀文皮日休開笋園森森競泫林梢雨􅑨􅑨爭穿石上雲並出亦如鵞管合各生還似犬牙分折煙束露如相遺何𦙍明朝不茹葷陸龜䝉春龍爭地養檀欒況是雙林雨後看迸出似豪當垤㙞孤生如恨倚闌干凌虚勢欲齊金刹折贈光宜照玉盤更待錦包零落後粉環髙下挶烟寒皮日休陸龜䝉避暑聨句煩暑雖難避僧家自有期泉甘於馬乳苔滑似龍漦麾任誕襟全散臨幽榻旋移松行將雅拜篁陣欲交望塔青􅐴識登樓白鴿知石經森欲動珠像儼將怡筒簟臨杉穂紗巾透雨絲靜譚蟬噪少凉步鶴隨遲烟重迴蕉扇風輕拂桂帷對碑吳地説開巻梵天詞積水魚梁壊殘花病枕欹懐君瀟洒處孤夢遶罘罳薛能題寺閣一閣見一郡亂流仍亂山未能終日住尤愛暫時閑唱棹吳門去啼林杜宇還髙僧不可羨西景掩禪關方子通程公闢留客開元飲二首晝錦新坊路稍西興来携客就僧扉樽前倒玉清無比筆下鏗金妙欲飛藍轝直須乗月去榜歌時聽採菱歸流𫝊白雪吳城滿頓覺炎歊一夕微仙老論文小往還多才令尹獨能攀携觴步入千花界借榻清臨一水間笑語不驚沙鳥去襟懐猶過野僧閑城中此地無人愛坐對西南見好山大慈寺在長洲縣北皮陸集云晉戴顒宅也至唐司勲陸郎中居之後以為寺號北禪院皮日休陸龜䝉避暑聨句歊蒸何處避来入戴顒宅逍遥脫單絞放曠抛輕䇿爬搔林下風偃仰澗中石殘蟬煙外響野鶴沙中跡到此失煩襟瀟然揖禪伯藤懸疊霜蛻桂倚支雲錫席清隂𥪡毛髪爽氣舒筋脉逐幽隨竹書選勝鋪苮魚跳上紫芡蝶化縁青壁易心是玉蓮徒耳為金磬敵吾宗昔髙尚志在羲皇豈獨㫁韋編㡬將刓銕㰅天書既屢降野抱難自適一入承明廬盱衡論今昔流光不容寸斯道甘枉尺既起謝儒𤣥亦翻商羽翼封章幃幄遍夢寐江湖日擺落函谷塵髙欹華陽幘詔去雲無信歸来鶴相識半病奪牛公全慵捕魚客少微光一㸃落此芒磔索籍釋子問池塘門人廢幽賾堪悲東序寳忽變西方不見步兵詩空懐康樂屐寂高名不可効勝境徒堪惜墨沼轉疎蕪𤣥齋踰閒遲遲不能去凉颸滿杉柏日下洲島清烟生苾蒭碧俱懐出塵想共有吟詩癖終與淨名遊還来雪山覔陸龜䝉同皮日休遊北禪連延花蔓映風廊岸㥽披襟到竹房居士秖今開梵處先生曽是草𤣥堂清樽林下看香印逺岫窻中掛鉢囊今日有情消未得故將名理問思光皮日休戚厯杉隂入草堂老僧雖見似相忘吟多㡬轉蓮花漏坐久重焚柏子香魚慣齋時分淨食鴿能閑處傍禪床雪林滿眼空羇滯欲對彌天却自傷陸龜䝉寒夜同皮日休訪寂上人月樓風殿靜沈沈披拂霜華訪道林鳥在寒枝棲影動人依古堞坐禪深明時尚阻青雲步半夜猶追白石吟自是海邊鷗伴侣不勞金偈更降心皮日休院寒青靄正沈沈霜淺乾鳴入古林數葉貝書松火暗一聲金磬檜煙深陶潛見社無妨醉殷浩談經不廢吟何事欲攀塵外契除君皆有利名心報恩光孝禪寺在長洲縣東南即舊天寧萬夀禪院也徽宗時以為祝夀道場後即以為薦嚴之地改今額蘇子美寄守堅覺初二僧曽攜舊書巻来宿古禪林方外求知性詩中得賞音爐開山夜靜門掩雪天隂杌上一寒硯燈前三苦吟韻强顔汗落句切鬢絲侵玉就還重琢河窮更逺尋宂爭探乳虎沙獨揀良金字穏天星轉萹終海月沈唱酬同紀錄得失暗規箴木鐸不徇路薫風難和琴半生誰引手中道比分襟分野三河濶年華二紀深師方𫝊祖印我欲謝朝簮嶺外烟嵐地湖邊雲水心情悰張翰鱠夢想陸機禽松下莓苔石何年重訪臨覺報寺在府東南舊名老夀菴王岐公家香火院也靖康之難此寺金人所寓故不得焚吳下古名屋惟此寺耳夀寧萬歳院在長洲縣東南舊羅漢院也寺有二塔對峙俗名雙塔寺紹熙中提舉徐誼給常平田記兩浙西路常平茶鹽使者治平江自行殿駐臨安視昔畿内若節誕必奉觴稱夀兩宫之庭時為盛典先期環月率其屬即府城東隅雙塔夀寧萬歳禪院建祝聖道埸備極嚴奉是院肇唐咸通逮本朝雍熙創造雙塔至道初賜以御書遂更今額乾道中始革律焉規模比舊増新四衆歸仰雲水坌集為一大叢林建院之民王氏捨負郭之田五百八十餘畝撞鐘擊鼓食者日倍帥常經營而懼弗贍紹熙二年前太常丞徐公以新安髙第就畀使者節兩朝所知徳意孚達朞年于此利興害除會崑山屬邑宗王有田七千餘畝没入于官一時貴近相先規取牒訴旁午公曉以令甲皆不應得命有司召佃如式而長老徳溥因以千畝為請公諉有司給之抑權禁勢平訟息爭不惟法理適宜人無加喙而院之衆藉是庶幾資以無乏禱祠之地報上義深夫一用至公而二美具非公其孰能之徳溥屬頤正記本末於是乎書公永嘉人徐誼字子宜學有師承徳業宏逺固將推之朝廷見之天下與来世此盖未足云三年上元日具位龔頤正記定慧寺在萬歳院之西本子院也祥符中改賜今額寳積教院在黄土塔橋之東舊靈巖山廨院也永福尼院在長洲縣南妙嚴尼院在長洲縣西北傳法尼寺在長洲縣西舊禪興寺也寧國禪尼院在天慶觀西南靈鷲寺在長洲縣北舊永光院大中祥符尼寺在長洲縣西北舊福田寺仁王尼院在長洲縣東南舊安吳院資夀尼院在長洲縣東南天宫禪院在長洲縣東北舊武平院寳光院在長洲縣東北婁門雍熙寺在吳縣北舊法水寺有方塔毁於兵燼至今未能復景徳寺在黄牛坊橋東寺有廢塔未復西竺尼院在跨街樓後舊保夀院乾元寺唐有之今不知所在據顧況記云晉戴逵宅皮陸集又以北禪寺為戴宅則此即今北禪寺矣顧況撰建乾元寺記五藴十二入十八界此上三科能包萬法因緣生為有無自性為空空有融一即中道義雖石船渡海蚊背負山不為希有事僧法珣與和合衆法蔵等造乾元寺者晉髙士戴逵子顒之宅也乾元初節度使鄭旻之奏云觀察使李涵李道昌皆有力大臣求無上道以心無所願無邊受者實與雖空不敗有為有滅無為有為之體有為無為之用無生無滅無相無為無名無法説無言語法以無言語説故有相大乗有觀法門無相大乗無觀法門於法有所得有相大乗義於法無所得無相大乗義所得無所得二俱真一乗之義也為妙因果譬如種子依地而生又如大地能荷羣有虚空之體大於天地天地有盡虛空無盡如来之體大於虛空光明虚覺圎寂萬億故於無住本建乎諸法不動真際恒沙煩惱莫不㫁除魚吞鈎虎落穽蛾拂火此衆生自取其毒道本平坦樹本清涼佛在提摩竭揭國成等正覺諸弟子栖乎茂林藉彼祥草厥後因時設教猶着弊衣行次乞食及往忉利省摩耶夫人優填王鑄金刻木始用膠漆泥布佛有像自此始也與佛在時功徳無異於是給孤長者造祇洹精舍末田底伽造龍宫精舍竺乾法蘭造洛陽白馬寺佛圗澄造鄴中九百七十三寺釋道安造襄陽一十五寺逺法師造廬山東林西林寺度法師造攝山栖霞寺杯渡法師造南陵隠靜寺傅大士造東陽雙林寺思大師造衡陽南嶽寺智者大師造天台國清玉泉寺三十五寺畧也湼槃無前無後般若無新無舊法珣上人重舊徳不輕新學門人清玦請况於經蔵中抄佛心説永示無極文曰倬哉迷盧宏亘大千百億日月藕絲貫穿蚊背負之飛登梵天塵勞為海般若為船截生死流是曰希有大哉乾元實則不朽和衆雲臻珣為稱首佛告善来寳坊崇哉法雨洒埃慈雲徘徊南禪寺唐有之今不知所在白居易南禪寺千佛堂轉輪經蔵石記千佛堂轉輪經蔵者先是郡太守居易發心蜀沙門清閑矢謨吳僧常敬𢎞正神益等僝功檀主鄧子成等施財院僧法𢎞等蔵事太和二年秋作開成元年春成堂之費計緡萬蔵與經之費計緡三千六百堂之中上盖下蔵盖之間輪九層佛千龕彩繪金碧以為飾環盖懸鏡六十有二蔵八面面二門丹漆銅鍇以為固環蔵敷座六十有四蔵之内轉以輪止以柅經函二百五十有六經巻五千五十有八蔵成經具之眀年蘇之緇白徒聚謀曰今功徳如是誰其尸之宜請有福智僧越之妙喜寺長老元遂禪師為之主宜請初發心人前本郡守白少傅為之記僉曰然遂既来教行如流僧至如歸供施達嚫隨日而集堂有羨食路無飢僧游者學者得以安給恵利饒益不可思量師又日與苾蒭衆升堂焚香合十指禮千佛然後啓蔵發函鳴楗椎唱伽陀授持讀諷十二部經經聲洋洋充滿虚空上下逺近有情識者法音所及無不䝉福法力所攝鮮不歸心佻然巽風一變至道所得功徳不自覺知繇是而言是堂是蔵是經之用信有以表旌覺路也脂轄法輪也示火宅長者子之便門也開毛道凡夫生之大竇也亶其然乎又眀年院之僧徒三詣雒都請予為記夫記者不惟紀年月述作為亦在乎辨興廢示勸誡也我釋迦如来有言一切佛及一切法皆從經出然則法依于經經依于蔵蔵依於堂若堂壊則蔵廢蔵廢則經墜經墜則法隠法隠則無上之道㡬乎息矣嗚呼凡我國土宰官支提上首暨摩摩帝輩得不䖍奉而䕶念之乎得不保持而増修之乎經有闕必補蔵有隙必葺堂有壊必支若然者真佛弟子得福無量反是者非佛弟子得罪如律開成四年二月一日記吳郡志巻三十一
