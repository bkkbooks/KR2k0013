body:
  text: 吳郡志卷二十宋范成大撰人物春秋吳公子慶忌王僚之子以男聞於世萬人莫當走追奔獸手接飛鳥追之駟馬馳而不及射之接矢而不可中僚死出奔闔廬得要離用之為離所刺被離吳王闔廬之臣楚白喜既入吳伍子胥言於王以為大夫被離問子胥曰何見而信喜子胥曰喜伯州犂之孫吾之怨與喜同子不聞河上歌乎同病相憐同憂相救誰不愛其所近悲其所思者乎被離曰吾觀喜之為人鷹視虎步専功擅殺性不可親也子胥曰不然竟與共事喜即伯嚭也要離吳人闔廬憚慶忌在鄰國有萬人之力恐合諸侯以害吳伍子胥乃進要離曰離雖細人有萬人之力嘗見其折辱壯士椒丘訢於友人之喪席訢怒須暝往攻離離至舍誡其妻曰我辱壯士椒丘訢於大家之䘮餘恨蔚恚暝必来第勿閉吾門至夜椒丘訢果往見其門不閉登其堂不闗入其室不守放髮僵卧無所懼訢乃手劒捽雜曰子有當死之過三子知之乎子辱我於大家之衆一死也歸不闗閉二死也卧不守御三死也子有三死之過欲無得怨要離曰吾無三死之過子有三不肖之愧子知之乎吾辱子於千人之衆子無敢報一不肖也入門不咳登堂無聲二不肖也前拔子劒手挫捽吾頭乃敢大言三不肖也有三不肖而威我豈不鄙哉於是椒丘訢投劒而歎曰天下壯士也臣所聞要離若此吳王見之要離曰臣國東千里之人細小無力迎風則僵負風則伏大王有命臣敢不盡力吳王黙然要離即進曰大王患慶忌乎臣能殺之王曰慶忌之勇聞於世今子之力不如也要離曰王有意焉臣能殺之臣詐以負罪出奔願王戮臣妻子斷臣右手慶忌必信臣王曰諾要離乃詐得罪出奔吳王乃取其妻焚棄於市要離乃奔諸侯以無罪聞於天下遂如衛見慶忌曰闔閭無道王子所知今戮吾妻子焚之於市無罪見誅吳國之事吾知其情願因王子之勇闔閭可得也慶忌信其謀練士卒遂之吳將渡江於中流要離力微坐慶忌上風因風勢以矛鈎其冠順風而刺慶忌慶忌顧而揮之三捽其頭於水中乃加於膝上曰嘻天下之勇士也乃敢加兵於我左右欲殺之慶忌止之曰豈可一日而殺天下勇士二人哉可令還吳以旌其忠於是慶忌死要離渡江愍然不行謂從者曰殺吾妻子以事吾君非仁也為新君而殺故君之子非義也何面目以視天下之士言訖遂投身於江未絶從者出之要離乃自斷手足伏劒而死吳太子友故夫差太子也夫差將伐齊令國中曰敢諫者死太子友知子胥忠而不用太宰嚭佞而専政欲切言之恐罹尤乃諷諫王清旦懐丸持彈從後園来衣袷履濡王怪問之太子曰適遊後園聞秋蜩之聲往觀之秋蟬登髙樹飲清露隨風撝撓長吟悲鳴自以為安不知螳蜋超枝縁條曳腰聳距而稷其形螳蜋翕心而進志在有利不知黄雀徘徊枝隂微進欲啄螳蜋黄雀但知伺螳蜋之有味不知臣挟彈飛丸而集其背臣但志在黄雀不知空埳其旁陷於深井臣故袷體濡履為大王笑王曰天下之愚也但貪前利不覩後患太子曰愚復有甚者呉徒知踰境征伐不知越王將選死士出三江之口入五湖之中天下之危莫甚於斯王不聽夀越吳子夀夢臣魯襄公五年使于晉請聽諸侯之好晉人遂為之合諸侯魯衛皆来㑹于善道季札吳子夀夢子諸樊之弟諸樊既除喪將立季札辭曰昔曹人不義曹君將立子臧子臧去之君子曰能守節札雖不才願附於子臧以無失節固立之棄其家而耕乃舍之札遂為吳出聘諸侯以通嗣君至魯説叔孫穆子知其不得死遂請觀周樂至齊説晏平仲至鄭見子産如舊相識至衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也至晉説趙文子韓宣子魏獻子曰晉國其萃於三族乎説叔向曰吾子勉之君侈而多良大夫皆冨政將在家吾子好直必思自免於難初使過徐君徐君好季札之劒口弗敢言及還徐君巳死解其劒繫之冢樹由是札賢名聞天下其卒也孔子書其葬處曰嗚呼有呉延陵君子之墓至今傳於世蹶由吳子餘祭之弟魯昭公五年楚伐吳蹶由犒師楚王執之將以釁鼓使問曰女卜来吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若驩焉好逆使臣兹敝邑休怠而忘其死亡無日矣今君奮焉震電馮怒虐執使臣將以釁鼓則吳知所備矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備吉孰大焉乃弗殺以蹶由歸掩餘吳公子也魯昭公二十三年吳伐州来楚及諸侯之師救州来吳公子光帥右掩餘帥左大敗楚及諸侯之師於雞父公子光弑王僚掩餘乃奔徐史記作盖餘燭庸吳公子魯昭公二十七年吳欲因楚喪而伐之使公子掩餘及燭庸帥師圍潛吳師不能退公子光遂殺王僚燭庸奔鍾吾後與掩餘奔楚二人不與闔廬者也夫槩王闔廬之弟也魯定公四年吳伐楚楚囊瓦禦之二師陳于栢舉夫槩王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊囊瓦之卒楚師亂吳師大敗之吳遂入郢夫槩王後奔楚為堂谿氏子洩吳王夫差臣魯哀公八年帥師伐魯取武城胥門巢王子姑曹展如皆吳王夫差臣哀公十一年巢將上軍姑曹將下軍展如將右軍戰于艾陵大敗齊師太子友夫差子王子地王孫彌庸皆夫差臣魯哀公十三年越伐吳為二隊疇無餘謳陽自南方先及郊彌庸見姑蔑之旗曰吾父之旗也不可以見讎而弗殺也太子曰戰而不克將亡國請待之彌庸獲疇無餘地獲謳陽越子至復戰友與彌夀於姚皆死之言偃字子游吳人孔子髙弟在文學之科嘗為武城宰孔子過之聞弦歌聲笑曰割雞焉用牛刀子游曰昔者聞諸夫子君子學道則愛人小人學道則易使孔子曰偃之言是也今言偃宅在常熟縣西常熟世𫝊一名琴川本弦歌之説故也餘見往蹟門前漢甪里先生吳人史記正義引周樹洞厯云姓周名術字元道太伯之後漢髙帝時與東園公綺里季夏黄公俱出定太子號四皓史記正義甪里先生一號霸上先生又云今太湖中洞庭山西南中有祿里村是嚴忌吳人時謂之嚴夫子尊之如此嚴助嚴夫子子也郡舉賢良對䇿百餘人武帝善助對擢為中大夫時征伐四夷開置邊郡助與大臣辨論中外相應以理義之文任用尤親助侍燕從容上問居鄉時助對為友壻富人所辱上問所欲願為㑹稽太守於是拜為㑹稽太守數年賜書曰君厭承眀之廬勞侍從之事懐故土出為郡吏㑹稽東接海南近諸越北枕大江間者闊焉久不聞問具以春秋對助上書謝復留侍中朱買臣字翁子家貧好讀書不治産業常艾薪樵賣以給食擔束薪行且讀書其妻羞而去買臣後至長安㑹嚴助貴幸薦買臣召見説春秋言楚詞帝甚説之拜中大夫因言東越可破之䇿拜㑹稽太守擊破東越徴為主爵都尉子山拊官至右扶風後漢沈豐郡人為郡主簿太守第五倫母老不能之官倫每至臘節常懐戀垂泣遣豐迎母廣陵母見大江畏水不敢渡豐祭神令子孫對母飲酒因醉卧臯伯通漢賢者居臯橋梁鴻與孟光偕至吳為人賃舂伯通異之舍之於家髙岱字孔文郡人性聰達輕財貴義所友皆世偉人太守盛憲以為上計舉孝㢘許貢来領郡岱將憲避難求救於陶謙岱憔悴泣血水漿不入口謙感其忠壯有申包胥之義許為出軍岱還而貢已囚其母吳人皆為危悚岱徑往見才辭敏捷好自陳謝貢登時出其母孫䇿聞其善左𫝊乃自玩讀欲與論講虚已候焉為媢嫉者所中䇿遽囚之知友時人皆露坐為請䇿登樓望見數里中填滿惡其收衆心遂遇害沈友字子正郡人年十一華歆行風俗見而異之因呼曰沈郎可登車語乎友逡巡曰君子講好以禮今仁義陵遲聖道漸壊先生銜命將以裨補先王之教整齊風俗而輕脱威儀猶負薪捄火更益其熾歆慚曰自威靈以来雖多英彦未有㓜童若此者弱冠博學善屬文兼好武事注孫子兵法又辯於口時稱其筆舌與刀三者皆妙過絶於人孫權以禮聘之既至極論王霸之畧正色立朝清議峻厲為庸臣所譛權亦疑其不為已用害之年二十九陸康字季寧郡人祖父續在獨行𫝊康漢末為廬江太守少篤孝悌勤修操行太守李肅察孝㢘肅後坐事伏誅康斂尸送喪還潁川行服禮終舉茂才厯三郡太守所在有稱子績仕吳謝承後漢書陸紆字叔盤敏淑有思學守城門校尉子駿駿字季才淳懿信厚為邦族所懐官至九江都尉子遜仕吳吳書陸氏世頌吳陸績字公紀漢末廬江太守康之子容貌雄壯博學多識該覽厯數吳孫權辟為曹掾以直道見憚出為鬱林太守罷歸無裝舟輕不可越海載石為重姑蘇陸氏之門有巨石號鬱林石世保其居績雖有軍事著述不廢作渾天圖注易釋太𤣥皆𫝊於世豫知亡日為辭以訣自謂有漢志士吳郡陸績幼勤詩書長玩禮易受命南征罹疾遇厄遭命不幸嗚呼悲隔卒年三十二長子宏㑹稽南郡都尉次子叡長水校尉陸遜字伯言孫權為將軍時遜年二十一始仕幕府厯東西曹代吕䝉為右都督拒關侯進克公安南郡進封華亭侯進封婁侯遷大都督破先主走曹休積功拜上大將軍輔太子董督軍國赤烏中代顧雍為丞相時謂伊尹隆湯吕尚翼周内外之任遜實兼之遜弟瑁瑁子喜遜子抗抗子景遜族子凱徹凱子禕陸瑁字子璋遜之弟好學篤義與英俊游割少分甘收導孤弱攝養至長乃别嘉禾中拜選曹尚書諫疏端切孫權嘉之子嘉仕晉陸抗字㓜節建衡中為都督諸軍事治樂鄉憂深慮逺數上疏陳時宜破西陵誅步闡貌無矜色謙冲如常得將士歡心與晉羊祜推僑札之好時以為華元子反復見於今鳯凰中拜大司馬荆州牧卒子晏嗣晏及弟景𤣥機雲分領抗兵陸景字士仁澡身好學著書數十篇以尚公主封毗陵侯陸凱字敬風遜族子為將數有功封嘉興侯孫休時領豫州牧雖統兵衆手不釋書好太𤣥論演其意以筮輙驗孫皓時為左丞相乃心公家義形於色卒年七十一陸𦙍字敬宗凱之弟初為呉尚書選曹郎太子和聞其名待以殊禮坐和下獄楚毒備至終無他辭出為交州刺史安南校尉夷人服其恩信交域肅清就加安南將軍永安元年徴為西陵督封都亭侯後轉左虎林中書丞華覈表薦曰𦙍天姿聰朗才通行潔昔厯選曹在州十餘年内無粉黛附珠之妾家無文甲犀象之珍方之今臣實難多得江邊任輕不盡其才宜股肱王室寵以上司則天工修而庶績熙矣𦙍卒子式嗣陸褘孫皓時為將軍父凱亡入為太子中庶子右史華覈薦曰褘體質方幹器幹彊固董率之才過於魯肅在戎果毅臨財有節晉陸機字士衡祖遜父抗已見前條機長七尺聲如鐘天才秀逸文章冠世閉門勤學非禮不動太康末與弟雲俱入洛張華謂伐吳之役利在獲二俊遂延譽薦之成都王頴假機後將軍河北大都督宦人孟玟譖機於頴遇害葛洪稱機文猶𤣥圃積玉無非夜光五河吐流泉源如一其宏麗妍贍英鋭漂逸亦一代之絶所著文章三百餘篇行於世弟雲耽陸雲字士龍機之弟六歳能屬文性清正有才理與兄齊名雖文章不及而持論過之號二陸舉賢良時年十六吳平入洛周浚謂為當今之顔子補浚儀令後百姓圖形配食縣社入為中書侍郎為成都王頴所害著文章及新書三百餘萹陸耽雲之弟為平東祭酒亦有清譽與雲同遇害孫恵與朱誕書曰三陸相攜闇朝一旦湮滅國喪雋望悲豈一人其為州里所痛如此陸喜字恭仲父瑁喜少有聲名好學有才思其為自敘畧曰感子雲之法言而作言道覩賈子之美才而作訪論觀子政洪範而作古今歴覽蔣子通萬機而作審機讀幽通思𤣥四愁而作娛賔九思其書近百篇仕吳吏部尚書入晉為散騎常侍子育為尚書郎弋陽太守姪曄陸曄字士光喜弟之子父英髙平相少有雅望以清正著稱從兄機稱之曰我家世不乏公矣太興初拜侍中與王導等受顧命遺詔録尚書事謂曄清操公忠厯職顯允事君如父憂國如家歳寒不凋體自門風焉蘇峻之難隨帝在石頭不以㓙威變節峻不敢害後求歸鄉里拜墳墓卒諡曰穆子諶散騎常侍弟玩陸玩字士瑤器量淹雅弱冠有美名嘗詣王導食酪因而得疾與導牋曰僕雖吳人㡬為傖鬼其輕易權貴如此詔曰玩體道清純雅量洪逺厯位内外風績顯著代王導等為司空翼亮累世以洪重為人主所貴性通雅不以名位格物誘納後進謙若布衣搢紳皆廕其徳宇薨諡曰康子納陸納字祖言少有清操正厲絶俗厯職恪勤純固始終不渝自吳興太守召拜尚書將應召外白宜裝㡬船臨發止有被襆而巳餘並封以還官時㑹稽王道子少年専政納望闕而歎曰好家居纖児欲撞壊之邪朝士咸服其忠亮卒官開府儀同三司吳郡志卷二十
