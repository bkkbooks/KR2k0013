body:
  text: 吳郡志卷二十八宋范成大撰進士題名端拱元年程宿榜龔識淳化三年孫何榜丁謂宰相錢昆諫議大夫謝濤太子賓客凌咸陸元圭龔緯識弟咸平二年孫暨榜李堪咸平三年陳堯咨榜鄭載談應許式龔紀緯兄胡堯佐許洞鄭為龔會元識姪大中祥符元年姚曄榜唐儼大中祥符四年張師德榜富嚴大中祥符五年徐奭榜林咸德大中祥符八年蔡齊榜謝絳濤子參知政事胡獻卿范仲淹參知政事天禧三年王整榜鄭修為子錢象先吏部侍郎天聖二年宋郊榜葉清臣翰林學士鄭戩載弟樞密副使天聖五年王堯臣榜李瑀直講堪子龔宗元識子天聖八年王拱辰榜范師道仲淹姪元絳參知政事鄭條為子林襲眀朱公綽林茂先襲明兄陳之武景祐元年張唐卿榜程師孟鄭戭戩弟刑部侍郎陸景祝熙載寶元元年吕溱榜陳之奇之武兄鄭君平修子陸絳鄭戡戩弟張詵天章閣待制慶歷二年楊置榜李瑜瑀弟孫規黃頌許奇慶歷六年賈黯榜崇大年鄭方平修子皇祐元年馮京榜范純仁仲淹子宰相張僑士廉姪李川郎淑皇祐五年鄭獬榜滕甫龍圖閣學士錢深鄭汝平修子支詠郭鼎臣范世京師道子嘉祐二年章衡榜陸元規郟亶嘉祐四年劉輝榜朱長文公綽子王純臣丁偃李逢原張詢陳之方嘉祐六年王俊民榜林卨咸德姪程寬師孟子陸元長元規兄嘉祐八年許將榜沈括翰林學士凌民瞻郭附黃顔治平二年彭汝礪榜孫載治平四年許安世榜張敦吳純貺張僅李博聞熙寧三年葉祖洽榜郁澄徐彥孚鄭安平改名景平伸子鄭伸凌民師民瞻兄范世亮師道子熙寧六年余中榜黃汝平梅灝林程茂先子張顔僑子龔程宗元子孫沖黃頡顔弟黃彥頡兄熙寧九年徐鐸榜張元素張元弼林稙茂先子郭際顧襄上舍元豐二年時彥榜秦希甫張諤林种茂先子顔長民元豐五年黃裳榜嚴君鄰林師醇孟醇黃懿彥元豐八年焦蹈榜沈彥升黃從周周何章衎之謝翺錢兟元祐三年李常寧榜范敦樂周沔丁覯李博喻陳傑孫實陳序元祐六年馬㳙榜林虡嚴適程騫師孟姪魏志陳噩施逺鄭倞戩孫黃䇿彥子紹聖元年畢漸榜胡浹程亢林穥茂先子富鈞嚴孫胡安平陳彥和紹聖四年何昌言榜郁師醇魏憲志弟吏部侍郎林虙虡兄富洵嚴孫元符三年李崟榜顧植張公厚張漸劉彥敦方振陶擴徐端行上舍崇寧二年霍端友榜崔伯乘潘兊禮部侍郎黃正彥孫陶黃昌衡崔百勝黃昌朝昌衡弟褚覃崇寧五年蔡薿榜程元允師孟姪孫李彌大尚書邊知章龔況程子陶振擴弟范聞大觀三年賈安宅榜王棠朱發長文子鄭聖任胡思浹子胡寬李彌逺彌大弟侍郎單師淵李毗政和二年莫儔榜陳述林閌顔孚林摰顔為孚兄方純彥王闈糜鍇政和五年何㮚榜陳起宗錢觀復張柟黃偉王裳棠弟葉髙節張敏功顔子沈季孫顔采長民子唐輝儼孫禮部侍郎錢當時葉薿政和八年嘉王榜顔天選魏賁憲弟徐慶錢仲思顔安時天選叔張德本李益瑀孫鄭護林璵茂先孫宣和三年何渙榜程元㢸元允弟范卨鄭作肅錢豫林友宣和六年沈晦榜范雩余仔達先伯李大鼎林儼卨姪王葆凌哲吏部侍郎民師姪何建中鄭時戩孫居世英富元衡嚴孫邊知白户部侍郎凌遘哲兄改名逺建炎二年李易榜倪成修唐煜輝弟楊景凌揆哲弟鄭揚章藉茅錫胡利賓孫觀魏志上舍附鄭大讜戭孫紹興二年張九成榜孫雄飛錢南周播尤著紹興五年汪應辰榜孫起卿觀子范成象雩姪郟升卿亶孫馬迥紹興八年黃公度榜王履黃萬頃陳長方顔唐天選姪王嘉彥葆姪沈詢紹興十二年陳誠之榜何俌工部侍郎王伯廣許光國袁鼇嚴煥君鄰姪紹興十五年劉章榜詹左翁翊臣李渥錢佃觀復子吳旻祝端表張世衡李衡紹興十八年王佐榜胡元質給事中冷世光胡百能糜師旦鍇子冷世修世光弟林光祖虡姪紹興二十一年趙逵榜余松錢俁佃兄成端亮林育顔發唐弟張允恭紹興二十四年張孝祥榜陳九思衛稷樂備陳晉卿楊思濟范成大雩子趙思陳嵩卿晉卿兄鄒嶰紹興二十七年王十朋榜鄭庶作肅姪陳端友顔度發弟叔平父王萬葆弟姚愈紹興三十年梁克家榜馬先覺吕篆方思純彥姪隆興元年木待問榜章澥胡元功元質弟唐子夀輝子王藝成欽亮端亮弟鄒止宗嶰弟郁异袁宗仁鼇子姚申之李廷直賀三聘羊光宋乾道二年蕭國梁榜薛甫孫紹先雄飛子胡長卿周建俞允成乾道五年鄭僑榜何淇俌姪李卞姪起林璞璵孫辛機林琰璞弟林廷瑞陳九德九思弟王邁乾道八年黃定榜范之柔仲淹孫鄭汝止王有大棠孫吳兢范藻成象子宋光逺曹緯淳熙二年詹騤榜姚濟錢萬頃兄萬選王育錢萬選張舜卿淳熙五年姚穎榜胡坦周日嚴吳仁傑淳熙八年黃由榜黃由狀元王保大有大弟裳孫蔣南金淳熙十一年衛涇榜衛涇狀元吕伯奮陳熠張攀敏功孫黃演䇿曽孫顧叔康吕申夏允中翁謙淳熙十四年王容榜胡林卿顔叔淵度姪趙興祖顧端臣盛章謝伯常李應祥衡子余逹先仔姪陳甫劉大忠林伯誠紹熙元年余復榜周南上舍蔡以中朱晞顔周褎然李南姪公縉李起宗應祥兄顔叔玠叔淵兄丁慤任相陳振顔叔平叔玠弟葛燦紹熙四年陳亮榜黃涇演弟髙之問慶元二年鄒應龍榜鄭凖葉蒙之潘夢旗胡允恭蔣志行趙汝宫孔元忠石宗王慶元五年曽從龍榜姚宜中愈子陳貴誼汪棐汪令圖棐叔糜溧師旦子顔叔瑤叔平弟潘興嗣衛沂涇兄嘉泰二年傅行簡榜曹豳漕試趙黔夫胡榮卿趙綝沈誠詢孫姜京趙汝璪趙汝礿髙不倚宋文英曹大昌吳埓方賜復弟萬里楊昕開禧元年毛自知榜趙汝淳鄭啓陶永叔振周深源南子嘉定元年鄭自誠榜衛洽涇弟衛價孟繼顯徐鼎唐伯楶趙澀夫辛忠嗣博學宏辭一人陳貴誼慶元五年進士嘉定四年趙建大榜嵇源上舍陳德林上舍施振方萬里趙時譡嘉定七年袁甫榜衛洙王尚輔保大叔棠姪張震發顔儼長民曽孫為孫黃必大趙豐亨嘉定十年吳潛榜趙汝禚汝初兄趙希魯糜榗溧兄趙㵢夫沈有開王圭父邁乾道己丑鄭榜蔡廉嘉定十三年劉渭榜黃保大必大弟王斗文育姪孫趙滬夫李公縉叔南施秉貫溫州寓居吳江趙體國謝鄆上舍王野從事郎張新震發從弟陶瑜叔祖永周夢發嘉定十五年上舍釋褐李起伯卞王熙載嘉定十六年蔣重珍榜鄭起潛上舍甲科趙崇驥汝積子朱檜周申內舍南姪深源兄蔡珏內舍李任通直郁雲內舍异姪褚南右科孫孜姪沈應昌凌雲揆姪孫王丙發寶慶二年王㑹龍榜盛文昭章姪莫子文內舍趙磻夫黔夫兄趙崇䛴趙時伸磻夫子黔夫姪葉酉發䝉之姪徐章鼎弟顔楧叔瑶妷蔣南金陶虎叔永姪瑜紹定二年黃朴榜盛文韶章姪兄文昭郁中异姪雲弟趙似祖興祖弟王㝱暋武舉進士題名補注建炎二年徐遂榜褚孜第二人乾道五年趙鼐榜朱子美第二人乾道八年林宗臣榜朱起宗推第一人恩例李嶽淳熙二年蔣介榜沈嗣宗孟湜淳熙十一年林㟽狀元紹熙元年厲仲詳榜蔡革李頤慶元二年周虎狀元嘉泰二年葉漴榜商覺民時克復開禧元年鄭公侃榜吕轍嘉定四年林汝浹榜劉以中絶倫吳郡志卷二十八
