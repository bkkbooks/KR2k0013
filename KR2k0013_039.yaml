body:
  text: 吳郡志巻三十九宋范成大撰塚墓吳太伯墓吳越春秋云太伯卒葬於梅里平墟梅里今屬常熟縣又史記正義引括地志太伯冢在吳縣北五十里無錫縣界西梅里村鴻山上去太伯所居城十里吳地記又云太伯冢在吳縣北去城十里未詳孰是吴王闔廬墓在虎丘山劍池下吴越春秋云闔閭葬於國西北虎丘穿土為山積壤為丘發五郡之士十萬人共治千里使象摙土鑿池四周水深丈餘銅槨三重澒水銀為池池廣六十步黄金珠玉為鳬雁扁諸之劍魚腸之干在焉葬之三日金精上揚為白虎據墳故曰虎丘越絶書云闔閭冢在閶門外虎丘下池廣六十歩水深一丈五尺銅棺三重澒池六尺玉鳬之流扁諸之劒三千方圜之口三千盤郢魚腸之劍在焉發卒十萬餘人築治之𦵏之三日白虎居其上二說畧有同異顧墳丘中事又古今遼絶無所考驗今兩存之餘見雲巖寺及往蹟冢墓攷證等門王禹偁詩惜哉吴王墓秦帝常開破應笑埋金玉千年賈為禍不待虎跡消已聞鮑車過又是驪山頭炎炎三月火吳女墓在閶門外闔廬女曰滕玉王與夫人及女㑹食蒸魚王前甞半而與女女怒曰王食魚辱我乃自殺闔閭痛之葬於國西閶門外鑿池積土文石為椁題湊為中以金鼎玉杯銀樽珠襦之寶送女乃舞白鶴於吳市中令民随而觀之使男女與鶴俱入羨門因發機以掩之殺生以送死國人非之又取土時其地為湖號女墳湖吳地記曰吳王葬女取土成湖皮日休女墳湖詩萬貴千奢已寂寥可憐忠憤為誰嬌須知韓重相思骨直在芙蓉向下消陸龜䝉水平波淡遶迴塘鶴殉人沈萬古傷應是離魂雙不得至今沙上少鴛鴦齊女墳在虞山吳太子娶齊女女思齊而病将死曰令死者有知必葬我於虞山之巔以望齊國闔閭傷之如其言𦵏虞山之巔吴越春秋吳王夫差墓在陽山越絶書謂越王棲夫差於餘杭山去吳縣五十里即今之陽山越絶文云夫差冢在猶亭西卑猶之位近太湖越王令干戈人以一力秧反土葬之吴越春秋云夫差既伏劍越王以禮葬之秦餘杭山卑猶宰嚭亦葬其傍史記正義夫差棲於姑蘇山轉戰西北敗於干遂干遂遂名一作隧在蘇州西北四十里萬安山有遂山夫差義子墳一十八所在秦餘杭山東吳地記巫臣冢即申公巫臣也郡國志云在匠門西南亦曰巫門干将墓在匠門外干将與區冶同師其妻曰莫耶吳王使鑄劍二干将匿其隂王殺之吳地記曰匠門本名干将門門外有干将墓後語訛呼為匠門餘見土物條要離墓在閶門外金昌亭傍専諸墓在閶門外吴孫王墓在盤門外三里政和間村民發墓磚皆作篆𨽻為萬嵗永藏之文得金玉瑰異之器甚多有東西銀杯初若燦花良久化為腐土又得金搔頭十數枚金握臂二皆如新并瓦薰鑪一枚與近世陸墓所燒略相似而箱底有灰炭如故父老相𫝊云長沙王墓按長沙王即孫䇿又恐是其母若妻墓郡守聞之遽命掩塞所得古物盡歸朱勔家洪芻香譜亦略載此事郡人楊友夔為詩序其事為詳但直指以為堅墓故有髙陵之句按史堅自葬曲阿紹興辛亥提舉常平張體仁始加考訂以為孫氏疑墓姑從鄉人謂之孫王墓又命郡人舉賢良方正滕宬記其事復以史攷之定為孫䇿所葬與世俗長沙王之説稍合今皆録之楊友夔闔閭城南荒之丘昔誰葬者孫豫州久無過客為下馬時有牧童来放牛居然珍寳出光怪識者夜見蹤其由玉環金盌到城市土花不蝕餘千秋州家㢘問亟封守賊曹掩骼窮姦偷已知其中有可欲亦恐未免無窮憂當時義師奮四海少日巳無袁與劉英雄異世凜如在暴露無乃為神羞人生浮脆無可料螻蟻烏鳶從所求髙陵勸爾一杯酒自古南山能錮不宋滕宬孫王墓記云出盤門三里有髙冢或得其冢磚有文在側曰萬嵗永藏問其傍老人曰孫王墓也又曰孫氏長沙王也或𫝊其先世之説盜甞發取藏金玉未竟敗獲有碑巳㫁缺不全止辨有中平年三字復掩之後郡置窑其傍取土為磚埴號官窑後又以授民田收其租前常平使者剙叢冢建齊昇院與孫墓相附近院甫成㑹徙他官将去職一日始得其事立命其屬表之為之表者不暇詢攷題曰先賢墓今使者以為失事實不可示久逺即命吴縣主簿劉允武訂其事乃具條所得冢傍老人之言以報屬宬記之按陳夀志長沙王字伯符始受漢爵為吴侯大皇稱帝追封長沙威王而其子紹嗣封於吴此墓當盜伐時有楊友夔舜韶者作詩弔之乃以為孫破虜墓陳夀志破虜薨葬曲阿楊詩固巳差謬則所𫝊長沙王者㡬是按中平元年朱雋表破虜為佐軍司馬討張角楊盖據碑有中平年字故定以為破虜而不攷其史江表𫝊載破虜為雋佐軍留家夀春長沙王方十餘嵗已能與知名士交周瑜自舒来夀春勸王徙舒則碑之所稱或為王也又夀志及裴松所補孫氏自破虜而下皆出所葬地獨王不言葬而王之薨其将周瑜吕範皆赴喪于吴至大皇始用張紘計自吴徙秣陵則王之葬當在吴也然碑今既不存欲訂而表之其𫝊疑曰孫王墓者從俗稱也舜韶序其詩又稱盜所得冡中物有東西銀杯金搔頭金握臂瓦薫爐中灰炭猶存其物皆歸朱勔家實政和丙申也前使者姓詹氏名體仁字元善今使者姓徐氏字子宜紹熙三年三月三日記漢丞相陸烈墳在餘杭山東二里吴地記山隂縣令陸寂墳在陸烈墳東二里臯伯通墳在胥門外今號伯通墩吴地記梁鴻墓在金昌亭南皋伯通以要離烈士梁生清髙因附葬之吴地記云在太伯廟南與要離墳相竝陸龜䝉云伯鸞墓在吴門金昌亭下㡬一里甞作文以祭焉龜䝉詞云先生為五噫之歌漢天子聞而病諸南走乎大江之波客皋氏之宇下志沈潜而靡他白吴粲以舉臼夫人之勤亦多不懐王於将沒適乎道之無頗比要離之烈魄冢雖夷而不磨嗟余後先生之千祀聊奉奠而来過俯灌地而仰語顧先生之謂以何心褊性誕客他人之宇下不得故力耕而自穫所法先生之義庶五噫之可學漢陸績墳在閶門外太伯廟西吴地記晉顧和冢榮之姪張翰墳在横山東五里吴地記門下侍郎陸雲公墳在横山吴地記侍中朱桓墳在横山吴地記兵部侍郎石崇墳在吴縣西六里吴地記黄門侍郎潘岳墳在石崇墳之西北吴地記上将軍顧榮墳在吴縣東南一十七里吴地記偏将軍步騭墳在吴縣西北三里一百步有碑吴地記将軍袁山松墳在横山二里吴地記江纂墓江逌子也木瀆孫起卿頃於天平山下地名上沙獲墓碑乃以大方塼刻之字畫俱存與石無異起卿為賦詩家有古瑑碑近自田家獲藏之五六年未甚見省録古苔侵文理封結殆莫識偶然嗟其窮一一為磨剔始若漫無文細尋適可讀文云晉江纂長夜垂兹刻貞石殊不用塊然但埏埴合葬無别銘背面書反覆一字不涉華本枝記明白二父遂兼書於逌乃宗嫡考諸晉史篇真是小出入字畫亦嶮勁然不類鐫斲漢魏尚豐碑此獨何褊迫豈時丁喪亂不暇如品式于時義熙季嵗次實庚戌五胡剖中原典午竄南極茍簡理宜爾寧詒不孝責審訂既昭然疑去喜自適歴年七百餘瞥爾駒過隙名節茍不𫝊埃化先瓦石寘兹當眼前用代銘几席梁顧野王墓在吴縣楞伽山下近越来溪紹興間其碑石雖皴剝斷裂尚巍然植立後為醉人推仆石碎於地今尚有存者又吴地記云在横山别隅平地不起墳唐陸象先墓在光福山西土人皆能指其處綽堆在崑山縣西數里相𫝊為黄幡綽墓又云村人皆善滑稽未詳也堆字本從土從享從文避御名改焉陸龜䝉墓顔蕘誌其墓吴子華為祭文曰觸即碎潭下月拭不滅玉上塵摭言吏部尚書姚紹之墳在吴縣南五里一百步吴地記真娘墓在虎丘寺側雲溪友議云吴門女郎真娘死葬虎丘山時人比之蘇小小行客題墓甚多唐舉子譚銖題云虎丘山下冢纍纍松柏蕭條盡可悲何事世人唯重色真娘墓上獨留詩白居易真娘墓虎丘道不識真娘鏡中面唯見真娘墓頭草霜摧桃李風折蓮真娘死時猶少年脂膚荑手不牢固世間尤物難留連難留連易銷歇塞北花江南雪李紳詩序云真娘吴之妓人歌舞有名者死葬虎丘寺前吴中少年從其志也墓多花草以蔽其上嘉興縣前亦有吴妓人蘇小小墓風雨之夕或聞其上有歌吹之音詩云一株繁艶春城盡雙樹慈門忍草生愁態自随風燭滅愛心難逐雨花輕黛消波月空蟾影歌息梁塵有梵聲還似錢塘蘇小小秖應迴首是卿卿王禹偁女命在于色士命在于才無才無色者未死如塵灰虎丘真娘墓止是空土堆香魂與膩骨銷散如黄埃何事千百年一名長在哉吴越多婦人死即藏山隈無色故無名丘冢空崔巍唯此真娘墓客到情徘徊我是好名士為爾傾一杯我非好色者後人無相咍楊備氷肌玊骨有遺妍粉作嬌雲黛作烟知有香魂埋不得夜深巖底月中仙范文正公祖墓在天平山三讓原曽祖夢齡舊名徴夢避皇朝諱改今名事吴越終蘇州糧料判官祖賛時童子出身終祕書監父墉從錢俶歸朝終武寧節度掌書記天平吴巨鎮周遭十里石山而土穴人以為范氏慶源云補註吳郡志巻三十九
